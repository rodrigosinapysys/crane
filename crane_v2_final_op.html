// CADASTRO — Equipamentos
// ════════════════════════════════════════
function FormEquip({item,tipo,onSave,onClose}){
  const isE=!!item?.id,isEl=tipo==='elevador',modelos=isEl?MEL:MMG,label=isEl?'Elevador Cremalheira':'Mini Grua';
  const[f,setF]=useState({
    np:item?.np||'',
    codigo_interno:item?.codigo_interno||'',
    descricao_item:item?.descricao_item||'',
    numero_serie:item?.numero_serie||'',
    modelo:item?.modelo||(isEl?'CMG12':'MG500'),
    fabricante:item?.fabricante||'',
    ano_fabricacao:item?.ano_fabricacao||'',
    capacidade_kg:item?.capacidade_kg||(isEl?1200:500),
    num_max_pessoas:item?.num_max_pessoas||'',
    motorizacao:item?.motorizacao||'',
    alimentacao:item?.alimentacao||'',
    largura:item?.largura||'',
    altura_cab:item?.altura_cab||'',
    comprimento:item?.comprimento||'',
    status:item?.status||'ATIVO',
    status_operacional:item?.status_operacional||'disponivel',
    observacoes:item?.observacoes||''
  });
  const[saving,setSaving]=useState(false);const[erro,setErro]=useState('');
  const[itensEstrutura,setItensEstrutura]=useState([]);const[buscaItem,setBuscaItem]=useState('');const[showSugItem,setShowSugItem]=useState(false);
  const up=(k,v)=>setF(p=>({...p,[k]:v}));
  function mudarM(m){up('modelo',m);if(CAP[m])up('capacidade_kg',CAP[m]);}
  const statusOpAnterior=item?.status_operacional||'disponivel';

  // Carregar catálogo de itens de estrutura para o autocomplete
  useEffect(()=>{
    db.from('itens_estrutura').select('codigo,descricao,tipo_equipamento').eq('ativo',true)
      .eq('tipo_equipamento',tipo).order('descricao')
      .then(({data})=>setItensEstrutura(data||[]));
  },[tipo]);

  const sugsItem=buscaItem.length>1?itensEstrutura.filter(i=>
    i.descricao.toLowerCase().includes(buscaItem.toLowerCase())||
    i.codigo.toLowerCase().includes(buscaItem.toLowerCase())
  ).slice(0,8):[];

  async function salvar(){
    if(!f.np.trim()){setErro('Informe o NP.');return;}
    setSaving(true);setErro('');
    const statusOpAnterior=item?.status_operacional||'disponivel';
    const novoStatusOp=f.status_operacional;
    const payload={...f,tipo,
      ano_fabricacao:f.ano_fabricacao?parseInt(f.ano_fabricacao):null,
      capacidade_kg:f.capacidade_kg?parseInt(f.capacidade_kg):null,
      num_max_pessoas:f.num_max_pessoas?parseInt(f.num_max_pessoas):null,
      largura:f.largura?parseFloat(f.largura):null,
      altura_cab:f.altura_cab?parseFloat(f.altura_cab):null,
      comprimento:f.comprimento?parseFloat(f.comprimento):null,
    };
    const{data:saved,error}=isE
      ?await db.from('equipamentos').update(payload).eq('id',item.id).select().single()
      :await db.from('equipamentos').insert(payload).select().single();
    if(error){setErro(error.code==='23505'?'NP já cadastrado.':error.message);setSaving(false);return;}

    // Abrir OS automaticamente se mudou para manutenção
    if(novoStatusOp==='manutencao'&&statusOpAnterior!=='manutencao'){
      const{data:osEx}=await db.from('crane_ordens_servico').select('id').eq('np',f.np).neq('status','liberado').limit(1);
      if(!osEx||osEx.length===0){
        await db.from('crane_ordens_servico').insert({
          np:f.np,modelo:f.modelo,status:'aberta',
          data_retorno:new Date().toISOString().slice(0,10),
          criado_em:new Date().toISOString()
        });
        toast('OS aberta automaticamente para '+f.np+' 🔧');
      }
    }
    setSaving(false);
    toast(isE?label+' atualizado.':label+' cadastrado.');
    onSave(saved);
  }

  return <Modal title={isE?'Editar — NP '+item.np:'Novo '+label} onClose={onClose} lg footer={<><button className="btn btn-g" onClick={onClose}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</button></>}>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}

    {/* Identificação */}
    <div style={{fontSize:11,fontWeight:800,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.8,marginBottom:8}}>Identificação</div>
    <div className="fr2">
      <div className="fg"><label className="fl">NP <span className="req">*</span></label>
        <input style={{fontFamily:'monospace'}} value={f.np} onChange={e=>up('np',e.target.value.toUpperCase())}/></div>
      <div className="fg" style={{position:'relative'}}>
        <label className="fl">Código Interno / Descrição</label>
        <input style={{fontFamily:'monospace'}} value={buscaItem||f.codigo_interno}
          onChange={e=>{setBuscaItem(e.target.value);up('codigo_interno',e.target.value);setShowSugItem(true);}}
          onFocus={()=>setShowSugItem(true)}
          onBlur={()=>setTimeout(()=>setShowSugItem(false),180)}
          placeholder="Buscar no cadastro de itens..."/>
        {showSugItem&&sugsItem.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:99,background:'var(--white)',border:'1px solid var(--g200)',borderRadius:'var(--r)',boxShadow:'var(--shadow-md)',maxHeight:200,overflowY:'auto'}}>
          {sugsItem.map(i=><div key={i.codigo} style={{padding:'7px 12px',cursor:'pointer',fontSize:13,borderBottom:'1px solid var(--g100)'}}
            onMouseDown={()=>{up('codigo_interno',i.codigo);up('descricao_item',i.descricao);setBuscaItem('');setShowSugItem(false);}}>
            <span style={{fontFamily:'monospace',color:'var(--blue)',marginRight:8}}>{i.codigo}</span>{i.descricao}
          </div>)}
        </div>}
      </div>
    </div>
    {f.descricao_item&&<div style={{fontSize:12,color:'var(--g500)',marginTop:-8,marginBottom:8,paddingLeft:2}}>{f.descricao_item}</div>}
    <div className="fg"><label className="fl">Número de Série</label>
      <input style={{fontFamily:'monospace'}} value={f.numero_serie} onChange={e=>up('numero_serie',e.target.value)}/></div>

    <div className="dv"/>
    {/* Especificações */}
    <div style={{fontSize:11,fontWeight:800,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.8,marginBottom:8}}>Especificações</div>
    <div className="fr2">
      <div className="fg"><label className="fl">Modelo <span className="req">*</span></label>
        <select value={f.modelo} onChange={e=>mudarM(e.target.value)}>{modelos.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div className="fg"><label className="fl">Fabricante</label>
        <input value={f.fabricante} onChange={e=>up('fabricante',e.target.value)}/></div>
    </div>
    <div className={isEl?'fr3':'fr2'}>

function PainelEquip({tipo}){

function FormItemEst({item,tipoEquip,onSave,onClose}){
  const isE=!!item?.id;
  const[f,setF]=useState({codigo:item?.codigo||'',descricao:item?.descricao||'',peso_kg:item?.peso_kg!=null?item.peso_kg:'',unidade:item?.unidade||'un',fabricante:item?.fabricante||'',referencia:item?.referencia||'',observacoes:item?.observacoes||'',ativo:item?.ativo!==undefined?item.ativo:true});
  const[saving,setSaving]=useState(false);const[erro,setErro]=useState('');
  const up=(k,v)=>setF(p=>({...p,[k]:v}));
  async function salvar(){if(!f.codigo.trim()){setErro('Informe o código.');return;}if(!f.descricao.trim()){setErro('Informe a descrição.');return;}setSaving(true);setErro('');const payload={...f,tipo_equipamento:tipoEquip,peso_kg:f.peso_kg!==''&&f.peso_kg!==null?parseFloat(f.peso_kg):null};const{data,error}=isE?await db.from('itens_estrutura').update(payload).eq('id',item.id).select().single():await db.from('itens_estrutura').insert(payload).select().single();setSaving(false);if(error){setErro(error.code==='23505'?'Código já existe.':error.message);return;}toast(isE?'Item atualizado.':'Item cadastrado.');onSave(data);}
  return <Modal title={isE?'Editar — '+item.codigo:'Novo item de estrutura'} onClose={onClose} footer={<><button className="btn btn-g" onClick={onClose}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</button></>}>

    <div className="fg"><label className="fl">Código <span className="req">*</span></label><input style={{fontFamily:'monospace'}} value={f.codigo} onChange={e=>up('codigo',e.target.value)}/><div className="fh">Código único do produto</div></div>
    <div className="fg"><label className="fl">Descrição <span className="req">*</span></label><input value={f.descricao} onChange={e=>up('descricao',e.target.value)}/></div>
    <div className="dv"/>

    <div className="fg"><label className="fl">Referência</label><input value={f.referencia} onChange={e=>up('referencia',e.target.value)}/></div>
    <div className="fg"><label className="fl">Observações</label><textarea value={f.observacoes} onChange={e=>up('observacoes',e.target.value)} rows={2}/></div>
    {isE&&<label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,marginTop:6}}><input type="checkbox" checked={f.ativo} onChange={e=>up('ativo',e.target.checked)}/>Item ativo</label>}
  </Modal>;
}

// ── SOLICITAÇÕES DE COMPRA ───────────────────────────────
function SolicitacoesCompra({solicitacoes,onUpdate}){
  // Agrupa por OS
  const byOS=useMemo(()=>{
    const map={};
    (solicitacoes||[]).forEach(s=>{
      const np=s.crane_ordens_servico?.np||'—';
      const modelo=s.crane_ordens_servico?.modelo||'';
      const osId=s.os_id;
      if(!map[osId])map[osId]={osId,np,modelo,itens:[]};
      map[osId].itens.push(s);
    });
    return Object.values(map).sort((a,b)=>a.np.localeCompare(b.np));
  },[solicitacoes]);

  async function marcarAtendida(item){
    await db.from('crane_os_inspecao_itens').update({compra_atendida:true,compra_atendida_em:new Date().toISOString().slice(0,10)}).eq('id',item.id);
    toast('Item marcado como atendido ✅');onUpdate();
  }
  async function marcarPendente(item){
    await db.from('crane_os_inspecao_itens').update({compra_atendida:false,compra_atendida_em:null}).eq('id',item.id);
    toast('Item reaberto');onUpdate();
  }

  const totalPendentes=(solicitacoes||[]).filter(s=>!s.compra_atendida).length;
  const totalAtendidos=(solicitacoes||[]).filter(s=>s.compra_atendida).length;

  return <div>
    {/* KPIs */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
      <div className="kpi"><div className="kl">Total solicitações</div><div className="kv">{(solicitacoes||[]).length}</div></div>
      <div className="kpi"><div className="kl">Pendentes</div><div className="kv" style={{color:totalPendentes>0?'var(--amber)':'var(--g300)'}}>{totalPendentes}</div></div>
      <div className="kpi"><div className="kl">Atendidos</div><div className="kv" style={{color:'var(--green)'}}>{totalAtendidos}</div></div>
    </div>

    {byOS.length===0
      ?<div className="emp"><div className="ei">📋</div><h3>Nenhuma solicitação de compra</h3><p>Solicitações são geradas na aba Inspeção das Ordens de Serviço</p></div>
      :<div style={{display:'flex',flexDirection:'column',gap:12}}>
        {byOS.map(grupo=>{
          const pendentes=grupo.itens.filter(i=>!i.compra_atendida).length;
          const total=grupo.itens.length;
          return <div key={grupo.osId} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',overflow:'hidden',boxShadow:'var(--shadow)'}}>
            {/* Header OS */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:pendentes===0?'var(--green-lt)':'var(--amber-lt)',borderBottom:'1px solid var(--g100)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span className="cod">{grupo.np}</span>
                <span style={{fontSize:13,fontWeight:600,color:'var(--g900)'}}>{grupo.modelo}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:12,color:'var(--g500)'}}>{total-pendentes}/{total} atendidos</span>
                {pendentes===0
                  ?<span className="bdg" style={{background:'var(--green-lt)',color:'var(--green)',border:'1px solid #86EFAC'}}>✅ Completo</span>
                  :<span className="bdg" style={{background:'var(--amber-lt)',color:'var(--amber)',border:'1px solid #FCD34D'}}>⏳ {pendentes} pendente(s)</span>}
              </div>
            </div>
            {/* Itens */}
            <div>
              {grupo.itens.map((item,idx)=><div key={item.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',borderBottom:idx<grupo.itens.length-1?'1px solid var(--g50)':'none',background:item.compra_atendida?'#f0fdf4':'var(--white)'}}>
                {item.item_codigo&&<span className="cod" style={{fontSize:10,flexShrink:0}}>{item.item_codigo}</span>}
                <span style={{flex:1,fontSize:13,color:item.compra_atendida?'var(--g500)':'var(--g900)',textDecoration:item.compra_atendida?'line-through':''}}>{item.item_descricao||item.descricao}</span>
                <span style={{fontSize:12,color:'var(--g400)',flexShrink:0}}>Qtd: {item.quantidade||1} {item.unidade||'un'}</span>
                {item.compra_atendida
                  ?<div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:11,color:'var(--green)',fontWeight:700}}>✓ {fmtD(item.compra_atendida_em)}</span>
                    <button className="btn btn-g" style={{padding:'4px 10px',fontSize:11}} onClick={()=>marcarPendente(item)}>↩ Reabrir</button>
                  </div>
                  :<button className="btn btn-ok" style={{padding:'5px 12px',fontSize:12,flexShrink:0}} onClick={()=>marcarAtendida(item)}>✓ Atendido</button>}
              </div>)}
            </div>
          </div>;
        })}
      </div>
    }
  </div>;
}

function AlmoxarifadoView(){
  const[abaAlmo,setAbaAlmo]=useState('estoque');
  const[solicitacoes,setSolicitacoes]=useState([]);
  const[snaps,setSnaps]=useState([]);
  const[selSnap,setSelSnap]=useState(null);
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(true);
  const[loadingItems,setLoadingItems]=useState(false);
  const[busca,setBusca]=useState(false);
  const[buscaTxt,setBuscaTxt]=useState('');
  const[step,setStep]=useState('drop');
  const[rawRows,setRawRows]=useState([]);
  const[headers,setHeaders]=useState([]);
  const[colMap,setColMap]=useState({codigo:'',descricao:'',saldo:'',unidade:''});
  const[snapDesc,setSnapDesc]=useState('');
  const[snapDate,setSnapDate]=useState(new Date().toISOString().slice(0,10));
  const[saving,setSaving]=useState(false);
  const[showImp,setShowImp]=useState(false);
  const[osPendentes,setOsPendentes]=useState([]);
  const[inspecaoMap,setInspecaoMap]=useState({});
  const fileRef=useRef();

  async function carregar(){
    setLoading(true);
    const[{data:snapList},{data:osList},{data:solList}]=await Promise.all([
      db.from('crane_almo_snapshots').select('*').order('snap_date',{ascending:false}).limit(30),
      db.from('crane_ordens_servico').select('id,np,modelo,status').eq('aguardando_pecas',true).neq('status','liberado'),
      db.from('crane_os_inspecao_itens').select('*,crane_ordens_servico(np,modelo,status)').eq('gerar_compra',true).order('criado_em',{ascending:false}),
    ]);
    setSnaps(snapList||[]);
    setOsPendentes(osList||[]);
    setSolicitacoes(solList||[]);
    if(snapList&&snapList.length>0)setSelSnap(snapList[0].id);
    else setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  useEffect(()=>{
    if(!selSnap){setItems([]);setLoading(false);return;}
    (async()=>{
      setLoadingItems(true);
      const{data}=await db.from('crane_almo_items').select('*').eq('snapshot_id',selSnap).order('codigo');
      setItems(data||[]);
      setLoadingItems(false);
      setLoading(false);
    })();
  },[selSnap]);

  useEffect(()=>{
    if(!osPendentes.length)return;
    (async()=>{
      const map={};
      await Promise.all(osPendentes.map(async os=>{
        const{data}=await db.from('crane_os_inspecao_itens').select('item_codigo,item_descricao,quantidade').eq('os_id',os.id).eq('tipo','peca');
        map[os.id]=data||[];
      }));
      setInspecaoMap(map);
    })();
  },[osPendentes]);

  const stockMap=useMemo(()=>{const m={};items.forEach(i=>{if(i.codigo)m[i.codigo.trim().toUpperCase()]=Number(i.saldo||0);});return m;},[items]);

  function checkarOS(os){
    const pecas=(inspecaoMap[os.id]||[]).filter(i=>i.item_codigo);
    if(!pecas.length)return{ok:null,faltando:[]};
    const faltando=pecas.filter(i=>(stockMap[i.item_codigo.trim().toUpperCase()]||0)<Number(i.quantidade||1));
    return{ok:faltando.length===0,faltando};
  }

  // ── XLSX import ──
  function onDrop(e){
    e.preventDefault();
    const file=e.dataTransfer?e.dataTransfer.files[0]:e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
      if(!rows.length)return;
      // Protheus: linha 0 pode ser título ("Saldos em Estoque"), linha 1 é o cabeçalho real
      // Detecta: se a primeira linha tem poucas células preenchidas, pula para a próxima
      const firstRowFilled=rows[0].filter(c=>String(c).trim()!=='').length;
      const headerRowIdx=firstRowFilled<=2?1:0;
      const hdrs=rows[headerRowIdx].map(h=>String(h).trim());
      setHeaders(hdrs);
      setRawRows(rows.slice(headerRowIdx+1).filter(r=>r.some(c=>String(c).trim()!=='')));
      // auto-detect colunas do Protheus: CODIGO, DESCRICAO, U.M., SALDO EM ESTOQUE
      const auto={codigo:'',descricao:'',saldo:'',unidade:''};
      hdrs.forEach(h=>{
        const hl=h.toLowerCase().trim();
        if(!auto.codigo&&(hl==='codigo'||hl==='código'||hl==='cod'||hl==='item'||hl==='produto'))auto.codigo=h;
        if(!auto.descricao&&(hl==='descricao'||hl==='descrição'||hl.includes('descri')||hl==='nome'))auto.descricao=h;
        if(!auto.saldo&&(hl==='saldo em estoque'||hl.includes('saldo')||hl.includes('qtd')||hl.includes('quant')||hl.includes('estoque')))auto.saldo=h;
        if(!auto.unidade&&(hl==='u.m.'||hl==='um'||hl==='un'||hl.includes('unid')))auto.unidade=h;
      });
      setColMap(auto);
      setStep('map');
    };
    reader.readAsArrayBuffer(file);
  }

  async function importar(){
    if(!colMap.codigo||!colMap.saldo){toast('Mapeie ao menos Código e Saldo','err');return;}
    setSaving(true);
    const{data:snap,error:err1}=await db.from('crane_almo_snapshots').insert({snap_date:snapDate,descricao:snapDesc||null}).select().single();
    if(err1){toast('Erro ao criar snapshot: '+err1.message,'err');setSaving(false);return;}
    const iCod=headers.indexOf(colMap.codigo);
    const iDesc=headers.indexOf(colMap.descricao);
    const iSald=headers.indexOf(colMap.saldo);
    const iUn=colMap.unidade?headers.indexOf(colMap.unidade):-1;
    const novosRows=rawRows.map(r=>({
      snapshot_id:snap.id,
      codigo:r[iCod]!=null&&r[iCod]!==''?String(r[iCod]).trim().toUpperCase():null,
      descricao:iDesc>=0&&r[iDesc]!=null?String(r[iDesc]).trim()||null:null,
      saldo:iSald>=0?parseFloat(String(r[iSald]||'0').replace(',','.'))||0:0,
      unidade:iUn>=0&&r[iUn]!=null?String(r[iUn]).trim()||'un':'un',
    })).filter(r=>r.codigo&&r.codigo.length>0);

    // Histórico: busca todos os códigos já vistos em snapshots anteriores
    // e adiciona ao novo snapshot com saldo 0 se não estiverem na nova importação
    try{
      const{data:snapsAnt}=await db.from('crane_almo_snapshots').select('id').neq('id',snap.id).order('snap_date',{ascending:false}).limit(5);
      if(snapsAnt&&snapsAnt.length>0){
        const idsAnt=snapsAnt.map(s=>s.id);
        const{data:itensAnt}=await db.from('crane_almo_items')
          .select('codigo,descricao,unidade').in('snapshot_id',idsAnt);
        if(itensAnt&&itensAnt.length>0){
          const codigosNovos=new Set(novosRows.map(r=>r.codigo));
          // Mapa de código → {descricao, unidade} dos snapshots anteriores
          const mapaAnt={};
          itensAnt.forEach(i=>{if(i.codigo&&!mapaAnt[i.codigo])mapaAnt[i.codigo]={descricao:i.descricao,unidade:i.unidade};});
          // Adiciona com saldo 0 os códigos que não estão na importação nova
          const extras=Object.entries(mapaAnt)
            .filter(([cod])=>!codigosNovos.has(cod))
            .map(([cod,v])=>({snapshot_id:snap.id,codigo:cod,descricao:v.descricao,saldo:0,unidade:v.unidade||'un'}));
          if(extras.length>0){
            const chunkSize=200;
            for(let i=0;i<extras.length;i+=chunkSize){
              await db.from('crane_almo_items').insert(extras.slice(i,i+chunkSize));
            }
          }
        }
      }
    }catch(e){console.warn('Histórico parcial:',e);}

    const chunkSize=200;
    for(let i=0;i<novosRows.length;i+=chunkSize){
      const{error}=await db.from('crane_almo_items').insert(novosRows.slice(i,i+chunkSize));
      if(error){toast('Erro ao inserir itens: '+error.message,'err');setSaving(false);return;}
    }
    toast('Importado! '+novosRows.length+' itens novos · histórico preservado');
    setSaving(false);setShowImp(false);setStep('drop');setRawRows([]);setHeaders([]);setSnapDesc('');
    carregar();
  }

  async function excluirSnap(id){
    if(!window.confirm('Excluir este snapshot e todos os seus itens?'))return;
    await db.from('crane_almo_snapshots').delete().eq('id',id);
    toast('Snapshot excluído');carregar();
  }

  const filtrados=useMemo(()=>{
    if(!buscaTxt.trim())return items;
    const q=buscaTxt.toLowerCase();
    return items.filter(i=>(i.codigo||'').toLowerCase().includes(q)||(i.descricao||'').toLowerCase().includes(q));
  },[items,buscaTxt]);

  const snapSel=snaps.find(s=>s.id===selSnap);
  const semEstoque=items.filter(i=>Number(i.saldo||0)===0).length;
  const comSaldo=items.length-semEstoque;

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:10}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>Almoxarifado</h2>
        <p style={{fontSize:13,color:'var(--g500)'}}>Estoque · Solicitações de compra por OS</p>
      </div>
      {abaAlmo==='estoque'&&<button className="btn btn-p" onClick={()=>setShowImp(true)}>⬆ Importar Planilha</button>}
    </div>
    <div className="tabs" style={{marginBottom:20}}>
      <button className={'tab'+(abaAlmo==='estoque'?' a':'')} onClick={()=>setAbaAlmo('estoque')}>📦 Estoque do Dia</button>
      <button className={'tab'+(abaAlmo==='solicitacoes'?' a':'')} onClick={()=>setAbaAlmo('solicitacoes')}>
        {'📋 Solicitações'+(solicitacoes.filter(s=>!s.compra_atendida).length>0?' ('+solicitacoes.filter(s=>!s.compra_atendida).length+' pendente(s))':'')}
      </button>
    </div>
    {abaAlmo==='solicitacoes'&&<SolicitacoesCompra solicitacoes={solicitacoes} onUpdate={carregar}/>}
    {abaAlmo==='estoque'&&<div>

    {/* OS aguardando peças */}
    {osPendentes.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Equipamentos aguardando peças ({osPendentes.length})</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {osPendentes.map(os=>{
          const ch=checkarOS(os);
          const cor=ch.ok===null?'var(--g300)':ch.ok?'var(--green)':'var(--amber)';
          return <div key={os.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:'12px 16px',display:'flex',alignItems:'center',gap:14,boxShadow:'var(--shadow)',borderLeft:'4px solid '+cor}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                <span className="cod">{os.np}</span>
                <span style={{fontSize:13,fontWeight:600}}>{os.modelo}</span>
              </div>
              {ch.ok===null&&<div style={{fontSize:12,color:'var(--g400)'}}>Sem peças com código mapeado na inspeção</div>}
              {ch.ok===true&&<div style={{fontSize:12,color:'var(--green)',fontWeight:700}}>✅ Todas as peças disponíveis no estoque atual</div>}
              {ch.ok===false&&<div>
                <div style={{fontSize:12,color:'var(--amber)',fontWeight:600}}>⏳ {ch.faltando.length} peça(s) ainda sem saldo suficiente</div>
                <div style={{fontSize:11,color:'var(--g400)',marginTop:2}}>{ch.faltando.map(i=>(i.item_codigo||'?')+' (need '+i.quantidade+')').join(' · ')}</div>
              </div>}
            </div>
            {ch.ok&&<span className="bdg" style={{background:'var(--green-lt)',color:'var(--green)',flexShrink:0}}>Pronto p/ manutenção</span>}
          </div>;
        })}
      </div>
      <div style={{height:1,background:'var(--g100)',margin:'18px 0'}}/>
    </div>}

    {/* Snapshot selector + KPIs */}
    <div className="bar">
      <select style={{width:'auto',minWidth:220}} value={selSnap||''} onChange={e=>setSelSnap(e.target.value)}>
        <option value="">Selecione o snapshot...</option>
        {snaps.map(s=><option key={s.id} value={s.id}>{fmtD(s.snap_date)}{s.descricao?' — '+s.descricao:''}</option>)}
      </select>
      {selSnap&&<button className="btn btn-d" style={{padding:'6px 10px',fontSize:12}} onClick={()=>excluirSnap(selSnap)}>🗑 Excluir snapshot</button>}
      <div className="sw" style={{marginLeft:'auto'}}><SI/><input placeholder="Buscar código ou descrição..." value={buscaTxt} onChange={e=>setBuscaTxt(e.target.value)}/></div>
    </div>

    {selSnap&&!loadingItems&&items.length>0&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
      <div className="kpi"><div className="kl">Total de itens</div><div className="kv">{items.length}</div><div className="ks">no snapshot de {fmtD(snapSel?.snap_date)}</div></div>
      <div className="kpi"><div className="kl">Com saldo</div><div className="kv" style={{color:'var(--green)'}}>{comSaldo}</div><div className="ks">itens disponíveis</div></div>
      <div className="kpi"><div className="kl">Sem estoque</div><div className="kv" style={{color:semEstoque>0?'var(--red)':'var(--g300)'}}>{semEstoque}</div><div className="ks">itens zerados</div></div>
    </div>}

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :loadingItems?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando itens...</div>
    :!selSnap?<div className="emp"><div className="ei">📦</div><h3>Nenhum snapshot selecionado</h3><p>Importe uma planilha de estoque ou selecione um snapshot existente</p></div>
    :filtrados.length===0?<div className="emp"><div className="ei">🔍</div><h3>Nenhum item encontrado</h3></div>
    :<div className="card"><div className="tw"><table>
      <thead><tr><th>Código</th><th>Descrição</th><th>Saldo</th><th>Un</th><th>Status</th></tr></thead>
      <tbody>{filtrados.map(i=>{
        const s=Number(i.saldo||0);
        return <tr key={i.id}>
          <td><span className="cod">{i.codigo}</span></td>
          <td style={{color:'var(--g700)'}}>{i.descricao||'—'}</td>
          <td style={{fontFamily:'monospace',fontWeight:700,color:s===0?'var(--red)':s<3?'var(--amber)':'var(--g900)'}}>{s}</td>
          <td style={{color:'var(--g500)'}}>{i.unidade||'un'}</td>
          <td><span className="bdg" style={{background:s===0?'var(--red-lt)':s<3?'var(--amber-lt)':'var(--green-lt)',color:s===0?'var(--red)':s<3?'var(--amber)':'var(--green)'}}>{s===0?'Sem estoque':s<3?'Baixo':'OK'}</span></td>
        </tr>;
      })}</tbody>
    </table></div></div>}

    </div>}
    {/* Modal importação */}
    {showImp&&<Modal title="Importar Planilha de Estoque" onClose={()=>{setShowImp(false);setStep('drop');setRawRows([]);setHeaders([]);}} lg>
      {step==='drop'&&<div>
        <div className="fr2" style={{marginBottom:14}}>
          <div className="fg"><label className="fl">Data do estoque <span className="req">*</span></label><input type="date" value={snapDate} onChange={e=>setSnapDate(e.target.value)}/></div>
          <div className="fg"><label className="fl">Descrição (opcional)</label><input value={snapDesc} onChange={e=>setSnapDesc(e.target.value)} placeholder="Ex: Almoxarifado — manhã"/></div>
        </div>
        <div style={{border:'2px dashed var(--g200)',borderRadius:'var(--rl)',padding:40,textAlign:'center',cursor:'pointer',background:'var(--g50)',transition:'.15s'}}
          onDragOver={e=>e.preventDefault()} onDrop={onDrop} onClick={()=>fileRef.current.click()}>
          <div style={{fontSize:36,marginBottom:8}}>📊</div>
          <div style={{fontSize:14,fontWeight:700,color:'var(--g700)',marginBottom:4}}>Arraste a planilha aqui ou clique para selecionar</div>
          <div style={{fontSize:12,color:'var(--g400)'}}>Formato .xlsx ou .csv — colunas: Código, Descrição, Saldo/Quantidade, Unidade</div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={onDrop}/>
        </div>
      </div>}
      {step==='map'&&<div>
        <div className="al al-i"><span>ℹ</span><span>{rawRows.length} linhas detectadas. Mapeie as colunas abaixo.</span></div>
        <div className="fr2">
          {[{k:'codigo',lb:'Código *'},{k:'descricao',lb:'Descrição'},{k:'saldo',lb:'Saldo/Quantidade *'},{k:'unidade',lb:'Unidade'}].map(({k,lb})=>(
            <div key={k} className="fg">
              <label className="fl">{lb}</label>
              <select value={colMap[k]} onChange={e=>setColMap(p=>({...p,[k]:e.target.value}))}>
                <option value="">— ignorar —</option>
                {headers.map(h=><option key={h} value={h}>{h}</option>)}
              </select>
            </div>
          ))}
        </div>
        {/* Preview */}
        {rawRows.length>0&&colMap.codigo&&<div style={{marginTop:8}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--g500)',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>Prévia (5 primeiras linhas)</div>
          <div className="card"><div className="tw"><table>
            <thead><tr><th>Código</th><th>Descrição</th><th>Saldo</th><th>Un</th></tr></thead>
            <tbody>{rawRows.slice(0,5).map((r,i)=>{
              const iC=headers.indexOf(colMap.codigo);
              const iD=headers.indexOf(colMap.descricao);
              const iS=headers.indexOf(colMap.saldo);
              const iU=colMap.unidade?headers.indexOf(colMap.unidade):-1;
              return <tr key={i}>
                <td><span className="cod">{String(r[iC]||'').trim()||'—'}</span></td>
                <td>{iD>=0?String(r[iD]||''):'—'}</td>
                <td style={{fontFamily:'monospace',fontWeight:700}}>{iS>=0?r[iS]:'—'}</td>
                <td>{iU>=0?r[iU]:'un'}</td>
              </tr>;
            })}</tbody>
          </table></div></div>
        </div>}
        <div className="mf" style={{padding:'14px 0 0',border:'none',justifyContent:'space-between'}}>
          <button className="btn btn-g" onClick={()=>setStep('drop')}>← Voltar</button>
          <button className="btn btn-p" onClick={importar} disabled={saving}>{saving?<><span className="spin">↻</span> Importando...</>:'Importar '+rawRows.length+' linhas'}</button>
        </div>
      </div>}
    </Modal>}
  </div>;
}

// ════════════════════════════════════════════════════════════════
// GESTÃO DE OBRAS — v2 (Pré-reserva / SYNAPSYS-style)
// ════════════════════════════════════════════════════════════════

const OBRA_ST = {
  negociacao:   {lb:'Em Negociação',  ic:'💬', c:'var(--blue)',    bg:'var(--blue-lt)'},
  pre_reservado:{lb:'Pré-reservado',  ic:'🔒', c:'var(--purple)',  bg:'var(--purple-lt)'},
  reservado:    {lb:'Reservado',      ic:'✅', c:'var(--green)',   bg:'var(--green-lt)'},
  encerrado:    {lb:'Encerrado',      ic:'📦', c:'var(--g400)',    bg:'var(--g100)'},
};

// ── cálculo romaneio (apenas NF=SIM) ─────────────────────
function calcRomaneio(p, baseItens){
  const{modelo,altura:H,num_acessos:C,cabine,tipo_cancela,dist_gravatas,tipo_modulo,tipo_gravata,tipo_cabine}=p;
  const CB=cabine==='dupla'?2:1;
  const DG=dist_gravatas==='9m'?9:6;
  const isMG=['MG500-RACK','MG500-C3'].includes(modelo);
  const ceil=n=>Math.ceil(n);

  if(isMG){
    return baseItens
      .filter(i=>i.item_nf&&i.modelos_aplicaveis&&i.modelos_aplicaveis.includes(modelo==='MG500-RACK'?'MG500-RACK':'MG500-C3'))
      .map(i=>({codigo:i.codigo,descricao:i.descricao,grupo:i.grupo||'Geral',quantidade:1,unidade:'un'}));
  }

  const modDuplos=ceil((H+4.5)/1.5);
  const gravatas=ceil((H+7.5)/DG);
  const guias=ceil((H+4.5)/3);

  function qtd(cod){
    switch(cod){
      case '0610000037': return modelo==='CMG12'?CB:0;
      case '0610000008': return modelo==='CMG20'?CB:0;
      case '0610000077': return ['RACK1500','RACK2000'].includes(modelo)?CB:0;
      case '0610000133': return modelo==='CMG12'?1:0;
      case '0610000134': return modelo==='CMG20'?1:0;
      case '0610000056': return tipo_cabine==='cesto'&&modelo==='CMG12'?CB:0;
      case '0646650001': return tipo_cabine==='cesto'&&modelo==='CMG20'?CB:0;
      case '0646650003': return modelo==='CMG12'?CB:0;
      case '0646650013': return ['RACK1500','RACK2000'].includes(modelo)?CB:0;
      case '0646650014': return modelo==='CMG20'?CB:0;
      case '0615110125': return tipo_cabine==='trolley'?CB:0;
      case '0615110147': return CB;
      case '0615110099': return CB;
      case '0615110062': return CB;
      case '0615110063': return 0;
      case '0610000049': return modelo==='CMG20'?CB:0;
      case '0615110155': return CB;
      case '0615110198': return CB;
      case '0615110195': return C;
      case '0615110167': return ['CMG12','CMG20'].includes(modelo)?1:0;
      case '0615110166': return ['RACK1500','RACK2000'].includes(modelo)?1:0;
      case '0615110117': return modelo==='CMG12'?CB:0;
      case '0615110118': return modelo==='CMG20'?CB:0;
      case '0615110244': return ['RACK1500','RACK2000'].includes(modelo)?CB:0;
      case '0615110032': return ['RACK1500','RACK2000'].includes(modelo)?CB:0;
      case '0615110023': return ceil(H*CB*1.2/10)*10;
      case '0610000053': return 0; // seleção manual tensão
      case '0610000054': return 0;
      case '0615110123': return 0;
      // BASE
      case '0615110013': return ['CMG12','CMG20'].includes(modelo)?1:0;
      case '0615110012': return ['RACK1500','RACK2000'].includes(modelo)?1:0;
      // MÓDULOS
      case '0615110070': return tipo_modulo==='CMG'&&modelo==='CMG12'?modDuplos:0;
      case '0615110071': return tipo_modulo==='CMG'&&modelo==='CMG20'?modDuplos:0;
      case '0615110072': return tipo_modulo==='CMG'&&['RACK1500','RACK2000'].includes(modelo)?modDuplos:0;
      case '0615110073': return tipo_modulo==='LOC'&&['RACK1500','RACK2000'].includes(modelo)?modDuplos:0;
      case '0615110074': return tipo_modulo==='CMG'&&['CMG12','CMG20'].includes(modelo)?CB:0;
      case '0615110078': return tipo_modulo==='CMG'&&['RACK1500','RACK2000'].includes(modelo)?CB:0;
      case '0610000044': return ['CMG12','CMG20'].includes(modelo)?guias:0;
      case '0615110058': return ['RACK1500','RACK2000'].includes(modelo)?guias:0;
      // GRAVATAS
      case '0610000023': return ['CMG12','CMG20'].includes(modelo)&&tipo_gravata==='CMG'?gravatas:0;
      case '0627030004': return ['RACK1500','RACK2000'].includes(modelo)?gravatas:0;
      // CANCELAS
      case '0615110029': return tipo_cancela==='unica'?C:0;
      case '0610000024': return tipo_cancela==='dupla'?C:0;
      case '0610000045': return C;
      default: return null;
    }
  }

  return baseItens
    .filter(i=>i.item_nf&&i.tipo_equipamento==='elevador')
    .map(i=>({
      codigo:i.codigo, descricao:i.descricao, grupo:i.grupo||'Geral',
      quantidade:qtd(i.codigo)??0, unidade:i.codigo==='0615110023'?'m':'un',
      peso_kg:i.peso_kg||null
    }))
    .filter(i=>i.quantidade>0);
}

  const[selObra,setSelObra]=useState(null);
  const[novaObra,setNovaObra]=useState(false);

  async function carregar(){
    setLoading(true);
    const{data}=await db.from('crane_obras')
      .select('*, crane_obra_equipamentos(id,tipo,modelo,np_vinculado,status)')
      .order('criado_em',{ascending:false});

function ObraForm({onSave,onClose,obraEdit}){
  const isEdit=!!obraEdit;
  const[f,setF]=useState({
    cliente:obraEdit?.cliente||'',
    razao_social:obraEdit?.razao_social||'',
    cnpj:obraEdit?.cnpj||'',
    nome_obra:obraEdit?.nome_obra||'',
    num_contrato:obraEdit?.num_contrato||'',
    previsao_saida:obraEdit?.previsao_saida||'',
    data_inicio_contrato:obraEdit?.data_inicio_contrato||'',
    data_fim_contrato:obraEdit?.data_fim_contrato||'',
    endereco:obraEdit?.endereco||'',
    vendedor:obraEdit?.vendedor||'',
    observacoes:obraEdit?.observacoes||''
  });
  const[equips,setEquips]=useState([{tipo:'elevador',modelo:'CMG12'}]);
  const[saving,setSaving]=useState(false);const[erro,setErro]=useState('');

  async function salvar(){
    if(!f.razao_social.trim()){setErro('Informe a Razão Social.');return;}
    if(!f.cnpj.trim()){setErro('Informe o CNPJ.');return;}
    if(!f.nome_obra.trim()){setErro('Informe o Nome da Obra.');return;}
    if(!f.previsao_saida){setErro('Informe a Previsão de Saída.');return;}
    if(!isEdit&&equips.length===0){setErro('Adicione ao menos 1 equipamento.');return;}
    setSaving(true);setErro('');
    const payload={
      ...f,
      cliente:f.razao_social, // mantém compatibilidade com campo cliente
      status:'negociacao'
    };
    const{data:obra,error}=isEdit
      ?await db.from('crane_obras').update(payload).eq('id',obraEdit.id).select().single()
      :await db.from('crane_obras').insert(payload).select().single();
    if(error){setErro(error.message);setSaving(false);return;}
    if(!isEdit){
      for(const e of equips){
        await db.from('crane_obra_equipamentos').insert({obra_id:obra.id,tipo:e.tipo,modelo:e.modelo,cabine:e.cabine||'simples'});
      }
    }
    toast(isEdit?'Obra atualizada!':'Obra criada! ✅');
    setSaving(false);onSave(obra);
  }

  return <div style={{maxWidth:680,margin:'0 auto'}}>

    </div>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}

    <div className="card" style={{padding:22,marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:800,color:'var(--g700)',marginBottom:14,textTransform:'uppercase',letterSpacing:.5}}>📋 Dados do Cliente</div>
      <div className="fr2">
        <div className="fg"><label className="fl">Razão Social <span className="req">*</span></label>
          <input value={f.razao_social} onChange={e=>setF(p=>({...p,razao_social:e.target.value}))} placeholder="Razão Social da empresa"/></div>
        <div className="fg"><label className="fl">CNPJ <span className="req">*</span></label>
          <input value={f.cnpj} onChange={e=>setF(p=>({...p,cnpj:e.target.value}))} placeholder="00.000.000/0000-00"/></div>
      </div>
      <div className="fr2">
        <div className="fg"><label className="fl">Nome da Obra <span className="req">*</span></label>
          <input value={f.nome_obra} onChange={e=>setF(p=>({...p,nome_obra:e.target.value}))} placeholder="Nome ou identificação da obra"/></div>
        <div className="fg"><label className="fl">Contrato</label>
          <input value={f.num_contrato} onChange={e=>setF(p=>({...p,num_contrato:e.target.value}))} placeholder="Nº do contrato"/></div>
      </div>
      <div className="fr2">
        <div className="fg"><label className="fl">Previsão de Saída <span className="req">*</span></label>
          <input type="date" value={f.previsao_saida} onChange={e=>setF(p=>({...p,previsao_saida:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Vendedor</label>
          <input value={f.vendedor} onChange={e=>setF(p=>({...p,vendedor:e.target.value}))} placeholder="Nome do vendedor responsável"/></div>
      </div>
      <div className="fr2">
        <div className="fg"><label className="fl">Início do Contrato</label>
          <input type="date" value={f.data_inicio_contrato} onChange={e=>setF(p=>({...p,data_inicio_contrato:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Fim do Contrato <span style={{fontSize:10,color:'var(--g400)',fontWeight:400}}>(base para preventivas)</span></label>
          <input type="date" value={f.data_fim_contrato} onChange={e=>setF(p=>({...p,data_fim_contrato:e.target.value}))}/></div>
      </div>
      <div className="fg"><label className="fl">Endereço da Obra</label>
        <input value={f.endereco} onChange={e=>setF(p=>({...p,endereco:e.target.value}))} placeholder="Endereço"/></div>

        <textarea rows={2} value={f.observacoes} onChange={e=>setF(p=>({...p,observacoes:e.target.value}))} style={{resize:'vertical'}}/></div>
    </div>

    <div className="card" style={{padding:22,marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:800,color:'var(--g700)',textTransform:'uppercase',letterSpacing:.5}}>🏗 Equipamentos <span className="req">*</span></div>
        <button className="btn btn-g" style={{padding:'5px 12px',fontSize:12}} onClick={()=>setEquips(p=>[...p,{tipo:'elevador',modelo:'CMG12'}])}>+ Adicionar</button>

    <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
