          <option value="">— Selecione para pré-preencher —</option>
          {CATALOGO_COMPONENTES.filter(c=>c.tipo==='motoredutor').map(c=><option key={c.om} value={c.om}>{c.om} — {c.descricao}</option>)}
        </select>
      </div>
      <div className="fr3"><div className="fg"><label className="fl">Modelo</label><input value={form.modelo} onChange={e=>setForm(p=>({...p,modelo:e.target.value}))}/></div><div className="fg"><label className="fl">Código Protheus</label><input value={form.codigo_protheus||''} onChange={e=>setForm(p=>({...p,codigo_protheus:e.target.value}))} placeholder="Ex: 0615110187" style={{fontFamily:'monospace'}}/></div><div className="fg"><label className="fl">OM (Ordem de Manutenção)</label><input value={form.om||''} onChange={e=>setForm(p=>({...p,om:e.target.value}))} placeholder="Nº da OM"/></div></div>
      <div className="fg"><label className="fl">Descrição</label><input value={form.descricao||''} onChange={e=>setForm(p=>({...p,descricao:e.target.value}))} placeholder="Ex: Motoredutor de subida, redutor de tração..."/></div>
      <div className="fr3"><div className="fg"><label className="fl">Tensão (V)</label><input value={form.tensao||''} onChange={e=>setForm(p=>({...p,tensao:e.target.value}))} placeholder="Ex: 380V"/></div><div className="fg"><label className="fl">KW</label><input type="number" step="0.1" value={form.kw} onChange={e=>setForm(p=>({...p,kw:e.target.value}))}/></div><div className="fg"><label className="fl">RPM</label><input type="number" value={form.rpm} onChange={e=>setForm(p=>({...p,rpm:e.target.value}))}/></div></div>
      <div className="fr3"><div className="fg"><label className="fl">Hz</label><input type="number" step="0.1" value={form.hz} onChange={e=>setForm(p=>({...p,hz:e.target.value}))}/></div><div className="fg"><label className="fl">Validade Laudo LP</label><input type="date" value={form.validade_lp} onChange={e=>setForm(p=>({...p,validade_lp:e.target.value}))}/></div><div className="fg"><label className="fl">Validade Ensaio Não Destrutivo</label><input type="date" value={form.validade_end||''} onChange={e=>setForm(p=>({...p,validade_end:e.target.value}))}/></div></div>
      {form.status==='instalado'&&<div className="fr2"><div className="fg"><label className="fl">NP Instalado</label><select value={form.np_atual} onChange={e=>setForm(p=>({...p,np_atual:e.target.value}))}><option value="">Selecione...</option>{equips.map(e=><option key={e.np} value={e.np}>{e.np} — {e.modelo}</option>)}</select></div><div className="fg"><label className="fl">Data Instalação</label><input type="date" value={form.data_instalacao_atual} onChange={e=>setForm(p=>({...p,data_instalacao_atual:e.target.value}))}/></div></div>}
    </Modal>}
    {modalLaudos&&<ModalLaudos componenteId={modalLaudos.id} tipoComponente="motoredutor" tag={modalLaudos.tag} onClose={()=>{setModalLaudos(null);carregar();}}/>}
    {modalMatriz&&<ModalEnvioMatriz componenteId={modalMatriz.id} tipoComponente="motoredutor" tag={modalMatriz.tag} onClose={()=>{setModalMatriz(null);carregar();}}/>}
  </div>;
}

// ── PAINEL FREIOS ─────────────────────────────────────────

  // BUG FIX: negação corrigida
  const filtrados=lista.filter(f=>!busca||f.tag.toLowerCase().includes(busca.toLowerCase())||(f.numero_serie||'').toLowerCase().includes(busca.toLowerCase())||(f.modelo||'').toLowerCase().includes(busca.toLowerCase()));
  const STATUS={disponivel:{cls:'st-disp',lb:'Disponível'},manutencao:{cls:'st-manut',lb:'Manutenção'},instalado:{cls:'st-inst',lb:'Instalado'},na_matriz:{cls:'st-matriz',lb:'Na Matriz'},descartado:{cls:'st-desc',lb:'Descartado'}};
  function abrirNovo(){setForm({tag:'',numero_serie:'',modelo:'',status:'disponivel',np_atual:'',data_instalacao_atual:'',data_teste_queda:'',validade_teste:''});setErro('');setModal('form');}
  function abrirEditar(f){setForm({...f,np_atual:f.np_atual||'',data_instalacao_atual:f.data_instalacao_atual||'',data_teste_queda:f.data_teste_queda||'',validade_teste:f.validade_teste||''});setErro('');setModal('form');}

  // Verifica se componente está em NP com OS liberada e pede confirmação para reabrir
  async function confirmarReabertura(np){
    if(!np)return true;
    const npNorm=np.trim().toUpperCase();
    const liberado=[...osLiberadas].some(x=>(x||'').trim().toUpperCase()===npNorm);
    if(!liberado)return true; // não está liberado, pode operar
    const ok=window.confirm(
      '⚠️ O equipamento '+np+' possui OS encerrada.\n\nPara alterar o status deste componente, a OS será reaberta automaticamente e voltará para Manutenção.\n\nDeseja continuar?'
    );
    if(!ok)return false;
    // Reabre a OS
    await db.from('crane_ordens_servico').update({
      status:'em_manutencao',data_liberacao:null,resp_lib_checklist:null,resp_liberacao:null
    }).eq('np',np).eq('status','liberado');
    await db.from('equipamentos').update({status_operacional:'manutencao'}).eq('np',np);
    toast('OS de '+np+' reaberta para manutenção 🔧');
    return true;
  }
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div><h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>Freios Centrífugos</h2><p style={{fontSize:13,color:'var(--g500)'}}>Somente para Elevador Cremalheira — validade do teste de queda: 2 anos</p></div>
      <button className="btn btn-p" onClick={abrirNovo}>+ Novo Freio</button>
    </div>
    <div className="bar">
      <div className="sw"><SI/><input placeholder="Buscar TAG, N° série, modelo..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{filtrados.length} registros</span>
    </div>
    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :filtrados.length===0?<div className="emp"><div className="ei">🛑</div><h3>Nenhum freio cadastrado</h3></div>
    :<div style={{display:'flex',flexDirection:'column',gap:8}}>{filtrados.map(f=>{const al=alertaValidade(f.validade_teste);const s=STATUS[f.status]||STATUS.disponivel;return <div key={f.id} className="comp-card" style={al&&al.tipo!=='ok'?{borderLeft:'4px solid '+(al.tipo==='critico'?'var(--red)':'var(--amber)')}:{}}>
      <div className="comp-card-header">
        <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{fontSize:24}}>🛑</div><div><div><span className="cod">{f.tag}</span></div><div style={{fontSize:13,color:'var(--g700)',fontWeight:500}}>{f.modelo||'—'}</div><div style={{fontSize:12,color:'var(--g500)'}}>N° série: {f.numero_serie||'—'}</div></div></div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}><span className={'bdg '+s.cls}>{s.lb}</span>{f.np_atual&&<span style={{fontSize:12,color:'var(--g500)'}}>📍 {f.np_atual}</span>}</div>
      </div>
      {al&&<div style={{padding:'5px 10px',borderRadius:'var(--r)',background:al.tipo==='ok'?'var(--green-lt)':al.tipo==='atencao'?'var(--amber-lt)':'var(--red-lt)',color:al.tipo==='ok'?'var(--green)':al.tipo==='atencao'?'var(--amber)':'var(--red)',fontSize:12,fontWeight:700,marginBottom:10}}>⚠️ Teste de queda: {al.msg}</div>}
      {f.np_atual&&(()=>{const npNorm=(f.np_atual||'').trim().toUpperCase();const lib=[...osLiberadas].some(np=>(np||'').trim().toUpperCase()===npNorm);return <div style={{marginBottom:8}}><div style={{fontSize:12,color:'var(--blue)',fontWeight:600}}>📍 Instalado no equipamento: <span style={{fontWeight:800}}>{f.np_atual}</span></div>{lib&&<div style={{fontSize:11,color:'var(--amber)',fontWeight:700,marginTop:3}}>🔒 OS encerrada — alteração de status reabrirá a OS automaticamente</div>}</div>;})()}
      {f.status==='manutencao'&&<div style={{display:'flex',gap:6,marginBottom:8}}>
        <button className="btn btn-g" style={{padding:'5px 12px',fontSize:12}} onClick={async()=>{
          if(!await confirmarReabertura(f.np_atual))return;
          await db.from('crane_componentes_freios').update({status:'disponivel'}).eq('id',f.id);
          toast('Status → Disponível');carregar();
        }}>✓ Marcar Disponível</button>
        <button className="btn" style={{padding:'5px 12px',fontSize:12,background:'var(--purple-lt)',color:'var(--purple)',border:'1px solid var(--purple)',borderRadius:'var(--r)',cursor:'pointer'}} onClick={async()=>{
          if(!window.confirm('Enviar '+f.tag+' para ORMEC?'))return;
          if(!await confirmarReabertura(f.np_atual))return;
          await db.from('crane_componentes_freios').update({status:'na_matriz'}).eq('id',f.id);
          const{data:ex}=await db.from('crane_ormec_envios').select('id').eq('componente_id',f.id).in('status',['embalagem','enviado','retorno']).limit(1);
          if(!ex||!ex.length)await db.from('crane_ormec_envios').insert({tipo:'freio',componente_id:f.id,componente_tag:f.tag,status:'embalagem',data_criacao:new Date().toISOString().slice(0,10)});
          toast('Enviado para ORMEC 🏭','warn');carregar();
        }}>🏭 Enviar ORMEC</button>
      </div>}
      {f.status==='disponivel'&&<button className="btn btn-g" style={{padding:'5px 12px',fontSize:12,marginBottom:8}} onClick={async()=>{if(!await confirmarReabertura(f.np_atual))return;await db.from('crane_componentes_freios').update({status:'manutencao'}).eq('id',f.id);toast('Status → Manutenção');carregar();}}>🔧 Entrada Manutenção</button>}
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}><button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>abrirEditar(f)}>✏️ Editar</button><button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>setModalLaudos(f)}>📄 Laudos</button><button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>setModalMatriz(f)}>🏭 Matriz</button></div>
    </div>;})}
    </div>}
    {modal==='form'&&<Modal title={form.id?'Editar — '+form.tag:'Novo Freio Centrífugo'} onClose={()=>setModal(null)} footer={<><button className="btn btn-g" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</button></>}>
      {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
      {/* Seleção rápida do catálogo Protheus */}
      <div className="fg" style={{marginBottom:12}}>
        <label className="fl">Selecionar do catálogo Protheus</label>
        <select onChange={e=>{if(!e.target.value)return;const c=CATALOGO_COMPONENTES.find(x=>x.om===e.target.value);if(c)setForm(p=>({...p,om:c.om,modelo:c.modelo,descricao:c.descricao}));}} defaultValue="">
          <option value="">— Selecione para pré-preencher —</option>
          {CATALOGO_COMPONENTES.filter(c=>c.tipo==='freio').map(c=><option key={c.om} value={c.om}>{c.om} — {c.descricao}</option>)}
        </select>
      </div>
      <div className="fr2"><div className="fg"><label className="fl">N° Série do Freio</label><input style={{fontFamily:'monospace'}} value={form.numero_serie} onChange={e=>setForm(p=>({...p,numero_serie:e.target.value}))}/></div><div className="fg"><label className="fl">N° Eixo</label><input style={{fontFamily:'monospace'}} value={form.numero_eixo||''} onChange={e=>setForm(p=>({...p,numero_eixo:e.target.value}))}/></div></div>
      <div className="fr2"><div className="fg"><label className="fl">Modelo</label><input value={form.modelo} onChange={e=>setForm(p=>({...p,modelo:e.target.value}))}/></div><div className="fg"><label className="fl">Status</label><select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}><option value="disponivel">Disponível</option><option value="manutencao">Manutenção</option><option value="instalado">Instalado</option><option value="na_matriz">Na Matriz</option><option value="descartado">Descartado</option></select></div></div>
      <div className="dv"/>
      <div className="fr3"><div className="fg"><label className="fl">Data da Manutenção</label><input type="date" value={form.data_manutencao||''} onChange={e=>setForm(p=>({...p,data_manutencao:e.target.value}))}/></div><div className="fg"><label className="fl">Primeiro Teste de Queda</label><input type="date" value={form.data_teste_queda} onChange={e=>setDataTeste(e.target.value)}/></div><div className="fg"><label className="fl">Validade (auto: +2 anos)</label><input type="date" value={form.validade_teste} onChange={e=>setForm(p=>({...p,validade_teste:e.target.value}))}/></div></div>
      {form.status==='instalado'&&<div className="fr2"><div className="fg"><label className="fl">NP Instalado</label><select value={form.np_atual} onChange={e=>setForm(p=>({...p,np_atual:e.target.value}))}><option value="">Selecione...</option>{equips.map(e=><option key={e.np} value={e.np}>{e.np} — {e.modelo}</option>)}</select></div><div className="fg"><label className="fl">Data Instalação</label><input type="date" value={form.data_instalacao_atual} onChange={e=>setForm(p=>({...p,data_instalacao_atual:e.target.value}))}/></div></div>}
    </Modal>}
    {modalLaudos&&<ModalLaudos componenteId={modalLaudos.id} tipoComponente="freio" tag={modalLaudos.tag} onClose={()=>{setModalLaudos(null);carregar();}}/>}
    {modalMatriz&&<ModalEnvioMatriz componenteId={modalMatriz.id} tipoComponente="freio" tag={modalMatriz.tag} onClose={()=>{setModalMatriz(null);carregar();}}/>}
  </div>;
}

// ── PAINEL CABINES (NP OVERVIEW) ──────────────────────────
function PainelCabines(){
  // Status possíveis do equipamento
  const EQ_STATUS={
    disponivel:    {lb:'Disponível',    c:'var(--green)', bg:'var(--green-lt)', ic:'✅'},
    manutencao:    {lb:'Manutenção',    c:'var(--amber)', bg:'var(--amber-lt)', ic:'🔧'},
    reservado:     {lb:'Reservado',     c:'var(--blue)',  bg:'var(--blue-lt)',  ic:'📋'},
    res_manutencao:{lb:'Res. Manut.',   c:'var(--purple)',bg:'var(--purple-lt)',ic:'📋🔧'},
    locado:        {lb:'Locado',        c:'var(--g900)',  bg:'var(--g100)',     ic:'🏗'},
    em_negociacao: {lb:'Em negociação', c:'var(--orange)',bg:'#FFF7ED',         ic:'💬'},
  };

  const[equips,setEquips]=useState([]);
  const[motors,setMotors]=useState([]);
  const[freios,setFreios]=useState([]);
  const[osList,setOsList]=useState([]);
  const[loading,setLoading]=useState(true);
  const[snapDate,setSnapDate]=useState(null);
  const[busca,setBusca]=useState('');
  const[filtSt,setFiltSt]=useState('');
  const[filtTipo,setFiltTipo]=useState('');
  const[mudandoStatus,setMudandoStatus]=useState(null); // {np, tipo}

  async function carregar(){
    setLoading(true);
    const[{data:e},{data:m},{data:f},{data:os},{data:snaps}]=await Promise.all([
      db.from('equipamentos').select('*').in('tipo',['elevador','minigrua']).order('tipo').order('np'),
      db.from('crane_componentes_motoredutores').select('tag,modelo,validade_lp,np_atual').eq('status','instalado'),
      db.from('crane_componentes_freios').select('tag,modelo,validade_teste,np_atual').eq('status','instalado'),
      db.from('crane_ordens_servico').select('id,np,status,aguardando_pecas').neq('status','liberado'),
      db.from('crane_almo_snapshots').select('snap_date').order('snap_date',{ascending:false}).limit(1),
    ]);
    setEquips(e||[]);setMotors(m||[]);setFreios(f||[]);setOsList(os||[]);
    if(snaps&&snaps.length>0)setSnapDate(snaps[0].snap_date);
    setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  const osMap=useMemo(()=>{const m={};(osList||[]).forEach(o=>{m[o.np]=o;});return m;},[osList]);

  async function mudarStatus(eq, novoStatus){
    const statusAtual=eq.status_operacional||'disponivel';
    if(novoStatus===statusAtual)return;

    // Para manutenção: abre OS automaticamente
    if(novoStatus==='manutencao'||novoStatus==='res_manutencao'){
      const osExistente=osMap[eq.np];
      if(!osExistente){
        if(window.confirm('Abrir OS de manutenção automaticamente para '+eq.np+'?')){
          const{data:novaOS,error:eOS}=await db.from('crane_ordens_servico').insert({
            np:eq.np,modelo:eq.modelo,status:'aberta',
            data_retorno:new Date().toISOString().slice(0,10),
            criado_em:new Date().toISOString()
          }).select().single();
          if(eOS){toast('Erro ao abrir OS: '+eOS.message,'err');return;}
          // Cria checklist de entrada
          const ckEntrada=CHECKLIST_ENTRADA_FLAT.map(i=>({os_id:novaOS.id,grupo:i.grupo,secao:i.secao,numero_item:i.numero,descricao:i.desc,resposta:null,observacao:''}));
          const ckManut=CHECKLIST_FLAT.map(i=>({os_id:novaOS.id,secao:i.secao,numero_item:i.numero,descricao:i.desc,resposta:null,observacao:''}));
          await Promise.all([
            db.from('crane_os_inspecao_checklist').insert(ckEntrada),
            db.from('crane_os_checklist_itens').insert(ckManut),
          ]);
          toast('OS aberta automaticamente para '+eq.np+' ✅');
        }
      }
    }

    await db.from('equipamentos').update({status_operacional:novoStatus}).eq('id',eq.id);
    toast('Status de '+eq.np+' → '+EQ_STATUS[novoStatus]?.lb);
    setMudandoStatus(null);
    carregar();
  }

  const filtrados=useMemo(()=>equips.filter(e=>{
    if(filtTipo&&e.tipo!==filtTipo)return false;
    if(filtSt){const st=e.status_operacional||'disponivel';if(st!==filtSt)return false;}
    if(busca&&!(e.np||'').toLowerCase().includes(busca.toLowerCase())&&!(e.modelo||'').toLowerCase().includes(busca.toLowerCase()))return false;
    return true;
  }),[equips,filtTipo,filtSt,busca]);

  const kpis=Object.entries(EQ_STATUS).map(([k,v])=>({...v,key:k,n:equips.filter(e=>(e.status_operacional||'disponivel')===k).length}));

  return <div>
    {/* Banner almoxarifado */}
    <div style={{display:'flex',alignItems:'center',gap:12,background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:'12px 16px',marginBottom:16,boxShadow:'var(--shadow)',flexWrap:'wrap'}}>
      <div style={{fontSize:20}}>📦</div>
      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>Almoxarifado</div><div style={{fontSize:12,color:'var(--g500)'}}>{snapDate?'Snapshot: '+fmtD(snapDate):'Nenhum snapshot importado'}</div></div>
      {osList.filter(o=>o.aguardando_pecas).length>0&&<span className="bdg" style={{background:'var(--amber-lt)',color:'var(--amber)'}}>{osList.filter(o=>o.aguardando_pecas).length} OS aguardando peças</span>}
    </div>

    {/* KPIs por status */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:16}}>
      {kpis.map(k=><div key={k.key} className="kpi" style={{cursor:'pointer',border:'2px solid '+(filtSt===k.key?k.c:'transparent'),transition:'.12s'}} onClick={()=>setFiltSt(filtSt===k.key?'':k.key)}>
        <div style={{fontSize:16,marginBottom:2}}>{k.ic}</div>
        <div className="kl">{k.lb}</div>
        <div className="kv" style={{color:k.c,fontSize:20}}>{k.n}</div>
      </div>)}
    </div>

    {/* Filtros */}
    <div className="bar" style={{marginBottom:16}}>
      <div className="sw"><SI/><input placeholder="Buscar NP ou modelo..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <select value={filtTipo} onChange={e=>setFiltTipo(e.target.value)} style={{width:'auto'}}>
        <option value="">Todos os tipos</option>
        <option value="elevador">🏗 Elevadores</option>
        <option value="minigrua">🏋 Mini Gruas</option>
      </select>
      {(filtSt||filtTipo||busca)&&<button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={()=>{setFiltSt('');setFiltTipo('');setBusca('');}}>✕ Limpar</button>}
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{filtrados.length} equipamento(s)</span>
    </div>

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :filtrados.length===0?<div className="emp"><div className="ei">🏗</div><h3>Nenhum equipamento encontrado</h3><p>Cadastre em Gestão Estruturas → Cadastro</p></div>
    :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(360px,1fr))',gap:12}}>
      {filtrados.map(eq=>{
        const st=EQ_STATUS[eq.status_operacional||'disponivel']||EQ_STATUS.disponivel;
        const mots=motors.filter(m=>m.np_atual===eq.np);
        const frei=freios.find(f=>f.np_atual===eq.np);
        const osAtiva=osMap[eq.np];
        const stOS=osAtiva?STATUS_OS[osAtiva.status]:null;
        const temAlerta=[...mots,...(frei?[frei]:[]),(alertaValidade(frei?.validade_teste)?.tipo!=='ok'?frei:null)].filter(Boolean).some(c=>alertaValidade(c.validade_lp||c.validade_teste)?.tipo!=='ok');
        return <div key={eq.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:'14px 16px',boxShadow:'var(--shadow)',borderLeft:'4px solid '+st.c}}>
          {/* Header NP */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span className="cod">{eq.np}</span>
                <span className="bdg" style={{background:'var(--blue-lt)',color:'var(--blue)',fontSize:10}}>{eq.modelo}</span>
                <span className="bdg" style={{background:'var(--g100)',color:'var(--g500)',fontSize:10}}>{eq.tipo==='elevador'?'🏗 Elevador':'🏋 Mini Grua'}</span>
              </div>
              <div style={{fontSize:12,color:'var(--g500)'}}>{eq.fabricante||''}{eq.capacidade_kg?' · '+eq.capacidade_kg+'kg':''}{eq.ano_fabricacao?' · '+eq.ano_fabricacao:''}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
              <span style={{padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:800,background:st.bg,color:st.c}}>{st.ic} {st.lb}</span>
              {stOS&&<span className={'bdg '+stOS.cls} style={{fontSize:10}}>{stOS.lb}</span>}
              {osAtiva?.aguardando_pecas&&<span style={{fontSize:10,color:'var(--amber)',fontWeight:700}}>⏳ Aguard. peças</span>}
            </div>
          </div>

          {/* Componentes instalados */}
          {eq.tipo==='elevador'&&<div style={{marginBottom:12}}>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {[0,1,2].map(n=>{const m=mots[n];const al=m?alertaValidade(m.validade_lp):null;return <div key={n} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 8px',background:'var(--g50)',borderRadius:'var(--r)',fontSize:11}}>
                <span style={{color:'var(--g400)',width:14,fontWeight:700,flexShrink:0}}>{n+1}°</span>
                <span style={{flex:1}}>{m?<><span className="cod" style={{fontSize:10}}>{m.tag}</span> <span style={{color:'var(--g600)'}}>{m.modelo||''}</span></>:<span style={{color:'var(--g300)'}}>Motor {n+1} — não instalado</span>}</span>
                {al&&<span style={{fontSize:10,color:al.tipo==='ok'?'var(--green)':al.tipo==='atencao'?'var(--amber)':'var(--red)',fontWeight:700}}>{al.tipo==='ok'?'✓':al.tipo==='atencao'?'⚠️':'🔴'}</span>}
              </div>;})}
              <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 8px',background:'#FFF5F5',borderRadius:'var(--r)',fontSize:11}}>
                <span style={{flexShrink:0}}>🛑</span>
                <span style={{flex:1}}>{frei?<><span className="cod" style={{fontSize:10}}>{frei.tag}</span> <span style={{color:'var(--g600)'}}>{frei.modelo||''}</span></>:<span style={{color:'var(--g300)'}}>Freio — não instalado</span>}</span>
                {frei&&(()=>{const al=alertaValidade(frei.validade_teste);return al&&<span style={{fontSize:10,color:al.tipo==='ok'?'var(--green)':al.tipo==='atencao'?'var(--amber)':'var(--red)',fontWeight:700}}>{al.tipo==='ok'?'✓':al.tipo==='atencao'?'⚠️':'🔴'}</span>;})()}
              </div>
            </div>
          </div>}

          {/* Seletor de status */}
          {osAtiva
            ?<div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:'var(--r)',background:'var(--amber-lt)',border:'1px solid #FCD34D',fontSize:12}}>
              <span>🔒</span>
              <span style={{color:'var(--amber)',fontWeight:600}}>Status bloqueado — OS em andamento ({STATUS_OS[osAtiva.status]?.lb||osAtiva.status})</span>
            </div>
            :mudandoStatus===eq.np
            ?<div style={{padding:'10px',background:'var(--g50)',borderRadius:'var(--r)',border:'1px solid var(--g200)'}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--g600)',marginBottom:8}}>Alterar status de {eq.np}:</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {Object.entries(EQ_STATUS).map(([k,v])=>{
                  const atual=(eq.status_operacional||'disponivel')===k;
                  return <button key={k} onClick={()=>!atual&&mudarStatus(eq,k)} style={{padding:'7px 10px',borderRadius:'var(--r)',border:'1px solid '+(atual?v.c:'var(--g200)'),background:atual?v.bg:'transparent',color:atual?v.c:'var(--g700)',fontFamily:'var(--font)',fontSize:12,fontWeight:atual?800:500,cursor:atual?'default':'pointer',opacity:atual?1:.85}}>
                    {v.ic} {v.lb}{atual?' ✓':''}
                  </button>;
                })}
              </div>
              <button onClick={()=>setMudandoStatus(null)} style={{marginTop:8,background:'none',border:'none',cursor:'pointer',color:'var(--g400)',fontSize:12,padding:'2px 6px'}}>Cancelar</button>
            </div>
            :<button onClick={()=>setMudandoStatus(eq.np)} style={{width:'100%',padding:'7px 0',borderRadius:'var(--r)',border:'1px dashed var(--g200)',background:'transparent',color:'var(--g500)',fontFamily:'var(--font)',fontSize:12,cursor:'pointer'}}>
              ⇄ Alterar status
            </button>}
        </div>;
      })}
    </div>}
  </div>;
}

// ── OS STEPPER ────────────────────────────────────────────
function Stepper({stage}){
  const steps=[{n:1,lb:'Inspeção',sub:'Apontamento'},{n:2,lb:'Manutenção',sub:'Execução'},{n:3,lb:'Checklist',sub:'Verificação'},{n:4,lb:'Liberação',sub:'Encerramento'}];
  return <div className="stepper">
    {steps.map((s,i)=>{
      const state=stage>i?'done':stage===i?'active':'pending';
      return <React.Fragment key={s.n}>
        {i>0&&<div className={'step-sep '+(stage>i-1?'done':'pending')}/>}
        <div style={{display:'flex',alignItems:'center',gap:8,flex:1,minWidth:80}}>
          <div className={'step-num '+state}>{stage>i?'✓':s.n}</div>
          <div><div style={{fontSize:12,fontWeight:700,color:state==='done'?'var(--green)':state==='active'?'var(--blue)':'var(--g400)',whiteSpace:'nowrap'}}>{s.lb}</div><div style={{fontSize:10,color:'var(--g400)',whiteSpace:'nowrap'}}>{s.sub}</div></div>
        </div>
      </React.Fragment>;
    })}
  </div>;
}

// ── PAINEL OS (LISTA) ─────────────────────────────────────

    <div className="bar">

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>

              <div style={{fontSize:12,color:'var(--g500)'}}>Retorno: {fmtD(os.data_retorno)} · Obra: {os.obra_origem||'—'} · Resp: {os.responsavel_inspecao||'—'}</div>

// ── MODAL NOVA OS ─────────────────────────────────────────
function ModalNovaOS({equips,onClose,onSaved}){
  const[form,setForm]=useState({np:'',modelo:'',data_retorno:new Date().toISOString().slice(0,10),obra_origem:'',responsavel_inspecao:'',observacao_inicial:'',status:'aberta'});
  const[saving,setSaving]=useState(false);const[erro,setErro]=useState('');
  const[funcionarios,setFuncionarios]=useState([]);
  useEffect(()=>{db.from('crane_funcionarios').select('id,nome,especialidade,funcao').eq('ativo',true).order('nome').then(({data})=>setFuncionarios(data||[]));},[]);
  function selecionarNP(np){const e=equips.find(x=>x.np===np);setForm(p=>({...p,np,modelo:e?.modelo||''}));}
  async function salvar(){
    if(!form.np){setErro('Selecione o NP');return;}
    if(!form.responsavel_inspecao){setErro('Selecione o responsável pela inspeção');return;}
    const{data:ex}=await db.from('crane_ordens_servico').select('id').eq('np',form.np).neq('status','liberado').limit(1);
    if(ex&&ex.length>0){setErro('Já existe uma OS aberta para este NP');return;}
    setSaving(true);setErro('');
    const{data,error}=await db.from('crane_ordens_servico').insert(form).select().single();
    if(error){setErro(error.message);setSaving(false);return;}
    const itens=CHECKLIST_FLAT.map(i=>({os_id:data.id,secao:i.secao,numero_item:i.numero,descricao:i.desc,resposta:null,observacao:''}));
    const ckEntrada=CHECKLIST_ENTRADA_FLAT.map(i=>({os_id:data.id,grupo:i.grupo,secao:i.secao,numero_item:i.numero,descricao:i.desc,resposta:null,observacao:''}));
    await Promise.all([
      db.from('crane_os_checklist_itens').insert(itens),
      db.from('crane_os_inspecao_checklist').insert(ckEntrada),
    ]);
    toast('OS aberta!');onSaved(data);
  }
  return <Modal title="Abrir Ordem de Serviço" onClose={onClose} footer={<><button className="btn btn-g" onClick={onClose}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Abrindo...':'Abrir OS'}</button></>}>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
    <div className="fr2">
      <div className="fg"><label className="fl">NP — Equipamento <span className="req">*</span></label>
        <select value={form.np} onChange={e=>selecionarNP(e.target.value)}>
          <option value="">Selecione...</option>
          {equips.map(e=><option key={e.np} value={e.np}>{e.np} — {e.modelo}</option>)}
        </select></div>
      <div className="fg"><label className="fl">Data de Retorno</label>
        <input type="date" value={form.data_retorno} onChange={e=>setForm(p=>({...p,data_retorno:e.target.value}))}/></div>
    </div>
    <div className="fr2">
      <div className="fg"><label className="fl">Obra de Origem</label>
        <input value={form.obra_origem} onChange={e=>setForm(p=>({...p,obra_origem:e.target.value}))} placeholder="De onde veio o equipamento"/></div>
      <div className="fg"><label className="fl">Responsável pela Inspeção <span className="req">*</span></label>
        <select value={form.responsavel_inspecao} onChange={e=>setForm(p=>({...p,responsavel_inspecao:e.target.value}))}>
          <option value="">Selecione o inspetor...</option>
          {funcionarios.map(f=><option key={f.id} value={f.nome}>{f.nome}{f.especialidade||f.funcao?' — '+(f.especialidade||f.funcao):''}</option>)}
        </select>
        {funcionarios.length===0&&<div style={{fontSize:11,color:'var(--amber)',marginTop:3}}>⚠ Nenhum funcionário ativo cadastrado.</div>}
      </div>
    </div>
    <div className="fg"><label className="fl">Observação Inicial</label>
      <textarea value={form.observacao_inicial} onChange={e=>setForm(p=>({...p,observacao_inicial:e.target.value}))} rows={3} placeholder="Condições de retorno, danos visíveis, relatos do operador..."/></div>
  </Modal>;
}

// ── OS DETAIL (4 ETAPAS) ──────────────────────────────────
function OSDetail({os,onBack,equips}){
  const[osData,setOsData]=useState(os);
  const[checklist,setChecklist]=useState([]);
  const[ckEntrada,setCkEntrada]=useState([]);
  const[abaInsp,setAbaInsp]=useState('checklist');
  const[ncForms,setNcForms]=useState({});
  const[ormecResps,setOrmecResps]=useState({motoredutor:null,freio:null}); // {tipo: 'sim'|'nao'|null}
  // assinatura campos — gerenciados internamente por AssinaturaCampo // {itemId: {tipo,busca,item_codigo,item_descricao,quantidade,unidade,showSug}}
  const[insItens,setInsItens]=useState([]);
  const[manRegs,setManRegs]=useState([]);
  const[fotos,setFotos]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[funcionarios,setFuncionarios]=useState([]);
  const[motorsDisp,setMotorsDisp]=useState([]);
  const[freiosDisp,setFreiosDisp]=useState([]);
  const[stockMap,setStockMap]=useState({});
  const fotoInputRef=useRef();
  const[fotoPonto,setFotoPonto]=useState('Vista frontal');

  const stage=STATUS_OS[osData.status]?.stage??0;

  async function carregar(){
    setLoading(true);
    try{
      const[{data:ck},{data:ii},{data:mr},{data:ft},{data:osAt},{data:funcs},{data:md},{data:fd},{data:snaps}]=await Promise.all([
        db.from('crane_os_checklist_itens').select('*').eq('os_id',os.id).order('numero_item'),
        db.from('crane_os_inspecao_itens').select('*').eq('os_id',os.id).order('criado_em'),
        db.from('crane_os_manutencao_registros').select('*').eq('os_id',os.id).order('criado_em'),
        db.from('crane_os_fotos').select('*').eq('os_id',os.id).order('criado_em'),
        db.from('crane_ordens_servico').select('*').eq('id',os.id).single(),
        db.from('crane_funcionarios').select('id,nome,especialidade').eq('ativo',true).order('nome'),
        db.from('crane_componentes_motoredutores').select('id,tag,modelo,validade_lp,np_atual,status').in('status',['disponivel','manutencao','instalado']),
        db.from('crane_componentes_freios').select('id,tag,modelo,validade_teste,np_atual,status').in('status',['disponivel','manutencao','instalado']),
        db.from('crane_almo_snapshots').select('id').order('snap_date',{ascending:false}).limit(1),
      ]);
      setChecklist(ck||[]);setInsItens(ii||[]);setManRegs(mr||[]);setFotos(ft||[]);
      if(osAt)setOsData(osAt);
      setFuncionarios(funcs||[]);
      setMotorsDisp((md||[]).filter(x=>['disponivel','manutencao','instalado'].includes(x.status)));
      setFreiosDisp((fd||[]).filter(x=>['disponivel','manutencao','instalado'].includes(x.status)));
      if(snaps&&snaps.length>0){
        const{data:items}=await db.from('crane_almo_items').select('codigo,saldo').eq('snapshot_id',snaps[0].id);
        const sm={};(items||[]).forEach(i=>{if(i.codigo)sm[i.codigo.trim().toUpperCase()]=Number(i.saldo||0);});
        setStockMap(sm);
      }
    }catch(e){console.error('carregar erro:',e);toast('Erro ao carregar OS: '+e.message,'err');}
    // Tabelas opcionais — fallback silencioso
    try{const{data:cke}=await db.from('crane_os_inspecao_checklist').select('*').eq('os_id',os.id).order('numero_item');setCkEntrada(cke||[]);}catch(e){setCkEntrada([]);}
    try{const{data:ormR}=await db.from('crane_os_ormec_respostas').select('*').eq('os_id',os.id);const ov={motoredutor:null,freio:null};(ormR||[]).forEach(r=>{ov[r.tipo]=r.resposta;});setOrmecResps(ov);}catch(e){}
    setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  // ── ETAPA 1: INSPEÇÃO ─────────────────────────────────
  const[novoIns,setNovoIns]=useState({tipo:'peca',item_codigo:'',item_descricao:'',quantidade:1,unidade:'un',gerar_compra:false,observacao:''});
  const[buscaIns,setBuscaIns]=useState('');const[showSugIns,setShowSugIns]=useState(false);
  const[catalogoIns,setCatalogoIns]=useState([]);

  // Carrega itens do snapshot mais recente do almoxarifado (não itens_estrutura)
  useEffect(()=>{
    (async()=>{
      const{data:snaps}=await db.from('crane_almo_snapshots').select('id').order('snap_date',{ascending:false}).limit(1);
      if(!snaps||!snaps.length){setCatalogoIns([]);return;}
      const{data:itens}=await db.from('crane_almo_items').select('codigo,descricao,saldo,unidade').eq('snapshot_id',snaps[0].id).order('descricao');
      setCatalogoIns(itens||[]);
    })();
  },[]);

  const sugestoesIns=useMemo(()=>{
    if(!buscaIns.trim()||buscaIns.length<2)return[];
    const q=buscaIns.toLowerCase();
    return catalogoIns.filter(i=>
      (i.codigo||'').toLowerCase().includes(q)||
      (i.descricao||'').toLowerCase().includes(q)
    ).slice(0,10);
  },[buscaIns,catalogoIns]);

  function selecionarItemIns(item){
    const saldo=Number(item.saldo||0);
    const temEst=saldo>0;
    setNovoIns(p=>({...p,item_codigo:item.codigo,item_descricao:item.descricao||item.codigo,unidade:item.unidade||'un',tem_estoque:temEst,gerar_compra:!temEst}));
    setBuscaIns(item.codigo+' — '+(item.descricao||''));setShowSugIns(false);
  }

  async function adicionarInsItem(){
    const desc=(novoIns.item_descricao||buscaIns||'').trim();
    if(!desc){toast('Informe a descrição ou selecione uma peça','err');return;}
    const saldoAtual=novoIns.item_codigo?(stockMap[novoIns.item_codigo.trim().toUpperCase()]||0):null;
    const tem_estoque=saldoAtual!==null?saldoAtual>=(Number(novoIns.quantidade)||1):null;
    const payload={
      os_id:os.id,
      tipo:novoIns.tipo,
      item_codigo:novoIns.item_codigo||null,
      item_descricao:desc,
      descricao:desc,
      quantidade:Number(novoIns.quantidade)||1,
      unidade:novoIns.unidade||'un',
      tem_estoque,
      gerar_compra:novoIns.tipo==='peca'?novoIns.gerar_compra:false,
      observacao:(novoIns.observacao||'').trim()
    };
    // Update otimista: mostra o item imediatamente na tela
    const tempId='temp_'+Date.now();
    setInsItens(prev=>[...prev,{...payload,id:tempId}]);
    setNovoIns({tipo:novoIns.tipo,item_codigo:'',item_descricao:'',quantidade:1,unidade:'un',gerar_compra:false,observacao:''});
    setBuscaIns('');setShowSugIns(false);
    // Persiste no banco
    const{error}=await db.from('crane_os_inspecao_itens').insert(payload);
    if(error){
      toast('Erro ao salvar: '+error.message,'err');
      setInsItens(prev=>prev.filter(i=>i.id!==tempId));
      return;
    }
    // Recarrega para pegar o ID real do banco
    carregar();
  }

  async function removerInsItem(id){setInsItens(prev=>prev.filter(i=>i.id!==id));await db.from('crane_os_inspecao_itens').delete().eq('id',id);carregar();}

  async function concluirInspecao(){
    // Validar checklist de entrada — todos os itens devem ter resposta
    const semResposta=ckEntrada.filter(i=>!i.resposta);
    if(ckEntrada.length>0&&semResposta.length>0){
      toast('⚠️ Checklist de entrada incompleto — '+semResposta.length+' item(s) sem resposta. Preencha o checklist antes de finalizar.','err');
      setAbaInsp('checklist');return;
    }
    if(insItens.filter(i=>!i.id?.startsWith('temp_')).length===0&&insItens.length===0){toast('Adicione ao menos um item à inspeção','err');return;}
    setSaving(true);
    const temCompra=insItens.some(i=>i.gerar_compra);
    const hoje=new Date().toISOString().slice(0,10);
    const{error}=await db.from('crane_ordens_servico').update({status:'inspecionada',data_inspecao:hoje,aguardando_pecas:temCompra}).eq('id',os.id);
    setSaving(false);
    if(error){toast('Erro: '+error.message,'err');return;}
    setOsData(p=>({...p,status:'inspecionada',data_inspecao:hoje,aguardando_pecas:temCompra}));
    toast('Inspeção concluída! ✅');
  }

  async function voltarParaAberta(){
    if(!window.confirm('Retornar OS para a Inspeção? Os itens já apontados serão mantidos.'))return;
    await db.from('crane_ordens_servico').update({status:'aberta'}).eq('id',os.id);
    setOsData(p=>({...p,status:'aberta'}));
    toast('OS reaberta para inspeção');
  }

  async function voltarParaInspecao(){
    if(!window.confirm('Retornar para etapa de Inspeção? Os registros de manutenção serão mantidos.'))return;
    await db.from('crane_ordens_servico').update({status:'inspecionada'}).eq('id',os.id);
    setOsData(p=>({...p,status:'inspecionada'}));
    toast('Retornado para Inspeção');
  }

  // ── ETAPA 2: MANUTENÇÃO ───────────────────────────────
  const[manForms,setManForms]=useState({}); // {insId: {funcionario_id, servico_realizado, observacao}}
  const[novoMan,setNovoMan]=useState({tipo:'servico',descricao:'',quantidade:1,unidade:'un',funcionario_id:'',funcionario_nome:''});
  const[motSel,setMotSel]=useState([null,null,null]);
  const[freiSel,setFreiSel]=useState(null);

  // Load existing motor/freio selections from DB on mount
  useEffect(()=>{
    if(osData.status==='em_manutencao'||osData.status==='inspecionada'||stage>=2){
      // read current installed motors/freios for this NP
      const mots=motorsDisp.filter(m=>m.np_atual===os.np);
      const frei=freiosDisp.find(f=>f.np_atual===os.np);
      if(mots.length)setMotSel([mots[0]?.id||null,mots[1]?.id||null,mots[2]?.id||null]);
      if(frei)setFreiSel(frei.id);
    }
  },[motorsDisp,freiosDisp]);

  function mfSet(insId,field,val){setManForms(prev=>({...prev,[insId]:{...(prev[insId]||{funcionario_id:'',servico_realizado:'',observacao:''}),[field]:val}}));}
  async function concluirItem(ins){
    const mf=manForms[ins.id]||{};
    if(!mf.funcionario_id){toast('Selecione o técnico responsável','err');return;}
    if(!(mf.servico_realizado||'').trim()){toast('Informe o serviço realizado','err');return;}
    // Validar conflito de horário: mesmo funcionário, mesma data
    if(mf.hora_inicio&&mf.hora_fim&&mf.funcionario_id){
      const hoje=new Date().toISOString().slice(0,10);
      const{data:conflitos}=await db.from('crane_os_manutencao_registros')
        .select('id,descricao,hora_inicio,hora_fim')
        .eq('funcionario_id',mf.funcionario_id)
        .not('id','eq',ins.id||'00000000-0000-0000-0000-000000000000');
      const hI=mf.hora_inicio,hF=mf.hora_fim;
      const sobrepos=(conflitos||[]).filter(r=>{
        if(!r.hora_inicio||!r.hora_fim)return false;

      });

    });

  async function adicionarInsItemFromNC(itemId,ckDescricao){
    const form=ncForms[itemId]||{};
    if(form.tipo==='servico'){
      // Serviço: precisa do serviço a realizar
      if(!(form.servico_realizar||'').trim()){toast('Informe o serviço a ser realizado','err');return;}
      // Monta descrição completa: Item verificado | Problema | Serviço
      const partes=[];
      partes.push('Item: '+ckDescricao.slice(0,80));
      if((form.problema||'').trim())partes.push('Problema: '+form.problema.trim());
      partes.push('Serviço: '+form.servico_realizar.trim());
      const descCompleta=partes.join(' | ');
      const payload={os_id:os.id,tipo:'servico',item_codigo:null,item_descricao:descCompleta,descricao:descCompleta,quantidade:1,unidade:'un',tem_estoque:null,gerar_compra:false,observacao:''};
      const tempId='temp_'+Date.now();
      setInsItens(prev=>[...prev,{...payload,id:tempId}]);
      setNcForms(prev=>({...prev,[itemId]:{tipo:'servico',busca:'',item_codigo:'',item_descricao:'',quantidade:1,unidade:'un',showSug:false,problema:'',servico_realizar:''}}));
      const{error}=await db.from('crane_os_inspecao_itens').insert(payload);
      if(error){toast('Erro: '+error.message,'err');setInsItens(prev=>prev.filter(i=>i.id!==tempId));return;}
      toast('Serviço incluído na lista ✅');carregar();
    } else {
      // Peça: precisa da peça selecionada
      const desc=(form.item_descricao||form.busca||'').trim();
      if(!desc){toast('Busque e selecione a peça no almoxarifado','err');return;}
      const saldoAtual=form.item_codigo?(stockMap[form.item_codigo.trim().toUpperCase()]||0):null;
      const tem_estoque=saldoAtual!==null?saldoAtual>=(Number(form.quantidade)||1):null;
      // Monta observação: Item verificado + obs do usuário
      const obsPartes=['Item verificado: '+ckDescricao.slice(0,80)];
      if((form.problema||'').trim())obsPartes.push('Problema: '+form.problema.trim());
      if((form.servico_realizar||'').trim())obsPartes.push('Serviço: '+form.servico_realizar.trim());
      if((form.observacao_peca||'').trim())obsPartes.push((form.observacao_peca).trim());
      const payload={os_id:os.id,tipo:'peca',item_codigo:form.item_codigo||null,item_descricao:desc,descricao:desc,quantidade:Number(form.quantidade)||1,unidade:form.unidade||'un',tem_estoque,gerar_compra:saldoAtual===0||form.gerar_compra||false,observacao:obsPartes.join(' | ')};
      const tempId='temp_'+Date.now();
      setInsItens(prev=>[...prev,{...payload,id:tempId}]);
      setNcForms(prev=>({...prev,[itemId]:{tipo:'peca',busca:'',item_codigo:'',item_descricao:'',quantidade:1,unidade:'un',showSug:false,observacao_peca:''}}));
      const{error}=await db.from('crane_os_inspecao_itens').insert(payload);
      if(error){toast('Erro: '+error.message,'err');setInsItens(prev=>prev.filter(i=>i.id!==tempId));return;}
      toast('Peça incluída na lista ✅');carregar();
    }
  }

    // Validar fotos obrigatórias
    if(fotos.length===0){

    const precisaFreio=temFreio(osData.modelo);

      toast('⚠️ Vincule '+(nSlots===1?'o motoredutor':nSlots+' motoredutores')+' antes de liberar.','err');return;

    if(precisaFreio&&!freiSel){

  async function gerarPDF(){
    toast('Gerando PDF...','warn');
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const ml=14,mr=196,cw=182;let y=0;
    function header(){
      doc.setFillColor(0,37,120);doc.rect(0,0,210,30,'F');
      doc.setFillColor(255,117,0);doc.rect(0,0,5,30,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
      doc.text('CRANE — Gestão de Cabines',ml+6,13);
      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Relatório de Manutenção de Equipamento',ml+6,21);

      doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(fmtD(osData.data_liberacao||new Date().toISOString().slice(0,10)),mr,21,{align:'right'});
      y=38;
    }
    function checkY(n){if(y+n>278){doc.addPage();header();}}
    function secTit(t){checkY(14);doc.setFillColor(232,239,252);doc.rect(ml,y,cw,8,'F');doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(0,37,120);doc.text(t,ml+4,y+5.5);y+=13;}
    header();
    // Capa
    doc.setFillColor(255,255,255);doc.setDrawColor(216,220,230);doc.rect(ml,y,cw,40,'FD');
    doc.setFontSize(20);doc.setFont('helvetica','bold');doc.setTextColor(0,57,166);doc.text(osData.np||'—',ml+8,y+14);
    doc.setFontSize(12);doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);doc.text(osData.modelo||'—',ml+8,y+23);
    doc.setFontSize(8);doc.setTextColor(95,104,128);
    doc.text('Obra: '+(osData.obra_origem||'—'),ml+8,y+31);
    doc.text('Retorno: '+fmtD(osData.data_retorno),mr,y+14,{align:'right'});
    doc.text('Inspeção: '+fmtD(osData.data_inspecao),mr,y+22,{align:'right'});
    doc.setTextColor(13,122,76);doc.setFont('helvetica','bold');
    doc.text('Liberação: '+fmtD(osData.data_liberacao),mr,y+30,{align:'right'});
    y+=48;
    // Inspeção
    if(insItens.length>0){
      secTit('INSPEÇÃO — Peças e Serviços Necessários');
      doc.autoTable({startY:y,margin:{left:ml,right:ml},
        head:[['Tipo','Descrição','Qtd','Un','Estoque','Compra']],
        body:insItens.map(i=>[i.tipo==='peca'?'Peça':'Serviço',i.item_descricao,i.quantidade||1,i.unidade||'un',i.tem_estoque===true?'Sim':i.tem_estoque===false?'Não':'—',i.gerar_compra?'Sim':'—']),
        styles:{fontSize:8,cellPadding:2},headStyles:{fillColor:[0,57,166],textColor:255,fontSize:8},alternateRowStyles:{fillColor:[245,246,248]},
        columnStyles:{0:{cellWidth:18},2:{halign:'center',cellWidth:10},3:{halign:'center',cellWidth:10},4:{halign:'center',cellWidth:18},5:{halign:'center',cellWidth:14}}
      });y=doc.lastAutoTable.finalY+8;
    }
    // Manutenção
    checkY(20);secTit('MANUTENÇÃO — Execução');
    if(osData.responsavel_manutencao){checkY(7);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(95,104,128);doc.text('Responsável:',ml,y);doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);doc.text(osData.responsavel_manutencao,ml+32,y);y+=7;}
    // Componentes instalados
    const mots=motorsDisp.filter(m=>m.np_atual===os.np);
    const frei=freiosDisp.find(f=>f.np_atual===os.np);
    if(mots.length||frei){
      checkY(8);y+=2;doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,37,120);doc.text('Componentes instalados:',ml,y);y+=6;
      mots.forEach((m,i)=>{checkY(5);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(95,104,128);doc.text('Motor '+(i+1)+':',ml,y);doc.setTextColor(17,24,39);doc.text(m.tag+(m.modelo?' — '+m.modelo:''),ml+20,y);y+=5;});
      if(frei){checkY(5);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(95,104,128);doc.text('Freio:',ml,y);doc.setTextColor(17,24,39);doc.text(frei.tag+(frei.modelo?' — '+frei.modelo:''),ml+20,y);y+=5;}
      y+=4;
    }
    if(manRegs.length>0){
      checkY(10);
      doc.autoTable({startY:y,margin:{left:ml,right:ml},
        head:[['Tipo','Descrição','Qtd','Funcionário']],
        body:manRegs.map(r=>[r.tipo==='peca'?'Peça':'Serviço',r.descricao,r.quantidade||1,r.funcionario_nome||'—']),
        styles:{fontSize:8,cellPadding:2},headStyles:{fillColor:[0,57,166],textColor:255,fontSize:8},alternateRowStyles:{fillColor:[245,246,248]},
        columnStyles:{0:{cellWidth:18},2:{halign:'center',cellWidth:10}}
      });y=doc.lastAutoTable.finalY+8;
    }
    // Checklist
    checkY(20);secTit('CHECKLIST — 55 Itens');
    doc.autoTable({startY:y,margin:{left:ml,right:ml},
      head:[['#','Seção','Descrição','Resp.','Obs.']],
      body:checklist.map(i=>[i.numero_item,i.secao,i.descricao,i.resposta==='conf'?'Conf.':i.resposta==='nc'?'N/C':i.resposta==='na'?'N/A':'—',i.observacao||'']),
      styles:{fontSize:7,cellPadding:1.8},headStyles:{fillColor:[0,57,166],textColor:255,fontSize:7},alternateRowStyles:{fillColor:[245,246,248]},
      columnStyles:{0:{cellWidth:8,halign:'center'},1:{cellWidth:30},3:{cellWidth:14,halign:'center'}},
      didParseCell(d){if(d.column.index===3&&d.section==='body'){if(d.cell.raw==='Conf.')d.cell.styles.textColor=[13,122,76];else if(d.cell.raw==='N/C')d.cell.styles.textColor=[192,57,43];}}
    });y=doc.lastAutoTable.finalY+8;
    // Fotos — 2 por linha lado a lado
    if(fotos.length>0){
      checkY(20);secTit('REGISTRO FOTOGRÁFICO ('+fotos.length+' foto(s))');
      const imgW=85,imgH=55,gap=8;
      // Carrega todas as imagens primeiro
      const fotoDatas=[];
      for(let i=0;i<fotos.length;i++){
        const f=fotos[i];
        try{
          const url=await getSignedUrl(f.arquivo_path);
          if(url){
            const resp=await fetch(url);
            const blob=await resp.blob();
            const dataUrl=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(blob);});
            const ext=(f.arquivo_nome||'foto').split('.').pop().toLowerCase();
            const fmt=ext==='png'?'PNG':ext==='webp'?'WEBP':'JPEG';
            fotoDatas.push({f,dataUrl,fmt,ok:true});
          }else{fotoDatas.push({f,ok:false});}
        }catch(e){fotoDatas.push({f,ok:false,err:e.message});}
      }
      // Renderiza em pares
      for(let i=0;i<fotoDatas.length;i+=2){
        const rowH=imgH+12;
        checkY(rowH);
        const items=[fotoDatas[i],fotoDatas[i+1]].filter(Boolean);

          const x=ml+col*(imgW+gap);
          // legenda
          doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(0,57,166);
          doc.text((i+col+1)+'. '+d.f.ponto_foto,x,y+4,{maxWidth:imgW});
          if(d.ok){
            doc.addImage(d.dataUrl,d.fmt,x,y+6,imgW,imgH);
          }else{
            doc.setDrawColor(220,220,220);doc.rect(x,y+6,imgW,imgH);
            doc.setFontSize(7);doc.setTextColor(150,150,150);
            doc.text('[Imagem indisponível]',x+imgW/2,y+6+imgH/2,{align:'center'});
          }
        });
        y+=rowH+4;
      }
    }
    // Assinaturas
    checkY(50);secTit('ASSINATURAS DE LIBERAÇÃO');
    // Busca cargo real pelo nome no cadastro de funcionários
    function cargoReal(nome){
      if(!nome)return'—';
      const f=funcionarios.find(x=>(x.nome||'').trim().toLowerCase()===nome.trim().toLowerCase());
