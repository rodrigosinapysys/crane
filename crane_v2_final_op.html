// ── ERROR BOUNDARY ────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null,info:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,i){this.setState({err:e,info:i});console.error('CRANE ERROR:',e,i);}
  render(){
    if(this.state.err)return <div style={{padding:24,background:'#FEF2F2',border:'2px solid #EF4444',borderRadius:8,margin:16,fontFamily:'monospace'}}>
      <div style={{fontSize:16,fontWeight:700,color:'#DC2626',marginBottom:8}}>⚠️ Erro de renderização</div>
      <div style={{fontSize:13,color:'#991B1B',marginBottom:12}}>{this.state.err.message}</div>
      <pre style={{fontSize:11,color:'#7F1D1D',whiteSpace:'pre-wrap',maxHeight:200,overflow:'auto'}}>{this.state.info?.componentStack}</pre>
      <button onClick={()=>this.setState({err:null})} style={{marginTop:12,padding:'6px 16px',background:'#DC2626',color:'#fff',border:'none',borderRadius:4,cursor:'pointer'}}>Tentar novamente</button>
    </div>;
    return this.props.children;
  }
}

function fmtHH(min){if(!min)return'—';const h=Math.floor(min/60),m=min%60;return h+'h'+(m>0?m+'min':'');}
function fmtD(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}catch{return d}}
const SI=()=><svg className="si" width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><circle cx={11} cy={11} r={8}/><path d="M21 21l-4.35-4.35"/></svg>;

// LOGIN
// ════════════════════════════════════════
function Login({onLogin,onVoltar}){
  const[email,setEmail]=useState('');const[senha,setSenha]=useState('');const[loading,setLoading]=useState(false);const[erro,setErro]=useState('');
  async function submit(){
    setErro('');setLoading(true);
    const{data,error}=await db.auth.signInWithPassword({email,password:senha});
    if(error){
      setErro(error.message==='Invalid login credentials'?'E-mail ou senha incorretos.'
        :error.message==='Email not confirmed'?'Confirme o e-mail antes de entrar.'
        :error.message==='User not found'?'Usuário não encontrado.'
        :'Erro: '+error.message);
      setLoading(false);return;
    }
    const{data:u}=await db.from('usuarios').select('*').eq('id',data.user.id).single();
    if(u&&!u.ativo){setErro('Usuário inativo. Contate o administrador.');await db.auth.signOut();setLoading(false);return;}
    onLogin(data.user,u||{id:data.user.id,nome:data.user.email,perfil:'ADMIN',ativo:true});
  }
  return <div className="lw"><div className="lc">
    <div style={{marginBottom:28}}>
      <div style={{fontSize:24,fontWeight:800,color:'var(--blue-dk)'}}>CRANE</div>
      <div style={{fontSize:12,color:'var(--g400)',marginTop:3}}>Gestor / PCM — Acesso completo</div>
    </div>
    <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>Entrar com sua conta</div>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
    <div className="fg"><label className="fl">E-mail</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} style={{padding:12,fontSize:14}}/></div>
    <div className="fg"><label className="fl">Senha</label><input type="password" value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} style={{padding:12,fontSize:14}}/></div>
    <button className="btn btn-p" style={{width:'100%',justifyContent:'center',padding:12,fontSize:14,marginTop:4}} disabled={loading} onClick={submit}>{loading&&<span className="spin">↻ </span>}{loading?'Entrando...':'Entrar'}</button>
    {onVoltar&&<button onClick={onVoltar} style={{width:'100%',marginTop:10,padding:'10px 0',background:'none',border:'1px solid var(--g200)',borderRadius:'var(--r)',cursor:'pointer',fontSize:13,color:'var(--g500)',fontFamily:'var(--font)'}}>← Voltar</button>}
  </div></div>;
}

function FuncionariosView(){
  const[lista,setLista]=useState([]);const[loading,setLoading]=useState(true);const[salvando,setSalvando]=useState(false);
  const[erro,setErro]=useState(null);const[sucesso,setSucesso]=useState(null);const[showForm,setShowForm]=useState(false);
  const[editando,setEditando]=useState(null);const[form,setForm]=useState({nome:'',especialidade:'Mecânico',pin:'',ativo:true});


  async function carregar(){setLoading(true);const{data,error}=await db.from('crane_funcionarios').select('*').order('nome');if(error)setErro(error.message);else setLista(data||[]);setLoading(false);}
  useEffect(()=>{carregar();},[]);

  function abrirNovo(){setForm({nome:'',especialidade:'Mecânico',pin:'',ativo:true});setEditando(null);setShowForm(true);setErro(null);}
  function abrirEditar(f){setForm({nome:f.nome,especialidade:f.especialidade||f.funcao||'Mecânico',pin:f.pin||'',ativo:f.ativo});setEditando(f.id);setShowForm(true);setErro(null);}

  async function salvar(){
    if(!form.nome.trim()){setErro('Nome obrigatório');return;}
    if(form.pin&&(form.pin.length!==4||!/^\d{4}$/.test(form.pin))){setErro('PIN deve ter exatamente 4 dígitos numéricos');return;}
    setSalvando(true);setErro(null);
    const payload={nome:form.nome.trim(),funcao:form.especialidade,especialidade:form.especialidade,ativo:form.ativo};
    // Tenta incluir PIN — ignora se coluna ainda não existe no banco
    if(form.pin)payload.pin=form.pin;
    const{error}=editando?await db.from('crane_funcionarios').update(payload).eq('id',editando):await db.from('crane_funcionarios').insert(payload);
    setSalvando(false);
    if(error){
      // Se erro de coluna PIN, salva sem PIN e avisa
      if(error.message&&error.message.includes('pin')){
        const payloadSemPin={nome:form.nome.trim(),funcao:form.especialidade,especialidade:form.especialidade,ativo:form.ativo};
        const{error:e2}=editando?await db.from('crane_funcionarios').update(payloadSemPin).eq('id',editando):await db.from('crane_funcionarios').insert(payloadSemPin);
        if(e2){setErro(e2.message);return;}
        setSucesso((editando?'Atualizado':'Cadastrado')+' (sem PIN — rode a migração SQL para habilitar PINs)');setTimeout(()=>setSucesso(null),6000);
        setShowForm(false);setEditando(null);carregar();return;
      }
      setErro(error.message);return;
    }
    setSucesso(editando?'Atualizado!':'Cadastrado!');setTimeout(()=>setSucesso(null),3000);
    setShowForm(false);setEditando(null);carregar();
  }
  async function toggleAtivo(f){await db.from('crane_funcionarios').update({ativo:!f.ativo}).eq('id',f.id);carregar();}

  const ativos=lista.filter(f=>f.ativo),inativos=lista.filter(f=>!f.ativo);

  return <div style={{maxWidth:680,margin:'0 auto',paddingBottom:40}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div><h2 style={{fontSize:20,fontWeight:800,margin:0}}>Cadastro de Funcionários</h2>
        <p style={{fontSize:13,color:'var(--g500)',marginTop:4}}>{ativos.length} ativo{ativos.length!==1?'s':''} · {inativos.length} inativo{inativos.length!==1?'s':''}</p></div>
      <button className="btn btn-p" onClick={abrirNovo}>+ Novo Funcionário</button>
    </div>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
    {sucesso&&<div className="al" style={{background:'#F0FDF4',border:'1px solid #86EFAC',color:'#166534'}}><span>✓</span><span>{sucesso}</span></div>}

    {showForm&&<div style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:20,marginBottom:20,boxShadow:'var(--shadow-md)'}}>
      <h3 style={{margin:'0 0 16px',fontSize:15,fontWeight:700}}>{editando?'Editar':'Novo'} Funcionário</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
        <div style={{gridColumn:'1/-1'}}><label className="fl">NOME COMPLETO <span className="req">*</span></label>
          <input value={form.nome} onChange={e=>setForm(p=>({...p,nome:e.target.value}))} placeholder="Nome do funcionário" style={{padding:12,fontSize:14}}/></div>
        <div><label className="fl">ESPECIALIDADE <span className="req">*</span></label>
          <select value={form.especialidade} onChange={e=>setForm(p=>({...p,especialidade:e.target.value}))} style={{padding:12,fontSize:14}}>
            {Object.keys(ESP).map(e=><option key={e} value={e}>{IE[e]} {e}</option>)}
          </select>
          {form.especialidade&&<div style={{marginTop:4,fontSize:11,color:'var(--g400)'}}>Serviços: {(ESP[form.especialidade]||[]).join(', ')}</div>}
        </div>
        <div><label className="fl">PIN DE ACESSO <span style={{fontSize:10,color:'var(--g400)',fontWeight:400}}>(4 dígitos — acesso técnico)</span></label>
          <input type="password" maxLength={4} value={form.pin} onChange={e=>setForm(p=>({...p,pin:e.target.value.replace(/\D/g,'').slice(0,4)}))} placeholder="••••" style={{padding:12,fontSize:18,letterSpacing:8,fontFamily:'monospace'}}/>
          <div style={{marginTop:3,fontSize:11,color:'var(--g400)'}}>Deixe em branco para desabilitar acesso técnico</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,paddingTop:20}}>
          <input type="checkbox" id="ck-a" checked={form.ativo} onChange={e=>setForm(p=>({...p,ativo:e.target.checked}))}/>
          <label htmlFor="ck-a" style={{fontSize:14,color:'var(--g700)',cursor:'pointer'}}>Ativo</label>
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-p" onClick={salvar} disabled={salvando} style={{padding:'10px 20px'}}>{salvando?'Salvando...':'Salvar'}</button>
        <button className="btn btn-g" onClick={()=>setShowForm(false)} style={{padding:'10px 16px'}}>Cancelar</button>
      </div>
    </div>}

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :lista.length===0?<div className="emp"><div className="ei">👷</div><h3>Nenhum funcionário cadastrado</h3><p>Clique em "+ Novo Funcionário" para começar</p></div>
    :<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {lista.map(f=>{const esp=f.especialidade||f.funcao||'';
        return <div key={f.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--r)',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,opacity:f.ativo?1:.5,boxShadow:'var(--shadow)'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:38,height:38,borderRadius:'50%',background:f.ativo?'var(--blue-lt)':'var(--g100)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{IE[esp]||'🔧'}</div>
            <div><div style={{fontSize:14,fontWeight:700}}>{f.nome}</div>
              <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,background:CE[esp]||'#F3F4F6',color:TE[esp]||'#374151'}}>{esp||'Geral'}</span>
              {f.pin?<span style={{marginLeft:6,fontSize:10,background:'var(--blue-lt)',color:'var(--blue)',padding:'2px 6px',borderRadius:10,fontWeight:700}}>🔑 PIN ativo</span>:<span style={{marginLeft:6,fontSize:10,color:'var(--g300)'}}>sem PIN</span>}
            </div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <span className="bdg" style={{background:f.ativo?'var(--green-lt)':'var(--g100)',color:f.ativo?'var(--green)':'var(--g500)'}}>{f.ativo?'Ativo':'Inativo'}</span>
            <button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>abrirEditar(f)}>Editar</button>
            <button style={{padding:'6px 12px',background:f.ativo?'#FEF9EC':'#F0FDF4',border:'1px solid '+(f.ativo?'#FCD34D':'#86EFAC'),borderRadius:'var(--r)',cursor:'pointer',fontSize:12,fontWeight:700,color:f.ativo?'#92400E':'#166534'}} onClick={()=>toggleAtivo(f)}>{f.ativo?'Inativar':'Ativar'}</button>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

function OficinaView(){
  const[aba,setAba]=useState('lancar');
  const[funcionarios,setFuncionarios]=useState([]);const[lancamentos,setLancamentos]=useState([]);const[catalogo,setCatalogo]=useState([]);
  const[loading,setLoading]=useState(true);const[salvando,setSalvando]=useState(false);const[erro,setErro]=useState(null);const[sucesso,setSucesso]=useState(null);
  const[periodo,setPeriodo]=useState(7);const[filtroF,setFiltroF]=useState('todos');
  const[buscaItem,setBuscaItem]=useState('');const[itemSel,setItemSel]=useState(null);const[showIL,setShowIL]=useState(false);
  const hoje=new Date().toISOString().split('T')[0];
  const[form,setForm]=useState({data:hoje,funcionario_id:'',servico:'',hora_inicio:'',hora_fim:'',quantidade:1,qtd_material:0,material_descricao:'',tipo:'elevador'});
  const[formFalta,setFormFalta]=useState({data:hoje,funcionario_id:'',tipo_ocorrencia:'falta',observacao:''});
  const[tipoLanc,setTipoLanc]=useState('producao'); // 'producao' | 'falta'

  async function carregar(){
    setLoading(true);
    const[{data:f},{data:l},{data:c}]=await Promise.all([
      db.from('crane_funcionarios').select('*').eq('ativo',true).order('nome'),
      db.from('crane_oficina').select('*').order('criado_em',{ascending:false}).limit(600),
      db.from('itens_estrutura').select('codigo,descricao,peso_kg,tipo_equipamento').eq('ativo',true),
    ]);
    setFuncionarios(f||[]);setLancamentos(l||[]);setCatalogo(c||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  const servicosF=useMemo(()=>{
    if(!form.funcionario_id)return TSRV;
    const func=funcionarios.find(f=>f.id===form.funcionario_id);
    return ESP[func?.especialidade||func?.funcao||'']||TSRV;
  },[form.funcionario_id,funcionarios]);
  useEffect(()=>{if(form.servico&&!servicosF.includes(form.servico))setForm(p=>({...p,servico:''}));},[servicosF]);

  const itensF=useMemo(()=>{
    if(!buscaItem.trim())return[];
    const q=buscaItem.toLowerCase();
    return catalogo.filter(i=>(i.codigo||'').toLowerCase().includes(q)||(i.descricao||'').toLowerCase().includes(q)).slice(0,10);
  },[buscaItem,catalogo]);

  function selItem(item){setItemSel(item);setBuscaItem(item.descricao||item.codigo);setShowIL(false);}
  function calcHH(ini,fim){const m=calcMin(ini,fim);if(!m)return null;return Math.floor(m/60)+'h'+(m%60>0?m%60+'min':'');}
  function pesoC(code){return catalogo.find(i=>i.codigo===code)?.peso_kg||null;}

  async function salvar(){
    if(!form.funcionario_id){setErro('Selecione o funcionário');return;}
    if(!itemSel){setErro('Selecione o item');return;}
    if(!form.servico){setErro('Selecione o serviço');return;}
    if(!form.hora_inicio||!form.hora_fim){setErro('Informe hora início e fim');return;}
    if(form.hora_fim<=form.hora_inicio){setErro('Hora fim deve ser maior que hora início');return;}
    setSalvando(true);setErro(null);
    try{
      const{data:dup}=await db.from('crane_oficina').select('id').eq('funcionario_id',form.funcionario_id).eq('data',form.data).eq('hora_inicio',form.hora_inicio).limit(1);
      if(dup&&dup.length>0){setErro('Já existe lançamento nesta data/hora.');setSalvando(false);return;}
      const func=funcionarios.find(f=>f.id===form.funcionario_id);
      const{error}=await db.from('crane_oficina').insert({
        data:form.data,funcionario_id:form.funcionario_id,funcionario_nome:func?.nome||'',
        tipo:form.tipo,item_code:itemSel.codigo,item_nome:itemSel.descricao||itemSel.codigo,
        servico:form.servico,hora_inicio:form.hora_inicio,hora_fim:form.hora_fim,
        quantidade:Number(form.quantidade)||1,qtd_material:Number(form.qtd_material)||0,
        material_descricao:form.material_descricao||null,
      });
      if(error)throw error;
      setSucesso('Lançamento salvo!');setTimeout(()=>setSucesso(null),3000);
      setItemSel(null);setBuscaItem('');
      setForm(p=>({...p,servico:'',hora_inicio:'',hora_fim:'',quantidade:1,qtd_material:0,material_descricao:''}));
      carregar();
    }catch(e){setErro(e.message);}
    setSalvando(false);
  }

  async function excluir(id){if(!window.confirm('Excluir este lançamento?'))return;await db.from('crane_oficina').delete().eq('id',id);carregar();}

  async function salvarFalta(){
    if(!formFalta.funcionario_id){setErro('Selecione o funcionário');return;}
    if(!formFalta.data){setErro('Informe a data');return;}
    setSalvando(true);setErro(null);
    try{
      const func=funcionarios.find(f=>f.id===formFalta.funcionario_id);
      const{error}=await db.from('crane_oficina').insert({
        data:formFalta.data,
        funcionario_id:formFalta.funcionario_id,
        funcionario_nome:func?.nome||'',
        tipo:'falta',
        tipo_lancamento:'falta',
        servico:formFalta.tipo_ocorrencia==='atestado'?'Atestado':'Falta',
        tipo_ocorrencia:formFalta.tipo_ocorrencia,
        observacao_falta:formFalta.observacao||null,
        item_code:null,item_nome:null,
        hora_inicio:null,hora_fim:null,quantidade:0,
      });
      if(error)throw error;
      setSucesso('Falta/Atestado registrado!');setTimeout(()=>setSucesso(null),3000);
      setFormFalta(p=>({...p,tipo_ocorrencia:'falta',observacao:''}));
      carregar();
    }catch(e){setErro(e.message);}
    setSalvando(false);
  }

  const dataCorte=new Date(Date.now()-periodo*86400000).toISOString().split('T')[0];
  const lancF=lancamentos.filter(l=>l.data>=dataCorte&&(filtroF==='todos'||l.funcionario_id===filtroF));
  const kgTotal=lancF.reduce((a,l)=>{const p=pesoC(l.item_code);return a+(p?p*Number(l.quantidade||1):0)},0);
  const kgPintura=lancF.filter(l=>l.servico==='Pintura').reduce((a,l)=>{const p=pesoC(l.item_code);return a+(p?p*Number(l.quantidade||1):0)},0);
  const minTotal=lancF.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0);
  const kgH=minTotal>0?(kgTotal/(minTotal/60)).toFixed(1):0;
  const totItens=lancF.reduce((a,l)=>a+Number(l.quantidade||1),0);
  const porF={};lancF.forEach(l=>{if(!porF[l.funcionario_id])porF[l.funcionario_id]={nome:l.funcionario_nome,itens:0,kg:0,min:0,kgP:0};const p=pesoC(l.item_code);porF[l.funcionario_id].itens+=Number(l.quantidade||1);porF[l.funcionario_id].kg+=(p?p*Number(l.quantidade||1):0);porF[l.funcionario_id].min+=calcMin(l.hora_inicio,l.hora_fim);if(l.servico==='Pintura')porF[l.funcionario_id].kgP+=(p?p*Number(l.quantidade||1):0);});
  const rankF=Object.values(porF).sort((a,b)=>b.itens-a.itens);

  const BtPer=()=><div style={{display:'flex',gap:6}}>{[7,15,30].map(d=><button key={d} onClick={()=>setPeriodo(d)} style={{padding:'6px 14px',border:'1px solid '+(d===periodo?'var(--blue)':'var(--g200)'),borderRadius:20,background:d===periodo?'var(--blue)':'var(--white)',color:d===periodo?'#fff':'var(--g500)',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'var(--font)'}}>{d}d</button>)}</div>;
  const BtFunc=()=><select value={filtroF} onChange={e=>setFiltroF(e.target.value)} style={{width:'auto',padding:'6px 12px',borderRadius:20,fontSize:13}}><option value="todos">Todos</option>{funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}</select>;

  return <div style={{maxWidth:760,margin:'0 auto',paddingBottom:60}}>
    <div style={{display:'flex',gap:0,borderBottom:'2px solid var(--g200)',marginBottom:22}}>
      {[{id:'lancar',lb:'📝 Lançar'},{id:'indicadores',lb:'📊 Indicadores'},{id:'historico',lb:'📋 Histórico'}].map(t=><button key={t.id} className={'tab'+(aba===t.id?' a':'')} onClick={()=>setAba(t.id)}>{t.lb}</button>)}
    </div>

    {erro&&<div className="al al-e" style={{marginBottom:12}}><span>⚠</span><span>{erro}</span><button style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'inherit',fontSize:18}} onClick={()=>setErro(null)}>×</button></div>}
    {sucesso&&<div className="al" style={{background:'#F0FDF4',border:'1px solid #86EFAC',color:'#166534',marginBottom:12}}><span>✓</span><span>{sucesso}</span></div>}

    {aba==='lancar'&&(loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>:
    <div style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:22,boxShadow:'var(--shadow)'}}>
      <div style={{display:'flex',gap:0,marginBottom:22,background:'var(--g50)',borderRadius:'var(--r)',padding:4}}>
        {[{id:'producao',lb:'🔧 Lançamento de Produção'},{id:'falta',lb:'📋 Falta / Atestado'}].map(t=><button key={t.id}
          onClick={()=>{setTipoLanc(t.id);setErro(null);}}
          style={{flex:1,padding:'9px 0',border:'none',borderRadius:'var(--r)',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'var(--font)',
            background:tipoLanc===t.id?'var(--white)':'transparent',
            color:tipoLanc===t.id?'var(--blue)':'var(--g500)',
            boxShadow:tipoLanc===t.id?'var(--shadow)':'none',transition:'.15s'}}>{t.lb}</button>)}
      </div>

      {/* ── FORM FALTA / ATESTADO ── */}
      {tipoLanc==='falta'&&<div>
        <div className="fr2" style={{marginBottom:14}}>
          <div><label className="fl">DATA <span className="req">*</span></label>
            <input type="date" value={formFalta.data} onChange={e=>setFormFalta(p=>({...p,data:e.target.value}))} style={{padding:12,fontSize:15}}/></div>
          <div><label className="fl">TIPO DE OCORRÊNCIA <span className="req">*</span></label>
            <select value={formFalta.tipo_ocorrencia} onChange={e=>setFormFalta(p=>({...p,tipo_ocorrencia:e.target.value}))} style={{padding:12,fontSize:15}}>
              <option value="falta">🔴 Falta</option>
              <option value="atestado">📄 Atestado Médico</option>
              <option value="falta_justificada">🟡 Falta Justificada</option>
              <option value="licenca">📋 Licença</option>
            </select></div>
        </div>
        <div style={{marginBottom:14}}><label className="fl">FUNCIONÁRIO <span className="req">*</span></label>
          {funcionarios.length===0
            ?<div style={{padding:12,background:'var(--amber-lt)',border:'1px solid #FCD34D',borderRadius:'var(--r)',fontSize:13,color:'var(--amber)'}}>⚠ Nenhum funcionário ativo.</div>
            :<select value={formFalta.funcionario_id} onChange={e=>setFormFalta(p=>({...p,funcionario_id:e.target.value}))} style={{padding:12,fontSize:15}}>
              <option value="">Selecione...</option>
              {funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome} — {f.especialidade||f.funcao||''}</option>)}
            </select>}
        </div>
        <div style={{marginBottom:20}}><label className="fl">OBSERVAÇÃO</label>
          <textarea value={formFalta.observacao} onChange={e=>setFormFalta(p=>({...p,observacao:e.target.value}))}
            placeholder="Ex: Apresentou atestado médico — 2 dias. CID: ..." rows={3}
            style={{padding:12,fontSize:14,resize:'vertical'}}/></div>
        <button className="btn btn-p" style={{padding:'12px 24px',fontSize:14,background:'var(--amber)',borderColor:'var(--amber)'}} onClick={salvarFalta} disabled={salvando}>{salvando?'Salvando...':'Registrar Ocorrência'}</button>
      </div>}

      {/* ── FORM PRODUÇÃO ── */}
      {tipoLanc==='producao'&&<div>
      <h3 style={{margin:'0 0 20px',fontSize:16,fontWeight:700}}>Novo Lançamento</h3>
      <div className="fr2" style={{marginBottom:14}}>
        <div><label className="fl">DATA</label><input type="date" value={form.data} onChange={e=>setForm(p=>({...p,data:e.target.value}))} style={{padding:12,fontSize:15}}/></div>
        <div><label className="fl">TIPO</label><select value={form.tipo} onChange={e=>setForm(p=>({...p,tipo:e.target.value}))} style={{padding:12,fontSize:14}}><option value="elevador">Elevador Cremalheira</option><option value="minigrua">Mini Grua</option></select></div>
      </div>
      <div style={{marginBottom:14}}><label className="fl">FUNCIONÁRIO <span className="req">*</span></label>
        {funcionarios.length===0
          ?<div style={{padding:12,background:'var(--amber-lt)',border:'1px solid #FCD34D',borderRadius:'var(--r)',fontSize:13,color:'var(--amber)'}}>⚠ Nenhum funcionário ativo. Cadastre na aba "Funcionários".</div>
          :<select value={form.funcionario_id} onChange={e=>setForm(p=>({...p,funcionario_id:e.target.value}))} style={{padding:12,fontSize:15}}>
            <option value="">Selecione...</option>
            {funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome} — {f.especialidade||f.funcao||''}</option>)}
          </select>}
      </div>
      <div style={{marginBottom:14,position:'relative'}}><label className="fl">ITEM MANUTENIDO <span className="req">*</span></label>
        <input value={buscaItem} onChange={e=>{setBuscaItem(e.target.value);setItemSel(null);setShowIL(true);}} onFocus={()=>buscaItem&&setShowIL(true)} placeholder="Digite código ou descrição..." style={{padding:12,fontSize:15,border:'1px solid '+(itemSel?'#86EFAC':'var(--g200)')}}/>
        {itemSel&&<div style={{position:'absolute',right:12,top:38,color:'#16A34A',fontSize:16}}>✓</div>}
        {showIL&&itensF.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',border:'1px solid var(--g200)',borderRadius:'var(--r)',boxShadow:'var(--shadow-md)',zIndex:100,maxHeight:220,overflowY:'auto'}}>
          {itensF.map(i=><div key={i.codigo} onClick={()=>selItem(i)} style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--g50)',fontSize:14}} onMouseEnter={e=>e.currentTarget.style.background='#F0F7FF'} onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
            <span style={{fontWeight:700,color:'var(--blue)',marginRight:8}}>{i.codigo}</span><span style={{color:'var(--g700)'}}>{i.descricao||''}</span>
            {i.peso_kg&&<span style={{fontSize:11,color:'var(--g400)',marginLeft:8}}>{i.peso_kg}kg/un</span>}
            <span style={{fontSize:10,color:'var(--g400)',marginLeft:8,background:'var(--g50)',padding:'1px 5px',borderRadius:4}}>{i.tipo_equipamento==='elevador'?'Elev.':'M.Grua'}</span>
          </div>)}
        </div>}
        {buscaItem&&itensF.length===0&&!itemSel&&showIL&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',border:'1px solid var(--g200)',borderRadius:'var(--r)',padding:'10px 14px',fontSize:13,color:'var(--g400)'}}>Nenhum item encontrado</div>}
      </div>
      <div style={{marginBottom:14}}><label className="fl">SERVIÇO REALIZADO <span className="req">*</span>{form.funcionario_id&&<span style={{fontWeight:400,marginLeft:6,color:'var(--g400)',fontSize:11,textTransform:'none'}}>(filtrado pela especialidade)</span>}</label>
        <select value={form.servico} onChange={e=>setForm(p=>({...p,servico:e.target.value}))} style={{padding:12,fontSize:15}}><option value="">Selecione...</option>{servicosF.map(s=><option key={s} value={s}>{s}</option>)}</select>
      </div>
      <div className="fr2">
        <div><label className="fl">HORA INÍCIO <span className="req">*</span></label><input type="time" value={form.hora_inicio} onChange={e=>setForm(p=>({...p,hora_inicio:e.target.value}))} style={{padding:12,fontSize:16}}/></div>
        <div><label className="fl">HORA FIM <span className="req">*</span></label><input type="time" value={form.hora_fim} onChange={e=>setForm(p=>({...p,hora_fim:e.target.value}))} style={{padding:12,fontSize:16}}/></div>
      </div>
      {form.hora_inicio&&form.hora_fim&&calcHH(form.hora_inicio,form.hora_fim)&&<div style={{background:'#EFF6FF',borderRadius:'var(--r)',padding:'8px 12px',marginTop:8,marginBottom:14,fontSize:13,color:'#1D4ED8',fontWeight:700}}>⏱ Tempo: {calcHH(form.hora_inicio,form.hora_fim)}</div>}
      <div className="fr2" style={{marginTop:14,marginBottom:Number(form.qtd_material)>0?14:20}}>
        <div><label className="fl">QTD. MANUTENIDA</label><input type="number" min="1" value={form.quantidade} onChange={e=>setForm(p=>({...p,quantidade:e.target.value}))} style={{padding:12,fontSize:15}}/></div>
        <div><label className="fl">QTD. MATERIAL LIBERADO</label><input type="number" min="0" value={form.qtd_material} onChange={e=>setForm(p=>({...p,qtd_material:e.target.value}))} style={{padding:12,fontSize:15}}/></div>
      </div>
      {Number(form.qtd_material)>0&&<div style={{marginBottom:20}}><label className="fl">DESCRIÇÃO DO MATERIAL</label><input value={form.material_descricao} onChange={e=>setForm(p=>({...p,material_descricao:e.target.value}))} placeholder="Ex: Parafuso M12, Rolamento 6205..." style={{padding:12,fontSize:14}}/></div>}
      <button className="btn btn-p" style={{padding:'12px 24px',fontSize:14}} onClick={salvar} disabled={salvando}>{salvando?'Salvando...':'Salvar Lançamento'}</button>
    </div>}
    </div>)}

    {aba==='indicadores'&&<div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,flexWrap:'wrap'}}><BtPer/><BtFunc/></div>
      <div className="krow">
        {[{l:'Itens manutenidos',v:totItens,s:'últimos '+periodo+' dias'},{l:'KG manutenido',v:kgTotal>0?kgTotal.toFixed(0)+'kg':'—',s:'peso processado'},{l:'Horas trabalhadas',v:fmtHH(minTotal),s:'tempo na oficina'},{l:'KG/hora',v:kgH>0?kgH+'kg/h':'—',s:'produtividade'}].map(k=><div key={k.l} className="kpi"><div className="kl">{k.l}</div><div className="kv" style={{fontSize:22}}>{k.v}</div><div className="ks">{k.s}</div></div>)}
      </div>
      {kgPintura>0&&<div style={{background:'linear-gradient(135deg,#FCE7F3,#FDF2F8)',border:'1px solid #F9A8D4',borderRadius:'var(--rl)',padding:'16px 20px',marginBottom:20,display:'flex',alignItems:'center',gap:14}}>
        <div style={{fontSize:36}}>🎨</div>
        <div><div style={{fontSize:10,fontWeight:800,color:'#9D174D',letterSpacing:.8,textTransform:'uppercase',marginBottom:2}}>Indicador — Pintura</div><div style={{fontSize:28,fontWeight:800,color:'#831843',lineHeight:1.1}}>{kgPintura.toFixed(0)} kg</div><div style={{fontSize:12,color:'#9D174D',marginTop:2}}>pintados nos últimos {periodo} dias · {lancF.filter(l=>l.servico==='Pintura').length} lançamentos</div></div>
      </div>}
      {rankF.length>0&&<div>
        <div style={{fontSize:11,fontWeight:700,color:'var(--g400)',marginBottom:10,letterSpacing:.4,textTransform:'uppercase'}}>Produtividade por Funcionário</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {rankF.map((f,i)=><div key={f.nome} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--r)',padding:'14px 16px',boxShadow:'var(--shadow)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:24,height:24,borderRadius:'50%',background:i===0?'#FEF9C3':i===1?'#F3F4F6':'#FFF7ED',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:i===0?'#92400E':'#374151'}}>{i+1}</div>
                <span style={{fontSize:14,fontWeight:700}}>{f.nome}</span>
              </div>
              <span style={{fontSize:14,fontWeight:800,color:'var(--blue)'}}>{f.itens} itens</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
              {[{lb:'KG manutenido',v:f.kg>0?f.kg.toFixed(0)+'kg':'—'},{lb:'Horas',v:(f.min/60).toFixed(1)+'h'},{lb:'KG/hora',v:f.min>0&&f.kg>0?(f.kg/(f.min/60)).toFixed(1)+'kg/h':'—'}].map(m=><div key={m.lb} style={{background:'var(--g50)',borderRadius:'var(--r)',padding:'8px 10px',textAlign:'center'}}><div style={{fontSize:14,fontWeight:700}}>{m.v}</div><div style={{fontSize:10,color:'var(--g400)',marginTop:2}}>{m.lb}</div></div>)}
            </div>
            {f.kgP>0&&<div style={{marginTop:8,padding:'6px 10px',background:'#FCE7F3',borderRadius:'var(--r)',fontSize:12,color:'#9D174D',fontWeight:700}}>🎨 Pintura: {f.kgP.toFixed(0)}kg</div>}
          </div>)}
        </div>
      </div>}
      {rankF.length===0&&<div className="emp"><div className="ei">📊</div><h3>Sem lançamentos no período</h3><p>Registre lançamentos na aba "Lançar"</p></div>}
    </div>}

    {aba==='historico'&&<div>
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}><BtPer/><BtFunc/><span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{lancF.length} lançamentos</span></div>
      {loading?<div style={{textAlign:'center',padding:30,color:'var(--g400)'}}>Carregando...</div>
      :lancF.length===0?<div className="emp"><div className="ei">📋</div><h3>Nenhum lançamento no período</h3></div>
      :<div style={{display:'flex',flexDirection:'column',gap:6}}>
        {lancF.map(l=><div key={l.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--r)',padding:'14px 16px',boxShadow:'var(--shadow)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,flexWrap:'wrap'}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700}}>{l.funcionario_nome}</div>
              <div style={{fontSize:13,color:'var(--g500)',marginTop:2}}><span style={{fontWeight:700,color:'var(--blue)',marginRight:6}}>{l.item_code}</span>{l.item_nome||''}</div>
              <div style={{fontSize:12,color:'var(--g400)',marginTop:1}}>{l.servico} · {l.tipo==='elevador'?'Elevador':'Mini Grua'}</div>
            </div>
            <div style={{display:'flex',alignItems:'flex-start',gap:8,flexShrink:0}}>
              <div style={{textAlign:'right'}}><div style={{fontSize:13,fontWeight:700,color:'var(--blue)'}}>{fmtHH(calcMin(l.hora_inicio,l.hora_fim))||'—'}</div><div style={{fontSize:12,color:'var(--g400)'}}>{fmtD(l.data)}</div></div>
              <button onClick={()=>excluir(l.id)} style={{padding:'4px 10px',background:'var(--red-lt)',border:'1px solid #FCA5A5',borderRadius:'var(--r)',cursor:'pointer',fontSize:12,color:'var(--red)',fontWeight:700}}>✕</button>
            </div>
          </div>
          <div style={{display:'flex',gap:12,marginTop:8,fontSize:12,color:'var(--g500)',flexWrap:'wrap'}}>
            <span>⏱ {l.hora_inicio}–{l.hora_fim}</span>
            <span>🔧 Qtd: {l.quantidade}</span>
            {Number(l.qtd_material)>0&&<span>📦 Mat: {l.qtd_material}{l.material_descricao?' – '+l.material_descricao:''}</span>}
            {pesoC(l.item_code)&&<span>⚖️ {(pesoC(l.item_code)*Number(l.quantidade||1)).toFixed(1)}kg</span>}
          </div>
        </div>)}
      </div>}
    </div>}
  </div>;
}

// RELATÓRIO DIÁRIO
// ════════════════════════════════════════
function RelatorioView(){
  const[data,setData]=useState(new Date().toISOString().split('T')[0]);
  const[funcionarios,setFuncionarios]=useState([]);const[lancamentos,setLancamentos]=useState([]);const[catalogo,setCatalogo]=useState([]);
  const[loading,setLoading]=useState(true);const[filtroF,setFiltroF]=useState('todos');

  async function carregar(){
    setLoading(true);
    const[{data:f},{data:l},{data:c}]=await Promise.all([
      db.from('crane_funcionarios').select('*').order('nome'),
      db.from('crane_oficina').select('*').order('hora_inicio'),
      db.from('itens_estrutura').select('codigo,descricao,peso_kg'),
    ]);
    setFuncionarios(f||[]);setLancamentos(l||[]);setCatalogo(c||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  function pesoC(code){return catalogo.find(i=>i.codigo===code)?.peso_kg||null;}
  const lancDia=lancamentos.filter(l=>l.data===data&&(filtroF==='todos'||l.funcionario_id===filtroF));
  const funcList=Array.from(new Set(lancDia.map(l=>l.funcionario_id))).map(fid=>{
    const nome=lancDia.find(l=>l.funcionario_id===fid)?.funcionario_nome||'?';
    const ls=lancDia.filter(l=>l.funcionario_id===fid).sort((a,b)=>a.hora_inicio>b.hora_inicio?1:-1);
    const tI=ls.reduce((a,l)=>a+Number(l.quantidade||1),0);
    const tM=ls.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0);
    const tK=ls.reduce((a,l)=>{const p=pesoC(l.item_code);return a+(p?p*Number(l.quantidade||1):0)},0);
    const mat=ls.filter(l=>Number(l.qtd_material)>0).map(l=>({item:l.item_code,desc:l.material_descricao||'—',qtd:l.qtd_material}));
    return{id:fid,nome,lancamentos:ls,tI,tM,tK,mat};
  });
  const totM=funcList.reduce((a,f)=>a+f.tM,0);
  const totI=funcList.reduce((a,f)=>a+f.tI,0);
  const totK=funcList.reduce((a,f)=>a+f.tK,0);
  const dtFmt=new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

  const thSt={padding:'6px 10px',textAlign:'left',fontSize:10,fontWeight:800,color:'var(--g500)',borderBottom:'1px solid var(--g200)',textTransform:'uppercase',letterSpacing:.4};

  return <div style={{maxWidth:920,margin:'0 auto',paddingBottom:48}}>
    <div className="np" style={{display:'flex',alignItems:'center',gap:12,marginBottom:22,flexWrap:'wrap'}}>
      <div><label className="fl">Data do relatório</label><input type="date" value={data} onChange={e=>setData(e.target.value)} style={{width:'auto',padding:'8px 12px',fontSize:14}}/></div>
      <div><label className="fl">Funcionário</label><select value={filtroF} onChange={e=>setFiltroF(e.target.value)} style={{width:'auto',padding:'8px 12px',fontSize:14}}><option value="todos">Todos</option>{funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}</select></div>
      <button className="btn btn-p" style={{marginTop:18}} onClick={()=>window.print()}>🖨 Imprimir / PDF</button>
    </div>

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :lancDia.length===0?<div className="emp np"><div className="ei">📄</div><h3>Sem lançamentos nesta data</h3><p>Registre lançamentos na Oficina para gerar o relatório</p></div>
    :<div className="rw card" style={{padding:28}}>
      <div style={{borderBottom:'3px solid var(--blue)',paddingBottom:16,marginBottom:22}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
          <div>
            <div style={{fontSize:10,fontWeight:800,color:'var(--blue)',letterSpacing:1.2,marginBottom:4}}>CRANE — OFICINA DE MANUTENÇÃO</div>
            <div style={{fontSize:22,fontWeight:800,color:'var(--g900)'}}>Relatório Diário de Produção</div>
            <div style={{fontSize:14,color:'var(--g500)',marginTop:4,textTransform:'capitalize'}}>{dtFmt}</div>
          </div>
          <div style={{textAlign:'right',fontSize:12,color:'var(--g400)'}}><div>Gerado em {new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>{filtroF!=='todos'&&<div style={{marginTop:2,fontWeight:700,color:'var(--g700)'}}>{funcionarios.find(f=>f.id===filtroF)?.nome||''}</div>}</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:24,padding:'14px 0',borderBottom:'1px solid var(--g100)'}}>
        {[{lb:'Funcionários',v:funcList.length,ic:'👷'},{lb:'Itens manutenidos',v:totI,ic:'🔧'},{lb:'Horas trabalhadas',v:fmtHH(totM),ic:'⏱'},{lb:'KG manutenido',v:totK>0?totK.toFixed(0)+'kg':'—',ic:'⚖️'}].map(k=><div key={k.lb} style={{textAlign:'center',padding:'10px 6px',background:'var(--g50)',borderRadius:'var(--r)'}}><div style={{fontSize:18,marginBottom:2}}>{k.ic}</div><div style={{fontSize:18,fontWeight:800,color:'var(--g900)'}}>{k.v}</div><div style={{fontSize:10,color:'var(--g500)',marginTop:2}}>{k.lb}</div></div>)}
      </div>

      {funcList.map((f,fi)=><div key={f.id} style={{marginBottom:fi<funcList.length-1?28:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--blue-lt)',borderRadius:'var(--r)',padding:'10px 14px',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:30,height:30,borderRadius:'50%',background:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:13,flexShrink:0}}>{f.nome.charAt(0).toUpperCase()}</div>
            <div><div style={{fontSize:15,fontWeight:800,color:'var(--g900)'}}>{f.nome}</div><div style={{fontSize:11,color:'var(--g500)'}}>{f.lancamentos.length} lançamento{f.lancamentos.length!==1?'s':''}</div></div>
          </div>
          <div style={{display:'flex',gap:16,fontSize:12}}>
            <div style={{textAlign:'center'}}><div style={{fontWeight:800,color:'var(--blue)',fontSize:15}}>{f.tI}</div><div style={{color:'var(--g500)'}}>itens</div></div>
            <div style={{textAlign:'center'}}><div style={{fontWeight:800,color:'var(--blue)',fontSize:15}}>{fmtHH(f.tM)}</div><div style={{color:'var(--g500)'}}>horas</div></div>
            {f.tK>0&&<div style={{textAlign:'center'}}><div style={{fontWeight:800,color:'var(--blue)',fontSize:15}}>{f.tK.toFixed(0)}kg</div><div style={{color:'var(--g500)'}}>peso</div></div>}
          </div>
        </div>

        <div style={{marginBottom:f.mat.length>0?12:0}}>
          <div style={{fontSize:10,fontWeight:800,color:'var(--g400)',marginBottom:6,letterSpacing:.8,textTransform:'uppercase'}}>Produção</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead><tr style={{background:'var(--g50)'}}>{['Item','Descrição','Tipo','Serviço','Qtd','Início','Fim','Tempo'].map(h=><th key={h} style={thSt}>{h}</th>)}</tr></thead>
            <tbody>{f.lancamentos.map((l,i)=><tr key={l.id} style={{background:i%2===0?'var(--white)':'var(--g50)'}}>
              <td style={{padding:'7px 10px',fontWeight:800,color:'var(--blue)',whiteSpace:'nowrap'}}>{l.item_code}</td>
              <td style={{padding:'7px 10px',color:'var(--g700)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.item_nome||'—'}</td>
              <td style={{padding:'7px 10px',whiteSpace:'nowrap'}}><span style={{fontSize:10,background:l.tipo==='elevador'?'var(--blue-lt)':'#F5F3FF',color:l.tipo==='elevador'?'var(--blue)':'#6D28D9',padding:'2px 6px',borderRadius:4,fontWeight:700}}>{l.tipo==='elevador'?'Elev.':'M.Grua'}</span></td>
              <td style={{padding:'7px 10px',color:'var(--g700)'}}>{l.servico}</td>
              <td style={{padding:'7px 10px',textAlign:'center',fontWeight:700}}>{l.quantidade}</td>
              <td style={{padding:'7px 10px',color:'var(--g500)',whiteSpace:'nowrap'}}>{l.hora_inicio}</td>
              <td style={{padding:'7px 10px',color:'var(--g500)',whiteSpace:'nowrap'}}>{l.hora_fim}</td>
              <td style={{padding:'7px 10px',fontWeight:800,color:'var(--blue)',whiteSpace:'nowrap'}}>{fmtHH(calcMin(l.hora_inicio,l.hora_fim))}</td>
            </tr>)}</tbody>
          </table>
        </div>

        {f.mat.length>0&&<div style={{marginTop:10}}>
          <div style={{fontSize:10,fontWeight:800,color:'var(--g400)',marginBottom:6,letterSpacing:.8,textTransform:'uppercase'}}>Material Liberado</div>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>

        {fi<funcList.length-1&&<div style={{borderBottom:'1px dashed var(--g200)',marginTop:20}}/>}
      </div>)}

      <div style={{borderTop:'1px solid var(--g100)',marginTop:24,paddingTop:12,display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--g400)'}}>
        <span>CRANE — Gestão de Estruturas</span>
        <span style={{textTransform:'capitalize'}}>{dtFmt} · {lancDia.length} lançamento{lancDia.length!==1?'s':''} · {totI} itens</span>
      </div>
    </div>}
  </div>;
}

function DisponibilidadeView(){
  const[tipo,setTipo]=useState('elevador');const[snapshots,setSnapshots]=useState([]);const[selSnap,setSelSnap]=useState(null);
  const[items,setItems]=useState([]);const[cadastro,setCadastro]=useState({});const[loading,setLoading]=useState(false);const[busca,setBusca]=useState('');

  const[reservaMap,setReservaMap]=useState({}); // {codigo -> [{obra, qtd}]}
  const[selItemCod,setSelItemCod]=useState(null); // modal obras por item
  const[showImp,setShowImp]=useState(false);const[step,setStep]=useState('drop');const[rawRows,setRawRows]=useState([]);const[headers,setHeaders]=useState([]);
  const[colMap,setColMap]=useState({codigo:'',dl:'',mi:''});const[preview,setPreview]=useState([]);
  const[snapDate,setSnapDate]=useState(new Date().toISOString().slice(0,10));const[saving,setSaving]=useState(false);const fileRef=useRef();

  const loadSnaps=useCallback(async()=>{const{data}=await db.from('crane_snapshots').select('*').order('snap_date',{ascending:false}).limit(30);setSnapshots(data||[]);if(data&&data.length)setSelSnap(data[0].id);else{setSelSnap(null);setItems([]);}},[]);
  const loadCat=useCallback(async()=>{const{data}=await db.from('itens_estrutura').select('codigo,descricao');const m={};(data||[]).forEach(i=>{if(i.codigo)m[i.codigo.trim().toUpperCase()]=i.descricao;});setCadastro(m);},[]);
  useEffect(()=>{loadSnaps();loadCat();},[]);
  useEffect(()=>{if(!selSnap){setItems([]);return;}(async()=>{
    setLoading(true);
    const[{data:its},{data:dem}]=await Promise.all([
      db.from('crane_snapshot_items').select('*').eq('snapshot_id',selSnap),
      db.from('crane_obra_demandas').select('codigo,quantidade_necessaria,status,crane_obras(cliente,status)'),
    ]);
    setItems(its||[]);
    // Agregar demandas por código
    const dm={};const rm={};
    (dem||[]).forEach(d=>{
      if(!d.codigo)return;
      const cod=d.codigo.trim().toUpperCase();
      dm[cod]=(dm[cod]||0)+Number(d.quantidade_necessaria||0);
      if(!rm[cod])rm[cod]=[];
      const nomeObra=d.crane_obras?.cliente||'—';
      rm[cod].push({obra:nomeObra,status_obra:d.crane_obras?.status||'',qtd:Number(d.quantidade_necessaria||0),status:d.status});
    });
    setDemandaMap(dm);setReservaMap(rm);
    setLoading(false);
  })();},[selSnap]);

  const[buildingPreview,setBuildingPreview]=useState(false);

  // Detecta se a planilha está no formato longo do Protheus (Produto + Almoxarifado + Qtde)
  function detectProtheusLong(hdrs){
    const norm=h=>String(h||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const hasProd=hdrs.some(h=>norm(h)==='produto'||norm(h).includes('produto'));
    const hasAlmo=hdrs.some(h=>norm(h).includes('almox'));
    const hasQtde=hdrs.some(h=>norm(h).includes('qtd')||norm(h).includes('quant'));
    return hasProd&&hasAlmo&&hasQtde;
  }

  // Pivot do formato longo Protheus → {codigo, dl, mi, descricao}
  function pivotProtheus(allRows){
    const norm=h=>String(h||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    // Encontra linha de cabeçalho (primeira que contém 'produto')
    let hdrIdx=0;
    for(let i=0;i<Math.min(allRows.length,15);i++){
      if(allRows[i].some(c=>norm(c)==='produto')){hdrIdx=i;break;}
    }
    const hdrs=allRows[hdrIdx].map(c=>String(c||'').trim());
    const dataRows=allRows.slice(hdrIdx+1);
    const iP=hdrs.findIndex(h=>norm(h)==='produto');
    const iA=hdrs.findIndex(h=>norm(h).includes('almox'));
    const iQ=hdrs.findIndex(h=>norm(h).includes('qtd')||norm(h).includes('quant'));
    const iD=hdrs.findIndex(h=>norm(h)==='descricao'||norm(h)==='descri');
    const map={};
    for(const row of dataRows){
      const cod=String(row[iP]||'').trim();
      const almo=String(row[iA]||'').trim().toUpperCase();
      const qtde=parseFloat(String(row[iQ]||'').replace(',','.'))||0;
      const desc=iD>=0?String(row[iD]||'').trim():'';
      if(!cod||!['DL','MI'].includes(almo))continue;
      if(!map[cod])map[cod]={dl:0,mi:0,desc:''};
      if(!map[cod].desc&&desc)map[cod].desc=desc;
      if(almo==='DL')map[cod].dl+=qtde;
      else if(almo==='MI')map[cod].mi+=qtde;
    }
    return Object.entries(map)
      .filter(([,v])=>v.dl+v.mi>0)
      .map(([codigo,v])=>({codigo,dl:v.dl,mi:v.mi,descricaoProtheus:v.desc}));
  }

  function handleFile(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const allRows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(!allRows.length){toast('Arquivo vazio','err');return;}

        // Tenta detectar formato longo Protheus
        const flat=allRows.slice(0,15).flat().map(c=>String(c||'').trim());
        if(detectProtheusLong(flat)){
          // Formato Protheus detectado — processa automaticamente
          setBuildingPreview(true);
          setStep('preview');
          const pivoData=pivotProtheus(allRows);
          // Cruza com cadastro
          const{data:catData}=await db.from('itens_estrutura').select('codigo,descricao,peso_kg').eq('tipo_equipamento',tipo).eq('ativo',true);
          const catMap={};(catData||[]).forEach(i=>{catMap[i.codigo]={descricao:i.descricao,peso_kg:i.peso_kg};});
          const ignorados=pivoData.filter(r=>!catMap[r.codigo]).length;
          const prev=pivoData
            .filter(r=>!!catMap[r.codigo])
            .map(r=>({...r,cadastrado:true,descricao:catMap[r.codigo].descricao||r.descricaoProtheus||'',peso_kg:catMap[r.codigo].peso_kg||null}));
          setPreview(prev);setBuildingPreview(false);
          if(ignorados>0)toast(ignorados+' item(s) sem cadastro CRANE foram ignorados');
        } else {
          // Formato genérico — exibe mapeador de colunas
          const hdrs=allRows[0].map(h=>String(h).trim());
          setHeaders(hdrs);setRawRows(allRows.slice(1));
          const auto={codigo:'',dl:'',mi:''};
          hdrs.forEach(h=>{const hl=h.toLowerCase();
            if(!auto.codigo&&(hl.includes('cod')||hl.includes('produto')||hl.includes('item')))auto.codigo=h;
            if(!auto.dl&&(hl==='dl'||hl.includes('disp')))auto.dl=h;
            if(!auto.mi&&(hl==='mi'||hl.includes('manut')))auto.mi=h;
          });
          setColMap(auto);setStep('map');
        }
      }catch(err){toast('Erro ao ler arquivo: '+err.message,'err');setBuildingPreview(false);}
    };
    reader.readAsBinaryString(file);
  }

  async function buildPreview(){
    // Usado apenas para formato genérico (colunas mapeadas manualmente)
    const ci=headers.indexOf(colMap.codigo),di=headers.indexOf(colMap.dl),mi=headers.indexOf(colMap.mi);
    if(ci<0||di<0||mi<0){toast('Mapeie todas as colunas','err');return;}
    setBuildingPreview(true);
    const{data:catData}=await db.from('itens_estrutura').select('codigo,descricao,peso_kg').eq('tipo_equipamento',tipo).eq('ativo',true);
    const catMap={};(catData||[]).forEach(i=>{catMap[i.codigo]={descricao:i.descricao,peso_kg:i.peso_kg};});
    const prev=rawRows.map(r=>({
      codigo:String(r[ci]||'').trim(),
      dl:Number(String(r[di]||'').replace(',','.'))||0,
      mi:Number(String(r[mi]||'').replace(',','.'))||0,
    })).filter(r=>r.codigo&&(r.dl+r.mi)>0)
    .filter(r=>!!catMap[r.codigo])
    .map(r=>({...r,cadastrado:true,descricao:catMap[r.codigo].descricao||'',peso_kg:catMap[r.codigo].peso_kg||null}));
    setPreview(prev);setBuildingPreview(false);setStep('preview');
  }
  async function confirmarImp(){
    setSaving(true);
    // Verifica sessão ativa
    const{data:{session}}=await db.auth.getSession();
    if(!session){toast('Sessão expirada. Faça login novamente.','err');setSaving(false);return;}
    const{data:snap,error:se}=await db.from('crane_snapshots')
      .upsert({snap_date:snapDate,tipo:'geral',filename:'Protheus'},{onConflict:'snap_date,tipo'})
      .select().single();
    if(se){
      console.error('crane_snapshots upsert error:',se);
      toast('Snapshot: '+se.message,'err');
      setSaving(false);return;
    }
    await db.from('crane_snapshot_items').delete().eq('snapshot_id',snap.id);
    const rows=preview.map(p=>({
      snapshot_id:snap.id,
      codigo:p.codigo,
      dl:p.dl,
      mi:p.mi,
      // descricao_ext guarda a descrição do Protheus se não cadastrado no CRANE
    }));
    const{error:ie}=await db.from('crane_snapshot_items').insert(rows);
    setSaving(false);
    if(ie){toast('Erro ao salvar itens','err');return;}
    const nCad=preview.filter(r=>r.cadastrado).length;
    toast(`${preview.length} itens importados — ${nCad} com cadastro CRANE`);
    setShowImp(false);setStep('drop');setPreview([]);setRawRows([]);loadSnaps();
  }

  const enriched=items.map(i=>{
    const t=i.dl+i.mi;const pct=t>0?Math.round(i.dl/t*100):0;
    const codNorm=(i.codigo||'').trim().toUpperCase();
    const desc=cadastro[codNorm]||i.descricao_ext||i.descricao||'—';
    const demRaw=demandaMap[codNorm]||0;
    const dem=Math.min(demRaw,t); // demanda não pode ser maior que DL+MI
    const saldoLiq=t-dem; // saldo líquido = total físico - demanda
    // Regra 1: DL+MI >= demanda → saldo ok, produzir só para meta
    // Regra 2: abaixo de 85% sem demanda → produzir para atingir 85%
    // Regra 3: abaixo de 85% E demanda consome todo estoque → soma: falta demanda + qtd para meta
    // DL necessário para meta: dlNovo/(dlNovo+MI) = META/100 → dlNovo = META/100 * MI / (1-META/100)
    const dlNecessarioMeta=t>0?Math.ceil((META/100)*t):0;
    const produzirMeta=Math.max(0,dlNecessarioMeta-i.dl);
    const faltaDemanda=Math.max(0,dem-t);
    const temDemanda=dem>0&&saldoLiq===0;
    let produzir=0;
    if(temDemanda&&produzirMeta>0){
      produzir=faltaDemanda+Math.max(0,dlNecessarioMeta-(i.dl+faltaDemanda));
    } else {
      produzir=produzirMeta;
    }
    return{...i,total:t,pct,descricao:desc,cadastrado:!!cadastro[codNorm],dem,saldoLiq,temDemanda,produzir};
  }).filter(i=>i.total>0).sort((a,b)=>{
    // 1º: demanda não atendida (saldo líquido negativo)
    if(a.temDemanda!==b.temDemanda)return a.temDemanda?-1:1;
    // 2º: com demanda (qualquer)
    const aDem=a.dem>0,bDem=b.dem>0;
    if(aDem!==bDem)return aDem?-1:1;
    // 3º: menor disponibilidade
    return a.pct-b.pct;
  });
  const filtrados=enriched.filter(i=>!busca||i.codigo.toLowerCase().includes(busca.toLowerCase())||i.descricao.toLowerCase().includes(busca.toLowerCase()));
  const abaixo=enriched.filter(i=>i.pct<META).length;const media=enriched.length?Math.round(enriched.reduce((a,b)=>a+b.pct,0)/enriched.length):0;const totMI=enriched.reduce((a,b)=>a+b.mi,0);

  // ── ORDEM DE PRODUÇÃO PDF ─────────────────────────────
  function gerarOrdemProducao(){
    // Itens críticos: abaixo de 85% OU com demanda maior que saldo
    const criticos=enriched.filter(i=>{
      const dem=demandaMap[(i.codigo||'').toUpperCase()]||0;
      const saldoLiq=i.dl-dem;
      return i.pct<META||saldoLiq<0;
    });
    if(criticos.length===0){toast('Todos os itens estão dentro da meta — nenhuma ordem necessária.','err');return;}
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const ml=14,mr=196,pw=182;
    let y=0;

    function cabecalho(){
      // Faixa azul topo
      doc.setFillColor(0,37,120);doc.rect(0,0,210,26,'F');
      doc.setFillColor(255,117,0);doc.rect(0,0,5,26,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
      doc.text('CRANE — Ordem de Produção',ml+6,10);
      doc.setFontSize(8);doc.setFont('helvetica','normal');
      doc.text((tipo==='elevador'?'Elevador Cremalheira':'Mini Grua')+' · Itens abaixo da meta ou com demanda não atendida',ml+6,17);
      const dt=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      doc.text('Emitido em: '+dt,mr,17,{align:'right'});
      y=34;
    }

    function secaoResumo(){
      // Caixas KPI
      const boxes=[
        {l:'Itens críticos',v:String(criticos.length),sub:'nesta ordem'},
        {l:'Disponib. média',v:media+'%',sub:'meta '+META+'%'},
        {l:'Total em MI',v:String(totMI),sub:'em manutenção'},
        {l:'Com demanda',v:String(Object.keys(demandaMap).filter(k=>demandaMap[k]>0).length),sub:'obras abertas'},
      ];
      const bw=42;const gap=4;let bx=ml;
      boxes.forEach(b=>{
        doc.setFillColor(245,246,248);doc.roundedRect(bx,y,bw,18,2,2,'F');
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(95,104,128);
        doc.text(b.l,bx+bw/2,y+5.5,{align:'center'});
        doc.setFontSize(14);doc.setFont('helvetica','bold');doc.setTextColor(17,24,39);
        doc.text(b.v,bx+bw/2,y+13,{align:'center'});
        doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(140,149,168);
        doc.text(b.sub,bx+bw/2,y+17,{align:'center'});
        bx+=bw+gap;
      });
      y+=24;
      // Linha separadora
      doc.setDrawColor(216,220,230);doc.line(ml,y,mr,y);
      y+=6;
    }

    function tituloSecao(txt){
      doc.setFillColor(0,57,166);doc.rect(ml,y,pw,6,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text(txt,ml+3,y+4.2);
      y+=9;
    }

    function rodape(){
      doc.setDrawColor(216,220,230);doc.line(ml,285,mr,285);
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,149,168);
      doc.text('CRANE — Sistema de Gestão de Estruturas',ml,289);
      doc.text('Página '+doc.internal.getCurrentPageInfo().pageNumber,mr,289,{align:'right'});
    }

    function novaPageSeNecessario(altura){
      if(y+altura>278){doc.addPage();cabecalhoSimples();y=20;}
    }

    function cabecalhoSimples(){
      doc.setFillColor(0,37,120);doc.rect(0,0,210,14,'F');
      doc.setFillColor(255,117,0);doc.rect(0,0,5,14,'F');
      doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text('CRANE — Ordem de Produção (continuação)',ml+6,9);
    }

    // Pagina 1
    cabecalho();
    secaoResumo();
    tituloSecao('ITENS QUE REQUEREM AÇÃO — '+tipo.toUpperCase()+' · '+criticos.length+' ITENS');

    // Cabeçalho da tabela
    const cols=[
      {h:'Código',w:26,align:'left'},
      {h:'Descrição',w:62,align:'left'},
      {h:'DL',w:13,align:'right'},
      {h:'MI',w:13,align:'right'},
      {h:'Total',w:13,align:'right'},
      {h:'Demanda',w:16,align:'right'},
      {h:'Saldo Líq.',w:16,align:'right'},
      {h:'Disp.%',w:13,align:'right'},
      {h:'▶ Produzir',w:18,align:'right'},
      {h:'Status',w:16,align:'center'},
    ];

    function desenharCabecalhoTabela(){
      doc.setFillColor(236,238,242);
      doc.rect(ml,y,pw,6,'F');
      doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(46,53,73);
      let cx=ml+1;
      cols.forEach(c=>{
        doc.text(c.h,c.align==='right'?cx+c.w-1:c.align==='center'?cx+c.w/2:cx,y+4.2,{align:c.align==='right'?'right':c.align==='center'?'center':'left'});
        cx+=c.w;
      });
      y+=7;
    }

    desenharCabecalhoTabela();

    criticos.forEach((item,idx)=>{
      novaPageSeNecessario(9);
      const semSaldo=item.temDemanda;
      const ok=item.pct>=META;

      // Fundo alternado + crítico vermelho
      if(semSaldo){doc.setFillColor(254,242,242);doc.rect(ml,y,pw,7.5,'F');}
      else if(idx%2===0){doc.setFillColor(250,251,252);doc.rect(ml,y,pw,7.5,'F');}

      doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);
      let cx=ml+1;

      // Código
      doc.setFont('helvetica','bold');doc.setTextColor(0,57,166);
      doc.text(item.codigo||'',cx,y+5.2);
      cx+=cols[0].w;

      // Descrição (truncar)
      doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);
      const desc=(item.descricao||'—').substring(0,46);
      doc.text(desc,cx,y+5.2);
      cx+=cols[1].w;

      // DL
      doc.setTextColor(13,122,76);doc.setFont('helvetica','bold');
      doc.text(String(item.dl),cx+cols[2].w-1,y+5.2,{align:'right'});cx+=cols[2].w;

      // MI
      doc.setTextColor(item.mi>0?192:140,item.mi>0?57:149,item.mi>0?43:168);
      doc.text(String(item.mi),cx+cols[3].w-1,y+5.2,{align:'right'});cx+=cols[3].w;

      // Total
      doc.setTextColor(17,24,39);doc.setFont('helvetica','normal');
      doc.text(String(item.total),cx+cols[4].w-1,y+5.2,{align:'right'});cx+=cols[4].w;

      // Demanda
      if(item.dem>0){doc.setTextColor(180,83,9);doc.setFont('helvetica','bold');doc.text('-'+item.dem,cx+cols[5].w-1,y+5.2,{align:'right'});}
      else{doc.setTextColor(184,191,208);doc.setFont('helvetica','normal');doc.text('—',cx+cols[5].w-1,y+5.2,{align:'right'});}
      cx+=cols[5].w;

      // Saldo líquido
      doc.setFont('helvetica','bold');
      doc.setTextColor(semSaldo?192:item.saldoLiq===0?180:13,semSaldo?57:item.saldoLiq===0?83:122,semSaldo?43:item.saldoLiq===0?9:76);
      doc.text(String(item.saldoLiq),cx+cols[6].w-1,y+5.2,{align:'right'});cx+=cols[6].w;

      // Disp%
      doc.setTextColor(ok?13:item.pct>=70?180:192,ok?122:item.pct>=70?83:57,ok?76:item.pct>=70?9:43);
      doc.setFont('helvetica','bold');
      doc.text(item.pct+'%',cx+cols[7].w-1,y+5.2,{align:'right'});cx+=cols[7].w;

      // ▶ Produzir — destaque azul ou vermelho
      if(item.produzir>0){
        const pr=item.produzir;
        const bx=cx+cols[8].w-1;
        doc.setFont('helvetica','bold');
        doc.setTextColor(semSaldo?192:0,semSaldo?57:57,semSaldo?43:166);
        doc.text(String(pr),bx,y+5.2,{align:'right'});
      } else {
        doc.setTextColor(184,191,208);doc.setFont('helvetica','normal');
        doc.text('—',cx+cols[8].w-1,y+5.2,{align:'right'});
      }
      cx+=cols[8].w;

      // Status badge texto
      const stLabel=semSaldo?'FALTA':ok?'OK':item.pct>=70?'ATENÇÃO':'CRÍTICO';
      doc.setFontSize(6.5);
      doc.setTextColor(semSaldo?192:ok?13:item.pct>=70?180:192,semSaldo?57:ok?122:item.pct>=70?83:57,semSaldo?43:ok?76:item.pct>=70?9:43);
      doc.text(stLabel,cx+cols[9].w/2,y+5.2,{align:'center'});

      // Linha separadora
      doc.setDrawColor(236,238,242);doc.line(ml,y+7.5,ml+pw,y+7.5);
      y+=8;
    });

    // Seção demandas por obra (itens que têm demanda)
    const comDemanda=criticos.filter(i=>demandaMap[(i.codigo||'').toUpperCase()]>0);
    if(comDemanda.length>0){
      novaPageSeNecessario(20);
      y+=6;
      tituloSecao('DEMANDA POR OBRA — '+comDemanda.length+' ITENS COM OBRAS PENDENTES');

      comDemanda.forEach(item=>{
        novaPageSeNecessario(12);
        const cod=(item.codigo||'').toUpperCase();
        const obras=reservaMap[cod]||[];
        doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(0,57,166);
        doc.text(item.codigo+' — ',ml,y+4);
        doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);
        doc.text((item.descricao||'').substring(0,60),ml+22,y+4);
        y+=5.5;
        obras.forEach(o=>{
          novaPageSeNecessario(5);
          doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(95,104,128);
          doc.text('→  '+o.obra+' · Qtd: '+o.qtd,ml+4,y+4);
          y+=4.5;
        });
        doc.setDrawColor(236,238,242);doc.line(ml,y,mr,y);
        y+=3;
      });
    }

    rodape();

    const snapSel=snapshots.find(s=>s.id===selSnap);
    const dataSnap=snapSel?snapSel.snap_date.replace(/-/g,''):'';
    doc.save('OrdemProducao_'+(tipo==='elevador'?'Elevador':'MiniGrua')+'_'+dataSnap+'.pdf');
    toast('Ordem de Produção gerada! ✅');
  }

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div><h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>Disponibilidade</h2><p style={{fontSize:13,color:'var(--g500)'}}>Posição de estoque importada do Protheus — meta {META}%</p></div>
      <div style={{display:'flex',gap:8}}>
        {enriched.length>0&&<button className="btn btn-d" style={{background:'var(--blue-dk)',color:'#fff',borderColor:'var(--blue-dk)'}} onClick={gerarOrdemProducao}>📋 Ordem de Produção</button>}
        <button className="btn btn-p" onClick={()=>{setShowImp(true);setStep('drop');}}>⬆ Importar Planilha</button>
      </div>
    </div>
    <div className="stabs">
      <button className={'stab'+(tipo==='elevador'?' a':'')} onClick={()=>setTipo('elevador')}>Elevador Cremalheira</button>
      <button className={'stab'+(tipo==='minigrua'?' a':'')} onClick={()=>setTipo('minigrua')}>Mini Grua</button>
    </div>
    {snapshots.length>0&&<div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
      <span style={{fontSize:12,color:'var(--g500)',flexShrink:0}}>Snapshot:</span>
      <select style={{width:'auto'}} value={selSnap||''} onChange={e=>setSelSnap(e.target.value)}>{snapshots.map(s=><option key={s.id} value={s.id}>{fmtD(s.snap_date)}</option>)}</select>
    </div>}
    <div className="krow">
      <div className="kpi"><div className="kl">Itens com saldo</div><div className="kv">{enriched.length}</div><div className="ks">{tipo==='elevador'?'Elevador':'Mini Grua'}</div></div>
      <div className="kpi" style={media<META?{borderLeft:'3px solid var(--amber)'}:{}}><div className="kl">Disponib. média</div><div className="kv" style={{color:media<META?'var(--amber)':'var(--g900)'}}>{media}%</div><div className="ks">meta: {META}%</div></div>
      <div className="kpi" style={abaixo>0?{borderLeft:'3px solid var(--red)'}:{}}><div className="kl">Abaixo da meta</div><div className="kv" style={{color:abaixo>0?'var(--red)':'var(--g900)'}}>{abaixo}</div><div className="ks">itens críticos</div></div>
      <div className="kpi"><div className="kl">Total em MI</div><div className="kv">{totMI}</div><div className="ks">unidades manutenção</div></div>
    </div>
    <div className="bar">
      <div className="sw"><SI/><input placeholder="Buscar código ou descrição..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{filtrados.length} itens</span>
    </div>
    {snapshots.length===0?<div className="emp"><div className="ei">📊</div><h3>Nenhum snapshot importado</h3><p>Clique em "Importar Planilha" para começar</p></div>
    :<div className="card"><div className="tw">
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--g400)'}}>Carregando...</div>
      :filtrados.length===0?<div className="emp"><div className="ei">📦</div><h3>Nenhum item</h3></div>
      :<table><thead><tr>
        <th>Código</th><th>Descrição</th>
        <th style={{textAlign:'right'}}>DL</th>
        <th style={{textAlign:'right'}}>MI</th>
        <th style={{textAlign:'right'}}>Total</th>
        <th style={{textAlign:'right'}}>Demanda</th>
        <th style={{textAlign:'right'}}>Saldo Líq.</th>
        <th style={{textAlign:'right'}}>Disp.%</th>
        <th style={{textAlign:'right',color:'var(--blue)',fontWeight:800}}>▶ Produzir</th>
        <th>Status</th>
      </tr></thead>
      <tbody>{filtrados.map((i,idx)=>{
        const ok=i.pct>=META,warn=i.pct>=70;
        return <tr key={idx} style={i.temDemanda?{background:'#FEF2F2'}:i.dem>0?{background:'#FFFBEB'}:{}}>
          <td style={{cursor:reservaMap[(i.codigo||'').toUpperCase()]?.length>0?'pointer':'default'}} onClick={()=>reservaMap[(i.codigo||'').toUpperCase()]?.length>0&&setSelItemCod(i.codigo)}>
            <span className="cod">{i.codigo}</span>
            {reservaMap[(i.codigo||'').toUpperCase()]?.length>0&&<span style={{marginLeft:4,fontSize:9,background:'var(--purple-lt)',color:'var(--purple)',padding:'1px 4px',borderRadius:4,fontWeight:700}}>{reservaMap[(i.codigo||'').toUpperCase()].length} obra(s)</span>}
          </td>
          <td><div style={{fontWeight:600,maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{i.descricao}</div>{!i.cadastrado&&<div style={{fontSize:10,color:'var(--amber)'}}>⚠ Não cadastrado</div>}</td>
          <td style={{textAlign:'right'}}><span style={{fontWeight:700,color:'var(--green)'}}>{i.dl}</span></td>
          <td style={{textAlign:'right'}}><span style={{fontWeight:700,color:i.mi>0?'var(--red)':'var(--g400)'}}>{i.mi}</span></td>
          <td style={{textAlign:'right'}}><span style={{fontFamily:'monospace'}}>{i.total}</span></td>
          <td style={{textAlign:'right'}}>{i.dem>0?<span style={{fontWeight:700,color:'var(--amber)',background:'var(--amber-lt)',padding:'1px 6px',borderRadius:4}}>-{i.dem}</span>:<span style={{color:'var(--g300)'}}>—</span>}</td>
          <td style={{textAlign:'right'}}><span style={{fontWeight:800,color:i.temDemanda?'var(--red)':i.saldoLiq===0?'var(--amber)':'var(--green)'}}>{i.saldoLiq}</span></td>
          <td style={{textAlign:'right'}}><span style={{fontWeight:800,color:ok?'var(--green)':warn?'var(--amber)':'var(--red)'}}>{i.pct}%</span></td>
          <td style={{textAlign:'right'}}>
            {i.produzir>0
              ?<span style={{fontWeight:800,fontSize:13,color:'var(--white)',background:i.temDemanda?'var(--red)':'var(--blue)',padding:'2px 8px',borderRadius:4,display:'inline-block'}}>{i.produzir}</span>
              :<span style={{color:'var(--g300)',fontSize:12}}>—</span>}
          </td>
          <td><span className="bdg" style={{background:i.temDemanda?'var(--red-lt)':ok?'var(--green-lt)':warn?'var(--amber-lt)':'var(--red-lt)',color:i.temDemanda?'var(--red)':ok?'var(--green)':warn?'var(--amber)':'var(--red)'}}>{i.temDemanda?'🔴 Falta':ok?'✅ OK':warn?'⚠ Atenção':'🔴 Crítico'}</span></td>
        </tr>;
      })}
      </tbody></table>}
    </div></div>}
    {selItemCod&&(()=>{
      const cod=(selItemCod||'').trim().toUpperCase();
      const obras=reservaMap[cod]||[];
      const snap=enriched.find(i=>(i.codigo||'').toUpperCase()===cod);
      return <Modal title={'Reservas — '+selItemCod} onClose={()=>setSelItemCod(null)}>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:'var(--g500)',marginBottom:6}}>{snap?.descricao||'—'}</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {snap&&<><span style={{fontSize:12,fontWeight:700}}>DL: <span style={{color:'var(--green)'}}>{snap.dl}</span></span>
            <span style={{fontSize:12,fontWeight:700}}>MI: <span style={{color:'var(--red)'}}>{snap.mi}</span></span>
            <span style={{fontSize:12,fontWeight:700}}>Demanda total: <span style={{color:'var(--amber)'}}>{demandaMap[cod]||0}</span></span>
            <span style={{fontSize:12,fontWeight:700}}>Saldo líquido: <span style={{color:(snap.dl-(demandaMap[cod]||0))<0?'var(--red)':'var(--green)'}}>{snap.dl-(demandaMap[cod]||0)}</span></span></>}
          </div>
        </div>
        <div style={{fontSize:12,fontWeight:700,color:'var(--g700)',marginBottom:8}}>Obras com demanda:</div>
        {obras.length===0?<div style={{fontSize:13,color:'var(--g400)'}}>Nenhuma obra com demanda</div>
        :<div style={{display:'flex',flexDirection:'column',gap:6}}>
          {obras.map((o,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderRadius:'var(--r)',background:'var(--g50)',border:'1px solid var(--g100)'}}>
            <div>
              <div style={{fontSize:13,fontWeight:700}}>{o.obra}</div>
              <div style={{fontSize:11,color:'var(--g400)'}}>{(OBRA_ST[o.status_obra]||OBRA_ST.negociacao).lb}</div>
            </div>
            <span style={{fontSize:13,fontWeight:800,color:'var(--amber)'}}>{o.qtd} un</span>
          </div>)}
        </div>}
      </Modal>;
    })()}
    {showImp&&<Modal title="Importar Planilha do Protheus" onClose={()=>{setShowImp(false);setStep('drop');setPreview([]);setRawRows([]);}} lg>
      {step==='drop'&&<div>
        <div style={{marginBottom:14}}><label className="fl">Data do snapshot</label><input type="date" value={snapDate} onChange={e=>setSnapDate(e.target.value)} style={{width:'auto'}}/><div className="fh">Data de referência da posição de estoque</div></div>
        <div className="al al-i" style={{marginBottom:14}}><span>ℹ</span><div><strong>Formato Protheus detectado automaticamente.</strong><br/><span style={{fontSize:12}}>A planilha "Saldo Estoque" do Protheus é reconhecida sem mapeamento manual — o sistema filtra DL e MI pela coluna Almoxarifado e agrega por produto. Para outros formatos, use colunas separadas por código.</span></div></div>
        <div className="dz" onClick={()=>fileRef.current.click()} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);}}><div style={{fontSize:36,marginBottom:8}}>📂</div><div style={{fontWeight:700,color:'var(--g700)',marginBottom:4}}>Clique ou arraste a planilha aqui</div><div style={{fontSize:12,color:'var(--g400)'}}>Suporta Saldo de Estoque Protheus (.xlsx) e outros formatos .csv/.xlsx</div></div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
        {buildingPreview&&<div style={{marginTop:14,display:'flex',alignItems:'center',gap:10,fontSize:13,color:'var(--blue)'}}><span className="spin">↻</span>Processando planilha e cruzando com o cadastro...</div>}
      </div>}
      {step==='map'&&<div>
        <div className="al al-i"><span>ℹ</span><span>Arquivo lido — {rawRows.length} linhas. Mapeie as colunas:</span></div>
        <div className="fr3">{[{key:'codigo',label:'Código do Item'},{key:'dl',label:'Saldo DL'},{key:'mi',label:'Saldo MI'}].map(({key,label})=><div className="fg" key={key}><label className="fl">{label} <span className="req">*</span></label><select value={colMap[key]} onChange={e=>setColMap(p=>({...p,[key]:e.target.value}))}><option value="">Selecione...</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}</select></div>)}</div>
        <div style={{display:'flex',gap:10}}><button className="btn btn-g" onClick={()=>setStep('drop')}>← Voltar</button><button className="btn btn-p" onClick={buildPreview} disabled={!colMap.codigo||!colMap.dl||!colMap.mi||buildingPreview}>{buildingPreview?<><span className="spin">↻</span> Cruzando cadastro...</>:'Pré-visualizar'}</button></div>
      </div>}
      {step==='preview'&&(()=>{
        const nCad=preview.length;
        return <div>
          <div style={{display:'flex',gap:10,marginBottom:10,flexWrap:'wrap'}}>
            <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 10px',background:'#EFF6FF',borderRadius:20,fontSize:12,fontWeight:700,color:'var(--blue)'}}>✅ Formato Protheus detectado</span>
            <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 10px',background:'var(--g50)',borderRadius:20,fontSize:12,fontWeight:600,color:'var(--g500)'}}>📦 {preview.length} produtos · DL+MI agregados</span>
          </div>
          <div className="al al-i" style={{marginBottom:10}}><span>✓</span><span><strong>{preview.length} itens cadastrados</strong> encontrados e prontos para importar. Itens sem cadastro CRANE foram ignorados automaticamente.</span></div>
          <div style={{maxHeight:340,overflowY:'auto',border:'1px solid var(--g100)',borderRadius:'var(--r)',marginBottom:14}}>
            <table>
              <thead><tr>
                <th>Código</th>
                <th>Descrição</th>
                <th style={{textAlign:'right'}}>DL</th>
                <th style={{textAlign:'right'}}>MI</th>
                <th style={{textAlign:'right'}}>Total</th>
                <th>Cadastro</th>
              </tr></thead>
              <tbody>{preview.slice(0,100).map((r,i)=><tr key={i} style={{background:r.cadastrado?'var(--white)':'#FFFBEB'}}>
                <td><span className="cod">{r.codigo}</span></td>
                <td style={{maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {r.descricao
                    ?<span style={{fontWeight:r.cadastrado?600:400,color:r.cadastrado?'var(--g900)':'var(--g500)'}}>{r.descricao}</span>
                    :<span style={{color:'var(--g400)',fontStyle:'italic'}}>—</span>}
                  {!r.cadastrado&&r.descricaoProtheus&&r.descricao!==r.descricaoProtheus&&<div style={{fontSize:10,color:'var(--g400)'}}>Protheus: {r.descricaoProtheus}</div>}
                </td>
                <td style={{textAlign:'right',fontWeight:700,color:'var(--green)'}}>{r.dl}</td>
                <td style={{textAlign:'right',fontWeight:700,color:r.mi>0?'var(--red)':'var(--g400)'}}>{r.mi}</td>
                <td style={{textAlign:'right',fontFamily:'monospace'}}>{r.dl+r.mi}</td>
                <td><span className="bdg" style={{background:'var(--green-lt)',color:'var(--green)'}}>✓ CRANE</span></td>
              </tr>)}</tbody>
            </table>
            {preview.length>100&&<div style={{padding:'8px 14px',fontSize:12,color:'var(--g400)'}}>...e mais {preview.length-100} itens</div>}
          </div>
          <div style={{display:'flex',gap:10}}><button className="btn btn-g" onClick={()=>{setStep('drop');setPreview([]);}}>← Voltar</button><button className="btn btn-p" onClick={confirmarImp} disabled={saving}>{saving?<><span className="spin">↻</span> Salvando...</>:'Confirmar Importação'}</button></div>
        </div>;
      })()}
    </Modal>}
  </div>;
}
