// ── DETALHE DA OBRA ───────────────────────────────────────
function ObraDetalhe({obra:obraInit,onBack}){
  const[obra,setObra]=useState(obraInit);
  const[equips,setEquips]=useState([]);
  const[aba,setAba]=useState('romaneio');
  const[selEquip,setSelEquip]=useState(null);
  const[editando,setEditando]=useState(false);
  const[saving,setSaving]=useState(false);

  async function carregar(){
    const[{data:o},{data:e}]=await Promise.all([
      db.from('crane_obras').select('*').eq('id',obra.id).single(),
      db.from('crane_obra_equipamentos').select('*').eq('obra_id',obra.id).order('criado_em'),
    ]);
    if(o)setObra(o);
    setEquips(e||[]);
  }
  useEffect(()=>{carregar();},[]);

  async function excluirObra(){
    if(!window.confirm('Excluir esta obra? Romaneios e pré-reservas serão removidos.'))return;
    setSaving(true);
    // Liberar NPs em negociação
    for(const e of equips){
      if(e.np_vinculado)await db.from('equipamentos').update({status_operacional:'disponivel'}).eq('np',e.np_vinculado);
    }
    await db.from('crane_obras').delete().eq('id',obra.id);
    setSaving(false);toast('Obra excluída');onBack();
  }

  async function confirmarReserva(){
    if(!window.confirm('Confirmar reserva desta obra? As cabines vinculadas serão marcadas como RESERVADAS e os itens do romaneio entrarão na demanda de estoque.'))return;
    setSaving(true);
    // Verificar se algum NP já está reservado em outra obra
    for(const e of equips){
      if(!e.np_vinculado)continue;
      const nps=e.np_vinculado.split('/').map(n=>n.trim()).filter(Boolean);
      for(const np of nps){
        const{data:outrasObras}=await db.from('crane_obra_equipamentos')
          .select('id,obra_id,crane_obras(cliente,nome_obra)')
          .eq('np_vinculado',np).neq('obra_id',obra.id);
        if(outrasObras&&outrasObras.length>0){
          const nomeObra=outrasObras[0].crane_obras?.nome_obra||outrasObras[0].crane_obras?.cliente||'outra obra';
          toast('NP '+np+' já está reservado para: '+nomeObra+'. Libere antes de confirmar.','err');
          setSaving(false);return;
        }
      }
    }
    // 1. Atualiza status da obra
    await db.from('crane_obras').update({status:'reservado'}).eq('id',obra.id);
    // 2. Atualiza status_operacional das cabines + salva previsao_saida e obra_destino
    for(const e of equips){
      if(e.np_vinculado){
        const nps=e.np_vinculado.split('/').map(n=>n.trim()).filter(Boolean);
        for(const np of nps){
          await db.from('equipamentos').update({
            status_operacional:'reservado',
            previsao_saida:obra.previsao_saida||null,
            obra_destino:obra.nome_obra||obra.cliente||null,
          }).eq('np',np);
        }
      }
    }
    // 3. Gera demandas de estrutura para cada equipamento da obra
    for(const e of equips){
      const{data:romItensEquip}=await db.from('crane_obra_romaneio_itens').select('*').eq('obra_equip_id',e.id);
      if(!romItensEquip||romItensEquip.length===0)continue;
      const{data:snaps}=await db.from('crane_snapshots').select('id').order('snap_date',{ascending:false}).limit(1);
      let snapMapEquip={};
      if(snaps&&snaps.length){
        const{data:sitens}=await db.from('crane_snapshot_items').select('codigo,dl,mi').eq('snapshot_id',snaps[0].id);
        (sitens||[]).forEach(i=>{snapMapEquip[(i.codigo||'').trim().toUpperCase()]={dl:Number(i.dl||0),mi:Number(i.mi||0)};});
      }
      await db.from('crane_obra_demandas').delete().eq('obra_equip_id',e.id);
      const rows=romItensEquip.filter(it=>it.codigo).map(it=>{
        const snap=snapMapEquip[(it.codigo||'').trim().toUpperCase()];
        const dl=snap?.dl??0;
        const falta=Math.max(0,Number(it.quantidade)-dl);
        return{obra_id:obra.id,obra_equip_id:e.id,codigo:it.codigo,descricao:it.descricao,
          quantidade_necessaria:Number(it.quantidade),quantidade_disponivel:dl,
          quantidade_falta:falta,status:falta>0?'pendente':'atendido'};
      });
      if(rows.length)await db.from('crane_obra_demandas').insert(rows);
    }

    // 4. GERAR OSs EXTERNAS AUTOMÁTICAS
    await gerarOSsAutomaticas(obra,equips);
    // 5. CRIAR ESTRUTURA DE DOCUMENTAÇÃO para cada NP
    await criarDocumentacaoObra(obra,equips);

    setSaving(false);
    toast('Reserva confirmada! ✅ OSs externas e documentação geradas');
    carregar();
    setObra(prev=>({...prev,status:'reservado'}));
  }

  const st=OBRA_ST[obra.status]||OBRA_ST.negociacao;
  const npReservados=equips.filter(e=>e.np_vinculado).length;

  return <div style={{maxWidth:980,margin:'0 auto'}}>
    {/* Header estilo SYNAPSYS */}
    <div style={{marginBottom:16}}>
      <button className="btn btn-g" style={{padding:'5px 10px',fontSize:12,marginBottom:10}} onClick={onBack}>← Voltar para Gestão de Obras</button>
      <div className="card" style={{padding:'18px 22px'}}>
        {/* Badges */}
        <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
          <span style={{padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:700,background:st.bg,color:st.c}}>{st.ic} {st.lb}</span>
          <span style={{padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:700,background:'var(--g100)',color:'var(--g500)'}}>
            {equips.length} equipamento(s)
          </span>
          {npReservados>0
            ?<span style={{padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:700,background:'var(--purple-lt)',color:'var(--purple)'}}>🔒 {npReservados} NP(s) pré-reservado(s)</span>
            :<span style={{padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:700,background:'var(--red-lt)',color:'var(--red)'}}>⚠️ Não reservado</span>}
        </div>
        {/* Nome + dados */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{fontSize:22,fontWeight:800,color:'var(--g900)',marginBottom:4}}>{obra.cliente}</div>
            <div style={{display:'flex',gap:16,flexWrap:'wrap',fontSize:13,color:'var(--g500)'}}>
              {obra.cnpj&&<span>CNPJ: <strong style={{color:'var(--g700)'}}>{obra.cnpj}</strong></span>}
              {obra.endereco&&<span>{obra.endereco}</span>}
              {obra.responsavel&&<span>Resp: {obra.responsavel}</span>}
            </div>
          </div>
          {/* Botões de ação */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {obra.status==='pre_reservado'&&<button className="btn btn-p" style={{padding:'7px 14px',fontSize:12,background:'var(--green)',borderColor:'var(--green)'}} onClick={confirmarReserva} disabled={saving}>✅ Confirmar Reserva</button>}
            {obra.status==='reservado'&&<button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={async()=>{
              if(!window.confirm('Voltar para Pré-reservado?'))return;
              await db.from('crane_obras').update({status:'pre_reservado'}).eq('id',obra.id);
              setObra(prev=>({...prev,status:'pre_reservado'}));
              for(const e of equips){
                if(e.np_vinculado){
                  const nps=e.np_vinculado.split('/').map(n=>n.trim()).filter(Boolean);
                  for(const np of nps)await db.from('equipamentos').update({status_operacional:'em_negociacao'}).eq('np',np);
                }
              }
              toast('Voltou para Pré-reservado');carregar();
            }}>↩ Desfazer Reserva</button>}
            <button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={()=>setEditando(true)}>✏️ Editar</button>
            <button className="btn btn-d" style={{padding:'7px 12px',fontSize:12}} onClick={excluirObra} disabled={saving}>🗑 Excluir</button>
          </div>
        </div>
        {obra.observacoes&&<div style={{marginTop:10,padding:'8px 12px',background:'var(--g50)',borderRadius:'var(--r)',fontSize:12,color:'var(--g500)'}}>{obra.observacoes}</div>}
      </div>
    </div>

    {/* Equipamentos chips */}
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
      {equips.map(e=>{
        const ativo=selEquip?.id===e.id;
        return <button key={e.id} onClick={()=>setSelEquip(ativo?null:e)}
          style={{padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:700,
            border:'2px solid '+(ativo?'var(--blue)':'var(--g200)'),
            background:ativo?'var(--blue)':'var(--white)',
            color:ativo?'#fff':'var(--g700)',cursor:'pointer',fontFamily:'var(--font)'}}>
          {e.tipo==='elevador'?'🏗':'🔧'} {e.modelo}
          {e.np_vinculado&&<span style={{marginLeft:4,opacity:.8}}>· {e.np_vinculado}</span>}
        </button>;
      })}
      <button className="btn btn-g" style={{padding:'5px 12px',fontSize:12,borderRadius:20}} onClick={async()=>{
        const tipo=prompt('Tipo (elevador/minigrua):','elevador');if(!tipo)return;
        const modelo=prompt('Modelo:','CMG12');if(!modelo)return;
        const{data:e}=await db.from('crane_obra_equipamentos').insert({obra_id:obra.id,tipo,modelo}).select().single();
        toast('Equipamento adicionado');carregar();if(e)setSelEquip(e);
      }}>+ Equipamento</button>
    </div>

    {/* Conteúdo do equipamento selecionado */}
    {selEquip
      ?<EquipObra key={selEquip.id} equip={selEquip} obra={obra} onAtualizar={carregar}/>
      :<div className="emp" style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:40}}>
        <div className="ei">🏗</div>
        <h3>Selecione um equipamento acima</h3>
        <p>Clique em um equipamento para ver romaneio, disponibilidade e transferências</p>
      </div>}
  </div>;
}

// ── EQUIPAMENTO DA OBRA (romaneio + disponibilidade + transferência) ──
// ── ADICIONAR ITEM AO ROMANEIO ────────────────────────────
function AdicionarItemRomaneio({tipo,romItens,onAdicionar}){
  const[catalogo,setCatalogo]=useState([]);const[busca,setBusca]=useState('');
  const[itemSel,setItemSel]=useState(null);const[qtd,setQtd]=useState(1);
  const[show,setShow]=useState(false);const[showSug,setShowSug]=useState(false);

  useEffect(()=>{
    db.from('itens_estrutura').select('codigo,descricao,grupo,unidade,peso_kg,tipo_equipamento').eq('ativo',true).eq('tipo_equipamento',tipo).order('descricao')
      .then(({data})=>setCatalogo(data||[]));
  },[tipo]);

  const sugs=useMemo(()=>{
    if(!busca||busca.length<2)return[];
    const q=busca.toLowerCase();
    return catalogo.filter(i=>(i.descricao||'').toLowerCase().includes(q)||(i.codigo||'').toLowerCase().includes(q)).slice(0,10);
  },[busca,catalogo]);

  function selecionar(item){setItemSel(item);setBusca(item.descricao);setShowSug(false);}

  function adicionar(){
    if(!itemSel){return;}
    if(!qtd||qtd<=0){return;}
    onAdicionar({...itemSel,qtd:Number(qtd)});
    setItemSel(null);setBusca('');setQtd(1);
  }

  return<div style={{marginTop:16,border:'2px dashed var(--g200)',borderRadius:'var(--rl)',padding:16,background:'var(--g50)'}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:show?14:0}}>
      <div style={{fontSize:13,fontWeight:800,color:'var(--g600)'}}>➕ Adicionar Item ao Romaneio</div>
      <button className="btn btn-g" style={{padding:'5px 12px',fontSize:12}} onClick={()=>setShow(p=>!p)}>
        {show?'▲ Fechar':'▼ Abrir'}
      </button>
    </div>

    {show&&<div>
      <p style={{fontSize:12,color:'var(--g500)',marginBottom:12}}>Busque no cadastro de itens e adicione ao romaneio desta obra.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 100px auto',gap:8,alignItems:'flex-end'}}>
        <div style={{position:'relative'}}>
          <label className="fl">BUSCAR ITEM NO CADASTRO</label>
          <input value={busca}
            onChange={e=>{setBusca(e.target.value);setItemSel(null);setShowSug(true);}}
            onFocus={()=>busca.length>=2&&setShowSug(true)}
            onBlur={()=>setTimeout(()=>setShowSug(false),180)}
            placeholder="Digite código ou descrição..."
            style={{padding:'9px 12px',fontSize:13,border:'1px solid '+(itemSel?'#86EFAC':'var(--g200)')}}/>
          {itemSel&&<div style={{position:'absolute',right:10,top:34,color:'var(--green)',fontSize:14}}>✓</div>}
          {showSug&&sugs.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',border:'1px solid var(--g200)',borderRadius:'var(--r)',boxShadow:'var(--shadow-md)',zIndex:200,maxHeight:220,overflowY:'auto'}}>
            {sugs.map(i=><div key={i.codigo} onMouseDown={()=>selecionar(i)}
              style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid var(--g50)',fontSize:13,display:'flex',gap:8,alignItems:'center'}}
              onMouseEnter={e=>e.currentTarget.style.background='#F0F7FF'}
              onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}>
              <span style={{fontFamily:'monospace',color:'var(--blue)',fontWeight:700,fontSize:11,minWidth:90}}>{i.codigo}</span>
              <span style={{color:'var(--g700)',flex:1}}>{i.descricao}</span>
              {i.grupo&&<span style={{fontSize:10,color:'var(--g400)',background:'var(--g100)',padding:'1px 6px',borderRadius:8}}>{i.grupo}</span>}
            </div>)}
          </div>}
          {busca.length>=2&&sugs.length===0&&!itemSel&&<div style={{fontSize:11,color:'var(--g400)',marginTop:3}}>Nenhum item encontrado</div>}
        </div>
        <div>
          <label className="fl">QUANTIDADE</label>
          <input type="number" min="1" value={qtd} onChange={e=>setQtd(e.target.value)}
            style={{padding:'9px 12px',fontSize:13,textAlign:'center'}}/>
        </div>
        <button className="btn btn-p" onClick={adicionar} disabled={!itemSel||!qtd||qtd<=0}
          style={{padding:'9px 16px',fontSize:13,marginTop:18}}>
          + Incluir
        </button>
      </div>
      {itemSel&&<div style={{marginTop:8,fontSize:12,color:'var(--g600)',padding:'6px 10px',background:'var(--blue-lt)',borderRadius:'var(--r)'}}>
        <strong>{itemSel.codigo}</strong> — {itemSel.descricao} · Un: {itemSel.unidade||'un'} · Grupo: {itemSel.grupo||'—'}
      </div>}
    </div>}
  </div>;
}

function EquipObra({equip:equipInit,obra,onAtualizar}){
  const[equip,setEquip]=useState(equipInit);
  const[aba,setAba]=useState('romaneio');
  const[baseItens,setBaseItens]=useState([]);
  const[romItens,setRomItens]=useState([]);
  const[params,setParams]=useState({altura:'',num_acessos:'',np_cabine_1:'',np_cabine_2:'',tipo_cancela:'unica',dist_gravatas:'6m',tensao:'220V',tipo_modulo:'CMG',tipo_gravata:'CMG',tipo_cabine:'trolley'});
  const isDupla=equip.cabine==='dupla';
  const[gerado,setGerado]=useState(null); // null=carregando, false=sem romaneio, true=com romaneio
  const[editandoParams,setEditandoParams]=useState(false);
  const[saving,setSaving]=useState(false);
  // Disponibilidade
  const[dispEquips,setDispEquips]=useState([]);
  const[snapMap,setSnapMap]=useState({});// {codigo->dl}
  // Transferências
  const[transfs,setTransfs]=useState([]);
  const isMG=['MG500-RACK','MG500-C3'].includes(equip.modelo);

  async function carregar(){
    const tipo=equip.tipo==='elevador'?'elevador':'minigrua';
    const[{data:base},{data:ri},{data:rp},{data:disp},{data:snaps},{data:tr}]=await Promise.all([
      db.from('itens_estrutura').select('*').eq('tipo_equipamento',tipo).eq('item_nf',true).order('grupo'),
      db.from('crane_obra_romaneio_itens').select('*').eq('obra_equip_id',equip.id).order('ordem'),
      db.from('crane_obra_romaneio_params').select('*').eq('obra_equip_id',equip.id).maybeSingle(),
      db.from('equipamentos').select('np,modelo,status_operacional,fabricante').eq('tipo',equip.tipo).eq('modelo',equip.modelo).order('np'),
      db.from('crane_snapshots').select('id,snap_date').order('snap_date',{ascending:false}).limit(1),
      db.from('crane_obra_demandas').select('*').eq('obra_equip_id',equip.id).order('criado_em'),
    ]);
    setBaseItens(base||[]);
    if(ri&&ri.length){setRomItens(ri);setGerado(true);}
    else{setGerado(false);}
    if(rp)setParams(p=>({...p,...rp}));
    setDispEquips(disp||[]);
    // Carregar snapshot
    if(snaps&&snaps.length){
      const{data:sitens}=await db.from('crane_snapshot_items').select('codigo,dl,mi').eq('snapshot_id',snaps[0].id);
      const sm={};(sitens||[]).forEach(i=>{sm[(i.codigo||'').trim().toUpperCase()]={dl:Number(i.dl||0),mi:Number(i.mi||0)};});
      setSnapMap(sm);
      if(snaps[0]?.snap_date)toast('Saldo carregado: posição de '+fmtD(snaps[0].snap_date),'ok');
    }
    setTransfs(tr||[]);
    // Recarregar equip atualizado
    const{data:eq}=await db.from('crane_obra_equipamentos').select('*').eq('id',equip.id).single();
    if(eq)setEquip(eq);
  }
  useEffect(()=>{carregar();},[equip.id]);

  function gerarLista(){
    if(!isMG&&(!params.altura||!params.num_acessos)){toast('Informe altura e nº de acessos','err');return;}
    const lista=calcRomaneio({modelo:equip.modelo,...params,cabine:isDupla?'dupla':'simples',altura:Number(params.altura),num_acessos:Number(params.num_acessos)},baseItens);
    setRomItens(lista.map((it,i)=>({...it,ordem:i,quantidade_orig:it.quantidade,id:'new_'+i})));
    setGerado(true);toast('Romaneio calculado!');
  }

  async function salvarRomaneio(){
    if(isDupla){
      if(!params.np_cabine_1||!params.np_cabine_2){toast('Informe os NPs das duas cabines','err');return;}
      if(params.np_cabine_1===params.np_cabine_2){toast('Os dois NPs devem ser diferentes','err');return;}
    }
    setSaving(true);
    await db.from('crane_obra_romaneio_params').upsert({obra_equip_id:equip.id,...params,altura:Number(params.altura)||null,num_acessos:Number(params.num_acessos)||null},{onConflict:'obra_equip_id'});
    await db.from('crane_obra_romaneio_itens').delete().eq('obra_equip_id',equip.id);
    const rows=romItens.map((it,i)=>({obra_equip_id:equip.id,codigo:it.codigo||null,descricao:it.descricao,grupo:it.grupo||'',quantidade:Number(it.quantidade)||0,quantidade_orig:it.quantidade_orig||it.quantidade,unidade:it.unidade||'un',item_nf:true,ordem:i}));
    if(rows.length)await db.from('crane_obra_romaneio_itens').insert(rows);
    // Pré-reservar NPs se cabine dupla
    if(isDupla&&params.np_cabine_1&&params.np_cabine_2){
      // Verificar se algum NP já está vinculado a outra obra
      for(const np of[params.np_cabine_1,params.np_cabine_2]){
        const{data:outrasObras}=await db.from('crane_obra_equipamentos')
          .select('id,obra_id,crane_obras(cliente,nome_obra)')
          .eq('np_vinculado',np).neq('obra_id',obra.id);
        if(outrasObras&&outrasObras.length>0){
          const nomeObra=outrasObras[0].crane_obras?.nome_obra||outrasObras[0].crane_obras?.cliente||'outra obra';
          toast('NP '+np+' já está reservado para: '+nomeObra,'err');
          setSaving(false);return;
        }
      }
      await Promise.all([
        db.from('equipamentos').update({status_operacional:'em_negociacao'}).eq('np',params.np_cabine_1),
        db.from('equipamentos').update({status_operacional:'em_negociacao'}).eq('np',params.np_cabine_2),
        db.from('crane_obra_equipamentos').update({np_vinculado:params.np_cabine_1+'/'+params.np_cabine_2}).eq('id',equip.id),
        db.from('crane_obras').update({status:'pre_reservado'}).eq('id',obra.id),
      ]);
      toast('Romaneio salvo! NPs '+params.np_cabine_1+' e '+params.np_cabine_2+' pré-reservados 🔒');
    } else {
      toast('Romaneio salvo! ✅');
    }
    setSaving(false);
    carregar();
  }

  async function excluirRomaneio(){
    if(!window.confirm('Excluir romaneio e transferências?'))return;
    await Promise.all([
      db.from('crane_obra_romaneio_itens').delete().eq('obra_equip_id',equip.id),
      db.from('crane_obra_romaneio_params').delete().eq('obra_equip_id',equip.id),
      db.from('crane_obra_demandas').delete().eq('obra_equip_id',equip.id),
    ]);
    setRomItens([]);setGerado(false);toast('Romaneio excluído');
  }

  async function preReservar(np){
    if(!window.confirm('Pré-reservar '+np+' para esta obra? Status → Em negociação'))return;
    setSaving(true);
    // Verificar se NP já está vinculado a outra obra
    const{data:outrasObras}=await db.from('crane_obra_equipamentos')
      .select('id,obra_id,crane_obras(cliente,nome_obra)')
      .eq('np_vinculado',np)
      .neq('obra_id',obra.id);
    if(outrasObras&&outrasObras.length>0){
      const nomeObra=outrasObras[0].crane_obras?.nome_obra||outrasObras[0].crane_obras?.cliente||'outra obra';
      toast('NP '+np+' já está reservado para: '+nomeObra,'err');
      setSaving(false);return;
    }
    // Liberar NP anterior se houver
    if(equip.np_vinculado&&equip.np_vinculado!==np)
      await db.from('equipamentos').update({status_operacional:'disponivel'}).eq('np',equip.np_vinculado);
    await db.from('equipamentos').update({status_operacional:'em_negociacao'}).eq('np',np);
    await db.from('crane_obra_equipamentos').update({np_vinculado:np,status:'reservado'}).eq('id',equip.id);
    await db.from('crane_obras').update({status:'pre_reservado'}).eq('id',obra.id);
    setSaving(false);toast('NP '+np+' pré-reservado! 🔒');
    carregar();onAtualizar();
  }

  async function liberarNP(){
    if(!equip.np_vinculado||!window.confirm('Liberar NP '+equip.np_vinculado+'?'))return;
    setSaving(true);
    await db.from('equipamentos').update({status_operacional:'disponivel'}).eq('np',equip.np_vinculado);
    await db.from('crane_obra_equipamentos').update({np_vinculado:null,status:'romaneio'}).eq('id',equip.id);
    setSaving(false);toast('NP liberado');carregar();onAtualizar();
  }

  async function gerarTransferencias(){
    if(romItens.length===0){toast('Gere o romaneio primeiro','err');return;}
    setSaving(true);
    // Apaga transferências anteriores e recria com saldo atual
    await db.from('crane_obra_demandas').delete().eq('obra_equip_id',equip.id);
    const faltam=romItens.filter(it=>{
      if(!it.codigo)return false;
      const dl=(snapMap[(it.codigo||'').trim().toUpperCase()]?.dl)||0;
      return dl<Number(it.quantidade);
    }).map(it=>{
      const dl=(snapMap[(it.codigo||'').trim().toUpperCase()]?.dl)||0;
      const falta=Number(it.quantidade)-dl;
      return{obra_id:obra.id,obra_equip_id:equip.id,codigo:it.codigo,descricao:it.descricao,
        quantidade_necessaria:Number(it.quantidade),quantidade_disponivel:dl,quantidade_falta:falta,status:'pendente'};
    });
    if(faltam.length)await db.from('crane_obra_demandas').insert(faltam);
    setSaving(false);
    toast(faltam.length>0?faltam.length+' item(s) com transferência necessária':'Todos os itens com saldo disponível ✅');
    setAba('transferencias');carregar();
  }

  async function gerarPDF(){
    if(romItens.length===0){toast('Romaneio vazio','err');return;}
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const ml=14,mr=196;let y=20;
    doc.setFillColor(0,37,120);doc.rect(0,0,210,28,'F');
    doc.setFillColor(255,117,0);doc.rect(0,0,5,28,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
    doc.text('CRANE — Romaneio de Equipamento',ml+6,12);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(obra.cliente+(obra.cnpj?' · CNPJ: '+obra.cnpj:''),ml+6,21);
    doc.text(new Date().toLocaleDateString('pt-BR'),mr,21,{align:'right'});
    y=36;
    doc.setFontSize(9);doc.setTextColor(0,37,120);doc.setFont('helvetica','bold');
    doc.text('Equipamento: ',ml,y);doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);
    doc.text(equip.modelo+(equip.np_vinculado?' — NP: '+equip.np_vinculado:'')+(obra.endereco?' — '+obra.endereco:''),ml+28,y);
    if(!isMG){
      y+=6;doc.setTextColor(0,37,120);doc.setFont('helvetica','bold');doc.text('Parâmetros: ',ml,y);
      doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);
      doc.text('H:'+params.altura+'m · Acessos:'+params.num_acessos+' · Cabine:'+params.cabine+' · Grav:'+params.dist_gravatas+' · Mód:'+params.tipo_modulo,ml+28,y);
    }
    y+=10;
    const grupos=[...new Set(romItens.map(i=>i.grupo||'Geral'))];
    for(const grp of grupos){
      const itensGrp=romItens.filter(i=>(i.grupo||'Geral')===grp);
      doc.autoTable({
        startY:y,
        head:[[grp,'Código','Qtd','Un']],
        body:itensGrp.map(i=>[i.descricao,i.codigo||'—',i.quantidade,i.unidade||'un']),
        styles:{fontSize:8,cellPadding:2},
        headStyles:{fillColor:[0,37,120],textColor:255,fontStyle:'bold'},
        alternateRowStyles:{fillColor:[245,246,248]},
        columnStyles:{0:{cellWidth:110},1:{cellWidth:26},2:{cellWidth:16,halign:'center'},3:{cellWidth:14}},
        margin:{left:ml,right:14},
      });
      y=doc.lastAutoTable.finalY+4;
    }
    const np=doc.getNumberOfPages();
    for(let p=1;p<=np;p++){doc.setPage(p);doc.setFontSize(7);doc.setTextColor(140,149,168);doc.line(ml,284,mr,284);doc.text('CRANE — Gerado em '+new Date().toLocaleString('pt-BR'),ml,288);doc.text('Pág '+p+'/'+np,mr,288,{align:'right'});}
    doc.save('Romaneio_'+equip.modelo+'_'+obra.cliente.replace(/\s+/g,'_')+'.pdf');
    toast('PDF gerado! 📄');
  }

  // ── KPIs ──
  const totalItens=romItens.reduce((a,i)=>a+Number(i.quantidade||0),0);
  const pesoTotal=romItens.reduce((a,i)=>{const b=baseItens.find(b=>b.codigo===i.codigo);return a+(b?.peso_kg?b.peso_kg*Number(i.quantidade||0):0);},0);
  const faltando=transfs.filter(t=>t.status==='pendente').length;
  const grupos=[...new Set(romItens.map(i=>i.grupo||'Geral'))];

  return <div>
    {/* KPIs bar */}
    {gerado===true&&(()=>{
      const itensComSaldo=romItens.filter(it=>{if(!it.codigo)return false;const dl=(snapMap[(it.codigo||'').trim().toUpperCase()]?.dl)??0;return dl>=Number(it.quantidade);}).length;
      const pctAtend=romItens.length>0?Math.round(itensComSaldo/romItens.length*100):0;
      return <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
        {[
          {l:'% Atendimento',v:pctAtend+'%',c:pctAtend===100?'var(--green)':pctAtend>=70?'var(--amber)':'var(--red)'},
          {l:'Itens',v:romItens.length,c:'var(--blue)'},
          {l:'Disponível',v:itensComSaldo,c:'var(--green)'},
          {l:'Faltando',v:romItens.length-itensComSaldo,c:romItens.length-itensComSaldo>0?'var(--red)':'var(--green)'},
          {l:'Transferências',v:faltando,c:faltando>0?'var(--red)':'var(--green)'},
          {l:'Peso Total',v:pesoTotal>0?pesoTotal.toFixed(1)+'kg':'—',c:'var(--g700)'},
        ].map(k=><div key={k.l} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--r)',padding:'8px 14px',boxShadow:'var(--shadow)',flex:1,minWidth:80}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--g400)',textTransform:'uppercase',letterSpacing:.5,marginBottom:3}}>{k.l}</div>
          <div style={{fontSize:20,fontWeight:800,color:k.c||'var(--g900)',fontFamily:'monospace'}}>{k.v}</div>
        </div>)}
      </div>;
    })()}

    {/* Botões de ação */}
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
      {gerado===true&&<>
        <button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={gerarPDF}>📄 Lista de materiais</button>
        <button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={()=>setAba('disponibilidade')}>🔍 Consultar disponibilidade</button>
        <button className="btn btn-ok" style={{padding:'7px 12px',fontSize:12}} onClick={gerarTransferencias} disabled={saving}>↔️ Verificar transferências</button>
      </>}
      {equip.np_vinculado
        ?<div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{padding:'7px 12px',borderRadius:'var(--r)',fontSize:12,fontWeight:700,background:'var(--purple-lt)',color:'var(--purple)',display:'inline-flex',alignItems:'center',gap:4}}>🔒 NP: {equip.np_vinculado}</span>
          <button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={liberarNP} disabled={saving}>✕ Liberar NP</button>
        </div>
        :<div style={{padding:'7px 12px',borderRadius:'var(--r)',fontSize:12,fontWeight:700,background:'var(--red-lt)',color:'var(--red)',display:'inline-flex',alignItems:'center',gap:4}}>⚠️ Indique o NP na aba Disponibilidade</div>}
    </div>

    {/* Tabs */}
    <div className="tabs">
      <button className={'tab'+(aba==='romaneio'?' a':'')} onClick={()=>setAba('romaneio')}>📋 Romaneio{romItens.length>0&&<span style={{marginLeft:4,fontSize:10,background:'var(--blue)',color:'#fff',borderRadius:10,padding:'1px 5px'}}>{romItens.length}</span>}</button>
      <button className={'tab'+(aba==='disponibilidade'?' a':'')} onClick={()=>{setAba('disponibilidade');}}>🔍 Disponibilidade</button>
      <button className={'tab'+(aba==='transferencias'?' a':'')} onClick={()=>setAba('transferencias')}>↔️ Transferências{faltando>0&&<span style={{marginLeft:4,fontSize:10,background:'var(--red)',color:'#fff',borderRadius:10,padding:'1px 5px'}}>{faltando}</span>}</button>
    </div>

    {/* ── ABA ROMANEIO ── */}
    {aba==='romaneio'&&<div>
      {/* Card NP — só para cabine SIMPLES. Dupla reserva direto nos parâmetros */}
      {!isDupla&&<div className="stage-box" style={{marginBottom:14,background:equip.np_vinculado?'var(--green-lt)':'#FFFBEB',border:'1px solid '+(equip.np_vinculado?'#86EFAC':'#FCD34D')}}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:10,color:'var(--g700)'}}>🏗 NP do Equipamento — {equip.modelo}</div>
        {equip.np_vinculado
          ?<div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <span style={{fontSize:15,fontWeight:800,color:'var(--green)',fontFamily:'monospace'}}>🔒 {equip.np_vinculado}</span>
            <span style={{fontSize:12,color:'var(--green)'}}>Pré-reservado para esta obra</span>
            <button className="btn btn-g" style={{padding:'5px 10px',fontSize:12,marginLeft:'auto'}} onClick={liberarNP} disabled={saving}>✕ Liberar</button>
          </div>
          :<div>
            <p style={{fontSize:12,color:'var(--amber)',fontWeight:600,marginBottom:8}}>⚠️ Indique o NP antes de gerar a reserva.</p>
            <div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap'}}>
              <div className="fg" style={{marginBottom:0,flex:1,minWidth:160}}>
                <label className="fl">NP disponível</label>
                <select id="np-select-rom" style={{padding:'8px 12px',fontSize:14}}>
                  <option value="">— Selecione {equip.modelo} —</option>
                  {dispEquips.filter(e=>e.modelo===equip.modelo&&['disponivel','em_negociacao'].includes(e.status_operacional||'disponivel')).map(e=><option key={e.np} value={e.np}>{e.np}{e.fabricante?' · '+e.fabricante:''}{e.status_operacional==='em_negociacao'?' 💬':' ✅'}</option>)}
                  {dispEquips.filter(e=>e.modelo===equip.modelo&&e.status_operacional==='manutencao').map(e=><option key={e.np} value={e.np}>{e.np} 🔧 Manutenção</option>)}
                </select>
              </div>
              <button className="btn btn-p" style={{padding:'8px 16px',fontSize:13}} disabled={saving} onClick={async()=>{
                const np=document.getElementById('np-select-rom')?.value;
                if(!np){toast('Selecione um NP','err');return;}
                await preReservar(np);
              }}>🔒 Pré-reservar</button>
            </div>
          </div>}
      </div>}

      {/* Loading */}
      {gerado===null&&<div style={{textAlign:'center',padding:32,color:'var(--g400)'}}>Carregando romaneio...</div>}

      {/* Parâmetros — só aparece se: sem romaneio OU editando */}
      {gerado!==null&&!isMG&&(gerado===false||editandoParams)&&<div className="stage-box">
        <div style={{fontSize:13,fontWeight:800,marginBottom:6,color:'var(--g700)'}}>⚙️ Parâmetros</div>
        <div style={{fontSize:11,color:'var(--g500)',marginBottom:14}}>Cabine: <strong>{isDupla?'Dupla':'Simples'}</strong> · Modelo: <strong>{equip.modelo}</strong></div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:14}}>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Altura (m) <span className="req">*</span></label><input type="number" value={params.altura} onChange={e=>setParams(p=>({...p,altura:e.target.value}))} placeholder="Ex: 85"/></div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Nº Acessos <span className="req">*</span></label><input type="number" value={params.num_acessos} onChange={e=>setParams(p=>({...p,num_acessos:e.target.value}))} placeholder="Ex: 25"/></div>
        </div>

        {/* NPs — simples ou dupla conforme cadastro */}
        {isDupla
          ?<div style={{background:'var(--blue-lt)',border:'1px solid var(--blue)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:800,color:'var(--blue)',marginBottom:4}}>🏗 Cabine Dupla — NPs do modelo {equip.modelo}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div className="fg" style={{marginBottom:0}}>
                <label className="fl">NP Cabine 1 <span className="req">*</span></label>
                <select value={params.np_cabine_1} onChange={e=>setParams(p=>({...p,np_cabine_1:e.target.value,np_cabine_2:p.np_cabine_2===e.target.value?'':p.np_cabine_2}))}>
                  <option value="">Selecione...</option>
                  {dispEquips.filter(e=>e.modelo===equip.modelo).map(e=><option key={e.np} value={e.np}>{e.np}{e.status_operacional==='manutencao'?' 🔧':' ✅'}</option>)}
                </select>
              </div>
              <div className="fg" style={{marginBottom:0}}>
                <label className="fl">NP Cabine 2 <span className="req">*</span></label>
                <select value={params.np_cabine_2} onChange={e=>setParams(p=>({...p,np_cabine_2:e.target.value}))}>
                  <option value="">Selecione...</option>
                  {dispEquips.filter(e=>e.modelo===equip.modelo&&e.np!==params.np_cabine_1).map(e=><option key={e.np} value={e.np}>{e.np}{e.status_operacional==='manutencao'?' 🔧':' ✅'}</option>)}
                </select>
              </div>
            </div>
            {params.np_cabine_1&&params.np_cabine_2&&
              <div style={{fontSize:11,color:'var(--green)',marginTop:8,fontWeight:700}}>✅ {params.np_cabine_1} + {params.np_cabine_2}</div>}
          </div>
          :null /* simples: NP via pré-reserva no card acima */}

        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:14}}>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Cancela</label><select value={params.tipo_cancela} onChange={e=>setParams(p=>({...p,tipo_cancela:e.target.value}))}><option value="unica">Bandeira Única</option><option value="dupla">Bandeira Dupla</option></select></div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Dist. Gravatas</label><select value={params.dist_gravatas} onChange={e=>setParams(p=>({...p,dist_gravatas:e.target.value}))}><option value="6m">6m</option><option value="9m">9m</option></select></div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Tensão</label><select value={params.tensao} onChange={e=>setParams(p=>({...p,tensao:e.target.value}))}><option value="220V">220V</option><option value="380V">380V</option><option value="440V">440V</option></select></div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Módulo</label><select value={params.tipo_modulo} onChange={e=>setParams(p=>({...p,tipo_modulo:e.target.value}))}><option value="CMG">CMG</option><option value="LOC">LOC</option></select></div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Gravata</label><select value={params.tipo_gravata} onChange={e=>setParams(p=>({...p,tipo_gravata:e.target.value}))}><option value="CMG">CMG</option><option value="LOC">LOC</option></select></div>
          <div className="fg" style={{marginBottom:0}}><label className="fl">Tipo Cabine</label><select value={params.tipo_cabine} onChange={e=>setParams(p=>({...p,tipo_cabine:e.target.value}))}><option value="trolley">Trolley</option><option value="cesto">Cesto</option></select></div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <button className="btn btn-p" onClick={()=>{gerarLista();setEditandoParams(false);}}>🔄 {gerado===true?'Regerar Romaneio':'Gerar Romaneio'}</button>
          {gerado===true&&editandoParams&&<button className="btn btn-g" onClick={()=>setEditandoParams(false)}>Cancelar</button>}
        </div>
      </div>}
      {gerado!==null&&!isMG&&gerado===true&&!editandoParams&&<div style={{marginBottom:14,padding:'10px 14px',background:'var(--g50)',border:'1px solid var(--g100)',borderRadius:'var(--r)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
        <div style={{fontSize:12,color:'var(--g600)'}}>
          <strong>Parâmetros:</strong> {params.altura?params.altura+'m':'—'} · {params.num_acessos?params.num_acessos+' acessos':'—'} · Cabine {isDupla?'Dupla':'Simples'} · {params.tensao} · {params.dist_gravatas}
          {isDupla&&params.np_cabine_1&&<span style={{marginLeft:6,color:'var(--blue)',fontWeight:700}}> · NPs: {params.np_cabine_1} / {params.np_cabine_2}</span>}
        </div>
        <button className="btn btn-g" style={{padding:'5px 12px',fontSize:12,flexShrink:0}} onClick={()=>setEditandoParams(true)}>✏️ Editar Parâmetros</button>
      </div>}
      {gerado!==null&&isMG&&gerado===false&&<div className="stage-box">
        <p style={{fontSize:13,color:'var(--g500)',marginBottom:10}}>Mini grua — lista fixa por modelo.</p>
        <button className="btn btn-p" onClick={gerarLista}>📋 Gerar Lista</button>
      </div>}

      {gerado===true&&romItens.length>0&&<div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <span style={{fontSize:13,fontWeight:700,color:'var(--g700)'}}>{romItens.length} itens · {grupos.length} grupo(s)</span>
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-d" style={{padding:'6px 10px',fontSize:12}} onClick={excluirRomaneio}>🗑</button>
            <button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={gerarPDF}>📄 PDF</button>
            <button className="btn btn-p" style={{padding:'6px 12px',fontSize:12}} onClick={salvarRomaneio} disabled={saving}>{saving?'Salvando...':'💾 Salvar'}</button>
          </div>
        </div>
        {grupos.map(grp=><div key={grp} className="card" style={{marginBottom:10,overflow:'hidden'}}>
          <div style={{background:'var(--blue-dk)',color:'#fff',padding:'7px 14px',fontSize:11,fontWeight:800,letterSpacing:.5,textTransform:'uppercase'}}>{grp}</div>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{background:'var(--g50)'}}>
              <th style={{textAlign:'left',padding:'5px 10px',fontSize:10,color:'var(--g500)',fontWeight:700,textTransform:'uppercase',letterSpacing:.4}}>Código</th>
              <th style={{textAlign:'left',padding:'5px 10px',fontSize:10,color:'var(--g500)',fontWeight:700,textTransform:'uppercase',letterSpacing:.4}}>Descrição</th>
              <th style={{textAlign:'center',padding:'5px 10px',fontSize:10,color:'var(--g500)',fontWeight:700,textTransform:'uppercase',letterSpacing:.4,width:70}}>Qtd</th>
              <th style={{textAlign:'left',padding:'5px 10px',fontSize:10,color:'var(--g500)',fontWeight:700,textTransform:'uppercase',letterSpacing:.4,width:40}}>Un</th>
            </tr></thead>
            <tbody>{romItens.filter(i=>(i.grupo||'Geral')===grp).map((it,idx)=>{
              const snap=snapMap[(it.codigo||'').trim().toUpperCase()];
              const dl=snap?.dl??null;
              const mi=snap?.mi??null;
              const falta=dl!==null&&dl<Number(it.quantidade);
              return <tr key={idx} style={{borderBottom:'1px solid var(--g50)',background:falta?'#FEF9F0':''}}>
                <td style={{padding:'6px 10px'}}><span className="cod" style={{fontSize:10}}>{it.codigo||'—'}</span></td>
                <td style={{padding:'6px 10px',fontSize:12,color:'var(--g700)'}}>{it.descricao}
                  {falta&&<span style={{marginLeft:6,fontSize:10,color:'var(--red)',fontWeight:700}}>⚠ Falta {Number(it.quantidade)-(dl||0)} | DL:{dl??'—'} MI:{mi??'—'}</span>}</td>
                <td style={{padding:'6px 10px',textAlign:'center'}}>
                  <input type="number" value={it.quantidade}
                    onChange={e=>setRomItens(prev=>{const n=[...prev];const i2=prev.indexOf(it);n[i2]={...it,quantidade:Number(e.target.value)};return n;})}
                    style={{width:55,textAlign:'center',padding:'2px 5px',border:'1px solid var(--g200)',borderRadius:'var(--r)',fontSize:12}}/>
                </td>
                <td style={{padding:'6px 10px',fontSize:12,color:'var(--g500)'}}>{it.unidade||'un'}</td>
              </tr>;
            })}</tbody>
          </table>
        </div>)}

        {/* ── ADICIONAR ITEM EXTRA ── */}
        <AdicionarItemRomaneio
          tipo={equip.tipo}
          romItens={romItens}
          onAdicionar={item=>{
            const existe=romItens.find(r=>r.codigo&&r.codigo.trim().toUpperCase()===item.codigo.trim().toUpperCase());
            if(existe){toast('Item já está no romaneio — edite a quantidade diretamente','err');return;}
            setRomItens(prev=>[...prev,{
              codigo:item.codigo,descricao:item.descricao,grupo:item.grupo||'Adicionais',
              quantidade:item.qtd,quantidade_orig:item.qtd,unidade:item.unidade||'un',
              ordem:prev.length,id:'add_'+Date.now()
            }]);
            toast(item.descricao+' adicionado ao romaneio ✅');
          }}
        />
      </div>}
    </div>}

    {/* ── ABA DISPONIBILIDADE ── */}
    {aba==='disponibilidade'&&<DisponibilidadeObra
      obra={obra} equip={equip} romItens={romItens} snapMap={snapMap}
      onTransferenciaSolicitada={()=>{carregar();setAba('transferencias');}}
    />}

    {/* ── ABA TRANSFERÊNCIAS ── */}
    {aba==='transferencias'&&<TransferenciasObra obra={obra} equip={equip} onAtualizar={carregar}/>}
  </div>;
}

// ── DISPONIBILIDADE POR OBRA ──────────────────────────────
function DisponibilidadeObra({obra,equip,romItens,snapMap,onTransferenciaSolicitada}){
  const[consultado,setConsultado]=useState(false);
  const[salvando,setSalvando]=useState(false);
  const[confirmando,setConfirmando]=useState(false);

  const itensFaltantes=useMemo(()=>{
    if(!romItens.length)return[];
    return romItens.filter(it=>{
      if(!it.codigo)return false;
      const snap=snapMap[(it.codigo||'').trim().toUpperCase()];
      const dl=snap?.dl??null;
      return dl!==null&&dl<Number(it.quantidade||0);
    }).map(it=>{
      const snap=snapMap[(it.codigo||'').trim().toUpperCase()];
      const dl=snap?.dl??0;
      const qtd=Number(it.quantidade||0);
      return{...it,dl,mi:snap?.mi??0,falta:qtd-dl};
    });
  },[romItens,snapMap]);

  const itensOK=useMemo(()=>{
    if(!romItens.length)return[];
    return romItens.filter(it=>{
      if(!it.codigo)return false;
      const snap=snapMap[(it.codigo||'').trim().toUpperCase()];
      const dl=snap?.dl??null;
      return dl!==null&&dl>=Number(it.quantidade||0);
    });
  },[romItens,snapMap]);

  async function solicitarTransferencia(){
    setSalvando(true);
    // Remove solicitações anteriores dessa obra/equip
    await db.from('crane_transferencias').delete().eq('obra_equip_id',equip.id).eq('status','solicitado');
    // Insere uma solicitação por item faltante
    const rows=itensFaltantes.map(it=>({
      obra_id:obra.id,obra_equip_id:equip.id,
      obra_nome:obra.nome_obra||obra.cliente,
      modelo:equip.modelo,
      codigo:it.codigo,descricao:it.descricao,
      quantidade_necessaria:Number(it.quantidade),
      quantidade_disponivel:it.dl,
      quantidade_falta:it.falta,
      status:'solicitado',
      criado_em:new Date().toISOString(),
    }));
    if(rows.length)await db.from('crane_transferencias').insert(rows);
    setSalvando(false);setConfirmando(false);
    toast('Transferência solicitada! ✅');
    onTransferenciaSolicitada();
  }

  if(!romItens.length)return<div className="emp"><div className="ei">📋</div><h3>Gere o romaneio primeiro</h3><p>A consulta de disponibilidade requer o romaneio gerado</p></div>;

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:8}}>
      <div>
        <div style={{fontSize:14,fontWeight:800}}>🔍 Disponibilidade de Estrutura</div>
        <p style={{fontSize:12,color:'var(--g500)',marginTop:2}}>{equip.modelo} · {romItens.length} itens no romaneio</p>
      </div>
      <button className="btn btn-p" onClick={()=>setConsultado(true)} style={{padding:'9px 18px',fontSize:13}}>
        🔍 Consultar Disponibilidade
      </button>
    </div>

    {!consultado&&<div className="emp" style={{padding:32}}>
      <div className="ei">📦</div>
      <h3>Clique em "Consultar Disponibilidade"</h3>
      <p>Cruza o romaneio com o snapshot do estoque e mostra os itens em falta</p>
    </div>}

    {consultado&&<div>
      {/* KPIs */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
        <div className="kpi"><div className="kl">Total itens</div><div className="kv">{romItens.filter(i=>i.codigo).length}</div></div>
        <div className="kpi"><div className="kl">OK</div><div className="kv" style={{color:'var(--green)'}}>{itensOK.length}</div></div>
        <div className="kpi"><div className="kl">Em falta</div><div className="kv" style={{color:itensFaltantes.length>0?'var(--red)':'var(--green)'}}>{itensFaltantes.length}</div></div>
      </div>

      {/* Itens em falta */}
      {itensFaltantes.length>0&&<div style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:800,color:'var(--red)',marginBottom:8}}>⚠ Itens com saldo insuficiente ({itensFaltantes.length})</div>
        <div className="card"><div className="tw"><table>
          <thead><tr>
            <th>Código</th><th>Descrição</th>
            <th style={{textAlign:'right'}}>Necessário</th>
            <th style={{textAlign:'right'}}>DL</th>
            <th style={{textAlign:'right',color:'var(--red)'}}>Falta</th>
          </tr></thead>
          <tbody>{itensFaltantes.map((it,i)=><tr key={i} style={{background:i%2===0?'var(--white)':'#FFF8F0'}}>
            <td><span className="cod" style={{fontSize:10}}>{it.codigo}</span></td>
            <td style={{fontSize:12,color:'var(--g700)'}}>{it.descricao}</td>
            <td style={{textAlign:'right',fontWeight:700}}>{it.quantidade}</td>
            <td style={{textAlign:'right',color:'var(--amber)',fontWeight:700}}>{it.dl}</td>
            <td style={{textAlign:'right',color:'var(--red)',fontWeight:800}}>{it.falta}</td>
          </tr>)}</tbody>
        </table></div></div>

        {/* Botão solicitar */}
        {!confirmando&&<div style={{marginTop:12,padding:'14px 16px',background:'var(--amber-lt)',border:'1px solid #FCD34D',borderRadius:'var(--rl)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:'var(--amber)'}}>Deseja solicitar transferência dos {itensFaltantes.length} itens em falta?</div>
            <div style={{fontSize:11,color:'var(--g500)',marginTop:2}}>A solicitação ficará registrada na aba Transferências com status Solicitado</div>
          </div>
          <button className="btn btn-p" style={{background:'var(--amber)',borderColor:'var(--amber)',padding:'8px 18px',fontSize:13}} onClick={()=>setConfirmando(true)}>
            ↔️ Solicitar Transferência
          </button>
        </div>}

        {confirmando&&<div style={{marginTop:12,padding:'14px 16px',background:'var(--red-lt)',border:'1px solid #FCA5A5',borderRadius:'var(--rl)'}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--red)',marginBottom:10}}>⚠ Confirmar solicitação de transferência?</div>

// ── TRANSFERÊNCIAS CONSOLIDADAS (GLOBAL) ─────────────────
function TransferenciasConsolidadas(){
  const[lista,setLista]=useState([]);const[loading,setLoading]=useState(true);
  const[filtroStatus,setFiltroStatus]=useState('');const[busca,setBusca]=useState('');

  async function carregar(){
    setLoading(true);
    const{data}=await db.from('crane_transferencias').select('*').order('criado_em',{ascending:false});
    setLista(data||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  async function atualizarStatus(id,status){
    await db.from('crane_transferencias').update({status,atualizado_em:new Date().toISOString()}).eq('id',id);
    carregar();toast('Status atualizado!');
  }

  const ST={
    solicitado:{lb:'📋 Solicitado',c:'var(--amber)',bg:'var(--amber-lt)'},
    aprovado:  {lb:'✅ Aprovado',  c:'var(--blue)', bg:'var(--blue-lt)'},
    recebido:  {lb:'📦 Recebido',  c:'var(--green)',bg:'var(--green-lt)'},
  };

  const filtrado=lista.filter(t=>{
    if(filtroStatus&&t.status!==filtroStatus)return false;
    if(busca){
      const b=busca.toLowerCase();
      if(!(t.obra_nome||'').toLowerCase().includes(b)&&!(t.codigo||'').toLowerCase().includes(b)&&!(t.descricao||'').toLowerCase().includes(b))return false;
    }
    return true;
  });

  // Agrupar por obra
  const porObra={};filtrado.forEach(t=>{
    const k=t.obra_id||'?';
    if(!porObra[k])porObra[k]={obra_nome:t.obra_nome||'Obra',modelo:t.modelo,itens:[]};
    porObra[k].itens.push(t);
  });

  function gerarPDF(){
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const ml=14,mr=196,pw=182;let y=0;
    doc.setFillColor(0,37,120);doc.rect(0,0,210,22,'F');
    doc.setFillColor(255,117,0);doc.rect(0,0,5,22,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(255,255,255);
    doc.text('CRANE — Solicitação de Transferência Consolidada',ml+6,10);
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text('Emitido em: '+new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),mr,16,{align:'right'});
    y=30;
    Object.values(porObra).forEach(ob=>{
      if(y+12+ob.itens.length*7>280){doc.addPage();y=14;}
      doc.setFillColor(236,238,242);doc.rect(ml,y,pw,8,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(0,37,120);
      doc.text(ob.obra_nome,ml+2,y+5.5);
      doc.setTextColor(100,100,120);doc.text(ob.modelo||'',ml+80,y+5.5);
      y+=9;
      ob.itens.forEach((t,i)=>{
        if(i%2===0){doc.setFillColor(250,251,252);doc.rect(ml,y,pw,6.5,'F');}
        doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(17,24,39);
        doc.text((t.codigo||'—').substring(0,14),ml+2,y+4.5);
        doc.text((t.descricao||'').substring(0,40),ml+28,y+4.5);
        doc.setFont('helvetica','bold');doc.setTextColor(192,57,43);
        doc.text('Falta: '+t.quantidade_falta,mr-20,y+4.5);
        const st=ST[t.status]||ST.solicitado;
        doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');
        doc.text(st.lb.replace(/[^\w\s]/g,'').trim(),mr-2,y+4.5,{align:'right'});
        doc.setDrawColor(236,238,242);doc.line(ml,y+6.5,mr,y+6.5);
        y+=7;
      });
      y+=4;
    });
    const pg=doc.internal.getNumberOfPages();
    for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,149,168);doc.line(ml,285,mr,285);doc.text('CRANE — Transferências',ml,289);doc.text('Página '+i+' de '+pg,mr,289,{align:'right'});}
    doc.save('Transferencias_'+new Date().toISOString().slice(0,10)+'.pdf');
    toast('PDF gerado! ✅');
  }

  const totSol=lista.filter(t=>t.status==='solicitado').length;
  const totApr=lista.filter(t=>t.status==='aprovado').length;
  const totRec=lista.filter(t=>t.status==='recebido').length;

  return<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>↔️ Transferências Consolidadas</h2>
        <p style={{fontSize:13,color:'var(--g500)'}}>Todas as solicitações de transferência — visão global por obra</p>
      </div>
      <button className="btn btn-p" onClick={gerarPDF} style={{background:'var(--blue-dk)'}}>📄 Exportar PDF</button>
    </div>

    <div className="krow" style={{marginBottom:16}}>
      <div className="kpi"><div className="kl">Total</div><div className="kv">{lista.length}</div></div>
      <div className="kpi"><div className="kl">Solicitado</div><div className="kv" style={{color:'var(--amber)'}}>{totSol}</div></div>
      <div className="kpi"><div className="kl">Aprovado</div><div className="kv" style={{color:'var(--blue)'}}>{totApr}</div></div>
      <div className="kpi"><div className="kl">Recebido</div><div className="kv" style={{color:'var(--green)'}}>{totRec}</div></div>
    </div>

    <div className="bar" style={{marginBottom:14}}>
      <div className="sw"><SI/><input placeholder="Buscar obra, código, descrição..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <select style={{width:'auto'}} value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)}>
        <option value="">Todos os status</option>
        <option value="solicitado">📋 Solicitado</option>
        <option value="aprovado">✅ Aprovado</option>
        <option value="recebido">📦 Recebido</option>
      </select>
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{filtrado.length} itens</span>
    </div>

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :Object.keys(porObra).length===0?<div className="emp"><div className="ei">↔️</div><h3>Nenhuma transferência encontrada</h3><p>As solicitações aparecem aqui após serem geradas na aba Disponibilidade de cada obra</p></div>
    :<div style={{display:'flex',flexDirection:'column',gap:12}}>
      {Object.values(porObra).map((ob,oi)=><div key={oi} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',overflow:'hidden',boxShadow:'var(--shadow)'}}>
        <div style={{background:'var(--g50)',padding:'10px 16px',borderBottom:'1px solid var(--g100)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:14,fontWeight:800,color:'var(--g900)'}}>{ob.obra_nome}</span>
            <span style={{fontSize:11,background:'var(--blue-lt)',color:'var(--blue)',padding:'2px 8px',borderRadius:10,fontWeight:700}}>{ob.modelo}</span>
          </div>
          <span style={{fontSize:12,color:'var(--g400)'}}>{ob.itens.length} item{ob.itens.length!==1?'s':''}</span>
        </div>
        <div className="tw"><table style={{fontSize:12}}>
          <thead><tr>
            <th>Código</th><th>Descrição</th>
            <th style={{textAlign:'right'}}>Necessário</th>
            <th style={{textAlign:'right'}}>DL</th>
            <th style={{textAlign:'right',color:'var(--red)'}}>Falta</th>
            <th>Status</th><th>Ação</th>
          </tr></thead>
          <tbody>{ob.itens.map(t=>{
            const st=ST[t.status]||ST.solicitado;
            return<tr key={t.id} style={{borderBottom:'1px solid var(--g50)',background:t.status==='recebido'?'var(--green-lt)':''}}>
              <td><span className="cod" style={{fontSize:10}}>{t.codigo||'—'}</span></td>
              <td style={{color:'var(--g700)'}}>{t.descricao}</td>
              <td style={{textAlign:'right',fontWeight:700}}>{t.quantidade_necessaria}</td>
              <td style={{textAlign:'right',color:'var(--amber)',fontWeight:700}}>{t.quantidade_disponivel}</td>
              <td style={{textAlign:'right',color:'var(--red)',fontWeight:800}}>{t.quantidade_falta}</td>
              <td><span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:10,background:st.bg,color:st.c}}>{st.lb}</span></td>
              <td>
                {t.status==='solicitado'&&<button className="btn btn-g" style={{padding:'3px 9px',fontSize:11}} onClick={()=>atualizarStatus(t.id,'aprovado')}>→ Aprovar</button>}

                {t.status==='recebido'&&<span style={{fontSize:11,color:'var(--green)'}}>✓</span>}
              </td>
            </tr>;
          })}</tbody>
        </table></div>
      </div>)}
    </div>}
  </div>;
}

async function nextNumOS(){
  const{data,error}=await db.from('crane_os_externas').select('numero_os').order('numero_os',{ascending:false}).limit(1);
  if(error)console.error('nextNumOS error:',error);
  const ultimo=data&&data.length?parseInt((data[0].numero_os||'OS-EXT-0000').replace(/\D/g,''))||0:0;
  return 'OS-EXT-'+(ultimo+1).toString().padStart(4,'0');
}

async function gerarOSsAutomaticas(obra,equips){
  const nomeObra=obra.nome_obra||obra.cliente||'Obra';
  const dataBase=obra.previsao_saida||new Date().toISOString().slice(0,10);
  const dataFim=obra.data_fim_contrato||null;
  const todosNPs=equips.flatMap(e=>e.np_vinculado?(e.np_vinculado.split('/').map(n=>n.trim()).filter(Boolean)):[]);
  const npPrincipal=todosNPs[0]||'';

  for(const os of [
    {tipo:'montagem',        titulo:'Montagem — '+nomeObra,        np:npPrincipal},
    {tipo:'entrega_tecnica', titulo:'Entrega Técnica — '+nomeObra, np:npPrincipal},
    {tipo:'visita_inicial',  titulo:'Visita Inicial — '+nomeObra,  np:npPrincipal},
  ]){
    const num=await nextNumOS();
    await db.from('crane_os_externas').insert({numero_os:num,obra_id:obra.id,np:os.np,tipo_servico:os.tipo,titulo:os.titulo,status:'aberta',origem:'automatico',criado_em:new Date().toISOString()});
  }

  for(const np of todosNPs){
    for(let m=1;m<=(dataFim?999:12);m++){
      const d=new Date(dataBase+'T12:00:00');d.setMonth(d.getMonth()+m);
      const ds=d.toISOString().slice(0,10);
      if(dataFim&&ds>dataFim)break;
      const num=await nextNumOS();
      const{error}=await db.from('crane_os_externas').insert({numero_os:num,obra_id:obra.id,np,tipo_servico:'prev_mensal',titulo:'Prev. Mensal '+fmtD(proximoUtil(ds)),data_prevista:proximoUtil(ds),status:'aberta',origem:'automatico',criado_em:new Date().toISOString()});
      if(error)break;
    }
    for(let t=1;t<=(dataFim?999:4);t++){
      const d=new Date(dataBase+'T12:00:00');d.setMonth(d.getMonth()+t*3);
      const ds=d.toISOString().slice(0,10);
      if(dataFim&&ds>dataFim)break;
      const num=await nextNumOS();
      const{error}=await db.from('crane_os_externas').insert({numero_os:num,obra_id:obra.id,np,tipo_servico:'prev_trimestral',titulo:'Prev. Trimestral + Freio '+fmtD(proximoUtil(ds)),data_prevista:proximoUtil(ds),status:'aberta',origem:'automatico',criado_em:new Date().toISOString()});
      if(error)break;
    }
  }
}

async function criarDocumentacaoObra(obra,equips){
  const todosNPs=equips.flatMap(e=>e.np_vinculado?(e.np_vinculado.split('/').map(n=>n.trim()).filter(Boolean)):[]);
  for(const np of todosNPs){
    const{data:existentes}=await db.from('crane_docs_np').select('id').eq('np',np).eq('obra_id',obra.id).limit(1);
    if(existentes&&existentes.length>0)continue;
    const rows=DOCS_PADRAO.map((nome,i)=>({np,obra_id:obra.id,nome_documento:nome,entregue:false,data_entrega:null,arquivo_url:null,ordem:i}));
    await db.from('crane_docs_np').insert(rows);
  }
}

function diasAte(d){if(!d)return null;return Math.ceil((new Date(d+'T12:00:00')-new Date())/(1000*60*60*24));}
function alertaValidade(v){const d=diasAte(v);if(d===null)return null;if(d<0)return{tipo:'critico',msg:'VENCIDO há '+Math.abs(d)+' dia(s)'};if(d<=30)return{tipo:'critico',msg:'Vence em '+d+' dia(s)'};if(d<=90)return{tipo:'atencao',msg:'Vence em '+d+' dia(s)'};return{tipo:'ok',msg:'Válido até '+fmtD(v)};}
async function uploadArquivo(file,pasta){const{data:{session}}=await db.auth.getSession();const ext=file.name.split('.').pop().toLowerCase();const path=pasta+'/'+session.user.id+'_'+Date.now()+'.'+ext;const{error}=await db.storage.from(BUCKET).upload(path,file,{contentType:file.type});if(error)throw error;return path;}
async function getSignedUrl(path){const{data}=await db.storage.from(BUCKET).createSignedUrl(path,3600);return data?.signedUrl||null;}

// ── MODAL LAUDOS ──────────────────────────────────────────
function ModalLaudos({componenteId,tipoComponente,tag,onClose}){
  const[laudos,setLaudos]=useState([]);const[loading,setLoading]=useState(true);const[uploading,setUploading]=useState(false);
  const[form,setForm]=useState({tipo_laudo:'Laudo LP',data_emissao:'',validade:'',emitido_por:''});
  const fileRef=useRef();
  async function carregar(){setLoading(true);const{data}=await db.from('crane_componente_laudos').select('*').eq('componente_id',componenteId).eq('tipo_componente',tipoComponente).order('data_emissao',{ascending:false});setLaudos(data||[]);setLoading(false);}
  useEffect(()=>{carregar();},[]);
  async function salvar(){if(!form.data_emissao||!form.validade){toast('Informe data e validade','err');return;}const file=fileRef.current?.files[0];if(!file){toast('Selecione o arquivo PDF','err');return;}setUploading(true);try{const path=await uploadArquivo(file,'laudos/'+tipoComponente+'/'+componenteId);await db.from('crane_componente_laudos').insert({componente_id:componenteId,tipo_componente:tipoComponente,...form,arquivo_path:path,arquivo_nome:file.name});toast('Laudo anexado!');setForm({tipo_laudo:'Laudo LP',data_emissao:'',validade:'',emitido_por:''});fileRef.current.value='';carregar();}catch(e){toast('Erro: '+e.message,'err');}setUploading(false);}
  async function baixar(l){const url=await getSignedUrl(l.arquivo_path);if(url)window.open(url,'_blank');else toast('Não encontrado','err');}
  async function excluir(l){if(!window.confirm('Excluir laudo?'))return;await db.storage.from(BUCKET).remove([l.arquivo_path]);await db.from('crane_componente_laudos').delete().eq('id',l.id);toast('Excluído');carregar();}
  return <Modal title={'Laudos — '+tag} onClose={onClose} lg>
    <div style={{background:'var(--g50)',border:'1px solid var(--g100)',borderRadius:'var(--r)',padding:16,marginBottom:18}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--g500)',marginBottom:12,textTransform:'uppercase',letterSpacing:.5}}>Anexar Novo Laudo</div>
      <div className="fr2"><div className="fg"><label className="fl">Tipo</label><select value={form.tipo_laudo} onChange={e=>setForm(p=>({...p,tipo_laudo:e.target.value}))}><option>Laudo LP</option><option>Relatório de Manutenção</option><option>Certificado</option><option>Outro</option></select></div><div className="fg"><label className="fl">Emitido por</label><input value={form.emitido_por} onChange={e=>setForm(p=>({...p,emitido_por:e.target.value}))} placeholder="Matriz / Laboratório"/></div></div>
      <div className="fr2"><div className="fg"><label className="fl">Data Emissão <span className="req">*</span></label><input type="date" value={form.data_emissao} onChange={e=>setForm(p=>({...p,data_emissao:e.target.value}))}/></div><div className="fg"><label className="fl">Validade <span className="req">*</span></label><input type="date" value={form.validade} onChange={e=>setForm(p=>({...p,validade:e.target.value}))}/></div></div>
      <div className="fg"><label className="fl">Arquivo PDF <span className="req">*</span></label><input ref={fileRef} type="file" accept=".pdf,.PDF"/></div>
      <button className="btn btn-p" onClick={salvar} disabled={uploading}>{uploading?<><span className="spin">↻</span> Enviando...</>:'Anexar Laudo'}</button>
    </div>
    {loading?<div style={{textAlign:'center',padding:24,color:'var(--g400)'}}>Carregando...</div>
    :laudos.length===0?<div className="emp"><div className="ei">📄</div><h3>Nenhum laudo</h3></div>
    :<div style={{display:'flex',flexDirection:'column',gap:8}}>{laudos.map(l=>{const al=alertaValidade(l.validade);return <div key={l.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--r)',padding:'12px 16px',display:'flex',alignItems:'center',gap:12,boxShadow:'var(--shadow)'}}>
      <div style={{fontSize:24}}>📄</div>
      <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13}}>{l.tipo_laudo}</div><div style={{fontSize:12,color:'var(--g500)'}}>{l.arquivo_nome} · {l.emitido_por||'—'}</div>{al&&<div style={{fontSize:11,marginTop:2,color:al.tipo==='ok'?'var(--green)':al.tipo==='atencao'?'var(--amber)':'var(--red)',fontWeight:700}}>{al.msg}</div>}</div>
      <div style={{display:'flex',gap:6}}><button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>baixar(l)}>⬇ Baixar</button><button className="btn btn-d" style={{padding:'6px 10px',fontSize:12}} onClick={()=>excluir(l)}>✕</button></div>
    </div>;})}
    </div>}
  </Modal>;
}

  useEffect(()=>{carregar();},[]);
  async function salvar(){if(!form.motivo||!form.data_envio){toast('Preencha motivo e data','err');return;}setSaving(true);await db.from('crane_componente_envios_matriz').insert({componente_id:componenteId,tipo_componente:tipoComponente,...form});const tab=tipoComponente==='motoredutor'?'crane_componentes_motoredutores':'crane_componentes_freios';await db.from(tab).update({status:'na_matriz'}).eq('id',componenteId);setSaving(false);toast('Envio registrado!');setForm({motivo:'',data_envio:new Date().toISOString().slice(0,10),data_retorno:'',observacao:''});carregar();}

      <div className="fg"><label className="fl">Observação</label><textarea value={form.observacao} onChange={e=>setForm(p=>({...p,observacao:e.target.value}))} rows={2}/></div>
      <button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Registrar Envio'}</button>
    </div>
    {loading?<div style={{textAlign:'center',padding:24,color:'var(--g400)'}}>Carregando...</div>
    :envios.length===0?<div className="emp"><div className="ei">🏭</div><h3>Nenhum envio registrado</h3></div>
    :<div style={{display:'flex',flexDirection:'column',gap:8}}>{envios.map(e=>{const dias=e.data_retorno?Math.ceil((new Date(e.data_retorno+'T12:00:00')-new Date(e.data_envio+'T12:00:00'))/(864e5)):Math.ceil((new Date()-new Date(e.data_envio+'T12:00:00'))/(864e5));return <div key={e.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--r)',padding:'12px 16px',boxShadow:'var(--shadow)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}><div><div style={{fontWeight:700,fontSize:13}}>{e.motivo}</div><div style={{fontSize:12,color:'var(--g500)'}}>{e.observacao}</div></div><span className="bdg" style={e.data_retorno?{background:'var(--green-lt)',color:'var(--green)'}:{background:'var(--amber-lt)',color:'var(--amber)'}}>{e.data_retorno?'Retornou':'Na Matriz'}</span></div>
      <div style={{display:'flex',gap:16,fontSize:12,color:'var(--g500)'}}><span>Envio: {fmtD(e.data_envio)}</span>{e.data_retorno?<span>Retorno: {fmtD(e.data_retorno)}</span>:<span style={{color:'var(--amber)'}}>Aguardando</span>}<span style={{color:'var(--blue)',fontWeight:700}}>{dias} dias</span></div>
      {!e.data_retorno&&<button className="btn btn-ok" style={{marginTop:8,padding:'5px 12px',fontSize:12}} onClick={()=>registrarRetorno(e)}>Registrar Retorno</button>}
    </div>;})}
    </div>}
  </Modal>;
}

// ── PAINEL MOTOREDUTORES ──────────────────────────────────
function PainelMotoredutores(){
  const[lista,setLista]=useState([]);const[loading,setLoading]=useState(true);const[busca,setBusca]=useState('');

  const[equips,setEquips]=useState([]);
  const[osLiberadas,setOsLiberadas]=useState(new Set());
  async function carregar(){
    setLoading(true);
    const[{data:m},{data:e},{data:osLib}]=await Promise.all([
      db.from('crane_componentes_motoredutores').select('*').order('tag'),
      db.from('equipamentos').select('np,modelo').eq('tipo','elevador').order('np'),
      db.from('crane_ordens_servico').select('np').eq('status','liberado'),
    ]);
    setLista(m||[]);setEquips(e||[]);
    setOsLiberadas(new Set((osLib||[]).map(o=>o.np)));
    setLoading(false);
  }
  useEffect(()=>{carregar();},[]);
  async function salvar(){if(!form.modelo.trim()&&!form.om.trim()){setErro('Informe pelo menos o Modelo ou OM');return;}setSaving(true);setErro('');const payload={...form,tag:form.tag||'MOTOREDUTOR',kw:form.kw?parseFloat(form.kw):null,rpm:form.rpm?parseInt(form.rpm):null,hz:form.hz?parseFloat(form.hz):null,np_atual:form.np_atual||null,data_instalacao_atual:form.data_instalacao_atual||null,validade_lp:form.validade_lp||null,validade_end:form.validade_end||null};const op=form.id?db.from('crane_componentes_motoredutores').update(payload).eq('id',form.id):db.from('crane_componentes_motoredutores').insert(payload);const{error}=await op;setSaving(false);if(error){setErro(error.message);return;}toast(form.id?'Atualizado!':'Cadastrado!');setModal(null);carregar();}
  // BUG FIX: filtro de freios/motoredutores - sem negação invertida
  const filtrados=lista.filter(m=>{if(filtStatus&&m.status!==filtStatus)return false;if(filtTipo&&m.tipo!==filtTipo)return false;if(busca&&!m.tag.toLowerCase().includes(busca.toLowerCase())&&!(m.numero_serie||'').toLowerCase().includes(busca.toLowerCase())&&!(m.modelo||'').toLowerCase().includes(busca.toLowerCase()))return false;return true;});
  const STATUS={disponivel:{cls:'st-disp',lb:'Disponível'},manutencao:{cls:'st-manut',lb:'Manutenção'},instalado:{cls:'st-inst',lb:'Instalado'},na_matriz:{cls:'st-matriz',lb:'Na Matriz'},descartado:{cls:'st-desc',lb:'Descartado'}};
  function abrirNovo(){setForm({tag:'MOTOREDUTOR',numero_serie:'',codigo_protheus:'',om:'',descricao:'',modelo:'',tensao:'',kw:'',rpm:'',hz:'',tipo:'elevador',status:'disponivel',np_atual:'',data_instalacao_atual:'',validade_lp:'',validade_end:''});setErro('');setModal('form');}
  function abrirEditar(m){setForm({...m,kw:m.kw||'',rpm:m.rpm||'',hz:m.hz||'',codigo_protheus:m.codigo_protheus||'',om:m.om||'',descricao:m.descricao||'',tensao:m.tensao||'',validade_end:m.validade_end||'',np_atual:m.np_atual||'',data_instalacao_atual:m.data_instalacao_atual||'',validade_lp:m.validade_lp||''});setErro('');setModal('form');}

  // Verifica se componente está em NP com OS liberada e pede confirmação para reabrir
  async function confirmarReabertura(np){
    if(!np)return true;
    const npNorm=np.trim().toUpperCase();
    const liberado=[...osLiberadas].some(x=>(x||'').trim().toUpperCase()===npNorm);
    if(!liberado)return true; // não está liberado, pode operar
    const ok=window.confirm(
      '⚠️ O equipamento '+np+' possui OS encerrada.\n\nPara alterar o status deste componente, a OS será reaberta automaticamente e voltará para Manutenção.\n\nDeseja continuar?'
    );
    if(!ok)return false;
    // Reabre a OS
    await db.from('crane_ordens_servico').update({
      status:'em_manutencao',data_liberacao:null,resp_lib_checklist:null,resp_liberacao:null
    }).eq('np',np).eq('status','liberado');
    await db.from('equipamentos').update({status_operacional:'manutencao'}).eq('np',np);
    toast('OS de '+np+' reaberta para manutenção 🔧');
    return true;
  }

      <div><h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>Motoredutores</h2><p style={{fontSize:13,color:'var(--g500)'}}>Cadastro e rastreabilidade completa</p></div>
      <button className="btn btn-p" onClick={abrirNovo}>+ Novo Motoredutor</button>
    </div>
    <div className="bar">
      <div className="sw"><SI/><input placeholder="Buscar TAG, N° série, modelo..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>

      <select style={{width:'auto'}} value={filtTipo} onChange={e=>setFiltTipo(e.target.value)}><option value="">Elevador + Mini Grua</option><option value="elevador">Elevador</option><option value="minigrua">Mini Grua</option></select>
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{filtrados.length} registros</span>
    </div>
    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :filtrados.length===0?<div className="emp"><div className="ei">⚙️</div><h3>Nenhum motoredutor encontrado</h3></div>
    :<div style={{display:'flex',flexDirection:'column',gap:8}}>{filtrados.map(m=>{const al=alertaValidade(m.validade_lp);const s=STATUS[m.status]||STATUS.disponivel;return <div key={m.id} className="comp-card" style={al&&al.tipo!=='ok'?{borderLeft:'4px solid '+(al.tipo==='critico'?'var(--red)':'var(--amber)')}:{}}>
      <div className="comp-card-header">
        <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{fontSize:24}}>⚙️</div><div><div style={{display:'flex',alignItems:'center',gap:8}}><span className="cod">{m.tag}</span><span className="bdg" style={{background:m.tipo==='elevador'?'var(--blue-lt)':'var(--purple-lt)',color:m.tipo==='elevador'?'var(--blue)':'var(--purple)',fontSize:10}}>{m.tipo==='elevador'?'Elevador':'Mini Grua'}</span></div><div style={{fontSize:13,color:'var(--g700)',marginTop:2,fontWeight:500}}>{m.modelo||'—'} {m.kw?'· '+m.kw+'kW':''} {m.rpm?'· '+m.rpm+'rpm':''}</div><div style={{fontSize:12,color:'var(--g500)'}}>{m.numero_serie||'—'}</div></div></div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}><span className={'bdg '+s.cls}>{s.lb}</span>{m.np_atual&&<span style={{fontSize:12,color:'var(--g500)'}}>📍 {m.np_atual}</span>}</div>
      </div>
      {al&&<div style={{padding:'5px 10px',borderRadius:'var(--r)',background:al.tipo==='ok'?'var(--green-lt)':al.tipo==='atencao'?'var(--amber-lt)':'var(--red-lt)',color:al.tipo==='ok'?'var(--green)':al.tipo==='atencao'?'var(--amber)':'var(--red)',fontSize:12,fontWeight:700,marginBottom:10}}>🔖 LP: {al.msg}</div>}
      {m.np_atual&&(()=>{const npNorm=(m.np_atual||'').trim().toUpperCase();const lib=[...osLiberadas].some(np=>(np||'').trim().toUpperCase()===npNorm);return <div style={{marginBottom:8}}><div style={{fontSize:12,color:'var(--blue)',fontWeight:600}}>📍 Instalado no equipamento: <span style={{fontWeight:800}}>{m.np_atual}</span></div>{lib&&<div style={{fontSize:11,color:'var(--amber)',fontWeight:700,marginTop:3}}>🔒 OS encerrada — alteração de status reabrirá a OS automaticamente</div>}</div>;})()}
      {m.status==='manutencao'&&<div style={{display:'flex',gap:6,marginBottom:8}}>
        <button className="btn btn-g" style={{padding:'5px 12px',fontSize:12}} onClick={async()=>{
          if(!await confirmarReabertura(m.np_atual))return;
          await db.from('crane_componentes_motoredutores').update({status:'disponivel'}).eq('id',m.id);
          toast('Status → Disponível');carregar();
        }}>✓ Marcar Disponível</button>
        <button className="btn" style={{padding:'5px 12px',fontSize:12,background:'var(--purple-lt)',color:'var(--purple)',border:'1px solid var(--purple)',borderRadius:'var(--r)',cursor:'pointer'}} onClick={async()=>{
          if(!window.confirm('Enviar '+m.tag+' para ORMEC?'))return;
          if(!await confirmarReabertura(m.np_atual))return;
          await db.from('crane_componentes_motoredutores').update({status:'na_matriz'}).eq('id',m.id);
          const{data:ex}=await db.from('crane_ormec_envios').select('id').eq('componente_id',m.id).in('status',['embalagem','enviado','retorno']).limit(1);
          if(!ex||!ex.length)await db.from('crane_ormec_envios').insert({tipo:'motoredutor',componente_id:m.id,componente_tag:m.tag,status:'embalagem',data_criacao:new Date().toISOString().slice(0,10)});
          toast('Enviado para ORMEC 🏭','warn');carregar();
        }}>🏭 Enviar ORMEC</button>
      </div>}
      {m.status==='disponivel'&&<button className="btn btn-g" style={{padding:'5px 12px',fontSize:12,marginBottom:8}} onClick={async()=>{if(!await confirmarReabertura(m.np_atual))return;await db.from('crane_componentes_motoredutores').update({status:'manutencao'}).eq('id',m.id);toast('Status → Manutenção');carregar();}}>🔧 Entrada Manutenção</button>}
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}><button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>abrirEditar(m)}>✏️ Editar</button><button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>setModalLaudos(m)}>📄 Laudos</button><button className="btn btn-g" style={{padding:'6px 12px',fontSize:12}} onClick={()=>setModalMatriz(m)}>🏭 Matriz</button></div>
    </div>;})}
    </div>}
    {modal==='form'&&<Modal title={form.id?'Editar — '+form.tag:'Novo Motoredutor'} onClose={()=>setModal(null)} footer={<><button className="btn btn-g" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</button></>} lg>
      {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
      <div className="fr2"><div className="fg"><label className="fl">Tipo</label><select value={form.tipo} onChange={e=>setForm(p=>({...p,tipo:e.target.value}))}><option value="elevador">Elevador</option><option value="minigrua">Mini Grua</option></select></div><div className="fg"><label className="fl">Status</label><select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}><option value="disponivel">Disponível</option><option value="manutencao">Manutenção</option><option value="instalado">Instalado</option><option value="na_matriz">Na Matriz</option><option value="descartado">Descartado</option></select></div></div>
