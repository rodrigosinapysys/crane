function RelatorioOSView(){
  const[osList,setOsList]=useState([]);const[lancamentos,setLancamentos]=useState([]);const[loading,setLoading]=useState(true);
  const[filtroOS,setFiltroOS]=useState('');const[filtroStatus,setFiltroStatus]=useState('');const[busca,setBusca]=useState('');

  async function carregar(){
    setLoading(true);
    const[{data:os},{data:lanc}]=await Promise.all([
      db.from('crane_ordens_servico').select('id,np,modelo,status,data_retorno,obra_origem,responsavel_inspecao,criado_em').order('criado_em',{ascending:false}),
      db.from('crane_oficina').select('*').not('os_id','is',null).order('data').order('hora_inicio'),
    ]);
    setOsList(os||[]);setLancamentos(lanc||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  const osFiltradas=osList.filter(o=>{
    if(filtroStatus&&o.status!==filtroStatus)return false;
    if(busca&&!(o.np||'').toLowerCase().includes(busca.toLowerCase())&&!(o.modelo||'').toLowerCase().includes(busca.toLowerCase()))return false;
    return true;
  });

  function lancsDaOS(osId){return lancamentos.filter(l=>l.os_id===osId);}

  function gerarPDF(){
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const ml=14,mr=196,pw=182;let y=0;

    // Cabeçalho
    doc.setFillColor(0,37,120);doc.rect(0,0,210,22,'F');
    doc.setFillColor(255,117,0);doc.rect(0,0,5,22,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(255,255,255);
    doc.text('CRANE — Relatório de OS / Serviços Realizados',ml+6,10);
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text('Emitido em: '+new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),mr,16,{align:'right'});
    y=30;

    osFiltradas.forEach(os=>{
      const lancs=lancsDaOS(os.id);
      const altOS=12+lancs.length*7+6;
      if(y+altOS>280){doc.addPage();y=14;}

      // Cabeçalho da OS
      doc.setFillColor(236,238,242);doc.rect(ml,y,pw,8,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(0,37,120);
      doc.text(os.np,ml+2,y+5.5);
      doc.setTextColor(46,53,73);
      doc.text(os.modelo||'',ml+28,y+5.5);
      doc.text('Status: '+(os.status||''),ml+70,y+5.5);
      if(os.responsavel_inspecao)doc.text('Inspetor: '+os.responsavel_inspecao,ml+110,y+5.5);
      const stBg={aberta:[0,57,166],em_manutencao:[180,83,9],liberado:[13,122,76]}[os.status]||[100,100,100];
      doc.setFillColor(...stBg);doc.roundedRect(mr-20,y+1,20,6,1,1,'F');
      doc.setFontSize(6);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text((os.status||'').toUpperCase(),mr-10,y+5,{align:'center'});
      y+=9;

      if(lancs.length===0){
        doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,149,168);
        doc.text('   Nenhum serviço lançado nesta OS',ml,y+4);
        y+=7;
      } else {
        lancs.forEach((l,idx)=>{
          if(idx%2===0){doc.setFillColor(250,251,252);doc.rect(ml,y,pw,6.5,'F');}
          doc.setFontSize(7.5);doc.setFont('helvetica','normal');doc.setTextColor(17,24,39);
          let cx=ml+2;
          // Data
          doc.setTextColor(100,100,120);doc.text(fmtD(l.data),cx,y+4.5);cx+=20;
          // Funcionário
          doc.setTextColor(17,24,39);doc.setFont('helvetica','bold');
          doc.text((l.funcionario_nome||'').substring(0,18),cx,y+4.5);cx+=36;
          // Serviço
          doc.setFont('helvetica','normal');doc.setTextColor(0,57,166);
          doc.text((l.servico||'').substring(0,22),cx,y+4.5);cx+=40;
          // Item
          doc.setTextColor(46,53,73);
          doc.text((l.item_nome||'—').substring(0,24),cx,y+4.5);cx+=44;
          // Horário
          doc.setTextColor(100,100,120);
          const hr=l.hora_inicio&&l.hora_fim?l.hora_inicio+'–'+l.hora_fim:'—';
          doc.text(hr,cx,y+4.5);cx+=24;
          // Duração
          const dur=calcMin(l.hora_inicio,l.hora_fim);
          doc.setTextColor(13,122,76);doc.setFont('helvetica','bold');
          doc.text(dur?dur+'min':'—',mr-2,y+4.5,{align:'right'});
          doc.setDrawColor(236,238,242);doc.line(ml,y+6.5,mr,y+6.5);
          y+=7;
        });
      }
      doc.setDrawColor(200,205,215);doc.line(ml,y,mr,y);
      y+=4;
    });

    // Rodapé
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(140,149,168);
    const pg=doc.internal.getNumberOfPages();
    for(let i=1;i<=pg;i++){doc.setPage(i);doc.line(ml,285,mr,285);doc.text('CRANE — Relatório de Serviços',ml,289);doc.text('Página '+i+' de '+pg,mr,289,{align:'right'});}
    doc.save('RelatorioOS_'+new Date().toISOString().slice(0,10)+'.pdf');
    toast('Relatório gerado! ✅');
  }

  const totalLanc=lancamentos.length;
  const totalMin=lancamentos.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0);

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:10}}>
      <div><h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>Relatório de OS</h2>
        <p style={{fontSize:13,color:'var(--g500)'}}>Todos os serviços lançados por OS — visão Gestor / PCM</p></div>
      <button className="btn btn-p" onClick={gerarPDF} style={{background:'var(--blue-dk)'}}>📄 Exportar PDF</button>
    </div>

    <div className="krow" style={{marginBottom:16}}>
      <div className="kpi"><div className="kl">Total de OS</div><div className="kv">{osList.length}</div></div>
      <div className="kpi"><div className="kl">Lançamentos</div><div className="kv">{totalLanc}</div></div>
      <div className="kpi"><div className="kl">Horas totais</div><div className="kv">{fmtHH(totalMin)}</div></div>
      <div className="kpi"><div className="kl">OS liberadas</div><div className="kv" style={{color:'var(--green)'}}>{osList.filter(o=>o.status==='liberado').length}</div></div>
    </div>

    <div className="bar" style={{marginBottom:14}}>
      <div className="sw"><SI/><input placeholder="Buscar NP ou modelo..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <select style={{width:'auto'}} value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)}>
        <option value="">Todos os status</option>
        <option value="aberta">Aberta</option>
        <option value="em_manutencao">Em Manutenção</option>
        <option value="liberado">Liberado</option>
      </select>
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{osFiltradas.length} OS</span>
    </div>

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :osFiltradas.length===0?<div className="emp"><div className="ei">📋</div><h3>Nenhuma OS encontrada</h3></div>
    :<div style={{display:'flex',flexDirection:'column',gap:12}}>
      {osFiltradas.map(os=>{
        const lancs=lancsDaOS(os.id);
        const minOS=lancs.reduce((a,l)=>a+calcMin(l.hora_inicio,l.hora_fim),0);
        const stCor={aberta:'var(--blue)',em_manutencao:'var(--amber)',liberado:'var(--green)'}[os.status]||'var(--g400)';
        return <div key={os.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',overflow:'hidden',boxShadow:'var(--shadow)'}}>
          {/* Header OS */}
          <div style={{background:'var(--g50)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,borderBottom:'1px solid var(--g100)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span className="cod" style={{fontSize:14}}>{os.np}</span>
              <span style={{fontSize:13,fontWeight:600,color:'var(--g700)'}}>{os.modelo}</span>
              {os.obra_origem&&<span style={{fontSize:12,color:'var(--g400)'}}>📍 {os.obra_origem}</span>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {minOS>0&&<span style={{fontSize:12,fontWeight:700,color:'var(--blue)'}}>⏱ {fmtHH(minOS)}</span>}
              <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:12,background:stCor+'22',color:stCor}}>{os.status}</span>
              <span style={{fontSize:11,color:'var(--g400)'}}>{lancs.length} serviço{lancs.length!==1?'s':''}</span>
            </div>
          </div>
          {/* Lançamentos */}
          {lancs.length===0?<div style={{padding:'12px 16px',fontSize:13,color:'var(--g400)',fontStyle:'italic'}}>Nenhum serviço lançado</div>
          :<div className="tw"><table style={{fontSize:12}}>
            <thead><tr>
              <th style={{width:80}}>Data</th><th>Funcionário</th><th>Serviço</th><th>Item</th>
              <th style={{textAlign:'center'}}>Horário</th><th style={{textAlign:'right'}}>Duração</th>
            </tr></thead>
            <tbody>{lancs.map((l,i)=>{const dur=calcMin(l.hora_inicio,l.hora_fim);return <tr key={l.id} style={{background:i%2===0?'var(--white)':'var(--g50)'}}>
              <td style={{color:'var(--g500)'}}>{fmtD(l.data)}</td>
              <td style={{fontWeight:700}}>{l.funcionario_nome}</td>
              <td><span style={{color:'var(--blue)',fontWeight:600}}>{l.servico}</span></td>
              <td style={{color:'var(--g500)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.item_nome||'—'}</td>
              <td style={{textAlign:'center',fontFamily:'monospace',color:'var(--g600)'}}>{l.hora_inicio&&l.hora_fim?l.hora_inicio+'–'+l.hora_fim:'—'}</td>
              <td style={{textAlign:'right',fontWeight:700,color:dur>0?'var(--green)':'var(--g300)'}}>{dur?dur+'min':'—'}</td>
            </tr>;})}
            </tbody>
          </table></div>}
        </div>;
      })}
    </div>}
  </div>;
}

  '2025-04-17','2025-04-18','2025-04-21','2025-05-01','2025-06-19',

  // 2026

  '2026-11-20','2026-12-08','2026-12-25',
];

function isFeriado(dateStr){return FERIADOS_RP.includes(dateStr);}
function isUtil(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const dow=d.getDay();
  return dow!==0&&dow!==6&&!isFeriado(dateStr);
}
function proximoUtil(dateStr){
  let d=new Date(dateStr+'T12:00:00');
  let s=dateStr;
  while(!isUtil(s)){
    d.setDate(d.getDate()+1);
    s=d.toISOString().slice(0,10);
  }
  return s;
}
function addMeses(dateStr,n){
  const d=new Date(dateStr+'T12:00:00');
  d.setMonth(d.getMonth()+n);
  return d.toISOString().slice(0,10);
}

function OSExternasView(){
  const[lista,setLista]=useState([]);const[loading,setLoading]=useState(true);
  const[obras,setObras]=useState([]);const[equipes,setEquipes]=useState([]);
  const[filtroObra,setFiltroObra]=useState('');const[filtroStatus,setFiltroStatus]=useState('');
  const[filtroTipo,setFiltroTipo]=useState('');const[busca,setBusca]=useState('');
  const[modalAg,setModalAg]=useState(null);const[modalNova,setModalNova]=useState(false);

  async function carregar(){
    setLoading(true);
    const[{data:os},{data:ob},{data:eq}]=await Promise.all([
      db.from('crane_os_externas').select('*,crane_obras(cliente,nome_obra),crane_agendamentos(id,data,data_fim,equipe_id,crane_equipes(nome))').order('numero_os'),
      db.from('crane_obras').select('id,cliente,nome_obra').neq('status','encerrado').order('cliente'),
      db.from('crane_equipes').select('*').eq('ativa',true).order('nome'),
    ]);
    setLista(os||[]);setObras(ob||[]);setEquipes(eq||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  const filtrado=lista.filter(os=>{
    if(filtroStatus&&os.status!==filtroStatus)return false;
    if(filtroTipo&&os.tipo_servico!==filtroTipo)return false;
    if(filtroObra&&os.obra_id!==filtroObra)return false;
    if(busca){const b=busca.toLowerCase();if(!(os.numero_os||'').toLowerCase().includes(b)&&!(os.titulo||'').toLowerCase().includes(b)&&!(os.np||'').toLowerCase().includes(b))return false;}
    return true;
  });

  const kAberta=lista.filter(o=>o.status==='aberta').length;
  const kAgendada=lista.filter(o=>o.status==='agendada').length;
  const kRealizada=lista.filter(o=>o.status==='realizada').length;

  const ST_OS={
    aberta:   {lb:'Aberta',   c:'var(--blue)',  bg:'var(--blue-lt)'},
    agendada: {lb:'Agendada', c:'var(--amber)', bg:'var(--amber-lt)'},
    realizada:{lb:'Realizada',c:'var(--green)', bg:'var(--green-lt)'},
    cancelada:{lb:'Cancelada',c:'var(--red)',   bg:'var(--red-lt)'},
  };

  async function criarOSManual(f){
    // Próximo número
    const{data}=await db.from('crane_os_externas').select('numero_os').order('numero_os',{ascending:false}).limit(1);
    const ultimo=data&&data.length?parseInt((data[0].numero_os||'OS-EXT-0000').replace(/\D/g,''))||0:0;
    const num='OS-EXT-'+(ultimo+1).toString().padStart(4,'0');
    const{data:novaOS,error}=await db.from('crane_os_externas').insert({...f,numero_os:num,status:'aberta',origem:'manual',criado_em:new Date().toISOString()}).select().single();
    if(error){toast(error.message,'err');return;}
    toast('OS '+num+' criada! ✅');
    carregar();
    return novaOS;
  }

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
      <div><h2 style={{fontSize:18,fontWeight:800,margin:0}}>OSs Externas</h2>
        <p style={{fontSize:12,color:'var(--g500)',marginTop:2}}>Ordens de serviço de campo — agendamento pelo PCM</p></div>
      <button className="btn btn-p" onClick={()=>setModalNova(true)}>+ Nova OS Manual</button>
    </div>

    {/* KPIs */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
      {[{l:'Total',v:lista.length,c:'var(--g700)'},{l:'Abertas',v:kAberta,c:'var(--blue)'},{l:'Agendadas',v:kAgendada,c:'var(--amber)'},{l:'Realizadas',v:kRealizada,c:'var(--green)'}]
        .map(k=><div key={k.l} className="kpi"><div className="kl">{k.l}</div><div className="kv" style={{color:k.c}}>{k.v}</div></div>)}
    </div>

    {/* Filtros */}
    <div className="bar" style={{marginBottom:14,flexWrap:'wrap'}}>
      <div className="sw"><SI/><input placeholder="Buscar OS, NP, título..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <select style={{width:'auto'}} value={filtroObra} onChange={e=>setFiltroObra(e.target.value)}>
        <option value="">Todas as obras</option>
        {obras.map(o=><option key={o.id} value={o.id}>{o.nome_obra||o.cliente}</option>)}
      </select>
      <select style={{width:'auto'}} value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)}>
        <option value="">Todos os tipos</option>
        {TIPOS_SERVICO.map(t=><option key={t.id} value={t.id}>{t.ic} {t.lb}</option>)}
      </select>
      <select style={{width:'auto'}} value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)}>
        <option value="">Todos os status</option>
        <option value="aberta">Aberta</option>
        <option value="agendada">Agendada</option>
        <option value="realizada">Realizada</option>
      </select>
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{filtrado.length} OS</span>
    </div>

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :filtrado.length===0?<div className="emp"><div className="ei">📋</div><h3>Nenhuma OS encontrada</h3><p>As OSs são geradas ao confirmar reserva de uma obra</p></div>
    :<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filtrado.map(os=>{
        const ts=TIPOS_SERVICO.find(t=>t.id===os.tipo_servico)||TIPOS_SERVICO[0];
        const st=ST_OS[os.status]||ST_OS.aberta;
        const ag=os.crane_agendamentos?.[0];
        return <div key={os.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:'14px 16px',display:'flex',alignItems:'center',gap:14,boxShadow:'var(--shadow)',flexWrap:'wrap'}}>
          {/* Número OS */}
          <div style={{minWidth:110,flexShrink:0}}>
            <div style={{fontSize:11,fontWeight:800,color:'var(--g400)',letterSpacing:.5}}>OS EXTERNA</div>
            <div style={{fontSize:15,fontWeight:800,color:'var(--blue)',fontFamily:'monospace'}}>{os.numero_os}</div>
          </div>
          {/* Tipo + barra colorida */}
          <div style={{width:4,height:40,borderRadius:2,background:ts.cor,flexShrink:0}}/>
          {/* Info */}
          <div style={{flex:1,minWidth:180}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--g900)',marginBottom:2}}>{os.titulo}</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',fontSize:11,color:'var(--g500)'}}>
              <span>{ts.ic} {ts.lb}</span>
              {os.np&&<span>NP: <strong>{os.np}</strong></span>}
              {os.crane_obras&&<span>📍 {os.crane_obras.nome_obra||os.crane_obras.cliente}</span>}
              {os.data_prevista&&<span>📅 Prev: {fmtD(os.data_prevista)}</span>}
              {os.origem==='automatico'&&<span style={{color:'var(--blue)'}}>⚡ Auto</span>}
            </div>
          </div>
          {/* Agendamento */}
          <div style={{minWidth:140,flexShrink:0}}>
            {ag?<div style={{fontSize:11,background:'var(--green-lt)',color:'var(--green)',padding:'4px 8px',borderRadius:6,fontWeight:600}}>
              ✅ {fmtD(ag.data)}{ag.data_fim&&ag.data_fim!==ag.data?' → '+fmtD(ag.data_fim):''}<br/>
              <span style={{fontSize:10}}>{ag.crane_equipes?.nome||'—'}</span>
            </div>:<div style={{fontSize:11,color:'var(--amber)',fontWeight:600}}>⏳ Sem agendamento</div>}
          </div>
          {/* Status + ação */}
          <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end',flexShrink:0}}>
            <span style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:10,background:st.bg,color:st.c}}>{st.lb}</span>
            <div style={{display:'flex',gap:6}}>
              {os.status!=='realizada'&&<button className="btn btn-p" style={{padding:'5px 12px',fontSize:11}} onClick={()=>setModalAg(os)}>
                {ag?'✏️ Reagendar':'📅 Agendar'}
              </button>}
              {os.status==='agendada'&&<button className="btn btn-g" style={{padding:'5px 12px',fontSize:11,background:'var(--green-lt)',color:'var(--green)',border:'1px solid var(--green)'}}
                onClick={async()=>{await db.from('crane_os_externas').update({status:'realizada'}).eq('id',os.id);carregar();toast('OS marcada como realizada ✅');}}>
                ✅ Realizada
              </button>}
            </div>
          </div>
        </div>;
      })}
    </div>}

    {/* Modal agendar OS */}
    {modalAg&&<ModalAgendarOS os={modalAg} equipes={equipes} onClose={()=>setModalAg(null)} onSaved={()=>{setModalAg(null);carregar();}}/>}

    {/* Modal nova OS manual */}
    {modalNova&&<ModalNovaOSExterna obras={obras} onClose={()=>setModalNova(false)} onSaved={async f=>{await criarOSManual(f);setModalNova(false);}}/>}
  </div>;
}

// ── MODAL AGENDAR OS ─────────────────────────────────────
function ModalAgendarOS({os,equipes,onClose,onSaved}){
  const[f,setF]=useState({
    data:new Date().toISOString().slice(0,10),
    data_fim:new Date().toISOString().slice(0,10),
    hora_inicio:'08:00',hora_fim:'17:00',
    equipe_id:'',funcionario_extra_id:'',observacao:'',
  });
  const[saving,setSaving]=useState(false);const[erro,setErro]=useState('');
  const[funcionarios,setFuncionarios]=useState([]);
  useEffect(()=>{db.from('crane_funcionarios').select('id,nome,especialidade').eq('ativo',true).order('nome').then(({data})=>setFuncionarios(data||[]));},[]);

  async function salvar(){
    if(!f.equipe_id){setErro('Selecione a equipe');return;}
    setSaving(true);setErro('');
    // Cria agendamento
    const{data:ag,error}=await db.from('crane_agendamentos').insert({
      obra_id:os.obra_id,np:os.np,tipo_servico:os.tipo_servico,
      data:f.data,data_fim:f.data_fim,hora_inicio:f.hora_inicio,hora_fim:f.hora_fim,
      equipe_id:f.equipe_id,funcionario_extra_id:f.funcionario_extra_id||null,
      status:'agendado',origem:'os_externa',observacao:f.observacao||null,
    }).select().single();
    if(error){setErro(error.message);setSaving(false);return;}
    // Atualiza OS para agendada
    await db.from('crane_os_externas').update({status:'agendada',agendamento_id:ag.id}).eq('id',os.id);
    setSaving(false);toast('OS agendada! ✅');onSaved();
  }

  const ts=TIPOS_SERVICO.find(t=>t.id===os.tipo_servico)||TIPOS_SERVICO[0];
  const dur=f.data&&f.data_fim?Math.ceil((new Date(f.data_fim)-new Date(f.data))/(1000*60*60*24))+1:1;

  return <Modal title={'Agendar OS — '+os.numero_os} onClose={onClose}
    footer={<><button className="btn btn-g" onClick={onClose}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Agendar'}</button></>}>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
    <div style={{background:ts.bg,border:'1px solid '+ts.border,borderRadius:'var(--r)',padding:'10px 14px',marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:800,color:ts.cor}}>{ts.ic} {ts.lb}</div>
      <div style={{fontSize:12,color:'var(--g700)',marginTop:3}}>{os.titulo}</div>
      {os.np&&<div style={{fontSize:11,color:'var(--g500)',marginTop:2}}>NP: {os.np}</div>}
      {os.data_prevista&&<div style={{fontSize:11,color:'var(--amber)',marginTop:2}}>📅 Data prevista: {fmtD(os.data_prevista)}</div>}
    </div>
    <div className="fr2">
      <div className="fg"><label className="fl">Data Início <span className="req">*</span></label>
        <input type="date" value={f.data} onChange={e=>setF(p=>({...p,data:e.target.value,data_fim:p.data_fim<e.target.value?e.target.value:p.data_fim}))}/></div>
      <div className="fg"><label className="fl">Data Fim</label>
        <input type="date" value={f.data_fim} onChange={e=>setF(p=>({...p,data_fim:e.target.value}))} min={f.data}/>
        {dur>1&&<div style={{fontSize:11,color:'var(--blue)',marginTop:2}}>{dur} dias</div>}
      </div>
    </div>
    <div className="fr2">
      <div className="fg"><label className="fl">Hora Início</label>
        <input type="time" value={f.hora_inicio} onChange={e=>setF(p=>({...p,hora_inicio:e.target.value}))}/></div>
      <div className="fg"><label className="fl">Hora Fim</label>
        <input type="time" value={f.hora_fim} onChange={e=>setF(p=>({...p,hora_fim:e.target.value}))}/></div>
    </div>
    <div className="fr2">
      <div className="fg"><label className="fl">Equipe <span className="req">*</span></label>
        <select value={f.equipe_id} onChange={e=>setF(p=>({...p,equipe_id:e.target.value}))}>
          <option value="">Selecione...</option>
          {equipes.map(e=><option key={e.id} value={e.id}>{e.nome}</option>)}
        </select></div>
      <div className="fg"><label className="fl">Funcionário Extra</label>
        <select value={f.funcionario_extra_id} onChange={e=>setF(p=>({...p,funcionario_extra_id:e.target.value}))}>
          <option value="">— Nenhum —</option>
          {funcionarios.map(fn=><option key={fn.id} value={fn.id}>{fn.nome}</option>)}
        </select></div>
    </div>
    <div className="fg"><label className="fl">Observação</label>
      <textarea value={f.observacao} onChange={e=>setF(p=>({...p,observacao:e.target.value}))} rows={2}/></div>
  </Modal>;
}

// ── MODAL NOVA OS EXTERNA MANUAL ─────────────────────────
function ModalNovaOSExterna({obras,onClose,onSaved}){
  const[f,setF]=useState({obra_id:'',np:'',tipo_servico:'montagem',titulo:'',data_prevista:'',observacao:''});
  const[saving,setSaving]=useState(false);const[erro,setErro]=useState('');

  async function salvar(){
    if(!f.titulo.trim()){setErro('Informe o título');return;}
    setSaving(true);setErro('');
    await onSaved(f);
    setSaving(false);
  }

  return <Modal title="Nova OS Externa — Manual" onClose={onClose}
    footer={<><button className="btn btn-g" onClick={onClose}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Criando...':'Criar OS'}</button></>}>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
    <div className="fr2">
      <div className="fg"><label className="fl">Tipo de Serviço <span className="req">*</span></label>
        <select value={f.tipo_servico} onChange={e=>setF(p=>({...p,tipo_servico:e.target.value}))}>
          {TIPOS_SERVICO.map(t=><option key={t.id} value={t.id}>{t.ic} {t.lb}</option>)}
        </select></div>
      <div className="fg"><label className="fl">Obra</label>
        <select value={f.obra_id} onChange={e=>setF(p=>({...p,obra_id:e.target.value}))}>
          <option value="">— Sem obra —</option>
          {obras.map(o=><option key={o.id} value={o.id}>{o.nome_obra||o.cliente}</option>)}
        </select></div>
    </div>
    <div className="fg"><label className="fl">Título <span className="req">*</span></label>
      <input value={f.titulo} onChange={e=>setF(p=>({...p,titulo:e.target.value}))} placeholder="Descreva o serviço..."/></div>
    <div className="fr2">
      <div className="fg"><label className="fl">NP do Equipamento</label>
        <input value={f.np} onChange={e=>setF(p=>({...p,np:e.target.value}))} placeholder="Ex: 030.1200.087"/></div>
      <div className="fg"><label className="fl">Data Prevista</label>
        <input type="date" value={f.data_prevista} onChange={e=>setF(p=>({...p,data_prevista:e.target.value}))}/></div>
    </div>
    <div className="fg"><label className="fl">Observação</label>
      <textarea value={f.observacao} onChange={e=>setF(p=>({...p,observacao:e.target.value}))} rows={2}/></div>
  </Modal>;
}

// ── DOCUMENTAÇÃO POR OBRA/NP ──────────────────────────────
function CalendarioEquipes(){
  const[semana,setSemana]=useState(()=>{
    const d=new Date();d.setDate(d.getDate()-d.getDay()+1);
    return d.toISOString().slice(0,10);
  });
  const[equipes,setEquipes]=useState([]);
  const[agendamentos,setAgendamentos]=useState([]);
  const[loading,setLoading]=useState(true);
  const[modalAg,setModalAg]=useState(null);
  const[editAg,setEditAg]=useState(null);
  const[dragAg,setDragAg]=useState(null);
  const[dragOver,setDragOver]=useState(null);// 'equipeId_data'

  const dias=Array.from({length:7},(_,i)=>{
    const d=new Date(semana+'T12:00:00');d.setDate(d.getDate()+i);
    return d.toISOString().slice(0,10);
  });

  async function carregar(){
    setLoading(true);
    const[{data:eq},{data:ag}]=await Promise.all([
      db.from('crane_equipes').select('*,crane_equipe_membros(funcionario_id,funcao,crane_funcionarios(nome))').eq('ativa',true).order('nome'),
      db.from('crane_agendamentos').select('*,crane_obras(cliente,nome_obra)').gte('data',dias[0]).lte('data',dias[6]).order('hora_inicio'),
    ]);
    setEquipes(eq||[]);setAgendamentos(ag||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[semana]);

  function agsDia(equipe_id,data){
    return agendamentos.filter(a=>{
      if(a.equipe_id!==equipe_id)return false;
      const ini=a.data;
      const fim=a.data_fim||a.data;
      return data>=ini&&data<=fim;
    });
  }
  function totalDia(data){
    return agendamentos.filter(a=>{
      const ini=a.data;const fim=a.data_fim||a.data;
      return data>=ini&&data<=fim;
    }).length;
  }

  async function moverAg(ag,equipe_id,novaData){
    await db.from('crane_agendamentos').update({data:novaData,equipe_id}).eq('id',ag.id);
    toast('Agendamento movido ✅');carregar();
  }

  async function reagendar(ag,e){
    e.stopPropagation();
    const nova=prompt('Nova data (AAAA-MM-DD):',ag.data);
    if(!nova)return;
    await db.from('crane_agendamentos').update({data:nova}).eq('id',ag.id);
    toast('Reagendado para '+fmtD(nova));carregar();
  }

  async function excluirAg(ag,e){
    e.stopPropagation();
    if(!window.confirm('Excluir agendamento?'))return;
    await db.from('crane_agendamentos').delete().eq('id',ag.id);
    toast('Excluído');carregar();
  }

  const hoje=new Date().toISOString().slice(0,10);
  const semAnterior=()=>{const d=new Date(semana+'T12:00:00');d.setDate(d.getDate()-7);setSemana(d.toISOString().slice(0,10));};
  const semSeguinte=()=>{const d=new Date(semana+'T12:00:00');d.setDate(d.getDate()+7);setSemana(d.toISOString().slice(0,10));};
  const irHoje=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1);setSemana(d.toISOString().slice(0,10));};

  const DIAS_LABEL=['SEG','TER','QUA','QUI','SEX','SÁB','DOM'];
  const MESES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

  // Cores status SYNAPSYS
  function stBadge(status){
    return {
      agendado:  {lb:'Agendado',   bg:'#EFF6FF',c:'#2563EB',border:'#BFDBFE'},
      confirmado:{lb:'Confirmado', bg:'#F0FDF4',c:'#16A34A',border:'#BBF7D0'},
      realizado: {lb:'Concluído',  bg:'#F0FDF4',c:'#15803D',border:'#86EFAC'},
      cancelado: {lb:'Cancelado',  bg:'#FEF2F2',c:'#DC2626',border:'#FECACA'},
    }[status]||{lb:status,bg:'#F9FAFB',c:'#6B7280',border:'#E5E7EB'};
  }

  const totalSemana=agendamentos.length;
  const feriadosSemana=dias.filter(d=>isFeriado(d));

  return <div style={{background:'#F4F6F9',minHeight:'100%',padding:'0 0 24px'}}>
    {/* Toolbar SYNAPSYS */}
    <div style={{background:'#fff',borderBottom:'1px solid #E5E7EB',padding:'10px 16px',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:0}}>
      <button onClick={semAnterior} style={{padding:'6px 14px',border:'1px solid #E5E7EB',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:13,fontFamily:'var(--font)',color:'#374151',fontWeight:500}}>← Semana anterior</button>
      <div style={{fontSize:14,fontWeight:700,color:'#111827',padding:'0 8px'}}>
        {new Date(dias[0]+'T12:00:00').getDate()} de {MESES[new Date(dias[0]+'T12:00:00').getMonth()]} – {new Date(dias[6]+'T12:00:00').getDate()} de {MESES[new Date(dias[6]+'T12:00:00').getMonth()]}. de {new Date(dias[0]+'T12:00:00').getFullYear()}
      </div>
      <button onClick={semSeguinte} style={{padding:'6px 14px',border:'1px solid #E5E7EB',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:13,fontFamily:'var(--font)',color:'#374151',fontWeight:500}}>Próxima semana →</button>
      <button onClick={irHoje} style={{padding:'6px 14px',border:'1px solid #E5E7EB',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:13,fontFamily:'var(--font)',color:'#374151',fontWeight:500}}>Semana atual</button>
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
        {/* Legenda feriados */}
        <div style={{display:'flex',gap:12,fontSize:11,color:'#6B7280',alignItems:'center'}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:'50%',background:'#EF4444',display:'inline-block'}}/>Nacional</span>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:'50%',background:'#3B82F6',display:'inline-block'}}/>Estadual</span>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:'50%',background:'#8B5CF6',display:'inline-block'}}/>Municipal</span>
        </div>
        <div style={{fontSize:12,color:'#6B7280'}}>Total: <strong style={{color:'#111827'}}>{totalSemana}</strong></div>
        <button onClick={()=>setModalAg({equipe_id:null,data:hoje})} style={{padding:'7px 16px',background:'var(--orange)',border:'none',borderRadius:6,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'var(--font)'}}>+ Novo Agendamento</button>
      </div>
    </div>

    {loading?<div style={{textAlign:'center',padding:60,color:'#9CA3AF',fontSize:14}}>Carregando calendário...</div>
    :<div style={{overflowX:'auto',padding:'16px'}}>
      <div style={{display:'grid',gridTemplateColumns:'130px repeat(7,1fr)',gap:0,minWidth:900,background:'#fff',border:'1px solid #E5E7EB',borderRadius:10,overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>

        {/* Header dias */}
        <div style={{background:'#F9FAFB',borderRight:'1px solid #E5E7EB',borderBottom:'1px solid #E5E7EB',padding:'12px 10px'}}>
          <div style={{fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:.8}}>Equipe</div>
        </div>
        {dias.map((d,i)=>{
          const isHoje=d===hoje;
          const isFer=isFeriado(d);
          const dow=new Date(d+'T12:00:00').getDay();
          const isWend=dow===0||dow===6;
          const tot=totalDia(d);
          return <div key={d} style={{borderRight:i<6?'1px solid #E5E7EB':'none',borderBottom:'1px solid #E5E7EB',
            background:isHoje?'#1E3A5F':isFer?'#FEF2F2':isWend?'#F9FAFB':'#F9FAFB',
            padding:'10px 8px',textAlign:'center',cursor:'default'}}>
            <div style={{fontSize:10,fontWeight:700,color:isHoje?'rgba(255,255,255,.7)':isWend?'#9CA3AF':'#6B7280',textTransform:'uppercase',letterSpacing:.8}}>{DIAS_LABEL[i]}</div>
            <div style={{fontSize:22,fontWeight:800,color:isHoje?'#fff':isFer?'#EF4444':isWend?'#9CA3AF':'#111827',lineHeight:1.1,marginTop:2}}>{new Date(d+'T12:00:00').getDate()}</div>
            <div style={{fontSize:10,color:isHoje?'rgba(255,255,255,.6)':'#9CA3AF',marginTop:1}}>{MESES[new Date(d+'T12:00:00').getMonth()]}</div>
            {tot>0&&<div style={{fontSize:10,color:isHoje?'rgba(255,255,255,.7)':'#6B7280',marginTop:4,fontWeight:600}}>{tot} op.</div>}
            {isFer&&!isHoje&&<div style={{fontSize:9,color:'#EF4444',marginTop:2,fontWeight:600}}>Feriado</div>}
          </div>;
        })}

        {/* Linhas equipes */}
        {equipes.length===0
          ?<div style={{gridColumn:'1/-1',padding:40,textAlign:'center',color:'#9CA3AF',fontSize:13}}>Nenhuma equipe cadastrada. Vá em Equipes para criar.</div>

              {(()=>{
                const cores=['#1D4ED8','#7C3AED','#0891B2','#059669','#D97706','#DC2626'];

                {ags.map(ag=>{

                    {/* Tipo */}
                    <div style={{fontSize:9,color:ts.cor,fontWeight:600,marginBottom:2}}>{ts.ic} {ts.lb}</div>
                    {/* Período — só no dia início */}
                    {isInicio&&isDuracao&&<div style={{fontSize:9,color:'#6B7280',marginBottom:3}}>📅 {fmtD(ag.data)} → {fmtD(fim)}</div>}
                    {/* Indicador de dia no período */}
                    {!isInicio&&isDuracao&&<div style={{fontSize:9,color:'#6B7280',marginBottom:3}}>{isFimDia?'🏁 Último dia':'▶ Dia '+( Math.ceil((new Date(d)-new Date(ag.data))/(1000*60*60*24))+1)+' de '+(Math.ceil((new Date(fim)-new Date(ag.data))/(1000*60*60*24))+1)}</div>}
                    {/* Badge + botões */}
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4}}>
                      <span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:4,background:sb.bg,color:sb.c,border:'1px solid '+sb.border}}>{sb.lb}</span>
                      <div style={{display:'flex',gap:2}} onClick={e=>e.stopPropagation()}>
                        <button title="Reagendar" onClick={e=>reagendar(ag,e)}
                          style={{width:20,height:20,border:'1px solid #E5E7EB',borderRadius:4,background:'rgba(255,255,255,.8)',cursor:'pointer',fontSize:10,color:'#6B7280',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>↺</button>
                        <button title="Excluir" onClick={e=>excluirAg(ag,e)}
                          style={{width:20,height:20,border:'1px solid #FECACA',borderRadius:4,background:'#FEF2F2',cursor:'pointer',fontSize:10,color:'#EF4444',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>🗑</button>
                      </div>
                    </div>
                  </div>;
                })}
                {ags.length===0&&!isFer&&<div style={{height:20}}/>}
              </div>;
            })}
          </React.Fragment>)}
      </div>
    </div>}

    {(modalAg||editAg)&&<ModalAgendamento
      ag={editAg}
      defaultEquipe={modalAg?.equipe_id}
      defaultData={modalAg?.data||editAg?.data}
      equipes={equipes}
      onClose={()=>{setModalAg(null);setEditAg(null);}}
      onSaved={()=>{setModalAg(null);setEditAg(null);carregar();}}
    />}
  </div>;
}

// ── MODAL AGENDAMENTO ────────────────────────────────────
function ModalAgendamento({ag,defaultEquipe,defaultData,equipes,onClose,onSaved}){
  const isEdit=!!ag?.id;
  const[obras,setObras]=useState([]);
  const[funcionarios,setFuncionarios]=useState([]);
  const[f,setF]=useState({
    obra_id:ag?.obra_id||'',np:ag?.np||'',
    tipo_servico:ag?.tipo_servico||'montagem',
    data:ag?.data||defaultData||new Date().toISOString().slice(0,10),
    data_fim:ag?.data_fim||ag?.data||defaultData||new Date().toISOString().slice(0,10),
    hora_inicio:ag?.hora_inicio||'08:00',hora_fim:ag?.hora_fim||'17:00',
    equipe_id:ag?.equipe_id||defaultEquipe||'',
    funcionario_extra_id:ag?.funcionario_extra_id||'',
    status:ag?.status||'agendado',origem:ag?.origem||'manual',
    observacao:ag?.observacao||'',
  });
  const[saving,setSaving]=useState(false);const[erro,setErro]=useState('');

  useEffect(()=>{
    Promise.all([
      db.from('crane_obras').select('id,cliente,nome_obra').neq('status','encerrado').order('cliente'),
      db.from('crane_funcionarios').select('id,nome,especialidade').eq('ativo',true).order('nome'),
    ]).then(([{data:o},{data:fn}])=>{setObras(o||[]);setFuncionarios(fn||[]);});
  },[]);

  async function salvar(){
    if(!f.tipo_servico){setErro('Selecione o tipo de serviço');return;}
    if(!f.data){setErro('Informe a data de início');return;}
    if(!f.equipe_id){setErro('Selecione a equipe');return;}
    if(f.data_fim&&f.data_fim<f.data){setErro('Data fim não pode ser anterior à data início');return;}
    setSaving(true);setErro('');
    const payload={...f,equipe_id:f.equipe_id||null,funcionario_extra_id:f.funcionario_extra_id||null,obra_id:f.obra_id||null};
    if(isEdit){
      const{error}=await db.from('crane_agendamentos').update(payload).eq('id',ag.id);
      setSaving(false);
      if(error){setErro(error.message);return;}
      toast('Agendamento atualizado!');
    } else {
      // Insere agendamento
      const{data:novoAg,error}=await db.from('crane_agendamentos').insert(payload).select().single();
      if(error){setErro(error.message);setSaving(false);return;}
      // Gera OS Externa automaticamente
      const ts=TIPOS_SERVICO.find(t=>t.id===f.tipo_servico)||TIPOS_SERVICO[0];
      const obra=obras.find(o=>o.id===f.obra_id);
      const num=await nextNumOS();
      await db.from('crane_os_externas').insert({
        numero_os:num,
        obra_id:f.obra_id||null,
        np:f.np||null,
        tipo_servico:f.tipo_servico,
        titulo:ts.lb+(obra?' — '+(obra.nome_obra||obra.cliente):'')+(f.np?' — '+f.np:''),
        data_prevista:f.data,
        status:'agendada',
        origem:'agendamento',
        agendamento_id:novoAg.id,
        criado_em:new Date().toISOString(),
      });
      setSaving(false);
      toast('Agendamento criado e OS '+num+' gerada! ✅');
    }
    onSaved();
  }

  async function excluir(){
    if(!window.confirm('Excluir este agendamento?'))return;
    await db.from('crane_agendamentos').delete().eq('id',ag.id);
    toast('Agendamento excluído');onSaved();
  }

  const isFerIni=isFeriado(f.data);
  const isFerFim=f.data_fim&&isFeriado(f.data_fim);
  const durDias=f.data&&f.data_fim?Math.ceil((new Date(f.data_fim)-new Date(f.data))/(1000*60*60*24))+1:1;

  return <Modal title={isEdit?'Editar Agendamento':'Novo Agendamento'} onClose={onClose} lg
    footer={<>
      {isEdit&&<button className="btn btn-d" style={{marginRight:'auto'}} onClick={excluir}>🗑 Excluir</button>}
      <button className="btn btn-g" onClick={onClose}>Cancelar</button>
      <button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</button>
    </>}>
    {erro&&<div className="al al-e"><span>⚠</span><span>{erro}</span></div>}
    {(isFerIni||isFerFim)&&<div className="al" style={{background:'var(--red-lt)',border:'1px solid #FCA5A5',color:'var(--red)'}}><span>⚠</span><span>Uma ou mais datas coincidem com feriado em Ribeirão Preto.</span></div>}

    <div className="fr2">
      <div className="fg"><label className="fl">Tipo de Serviço <span className="req">*</span></label>
        <select value={f.tipo_servico} onChange={e=>setF(p=>({...p,tipo_servico:e.target.value}))}>
          {TIPOS_SERVICO.map(t=><option key={t.id} value={t.id}>{t.ic} {t.lb}</option>)}
        </select></div>
      <div className="fg"><label className="fl">Status</label>
        <select value={f.status} onChange={e=>setF(p=>({...p,status:e.target.value}))}>
          {Object.entries(STATUS_AG).map(([k,v])=><option key={k} value={k}>{v.lb}</option>)}
        </select></div>
    </div>
    <div className="fr2">
      <div className="fg"><label className="fl">Data Início <span className="req">*</span></label>
        <input type="date" value={f.data} onChange={e=>setF(p=>({...p,data:e.target.value,data_fim:p.data_fim<e.target.value?e.target.value:p.data_fim}))}/></div>
      <div className="fg"><label className="fl">Data Fim</label>
        <input type="date" value={f.data_fim} onChange={e=>setF(p=>({...p,data_fim:e.target.value}))} min={f.data}/>
        {durDias>1&&<div style={{fontSize:11,color:'var(--blue)',marginTop:3,fontWeight:600}}>{durDias} dias de serviço</div>}
      </div>
    </div>
    <div className="fr2">
      <div className="fg"><label className="fl">Hora Início</label>
        <input type="time" value={f.hora_inicio} onChange={e=>setF(p=>({...p,hora_inicio:e.target.value}))}/></div>
      <div className="fg"><label className="fl">Hora Fim</label>
        <input type="time" value={f.hora_fim} onChange={e=>setF(p=>({...p,hora_fim:e.target.value}))}/></div>
    </div>
    <div className="fg"><label className="fl">Obra</label>
      <select value={f.obra_id} onChange={e=>setF(p=>({...p,obra_id:e.target.value}))}>
        <option value="">— Sem obra —</option>
        {obras.map(o=><option key={o.id} value={o.id}>{o.nome_obra||o.cliente}</option>)}
      </select></div>
    <div className="fr2">
      <div className="fg"><label className="fl">Equipe <span className="req">*</span></label>
        <select value={f.equipe_id} onChange={e=>setF(p=>({...p,equipe_id:e.target.value}))}>
          <option value="">Selecione...</option>
          {equipes.map(e=><option key={e.id} value={e.id}>{e.nome}</option>)}
        </select></div>
      <div className="fg"><label className="fl">Funcionário Extra (opcional)</label>
        <select value={f.funcionario_extra_id} onChange={e=>setF(p=>({...p,funcionario_extra_id:e.target.value}))}>
          <option value="">— Nenhum —</option>
          {funcionarios.map(fn=><option key={fn.id} value={fn.id}>{fn.nome} — {fn.especialidade||''}</option>)}
        </select></div>
    </div>
    <div className="fg"><label className="fl">NP do Equipamento</label>
      <input value={f.np} onChange={e=>setF(p=>({...p,np:e.target.value}))} placeholder="Ex: 030.1200.087"/></div>
    <div className="fg"><label className="fl">Observação</label>
      <textarea value={f.observacao} onChange={e=>setF(p=>({...p,observacao:e.target.value}))} rows={2}/></div>
  </Modal>;
}

// ── AGENDAMENTOS (lista) ──────────────────────────────────
function AgendamentosView(){
  const[lista,setLista]=useState([]);const[loading,setLoading]=useState(true);
  const[filtroTipo,setFiltroTipo]=useState('');const[filtroStatus,setFiltroStatus]=useState('');
  const[busca,setBusca]=useState('');const[modal,setModal]=useState(null);
  const[equipes,setEquipes]=useState([]);

  async function carregar(){
    setLoading(true);
    const[{data:ag},{data:eq}]=await Promise.all([
      db.from('crane_agendamentos').select('*,crane_obras(cliente,nome_obra),crane_equipes(nome)').order('data').order('hora_inicio'),
      db.from('crane_equipes').select('*').eq('ativa',true).order('nome'),
    ]);
    setLista(ag||[]);setEquipes(eq||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  const filtrado=lista.filter(a=>{
    if(filtroTipo&&a.tipo_servico!==filtroTipo)return false;
    if(filtroStatus&&a.status!==filtroStatus)return false;
    if(busca){const b=busca.toLowerCase();if(!(a.crane_obras?.nome_obra||a.crane_obras?.cliente||'').toLowerCase().includes(b)&&!(a.np||'').toLowerCase().includes(b))return false;}
    return true;

  return <div>

      <div><h2 style={{fontSize:18,fontWeight:800,margin:0}}>Agendamentos</h2>
        <p style={{fontSize:12,color:'var(--g500)',marginTop:2}}>{filtrado.length} agendamentos</p></div>
      <button className="btn btn-p" onClick={()=>setModal({})}>+ Novo</button>
    </div>
    <div className="bar" style={{marginBottom:14}}>
      <div className="sw"><SI/><input placeholder="Buscar obra ou NP..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      <select style={{width:'auto'}} value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)}>
        <option value="">Todos os tipos</option>
        {TIPOS_SERVICO.map(t=><option key={t.id} value={t.id}>{t.ic} {t.lb}</option>)}
      </select>
      <select style={{width:'auto'}} value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)}>
        <option value="">Todos os status</option>
        {Object.entries(STATUS_AG).map(([k,v])=><option key={k} value={k}>{v.lb}</option>)}
      </select>
    </div>
    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :filtrado.length===0?<div className="emp"><div className="ei">📅</div><h3>Nenhum agendamento</h3></div>
    :<div className="card"><div className="tw"><table style={{fontSize:12}}>
      <thead><tr><th>Data</th><th>Tipo</th><th>Obra / NP</th><th>Equipe</th><th>Horário</th><th>Status</th><th></th></tr></thead>
      <tbody>{filtrado.map(a=>{
        const ts=TIPOS_SERVICO.find(t=>t.id===a.tipo_servico)||TIPOS_SERVICO[0];
        const st=STATUS_AG[a.status]||STATUS_AG.agendado;
        const fer=isFeriado(a.data);
        return <tr key={a.id} style={{borderBottom:'1px solid var(--g50)',background:a.status==='realizado'?'var(--g50)':''}}>
          <td style={{fontWeight:700,color:fer?'var(--red)':'var(--g900)'}}>{fmtD(a.data)}{fer&&<span style={{fontSize:9,color:'var(--red)',marginLeft:4}}>🚫</span>}</td>
          <td><span style={{fontSize:11,fontWeight:700,color:ts.cor}}>{ts.ic} {ts.lb}</span></td>
          <td><div style={{fontWeight:600}}>{a.crane_obras?.nome_obra||a.crane_obras?.cliente||'—'}</div><div style={{fontSize:10,color:'var(--g400)'}}>{a.np||''}</div></td>
          <td>{a.crane_equipes?.nome||'—'}</td>
          <td style={{fontFamily:'monospace',fontSize:11}}>{a.hora_inicio?.slice(0,5)||'—'}{a.hora_fim?' – '+a.hora_fim.slice(0,5):''}</td>
          <td><span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:10,background:st.bg,color:st.c}}>{st.lb}</span></td>
          <td><button className="btn btn-g" style={{padding:'3px 9px',fontSize:11}} onClick={()=>setModal(a)}>Editar</button></td>
        </tr>;
      })}</tbody>

    {modal!==null&&<ModalAgendamento ag={modal?.id?modal:null} defaultData={new Date().toISOString().slice(0,10)} equipes={equipes} onClose={()=>setModal(null)} onSaved={()=>{setModal(null);carregar();}}/>}
  </div>;
}

// ── EQUIPES ───────────────────────────────────────────────
function EquipesView(){
  const[equipes,setEquipes]=useState([]);const[loading,setLoading]=useState(true);
  const[funcionarios,setFuncionarios]=useState([]);
  const[modal,setModal]=useState(null);const[saving,setSaving]=useState(false);
  const[form,setForm]=useState({nome:'',ativa:true});
  const[membros,setMembros]=useState([]);

  async function carregar(){
    setLoading(true);
    const[{data:eq},{data:fn}]=await Promise.all([
      db.from('crane_equipes').select('*,crane_equipe_membros(id,funcionario_id,funcao,crane_funcionarios(nome,especialidade))').order('nome'),
      db.from('crane_funcionarios').select('id,nome,especialidade').eq('ativo',true).order('nome'),
    ]);
    setEquipes(eq||[]);setFuncionarios(fn||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  function abrirNova(){setForm({nome:'',ativa:true});setMembros([{funcionario_id:'',funcao:'Montador'}]);setModal('novo');}
  function abrirEditar(eq){
    setForm({nome:eq.nome,ativa:eq.ativa});
    setMembros((eq.crane_equipe_membros||[]).map(m=>({id:m.id,funcionario_id:m.funcionario_id,funcao:m.funcao})));
    setModal(eq);
  }

  async function salvar(){
    if(!form.nome.trim()){toast('Nome obrigatório','err');return;}
    setSaving(true);
    const isEdit=modal!=='novo';
    let eqId=isEdit?modal.id:null;
    if(isEdit){
      await db.from('crane_equipes').update({nome:form.nome,ativa:form.ativa}).eq('id',eqId);
    } else {
      const{data}=await db.from('crane_equipes').insert({nome:form.nome,ativa:form.ativa}).select().single();
      eqId=data.id;
    }
    // Atualiza membros
    await db.from('crane_equipe_membros').delete().eq('equipe_id',eqId);
    const rows=membros.filter(m=>m.funcionario_id).map(m=>({equipe_id:eqId,funcionario_id:m.funcionario_id,funcao:m.funcao}));
    if(rows.length)await db.from('crane_equipe_membros').insert(rows);
    setSaving(false);toast(isEdit?'Equipe atualizada!':'Equipe criada! ✅');
    setModal(null);carregar();
  }

  const FUNCOES_EQUIPE=['Encarregado','Montador','Mecânico','Eletricista','Líder'];

  return <div style={{maxWidth:760,margin:'0 auto'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <h2 style={{fontSize:18,fontWeight:800,margin:0}}>Equipes de Campo</h2>
      <button className="btn btn-p" onClick={abrirNova}>+ Nova Equipe</button>
    </div>
    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :equipes.length===0?<div className="emp"><div className="ei">👷</div><h3>Nenhuma equipe cadastrada</h3></div>
    :<div style={{display:'flex',flexDirection:'column',gap:10}}>
      {equipes.map(eq=>{
        const membros=eq.crane_equipe_membros||[];
        return <div key={eq.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:'16px 18px',boxShadow:'var(--shadow)',opacity:eq.ativa?1:.6}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:36,height:36,borderRadius:8,background:'var(--blue-lt)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>👷</div>
              <div><div style={{fontSize:15,fontWeight:800}}>{eq.nome}</div>
                <div style={{fontSize:11,color:'var(--g400)'}}>{membros.length} membro{membros.length!==1?'s':''} · {eq.ativa?'Ativa':'Inativa'}</div>
              </div>
            </div>
            <button className="btn btn-g" style={{padding:'5px 12px',fontSize:12}} onClick={()=>abrirEditar(eq)}>✏️ Editar</button>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {membros.map((m,i)=><div key={i} style={{fontSize:11,padding:'3px 10px',background:'var(--g50)',border:'1px solid var(--g200)',borderRadius:10,fontWeight:600}}>
              {m.crane_funcionarios?.nome||'—'} <span style={{color:'var(--g400)',fontWeight:400}}>— {m.funcao}</span>
            </div>)}
            {membros.length===0&&<span style={{fontSize:12,color:'var(--g400)',fontStyle:'italic'}}>Sem membros cadastrados</span>}
          </div>
        </div>;
      })}
    </div>}

    {modal!==null&&<Modal title={modal==='novo'?'Nova Equipe':'Editar Equipe'} onClose={()=>setModal(null)}
      footer={<><button className="btn btn-g" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</button></>}>
      <div className="fr2">
        <div className="fg"><label className="fl">Nome da Equipe <span className="req">*</span></label>
          <input value={form.nome} onChange={e=>setForm(p=>({...p,nome:e.target.value}))} placeholder="Ex: Equipe 1"/></div>
        <div className="fg" style={{display:'flex',alignItems:'center',gap:8,paddingTop:22}}>
          <input type="checkbox" id="eq-ativa" checked={form.ativa} onChange={e=>setForm(p=>({...p,ativa:e.target.checked}))}/>
          <label htmlFor="eq-ativa" style={{fontSize:14,cursor:'pointer'}}>Equipe Ativa</label>
        </div>
      </div>
      <div className="dv"/>
      <div style={{fontSize:12,fontWeight:800,color:'var(--g600)',marginBottom:10,textTransform:'uppercase',letterSpacing:.6}}>Membros</div>
      {membros.map((m,i)=><div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr auto',gap:8,marginBottom:8,alignItems:'center'}}>
        <select value={m.funcionario_id} onChange={e=>setMembros(p=>{const n=[...p];n[i]={...n[i],funcionario_id:e.target.value};return n;})}>
          <option value="">Selecione...</option>
          {funcionarios.map(fn=><option key={fn.id} value={fn.id}>{fn.nome}</option>)}
        </select>
        <select value={m.funcao} onChange={e=>setMembros(p=>{const n=[...p];n[i]={...n[i],funcao:e.target.value};return n;})}>
          {FUNCOES_EQUIPE.map(f=><option key={f}>{f}</option>)}
        </select>
        <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:18}} onClick={()=>setMembros(p=>p.filter((_,j)=>j!==i))}>✕</button>
      </div>)}
      <button className="btn btn-g" style={{fontSize:12,padding:'5px 12px'}} onClick={()=>setMembros(p=>[...p,{funcionario_id:'',funcao:'Montador'}])}>+ Adicionar Membro</button>
    </Modal>}
  </div>;
}

// ── DOCUMENTAÇÃO POR NP ───────────────────────────────────
function DocumentacaoView(){
  // Esta view usa a DocumentacaoView da aba OSs Externas (obra→NP)
  // Redireciona para o componente correto já definido acima
  return <DocumentacaoObraView/>;
}

function DocumentacaoObraView(){
  const[obras,setObras]=useState([]);const[selObra,setSelObra]=useState('');
  const[docs,setDocs]=useState([]);const[loading,setLoading]=useState(false);
  const[uploadingId,setUploadingId]=useState(null);

  useEffect(()=>{
    db.from('crane_obras').select('id,cliente,nome_obra,status').in('status',['reservado','encerrado']).order('cliente')
      .then(({data})=>setObras(data||[]));
  },[]);

  useEffect(()=>{
    if(!selObra){setDocs([]);return;}
    setLoading(true);
    db.from('crane_docs_np').select('*').eq('obra_id',selObra).order('np').order('ordem')
      .then(({data})=>{setDocs(data||[]);setLoading(false);});
  },[selObra]);

  const porNP=useMemo(()=>{
    const m={};docs.forEach(d=>{if(!m[d.np])m[d.np]=[];m[d.np].push(d);});return m;
  },[docs]);

  async function toggleEntregue(doc){
    const novoVal=!doc.entregue;
    const{data:updated}=await db.from('crane_docs_np').update({entregue:novoVal,data_entrega:novoVal?new Date().toISOString().slice(0,10):null}).eq('id',doc.id).select().single();
    setDocs(prev=>prev.map(d=>d.id===doc.id?{...d,...updated}:d));
    if(novoVal){
      const npDocs=docs.filter(d=>d.np===doc.np&&d.id!==doc.id);
      if(npDocs.every(d=>d.entregue))toast('🎉 Documentação do NP '+doc.np+' completa!');
    }
  }

  async function uploadArquivo(doc,file){
    if(!file)return;
    setUploadingId(doc.id);
    try{
      const ext=file.name.split('.').pop();
      const path=`docs/${selObra}/${doc.np}/${doc.id}.${ext}`;
      const{error:upErr}=await db.storage.from('crane-docs').upload(path,file,{upsert:true});
      if(upErr){toast('Erro no upload: '+upErr.message,'err');setUploadingId(null);return;}
      const{data:{publicUrl}}=db.storage.from('crane-docs').getPublicUrl(path);
      await db.from('crane_docs_np').update({arquivo_url:publicUrl,entregue:true,data_entrega:new Date().toISOString().slice(0,10)}).eq('id',doc.id);
      setDocs(prev=>prev.map(d=>d.id===doc.id?{...d,arquivo_url:publicUrl,entregue:true}:d));
      toast('Arquivo enviado! ✅');
    }catch(e){toast('Erro: '+e.message,'err');}
    setUploadingId(null);
  }

  const obraSel=obras.find(o=>o.id===selObra);
  const totalDocs=docs.length;
  const totalEnt=docs.filter(d=>d.entregue).length;
  const pctGeral=totalDocs>0?Math.round(totalEnt/totalDocs*100):0;

  return <div style={{maxWidth:900,margin:'0 auto'}}>
    <div style={{marginBottom:20}}>
      <h2 style={{fontSize:18,fontWeight:800,marginBottom:4}}>📁 Documentação por Obra</h2>
      <p style={{fontSize:13,color:'var(--g500)'}}>Selecione a obra → visualize os NPs → gerencie documentos de cada NP</p>
    </div>

    <div className="fg" style={{marginBottom:20}}>
      <label className="fl">Obra</label>
      <select value={selObra} onChange={e=>setSelObra(e.target.value)} style={{fontSize:14,padding:'10px 12px'}}>
        <option value="">— Selecione uma obra —</option>
        {obras.map(o=><option key={o.id} value={o.id}>{o.nome_obra||o.cliente}</option>)}
      </select>
    </div>

    {!selObra&&<div className="emp"><div className="ei">📁</div><h3>Selecione uma obra</h3><p>A documentação é criada automaticamente ao confirmar reserva</p></div>}
    {selObra&&loading&&<div style={{textAlign:'center',padding:32,color:'var(--g400)'}}>Carregando...</div>}

    {selObra&&!loading&&<div>
      {/* KPI obra */}
      <div style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:'16px 20px',marginBottom:20,boxShadow:'var(--shadow)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontSize:15,fontWeight:800}}>{obraSel?.nome_obra||obraSel?.cliente}</div>
            <div style={{fontSize:12,color:'var(--g500)',marginTop:2}}>{Object.keys(porNP).length} NP(s) · {totalDocs} documentos</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:28,fontWeight:800,color:pctGeral===100?'var(--green)':pctGeral>=60?'var(--amber)':'var(--red)'}}>{pctGeral}%</div>
            <div style={{fontSize:11,color:'var(--g500)'}}>{totalEnt}/{totalDocs} entregues</div>
          </div>
        </div>
        <div style={{height:8,background:'var(--g100)',borderRadius:4,overflow:'hidden'}}>
          <div style={{height:'100%',width:pctGeral+'%',background:pctGeral===100?'var(--green)':pctGeral>=60?'var(--amber)':'var(--red)',borderRadius:4,transition:'.3s'}}/>
        </div>
        {pctGeral===100&&<div style={{marginTop:8,fontSize:12,color:'var(--green)',fontWeight:700}}>🎉 Documentação completa!</div>}
      </div>

      {Object.keys(porNP).length===0&&<div className="emp"><div className="ei">📁</div><h3>Sem documentação cadastrada</h3><p>Gerada automaticamente ao confirmar reserva da obra</p></div>}

      {/* Por NP */}
      {Object.entries(porNP).map(([np,npDocs])=>{
        const ent=npDocs.filter(d=>d.entregue).length;
        const pct=npDocs.length>0?Math.round(ent/npDocs.length*100):0;
        return <div key={np} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',marginBottom:16,boxShadow:'var(--shadow)',overflow:'hidden'}}>
          <div style={{background:'var(--blue-dk)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontFamily:'monospace',fontWeight:800,color:'#fff',fontSize:14}}>{np}</span>
              <span style={{fontSize:11,color:'rgba(255,255,255,.5)'}}>{ent}/{npDocs.length} docs</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:80,height:6,background:'rgba(255,255,255,.2)',borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',width:pct+'%',background:pct===100?'#86EFAC':'#FDE68A',borderRadius:3,transition:'.3s'}}/>
              </div>
              <span style={{fontSize:12,fontWeight:800,color:pct===100?'#86EFAC':'#FDE68A'}}>{pct}%</span>
              {pct===100&&<span style={{fontSize:12}}>🎉</span>}
            </div>
          </div>
          <div style={{padding:'6px 0'}}>
            {npDocs.map((doc,i)=><div key={doc.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 16px',borderBottom:i<npDocs.length-1?'1px solid var(--g50)':'none',background:doc.entregue?'#F0FDF4':'var(--white)'}}>
              <input type="checkbox" checked={doc.entregue} onChange={()=>toggleEntregue(doc)} style={{width:16,height:16,cursor:'pointer',accentColor:'var(--green)',flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:doc.entregue?600:500,color:doc.entregue?'var(--green)':'var(--g700)'}}>{doc.nome_documento}</div>
                {doc.entregue&&doc.data_entrega&&<div style={{fontSize:10,color:'var(--g400)'}}>Entregue em {fmtD(doc.data_entrega)}</div>}
              </div>
              <div style={{display:'flex',gap:5,flexShrink:0,alignItems:'center'}}>
                {doc.arquivo_url
                  ?<><a href={doc.arquivo_url} target="_blank" rel="noreferrer" style={{fontSize:11,padding:'3px 8px',background:'var(--blue-lt)',color:'var(--blue)',border:'1px solid var(--blue)',borderRadius:'var(--r)',textDecoration:'none',fontWeight:700}}>⬇ Baixar</a>
                    <label style={{fontSize:11,padding:'3px 8px',background:'var(--g50)',color:'var(--g500)',border:'1px solid var(--g200)',borderRadius:'var(--r)',cursor:'pointer'}} title="Substituir arquivo">🔄<input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style={{display:'none'}} onChange={e=>uploadArquivo(doc,e.target.files[0])}/></label></>
                  :<label style={{fontSize:11,padding:'3px 8px',background:'var(--g50)',color:'var(--g600)',border:'1px solid var(--g200)',borderRadius:'var(--r)',cursor:'pointer',fontWeight:600}}>
                    {uploadingId===doc.id?'⏳ Enviando...':'📎 Upload'}
                    <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style={{display:'none'}} onChange={e=>uploadArquivo(doc,e.target.files[0])}/>
                  </label>}
                <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:8,background:doc.entregue?'var(--green-lt)':'var(--g100)',color:doc.entregue?'var(--green)':'var(--g400)',whiteSpace:'nowrap'}}>
                  {doc.entregue?'✅':'⏳'}
                </span>
              </div>
            </div>)}
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

// ── OPERADORES ────────────────────────────────────────────
function OperadoresView(){
  const[lista,setLista]=useState([]);const[loading,setLoading]=useState(true);
  const[obras,setObras]=useState([]);
  const[modal,setModal]=useState(null);const[saving,setSaving]=useState(false);
  const[form,setForm]=useState({nome:'',funcao:'Operador',obra_id:'',np:'',nr18_validade:'',nr35_validade:'',observacao:''});

  async function carregar(){
    setLoading(true);
    const[{data:op},{data:ob}]=await Promise.all([
      db.from('crane_operadores').select('*,crane_obras(cliente,nome_obra)').order('nome'),
      db.from('crane_obras').select('id,cliente,nome_obra').neq('status','encerrado').order('cliente'),
    ]);
    setLista(op||[]);setObras(ob||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  function abrirNovo(){setForm({nome:'',funcao:'Operador',obra_id:'',np:'',nr18_validade:'',nr35_validade:'',observacao:''});setModal('novo');}
  function abrirEditar(op){setForm({nome:op.nome,funcao:op.funcao||'Operador',obra_id:op.obra_id||'',np:op.np||'',nr18_validade:op.nr18_validade||'',nr35_validade:op.nr35_validade||'',observacao:op.observacao||''});setModal(op);}

  async function salvar(){
    if(!form.nome.trim()){toast('Nome obrigatório','err');return;}
    setSaving(true);
    const payload={...form,obra_id:form.obra_id||null};
    const isEdit=modal!=='novo';
    const{error}=isEdit
      ?await db.from('crane_operadores').update(payload).eq('id',modal.id)
      :await db.from('crane_operadores').insert(payload);
    setSaving(false);if(error){toast(error.message,'err');return;}
    toast(isEdit?'Operador atualizado!':'Operador cadastrado! ✅');
    setModal(null);carregar();
  }

  const hoje=new Date().toISOString().slice(0,10);
  function statusCert(val){
    if(!val)return{lb:'Não informado',c:'var(--g400)',bg:'var(--g100)'};
    const diff=Math.ceil((new Date(val)-new Date(hoje))/(1000*60*60*24));
    if(diff<0)return{lb:'Vencido',c:'var(--red)',bg:'var(--red-lt)'};
    if(diff<=30)return{lb:'Vence em '+diff+'d',c:'var(--amber)',bg:'var(--amber-lt)'};
    return{lb:'Válido',c:'var(--green)',bg:'var(--green-lt)'};
  }

  return <div style={{maxWidth:860,margin:'0 auto'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
      <div><h2 style={{fontSize:18,fontWeight:800,margin:0}}>Operadores</h2>
        <p style={{fontSize:12,color:'var(--g500)',marginTop:2}}>{lista.length} operador{lista.length!==1?'es':''} cadastrados</p></div>
      <button className="btn btn-p" onClick={abrirNovo}>+ Novo Operador</button>
    </div>
    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :lista.length===0?<div className="emp"><div className="ei">🪪</div><h3>Nenhum operador cadastrado</h3></div>
    :<div className="card"><div className="tw"><table style={{fontSize:12}}>
      <thead><tr><th>Nome</th><th>Função</th><th>Obra</th><th>NP</th><th>NR-18</th><th>NR-35</th><th></th></tr></thead>
      <tbody>{lista.map(op=>{
        const nr18=statusCert(op.nr18_validade);const nr35=statusCert(op.nr35_validade);
        return <tr key={op.id} style={{borderBottom:'1px solid var(--g50)'}}>
          <td style={{fontWeight:700}}>{op.nome}</td>
          <td style={{color:'var(--g600)'}}>{op.funcao}</td>
          <td>{op.crane_obras?.nome_obra||op.crane_obras?.cliente||'—'}</td>
          <td><span className="cod" style={{fontSize:10}}>{op.np||'—'}</span></td>
          <td><span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:8,background:nr18.bg,color:nr18.c}}>{nr18.lb}</span>{op.nr18_validade&&<div style={{fontSize:9,color:'var(--g400)',marginTop:1}}>{fmtD(op.nr18_validade)}</div>}</td>
          <td><span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:8,background:nr35.bg,color:nr35.c}}>{nr35.lb}</span>{op.nr35_validade&&<div style={{fontSize:9,color:'var(--g400)',marginTop:1}}>{fmtD(op.nr35_validade)}</div>}</td>
          <td><button className="btn btn-g" style={{padding:'3px 9px',fontSize:11}} onClick={()=>abrirEditar(op)}>Editar</button></td>
        </tr>;
      })}</tbody>
    </table></div></div>}

    {modal!==null&&<Modal title={modal==='novo'?'Novo Operador':'Editar Operador'} onClose={()=>setModal(null)}
      footer={<><button className="btn btn-g" onClick={()=>setModal(null)}>Cancelar</button><button className="btn btn-p" onClick={salvar} disabled={saving}>{saving?'Salvando...':'Salvar'}</button></>}>
      <div className="fr2">
        <div className="fg"><label className="fl">Nome <span className="req">*</span></label><input value={form.nome} onChange={e=>setForm(p=>({...p,nome:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Função</label>
          <select value={form.funcao} onChange={e=>setForm(p=>({...p,funcao:e.target.value}))}>
            {['Operador','Operador Sênior','Encarregado de Operação','Auxiliar'].map(f=><option key={f}>{f}</option>)}
          </select></div>
      </div>
      <div className="fr2">
        <div className="fg"><label className="fl">Obra</label>
          <select value={form.obra_id} onChange={e=>setForm(p=>({...p,obra_id:e.target.value}))}>
            <option value="">— Sem obra —</option>
            {obras.map(o=><option key={o.id} value={o.id}>{o.nome_obra||o.cliente}</option>)}
          </select></div>
        <div className="fg"><label className="fl">NP do Equipamento</label><input value={form.np} onChange={e=>setForm(p=>({...p,np:e.target.value}))} placeholder="Ex: 030.1200.087"/></div>
      </div>
      <div className="fr2">
        <div className="fg"><label className="fl">Validade NR-18</label><input type="date" value={form.nr18_validade} onChange={e=>setForm(p=>({...p,nr18_validade:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Validade NR-35</label><input type="date" value={form.nr35_validade} onChange={e=>setForm(p=>({...p,nr35_validade:e.target.value}))}/></div>
      </div>
      <div className="fg"><label className="fl">Observação</label><textarea value={form.observacao} onChange={e=>setForm(p=>({...p,observacao:e.target.value}))} rows={2}/></div>
    </Modal>}
  </div>;
}

// ── ALERTAS ───────────────────────────────────────────────
function AlertasView(){
  const[operadores,setOperadores]=useState([]);const[docs,setDocs]=useState([]);
  const[ags,setAgs]=useState([]);const[loading,setLoading]=useState(true);

  useEffect(()=>{
    const hoje=new Date().toISOString().slice(0,10);
    const d30=new Date();d30.setDate(d30.getDate()+30);
    const d30s=d30.toISOString().slice(0,10);
    Promise.all([
      db.from('crane_operadores').select('*,crane_obras(cliente,nome_obra)').or('nr18_validade.lte.'+d30s+',nr35_validade.lte.'+d30s),
      db.from('crane_docs_np').select('np,nome_documento').eq('entregue',false),
      db.from('crane_agendamentos').select('*,crane_obras(cliente,nome_obra),crane_equipes(nome)').gte('data',hoje).lte('data',d30s).eq('status','agendado').order('data'),
    ]).then(([{data:op},{data:dc},{data:ag}])=>{
      setOperadores(op||[]);setDocs(dc||[]);setAgs(ag||[]);setLoading(false);
    });
  },[]);

  const hoje=new Date().toISOString().slice(0,10);
  function certAlerts(op){
    const alerts=[];
    ['nr18_validade','nr35_validade'].forEach(campo=>{
      if(!op[campo])return;
      const diff=Math.ceil((new Date(op[campo])-new Date(hoje))/(1000*60*60*24));
      if(diff<=30)alerts.push({nr:campo==='nr18_validade'?'NR-18':'NR-35',val:op[campo],diff});
    });
    return alerts;
  }

  const certAlertas=operadores.flatMap(op=>certAlerts(op).map(a=>({...a,op})));
  const npComFalta=[...new Set(docs.map(d=>d.np))];

  return <div>
    <h2 style={{fontSize:18,fontWeight:800,marginBottom:16}}>🔔 Alertas e Pendências</h2>
    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>

      {/* Certificados vencendo */}
      <div className="card" style={{padding:16}}>
        <div style={{fontSize:13,fontWeight:800,color:'var(--amber)',marginBottom:12}}>⚠ Certificados Vencendo ({certAlertas.length})</div>
        {certAlertas.length===0?<div style={{fontSize:12,color:'var(--g400)',fontStyle:'italic'}}>Nenhum certificado vencendo nos próximos 30 dias ✅</div>
        :certAlertas.map((a,i)=><div key={i} style={{padding:'8px 10px',background:a.diff<0?'var(--red-lt)':'var(--amber-lt)',borderRadius:'var(--r)',marginBottom:6,fontSize:12}}>
          <div style={{fontWeight:700,color:a.diff<0?'var(--red)':'var(--amber)'}}>{a.op.nome} — {a.nr}</div>
          <div style={{color:'var(--g600)',marginTop:2}}>{a.op.crane_obras?.nome_obra||'—'} · {a.diff<0?'Venceu há '+Math.abs(a.diff)+' dias':'Vence em '+a.diff+' dias'} ({fmtD(a.val)})</div>
        </div>)}
      </div>

      {/* Documentação pendente */}
      <div className="card" style={{padding:16}}>
        <div style={{fontSize:13,fontWeight:800,color:'var(--blue)',marginBottom:12}}>📁 Documentação Pendente ({npComFalta.length} NPs)</div>
        {npComFalta.length===0?<div style={{fontSize:12,color:'var(--g400)',fontStyle:'italic'}}>Toda documentação entregue ✅</div>
        :npComFalta.map(np=>{
          const falta=docs.filter(d=>d.np===np);
          return <div key={np} style={{padding:'8px 10px',background:'var(--blue-lt)',borderRadius:'var(--r)',marginBottom:6,fontSize:12}}>
            <div style={{fontWeight:700,color:'var(--blue)'}}>{np}</div>
            <div style={{color:'var(--g600)',marginTop:2}}>{falta.length} documento{falta.length!==1?'s':''} pendente{falta.length!==1?'s':''}</div>
          </div>;
        })}
      </div>

      {/* Próximos agendamentos */}
      <div className="card" style={{padding:16,gridColumn:'1/-1'}}>
        <div style={{fontSize:13,fontWeight:800,color:'var(--g700)',marginBottom:12}}>📅 Próximos Agendamentos — 30 dias ({ags.length})</div>
        {ags.length===0?<div style={{fontSize:12,color:'var(--g400)',fontStyle:'italic'}}>Nenhum agendamento nos próximos 30 dias</div>
        :<div className="tw"><table style={{fontSize:12}}>
          <thead><tr><th>Data</th><th>Tipo</th><th>Obra</th><th>Equipe</th><th>Status</th></tr></thead>
          <tbody>{ags.map(a=>{
            const ts=TIPOS_SERVICO.find(t=>t.id===a.tipo_servico)||TIPOS_SERVICO[0];
            const fer=isFeriado(a.data);
            return <tr key={a.id} style={{borderBottom:'1px solid var(--g50)'}}>
              <td style={{fontWeight:700,color:fer?'var(--red)':'var(--g900)'}}>{fmtD(a.data)}{fer&&' 🚫'}</td>
              <td><span style={{fontSize:11,fontWeight:700,color:ts.cor}}>{ts.ic} {ts.lb}</span></td>
              <td>{a.crane_obras?.nome_obra||a.crane_obras?.cliente||a.np||'—'}</td>
              <td>{a.crane_equipes?.nome||'—'}</td>
              <td><span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:8,background:STATUS_AG[a.status]?.bg,color:STATUS_AG[a.status]?.c}}>{STATUS_AG[a.status]?.lb}</span></td>
            </tr>;
          })}</tbody>
        </table></div>}
      </div>
    </div>}
  </div>;
}

const MODS=[
  {id:'gestao',      lb:'Gestão Estruturas', ic:'⚙️', sub:'Oficina · Disponibilidade · Almoxarifado'},
  {id:'cabines',     lb:'Gestão de Cabines', ic:'🏗',  sub:'Cabines · Motoredutores · OS'},
  {id:'obras',       lb:'Gestão de Obras',   ic:'🏢', sub:'Romaneio · Reserva · Contrato · Saída'},
  {id:'servicos',    lb:'Serviços Externos', ic:'📅', sub:'Calendário · Equipes · Documentação · Operadores'},
  {id:'cadastro',    lb:'Cadastro',          ic:'📦', sub:'Equipamentos e estrutura'},
  {id:'relatorio-os',lb:'Relatório de OS',   ic:'📊', sub:'Serviços por OS · Gestor / PCM'},
];

function App(){
  const[session,setSession]=useState(null);const[usuario,setUsuario]=useState(null);const[checking,setChecking]=useState(true);const[modulo,setModulo]=useState('gestao');
  const[tecnico,setTecnico]=useState(()=>{
    // Restaura técnico do sessionStorage se existir
    try{const t=sessionStorage.getItem('crane_tecnico_data');return t?JSON.parse(t):null;}catch{return null;}
  });
  const[acessoGestor,setAcessoGestor]=useState(()=>sessionStorage.getItem('crane_gestor')==='1');

  useEffect(()=>{
    db.auth.getSession().then(({data})=>{
      if(data.session){setSession(data.session);db.from('usuarios').select('*').eq('id',data.session.user.id).single().then(({data:u})=>{setUsuario(u);setChecking(false);});}
      else setChecking(false);
    });
    const{data:{subscription}}=db.auth.onAuthStateChange((_,s)=>{if(!s){setSession(null);setUsuario(null);}});
    return()=>subscription.unsubscribe();
  },[]);

  // Técnico logado → mostra Portal Técnico ANTES de qualquer verificação de sessão
  if(tecnico)return <PortalTecnico funcionario={tecnico} onSair={()=>{setTecnico(null);sessionStorage.removeItem('crane_tecnico_data');sessionStorage.removeItem('crane_tecnico');}}/>;

  if(checking)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--blue-dk)'}}><div style={{color:'rgba(255,255,255,.5)',fontSize:14}}>Verificando sessão...</div></div>;

  // Sem sessão Supabase → tela de acesso CRANE
  if(!session){
    if(acessoGestor){
      return <Login onLogin={(user,u)=>{setSession({user});setUsuario(u);}} onVoltar={()=>{setAcessoGestor(false);sessionStorage.removeItem('crane_gestor');}}/>;
    }
    return <TelaAcesso
      onEntrarGestor={()=>{setAcessoGestor(true);sessionStorage.setItem('crane_gestor','1');}}
      onEntrarTecnico={func=>{
        setTecnico(func);
        sessionStorage.setItem('crane_tecnico',func.id);
        sessionStorage.setItem('crane_tecnico_data',JSON.stringify(func));
      }}/>;
  }

  const ini=(usuario?.nome||'U').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const mod=MODS.find(m=>m.id===modulo)||MODS[0];

  return <div id="root">
    <div className="sb">
      <div className="sb-logo">
        <div className="sb-mark">CR</div>
        <div><div className="sb-txt">CRANE</div><div className="sb-sub">Sistema</div></div>
      </div>
      <nav className="sb-nav">
        <div className="sb-sec">Módulos</div>
        {MODS.map(m=><button key={m.id} className={'sb-it'+(modulo===m.id?' ac':'')} onClick={()=>setModulo(m.id)}><span>{m.ic}</span>{m.lb}</button>)}
      </nav>
      <div className="sb-foot">
        <div className="sb-usr">
          <div className="sb-av">{ini}</div>
          <div style={{flex:1,minWidth:0}}><div className="sb-nm">{usuario?.nome||'Usuário'}</div><div className="sb-rl">{{ADMIN:'Administrador',OPERADOR:'Operador',LEITURA:'Leitura'}[usuario?.perfil]||'—'}</div></div>
          <button className="sb-out" title="Sair" onClick={async()=>{await db.auth.signOut();setSession(null);setUsuario(null);setAcessoGestor(false);sessionStorage.clear();}}>⇥</button>
        </div>
      </div>
    </div>
    <div id="main">
      <div className="topbar">
        <div><div className="topbar-t">{mod.lb}</div><div className="topbar-s">CRANE — {mod.sub}</div></div>
        <div style={{fontSize:12,color:'var(--g400)',fontFamily:'monospace'}}>{new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}</div>
      </div>
      <div className="pg">
        {modulo==='gestao'      &&<ModuloGestao/>}
        {modulo==='cabines'     &&<ModuloCabines/>}
        {modulo==='obras'       &&<ModuloObras/>}
        {modulo==='servicos'    &&<ModuloServicos/>}
        {modulo==='cadastro'    &&<ModuloCadastro/>}
        {modulo==='relatorio-os'&&<RelatorioOSView/>}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
