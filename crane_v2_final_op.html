    // Footer
    const np=doc.getNumberOfPages();
    for(let p=1;p<=np;p++){doc.setPage(p);doc.setFontSize(7);doc.setTextColor(140,149,168);doc.line(ml,284,mr,284);doc.text('CRANE — Gerado em '+new Date().toLocaleString('pt-BR'),ml,288);doc.text('Pág '+p+'/'+np,mr,288,{align:'right'});}
    doc.save('CRANE_OS_'+osData.np+'_'+new Date().toISOString().slice(0,10)+'.pdf');
    toast('PDF gerado!');
  }


  // ── FuncPicker: autocomplete de funcionários com filtro por cargo ──
  const CARGOS_LIDER=['Coordenador','Coordenadora','Líder de Manutenção','Líder','Lider','Gerente','Supervisor'];
  function FuncPicker({campo,label,valor,cargosPermitidos}){
    const[busca,setBusca]=useState(valor||'');
    const[aberto,setAberto]=useState(false);
    useEffect(()=>{setBusca(valor||'');},[valor]);
    const lista=useMemo(()=>{
      if(!busca||busca.length<1)return[];
      const q=busca.toLowerCase();
      let f=funcionarios.filter(x=>x.ativo!==false&&(x.nome||'').toLowerCase().includes(q));
      if(cargosPermitidos&&cargosPermitidos.length)
        f=f.filter(x=>cargosPermitidos.some(c=>(x.especialidade||x.funcao||'').toLowerCase().includes(c.toLowerCase())));
      return f.slice(0,8);
    },[busca,funcionarios,cargosPermitidos]);
    async function selecionar(nome){
      setBusca(nome);setAberto(false);
      setOsData(p=>({...p,[campo]:nome}));
      await db.from('crane_ordens_servico').update({[campo]:nome}).eq('id',os.id);
    }
    async function limpar(){
      setBusca('');setAberto(false);
      setOsData(p=>({...p,[campo]:''}));
      await db.from('crane_ordens_servico').update({[campo]:null}).eq('id',os.id);
    }
    const selecionado=valor&&valor.trim().length>0;
    return <div className="fg" style={{marginBottom:0,position:'relative'}}>
      <label className="fl">{label}</label>
      {selecionado
        ?<div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--green-lt)',borderRadius:'var(--r)',border:'1px solid #86EFAC'}}>
          <span style={{flex:1,fontSize:13,fontWeight:700,color:'var(--green)'}}>✍️ {valor}</span>
          <button onMouseDown={e=>{e.preventDefault();limpar();}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--g400)',fontSize:16,lineHeight:1}}>✕</button>
        </div>
        :<div>
          <input
            value={busca}
            onChange={e=>{setBusca(e.target.value);setAberto(true);}}
            onFocus={()=>setAberto(true)}
            onBlur={()=>setTimeout(()=>setAberto(false),200)}
            placeholder={cargosPermitidos?'Buscar '+cargosPermitidos.join(' / ')+'...':'Buscar funcionário...'}
          />
          {aberto&&lista.length>0&&<div className="sug-list" style={{zIndex:200}}>
            {lista.map(f=><div key={f.id} className="sug-item"
              onMouseDown={e=>{e.preventDefault();selecionar(f.nome);}}
              style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:600}}>{f.nome}</span>
              <span style={{fontSize:10,color:'var(--g400)',background:'var(--g50)',padding:'1px 6px',borderRadius:10}}>{f.especialidade||f.funcao||''}</span>
            </div>)}
          </div>}
          {aberto&&busca.length>1&&lista.length===0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',border:'1px solid var(--g200)',borderRadius:'var(--r)',padding:'8px 12px',fontSize:12,color:'var(--g400)',zIndex:200}}>
            {cargosPermitidos?'Nenhum funcionário com esse cargo encontrado':'Nenhum funcionário encontrado'}
          </div>}
        </div>}
    </div>;
  }

  if(loading)return <div style={{textAlign:'center',padding:60,color:'var(--g400)'}}>Carregando OS...</div>;

  const st=STATUS_OS[osData.status]||STATUS_OS.aberta;

  async function excluirOS(){
    if(!window.confirm('Excluir esta OS? Todos os registros, checklist e fotos serão removidos permanentemente.'))return;
    setSaving(true);
    // Remove fotos do storage
    if(fotos.length>0){
      await db.storage.from(BUCKET).remove(fotos.map(f=>f.arquivo_path).filter(Boolean));
    }
    await db.from('crane_ordens_servico').delete().eq('id',os.id);
    setSaving(false);
    toast('OS excluída');
    onBack();
  }

  return <div>
    {/* Header */}
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,flexWrap:'wrap'}}>
      <button className="btn btn-g" onClick={onBack}>← Voltar</button>
      <div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}><span className="cod" style={{fontSize:14}}>{osData.np}</span><span style={{fontSize:16,fontWeight:700}}>{osData.modelo}</span><span className={'bdg '+st.cls}>{st.lb}</span></div>
        <div style={{fontSize:12,color:'var(--g500)',marginTop:3}}>Retorno: {fmtD(osData.data_retorno)} · Obra: {osData.obra_origem||'—'} · Resp: {osData.responsavel_inspecao||'—'}</div>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:4}}>
          {osData.data_inspecao&&<span style={{fontSize:11,color:'var(--g400)'}}>🔍 Inspeção: <strong style={{color:'var(--g700)'}}>{fmtD(osData.data_inspecao)}</strong></span>}
          {osData.data_inicio_manutencao&&<span style={{fontSize:11,color:'var(--g400)'}}>▶ Manutenção: <strong style={{color:'var(--g700)'}}>{fmtD(osData.data_inicio_manutencao)}</strong></span>}
          {osData.data_fim_manutencao&&<span style={{fontSize:11,color:'var(--g400)'}}>⏹ Término: <strong style={{color:'var(--g700)'}}>{fmtD(osData.data_fim_manutencao)}</strong></span>}
          {osData.data_liberacao&&<span style={{fontSize:11,color:'var(--green)',fontWeight:700}}>✅ Liberado: {fmtD(osData.data_liberacao)}</span>}
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        {osData.status==='liberado'&&<button className="btn btn-ok" onClick={gerarPDF}>📄 Gerar PDF</button>}
        <button className="btn btn-d" style={{padding:'8px 12px'}} onClick={excluirOS} disabled={saving} title="Excluir OS">🗑 Excluir OS</button>
      </div>
    </div>

    <Stepper stage={osData.status==='liberado'?4:stage}/>

    {/* ── ETAPA 1: INSPEÇÃO ── */}
    {stage===0&&<div>
      {/* Tabs internas da inspeção */}
      <div style={{display:'flex',gap:0,marginBottom:16,border:'1px solid var(--g200)',borderRadius:'var(--rl)',overflow:'hidden',background:'var(--white)'}}>
        <button onClick={()=>setAbaInsp('checklist')} style={{flex:1,padding:'11px 0',border:'none',cursor:'pointer',fontFamily:'var(--font)',fontSize:13,fontWeight:700,background:abaInsp==='checklist'?'var(--blue)':'transparent',color:abaInsp==='checklist'?'#fff':'var(--g500)',transition:'.12s'}}>
          {(()=>{const tot=ckEntrada.length;const res=ckEntrada.filter(i=>i.resposta).length;const nc=ckEntrada.filter(i=>i.resposta==='nc').length;return '✅ Checklist de Entrada ('+(tot>0?res+'/'+tot:'0')+')' + (nc>0?' ⚠'+nc+' N/C':'');})()}
        </button>
        <button onClick={()=>setAbaInsp('pecas')} style={{flex:1,padding:'11px 0',border:'none',cursor:'pointer',fontFamily:'var(--font)',fontSize:13,fontWeight:700,background:abaInsp==='pecas'?'var(--blue)':'transparent',color:abaInsp==='pecas'?'#fff':'var(--g500)',borderLeft:'1px solid var(--g200)',transition:'.12s'}}>
          {(()=>{const tot=insItens.length;const compras=insItens.filter(i=>i.gerar_compra).length;return '🔩 Peças e Serviços'+(tot>0?' ('+tot+')':'')+(compras>0?' 📋'+compras:'');})()}
        </button>
      </div>

      {/* ABA: CHECKLIST DE ENTRADA */}
      {abaInsp==='checklist'&&<div>
        {ckEntrada.length===0
          ?<div className="al al-w"><span>⚠️</span><span>Checklist não encontrado. Feche e reabra esta OS para gerar automaticamente.</span></div>
          :<div>
            {/* KPIs rápidos */}
            {(()=>{
              const tot=ckEntrada.length;
              const res=ckEntrada.filter(i=>i.resposta).length;
              const nc=ckEntrada.filter(i=>i.resposta==='nc').length;
              const pctE=tot>0?Math.round(res/tot*100):0;
              return <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
                {[{lb:'Total',v:tot,c:'var(--g900)'},{lb:'Verificados',v:res,c:'var(--blue)'},{lb:'N/C',v:nc,c:nc>0?'var(--red)':'var(--g300)'},{lb:'Progresso',v:pctE+'%',c:pctE===100?'var(--green)':'var(--blue)'}].map(k=><div key={k.lb} className="kpi"><div className="kl">{k.lb}</div><div className="kv" style={{color:k.c,fontSize:20}}>{k.v}</div></div>)}
              </div>;
            })()}
            {/* Grupos elétrico / mecânico */}
            {['ELÉTRICO','MECÂNICO'].map(grupo=>{
              const secoes=CHECKLIST_ENTRADA.filter(s=>s.grupo===grupo);
              const itensGrupo=ckEntrada.filter(i=>i.grupo===grupo);
              const resGrupo=itensGrupo.filter(i=>i.resposta).length;
              const ncGrupo=itensGrupo.filter(i=>i.resposta==='nc').length;
              return <div key={grupo} style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 14px',background:'var(--blue-dk)',borderRadius:'var(--rl) var(--rl) 0 0',color:'#fff'}}>
                  <span style={{fontSize:13,fontWeight:800,letterSpacing:.5}}>{grupo==='ELÉTRICO'?'⚡':'🔧'} CHECK LIST {grupo}</span>
                  <span style={{fontSize:11,opacity:.8}}>{resGrupo}/{itensGrupo.length} verificados{ncGrupo>0?' · '+ncGrupo+' N/C':''}</span>
                </div>
                {secoes.map(sec=>{
                  const secItens=ckEntrada.filter(i=>i.grupo===grupo&&i.secao===sec.secao);
                  return <div key={sec.secao} className="ck-section" style={{borderRadius:0,marginBottom:0,borderTop:'none'}}>
                    <div className="ck-header" style={{background:'var(--g700)',fontSize:11}}><span>{sec.icone}</span>{sec.secao}</div>
                    {secItens.map(item=>{
                      const ncF=ncForms[item.id]||{tipo:'servico',busca:'',item_codigo:'',item_descricao:'',quantidade:1,unidade:'un',showSug:false};
                      const jaIncluido=insItens.some(i=>(i.observacao||'').includes(item.descricao.slice(0,30)));
                      return <div key={item.id} style={{borderBottom:'1px solid var(--g50)'}}>
                        <div className={'ck-item'+(item.resposta==='nc'?' nc':item.resposta==='ok'?' conf':'')} style={{borderBottom:'none'}}>
                          <div style={{display:'flex',alignItems:'flex-start',gap:6,minWidth:0}}>
                            <span className="ck-num">{item.numero_item}.</span>
                            <div style={{minWidth:0,flex:1}}>
                              <div style={{fontSize:12,lineHeight:1.4}}>{item.descricao}</div>
                              {item.resposta==='nc'&&jaIncluido&&<div style={{fontSize:11,color:'var(--green)',marginTop:4,fontWeight:600}}>✓ Serviço/peça já incluído na lista</div>}
                            </div>
                          </div>
                          <div className="ck-radios">
                            {[{v:'ok',l:'OK',c:'var(--green)'},{v:'nc',l:'N/C',c:'var(--red)'},{v:'na',l:'N/A',c:'var(--g400)'}].map(r=><label key={r.v} className="ck-radio">
                              <input type="radio" name={'cke_'+item.id} value={r.v} checked={item.resposta===r.v} onChange={()=>{setRespostaEntrada(item.id,r.v);if(r.v==='nc')setNcForms(prev=>({...prev,[item.id]:{tipo:'servico',busca:'',item_codigo:'',item_descricao:'',quantidade:1,unidade:'un',showSug:false,problema:'',servico_realizar:'',observacao_peca:''}}));else setNcForms(prev=>{const n={...prev};delete n[item.id];return n;});}}/>
                              <span style={{color:item.resposta===r.v?r.c:'var(--g400)'}}>{r.l}</span>
                            </label>)}
                          </div>
                        </div>
                        {item.resposta==='nc'&&!jaIncluido&&<div style={{margin:'0 10px 10px',padding:'12px',background:'#fff5f5',borderRadius:'var(--r)',border:'1px solid #fca5a5'}}>
                          <div style={{fontSize:11,fontWeight:700,color:'var(--red)',marginBottom:8,textTransform:'uppercase',letterSpacing:.4}}>⚠️ Apontar serviço ou troca de peça</div>
                          {/* Tipo selector */}
                          <div style={{display:'flex',gap:6,marginBottom:10}}>
                            {[{v:'servico',l:'🔧 Serviço'},{v:'peca',l:'🔩 Peça'}].map(t=><button key={t.v} onClick={()=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),tipo:t.v}}))} style={{padding:'5px 14px',borderRadius:'var(--r)',border:'1px solid '+(ncF.tipo===t.v?'var(--blue)':'var(--g200)'),background:ncF.tipo===t.v?'var(--blue)':'transparent',color:ncF.tipo===t.v?'#fff':'var(--g500)',fontFamily:'var(--font)',fontSize:12,fontWeight:700,cursor:'pointer'}}>{t.l}</button>)}
                          </div>
                          {/* Item verificado — pré-preenchido */}
                          <div className="fg" style={{marginBottom:8}}>
                            <label className="fl" style={{fontSize:10}}>Item verificado (checklist)</label>
                            <input value={item.descricao} readOnly style={{fontSize:11,padding:'5px 8px',background:'var(--g50)',color:'var(--g500)',cursor:'default'}}/>
                          </div>
                          {/* SERVIÇO */}
                          {ncF.tipo==='servico'&&<div>
                            <div className="fg" style={{marginBottom:8}}>
                              <label className="fl" style={{fontSize:10}}>Problema encontrado</label>
                              <input value={ncF.problema||''} style={{fontSize:12,padding:'6px 8px'}} onChange={e=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),problema:e.target.value}}))} placeholder="Descreva o problema identificado..."/>
                            </div>
                            <div className="fg" style={{marginBottom:0}}>
                              <label className="fl" style={{fontSize:10}}>Serviço a ser realizado <span className="req">*</span></label>
                              <input value={ncF.servico_realizar||''} style={{fontSize:12,padding:'6px 8px'}} onChange={e=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),servico_realizar:e.target.value}}))} placeholder="Ex: Substituição do cabo, regulagem das portas..."/>
                            </div>
                          </div>}
                          {/* PEÇA */}
                          {ncF.tipo==='peca'&&<div>
                            <div className="fg" style={{marginBottom:8}}>
                              <label className="fl" style={{fontSize:10}}>Problema encontrado</label>
                              <input value={ncF.problema||''} style={{fontSize:12,padding:'6px 8px'}} onChange={e=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),problema:e.target.value}}))} placeholder="Descreva o problema identificado..."/>
                            </div>
                            <div className="fg sug-wrap" style={{marginBottom:8,position:'relative'}}>
                              <label className="fl" style={{fontSize:10}}>Peça necessária — buscar no almoxarifado <span className="req">*</span></label>
                              <input value={ncF.busca||''} style={{fontSize:12,padding:'6px 8px'}}
                                onChange={e=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),busca:e.target.value,item_codigo:'',item_descricao:e.target.value,showSug:true}}))}
                                onFocus={()=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),showSug:true}}))}
                                onBlur={()=>setTimeout(()=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),showSug:false}})),150)}
                                placeholder="Código ou descrição da peça..."/>
                              {ncF.showSug&&(ncF.busca||'').length>=2&&(()=>{
                                const q=(ncF.busca||'').toLowerCase();
                                const sug=catalogoIns.filter(i=>(i.codigo||'').toLowerCase().includes(q)||(i.descricao||'').toLowerCase().includes(q)).slice(0,8);
                                if(!sug.length)return null;
                                return <div className="sug-list" style={{zIndex:70}}>
                                  {sug.map(i=>{const s=Number(i.saldo||0);return <div key={i.codigo} className="sug-item" onMouseDown={()=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),item_codigo:i.codigo,item_descricao:i.descricao||i.codigo,busca:i.codigo+' — '+(i.descricao||''),unidade:i.unidade||'un',showSug:false,gerar_compra:s===0}}))} style={{display:'flex',justifyContent:'space-between',gap:8}}>
                                    <div><span className="cod" style={{fontSize:10,marginRight:4}}>{i.codigo}</span><span style={{fontSize:11}}>{i.descricao}</span></div>
                                    <span style={{fontSize:10,fontWeight:700,padding:'1px 5px',borderRadius:8,background:s===0?'var(--red-lt)':s<3?'var(--amber-lt)':'var(--green-lt)',color:s===0?'var(--red)':s<3?'var(--amber)':'var(--green)'}}>{s} {i.unidade||'un'}</span>
                                  </div>;})}
                                </div>;
                              })()}
                            </div>
                            {ncF.item_codigo&&(()=>{const s=stockMap[(ncF.item_codigo||'').trim().toUpperCase()]||0;const ok=s>=(Number(ncF.quantidade)||1);return <div style={{fontSize:11,marginBottom:8,padding:'4px 8px',borderRadius:'var(--r)',background:ok?'var(--green-lt)':'var(--red-lt)',color:ok?'var(--green)':'var(--red)',fontWeight:700}}>{ok?'✅ Saldo: '+s+' '+(ncF.unidade||'un'):'⚠️ Sem saldo ('+s+') — será gerada requisição de compra'}</div>;})()} 
                            <div style={{display:'grid',gridTemplateColumns:'80px 1fr',gap:8,marginBottom:8}}>
                              <div className="fg" style={{marginBottom:0}}>
                                <label className="fl" style={{fontSize:10}}>Qtd</label>
                                <input type="number" min={1} value={ncF.quantidade||1} style={{fontSize:12,padding:'6px 8px'}} onChange={e=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),quantidade:e.target.value}}))}/>
                              </div>
                              <div className="fg" style={{marginBottom:0}}>
                                <label className="fl" style={{fontSize:10}}>Observações</label>
                                <input value={ncF.observacao_peca||''} style={{fontSize:12,padding:'6px 8px'}} onChange={e=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),observacao_peca:e.target.value}}))} placeholder="Ex: Verificar padrão, número de série..."/>
                              </div>
                            </div>
                            <div className="fg" style={{marginBottom:0}}>
                              <label className="fl" style={{fontSize:10}}>Serviço a ser realizado</label>
                              <input value={ncF.servico_realizar||''} style={{fontSize:12,padding:'6px 8px'}} onChange={e=>setNcForms(prev=>({...prev,[item.id]:{...(prev[item.id]||{}),servico_realizar:e.target.value}}))} placeholder="Ex: Substituição da peça, reparo..."/>
                            </div>
                          </div>}
                          <div style={{marginTop:10,display:'flex',justifyContent:'flex-end'}}>
                            <button className="btn btn-d" style={{padding:'7px 16px',fontSize:12}} onClick={()=>adicionarInsItemFromNC(item.id,item.descricao)}>+ Incluir na lista</button>
                          </div>
                        </div>}
                      </div>;
                    })}
                {/* Componentes instalados + pergunta manutenção + ORMEC */}
                {sec.secao==='MOTOREDUTORES E FREIOS'&&<div style={{background:'#EFF6FF',borderTop:'2px solid var(--blue-lt)'}}>
                  {/* ── Motoredutores instalados nesta cabine ── */}
                  {(()=>{
                    const insMotors=motorsDisp.filter(x=>x.np_atual===os.np);
                    const insFrei=freiosDisp.find(x=>x.np_atual===os.np);
                    if(insMotors.length===0&&!insFrei)return <div style={{padding:'10px 16px',fontSize:12,color:'var(--g400)',fontStyle:'italic'}}>Nenhum motoredutor ou freio instalado nesta cabine.</div>;
                    return <div>
                      {/* Motoredutores */}
                      {insMotors.length>0&&<div style={{padding:'10px 16px',borderBottom:'1px solid var(--blue-lt)'}}>
                        <div style={{fontSize:12,fontWeight:700,color:'var(--blue-dk)',marginBottom:8}}>⚙️ Motoredutores instalados na cabine</div>
                        {insMotors.map(m=><div key={m.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:'8px 0',borderBottom:'1px solid var(--blue-lt)',flexWrap:'wrap'}}>
                          <div>
                            <span className="cod" style={{fontSize:11,marginRight:6}}>{m.tag}</span>
                            <span style={{fontSize:12,color:'var(--g700)'}}>{m.modelo||''}</span>
                            <span className="bdg" style={{marginLeft:8,background:m.status==='manutencao'?'var(--amber-lt)':'var(--green-lt)',color:m.status==='manutencao'?'var(--amber)':'var(--green)',fontSize:10}}>
                              {m.status==='manutencao'?'🔧 Manutenção':'✅ Instalado'}
                            </span>
                          </div>
                          {m.status!=='manutencao'&&<div style={{display:'flex',gap:6,alignItems:'center'}}>
                            <span style={{fontSize:11,color:'var(--g500)'}}>Mudar para manutenção?</span>
                            <button className="btn btn-ok" style={{padding:'4px 12px',fontSize:11}} onClick={async()=>{
                              await db.from('crane_componentes_motoredutores').update({status:'manutencao'}).eq('id',m.id);
                              toast('Motoredutor '+m.tag+' → Manutenção 🔧');carregar();
                            }}>Sim</button>
                            <button className="btn btn-g" style={{padding:'4px 12px',fontSize:11}}>Não</button>
                          </div>}
                          {m.status==='manutencao'&&<span className="bdg" style={{background:'var(--amber-lt)',color:'var(--amber)'}}>🔧 Em manutenção</span>}
                        </div>)}
                      </div>}
                      {/* Freio */}
                      {insFrei&&<div style={{padding:'10px 16px'}}>
                        <div style={{fontSize:12,fontWeight:700,color:'var(--blue-dk)',marginBottom:8}}>🛑 Freio centrífugo instalado na cabine</div>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,flexWrap:'wrap'}}>
                          <div>
                            <span className="cod" style={{fontSize:11,marginRight:6}}>{insFrei.tag}</span>
                            <span style={{fontSize:12,color:'var(--g700)'}}>{insFrei.modelo||''}</span>
                            <span className="bdg" style={{marginLeft:8,background:insFrei.status==='manutencao'?'var(--amber-lt)':'var(--green-lt)',color:insFrei.status==='manutencao'?'var(--amber)':'var(--green)',fontSize:10}}>
                              {insFrei.status==='manutencao'?'🔧 Manutenção':'✅ Instalado'}
                            </span>
                          </div>
                          {insFrei.status!=='manutencao'&&<div style={{display:'flex',gap:6,alignItems:'center'}}>
                            <span style={{fontSize:11,color:'var(--g500)'}}>Mudar para manutenção?</span>
                            <button className="btn btn-ok" style={{padding:'4px 12px',fontSize:11}} onClick={async()=>{
                              await db.from('crane_componentes_freios').update({status:'manutencao'}).eq('id',insFrei.id);
                              toast('Freio '+insFrei.tag+' → Manutenção 🔧');carregar();
                            }}>Sim</button>
                            <button className="btn btn-g" style={{padding:'4px 12px',fontSize:11}}>Não</button>
                          </div>}
                          {insFrei.status==='manutencao'&&<span className="bdg" style={{background:'var(--amber-lt)',color:'var(--amber)'}}>🔧 Em manutenção</span>}
                        </div>
                      </div>}
                    </div>;
                  })()}
                </div>}
                  </div>;
                })}
                <div style={{borderRadius:'0 0 var(--rl) var(--rl)',overflow:'hidden',border:'1px solid var(--g100)',borderTop:'none'}}/>
              </div>;
            })}
          </div>
        }
        <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
          <button className="btn btn-p" onClick={()=>setAbaInsp('pecas')}>Próximo → Peças e Serviços</button>
        </div>
      </div>}

      {/* Observação geral + Responsável pelo check de entrada */}
      <div className="stage-box">
        <div style={{fontSize:13,fontWeight:800,marginBottom:14,color:'var(--g700)'}}>📝 Encerramento da Inspeção</div>
        <div className="fg">
          <label className="fl">Observação geral da inspeção</label>
          <textarea rows={3} value={osData.obs_inspecao||''} onChange={e=>setOsData(p=>({...p,obs_inspecao:e.target.value}))} onBlur={async e=>await db.from('crane_ordens_servico').update({obs_inspecao:e.target.value}).eq('id',os.id)} placeholder="Observações gerais sobre o estado do equipamento na entrada..." style={{resize:'vertical'}}/>
        </div>
        <div style={{marginTop:12}}>
          <FuncPicker campo="resp_check_entrada" label="✍️ Responsável pelo check de entrada" valor={osData.resp_check_entrada||''} cargosPermitidos={CARGOS_LIDER}/>
        </div>
        <div style={{marginTop:12,display:'flex',justifyContent:'flex-end'}}>
          <button className="btn btn-ok" style={{padding:'10px 22px',fontSize:14}} onClick={concluirInspecao} disabled={saving||insItens.length===0}>
            {saving?'Finalizando...':'🏁 Finalizar Inspeção'}
          </button>
        </div>
      </div>

      {/* ABA: PEÇAS E SERVIÇOS */}
      {abaInsp==='pecas'&&<div>
        {/* Formulário de adição */}
        <div className="stage-box">
          <div style={{fontSize:14,fontWeight:800,marginBottom:16,display:'flex',alignItems:'center',gap:8}}>🔍 Apontamento de Peças e Serviços</div>
          <div style={{display:'grid',gridTemplateColumns:'120px 1fr 80px auto',gap:8,alignItems:'end',marginBottom:10}}>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Tipo</label>
              <select value={novoIns.tipo} onChange={e=>setNovoIns(p=>({...p,tipo:e.target.value,item_codigo:'',item_descricao:''}))}>
                <option value="peca">🔩 Peça</option>
                <option value="servico">🔧 Serviço</option>
              </select>
            </div>
            <div className="fg sug-wrap" style={{marginBottom:0,position:'relative'}}>
              <label className="fl">{novoIns.tipo==='peca'?'Buscar peça no almoxarifado':'Descrição do serviço'}</label>
              <input value={buscaIns} onChange={e=>{setBuscaIns(e.target.value);setNovoIns(p=>({...p,item_descricao:e.target.value,item_codigo:''}));setShowSugIns(true);}} onFocus={()=>setShowSugIns(true)} onBlur={()=>setTimeout(()=>setShowSugIns(false),150)} placeholder={novoIns.tipo==='peca'?'Digite código ou descrição...':'Ex: Substituição do cabo de aço...'}/>
              {showSugIns&&sugestoesIns.length>0&&<div className="sug-list">
                {sugestoesIns.map(i=>{
                  const saldo=Number(i.saldo||0);
                  return <div key={i.codigo+i.descricao} className="sug-item" onMouseDown={()=>selecionarItemIns(i)} style={{display:'flex',alignItems:'center',gap:8,justifyContent:'space-between'}}>
                    <div style={{minWidth:0,flex:1}}><span className="cod" style={{fontSize:10,marginRight:6}}>{i.codigo}</span><span style={{fontSize:12}}>{i.descricao}</span></div>
                    <span style={{fontSize:11,fontWeight:700,flexShrink:0,padding:'1px 7px',borderRadius:10,background:saldo===0?'var(--red-lt)':saldo<3?'var(--amber-lt)':'var(--green-lt)',color:saldo===0?'var(--red)':saldo<3?'var(--amber)':'var(--green)'}}>{saldo} {i.unidade||'un'}</span>
                  </div>;
                })}
              </div>}
            </div>
            <div className="fg" style={{marginBottom:0}}>
              <label className="fl">Qtd</label>
              <input type="number" min={1} value={novoIns.quantidade} onChange={e=>setNovoIns(p=>({...p,quantidade:e.target.value}))}/>
            </div>
            <div style={{paddingBottom:2}}>
              <button className="btn btn-p" style={{padding:'9px 16px',whiteSpace:'nowrap'}} onClick={adicionarInsItem}>+ Adicionar</button>
            </div>
          </div>
          {novoIns.tipo==='peca'&&novoIns.item_codigo&&(()=>{
            const saldo=stockMap[novoIns.item_codigo.trim().toUpperCase()]||0;
            const ok=saldo>=(Number(novoIns.quantidade)||1);
            return <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:12,padding:'7px 12px',borderRadius:'var(--r)',marginBottom:8,background:ok?'var(--green-lt)':'var(--red-lt)',color:ok?'var(--green)':'var(--red)',fontWeight:700}}>
              <span>{ok?'✅ Saldo disponível: '+saldo+' '+(novoIns.unidade||'un'):'⚠️ Saldo insuficiente — disponível: '+saldo+' '+(novoIns.unidade||'un')}</span>
              {!ok&&<label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontWeight:600,color:'var(--amber)'}}>
                <input type="checkbox" checked={novoIns.gerar_compra} onChange={e=>setNovoIns(p=>({...p,gerar_compra:e.target.checked}))} style={{width:'auto'}}/>
                Gerar requisição de compra
              </label>}
            </div>;
          })()}
          {novoIns.tipo==='peca'&&catalogoIns.length===0&&<div className="al al-w" style={{marginBottom:0}}><span>⚠️</span><span>Nenhum snapshot importado. Acesse a aba Almoxarifado para importar uma planilha.</span></div>}
          <div className="fg" style={{marginBottom:0,marginTop:8}}>
            <label className="fl">Observação</label>
            <input value={novoIns.observacao||''} onChange={e=>setNovoIns(p=>({...p,observacao:e.target.value}))} placeholder="Observação livre sobre esta peça ou serviço..."/>
          </div>
        </div>

        {/* Lista de itens apontados */}
        <div className="stage-box">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:800}}>📋 Itens Apontados</div>
            <div style={{display:'flex',gap:10,fontSize:12}}>
              <span style={{color:'var(--blue)',fontWeight:700}}>{insItens.filter(i=>i.tipo==='peca').length} peça(s)</span>
              <span style={{color:'var(--purple)',fontWeight:700}}>{insItens.filter(i=>i.tipo==='servico').length} serviço(s)</span>
              {insItens.some(i=>i.gerar_compra)&&<span style={{color:'var(--amber)',fontWeight:700}}>{insItens.filter(i=>i.gerar_compra).length} p/ compra</span>}
            </div>
          </div>
          {insItens.length===0
            ?<div style={{textAlign:'center',padding:'20px 0',color:'var(--g400)',fontSize:13}}>Nenhum item apontado ainda.</div>
            :<div>
              {/* ── PEÇAS ── */}
              {insItens.filter(i=>i.tipo==='peca').length>0&&<div style={{marginBottom:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',textTransform:'uppercase',letterSpacing:.5}}>🔩 Peças ({insItens.filter(i=>i.tipo==='peca').length})</div>
                  {insItens.some(i=>i.tipo==='peca'&&i.gerar_compra)&&
                    <span className="bdg" style={{background:'var(--amber-lt)',color:'var(--amber)',border:'1px solid #FCD34D'}}>
                      📋 {insItens.filter(i=>i.tipo==='peca'&&i.gerar_compra).length} peça(s) p/ compra
                    </span>}
                </div>
                {insItens.filter(i=>i.tipo==='peca').map(i=>{
                  const obsPartes=(i.observacao||'').split(' | ');
                  const itemVerificado=obsPartes.find(p=>p.startsWith('Item verificado:'))?.replace('Item verificado:','').trim()||'';
                  const problema=obsPartes.find(p=>p.startsWith('Problema:'))?.replace('Problema:','').trim()||'';
                  const obsExtra=obsPartes.filter(p=>!p.startsWith('Item verificado:')&&!p.startsWith('Problema:')&&!p.startsWith('Serviço:')).join(' | ');
                  return <div key={i.id} style={{padding:'12px 14px',marginBottom:6,borderRadius:'var(--r)',border:'1px solid '+(i.gerar_compra?'#FCD34D':'var(--g200)'),background:i.gerar_compra?'#FFFBEB':'var(--white)',boxShadow:'var(--shadow)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        {i.item_codigo&&<span className="cod" style={{fontSize:11}}>{i.item_codigo}</span>}
                        <span style={{fontSize:13,fontWeight:700,color:'var(--g900)'}}>{i.item_descricao||i.descricao}</span>
                      </div>
                      <button onClick={()=>removerInsItem(i.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--g300)',fontSize:16,padding:'2px 6px',flexShrink:0}}>✕</button>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'4px 10px',fontSize:12}}>
                      {itemVerificado&&<><span style={{color:'var(--g400)',fontWeight:600,whiteSpace:'nowrap'}}>Item verificado:</span><span style={{color:'var(--g700)'}}>{itemVerificado}</span></>}
                      {problema&&<><span style={{color:'var(--red)',fontWeight:600,whiteSpace:'nowrap'}}>Problema:</span><span style={{color:'var(--g700)',fontWeight:500}}>{problema}</span></>}
                      {(()=>{const srv=obsPartes.find(p=>p.startsWith('Serviço:'))?.replace('Serviço:','').trim()||'';return srv?<><span style={{color:'var(--purple)',fontWeight:700,whiteSpace:'nowrap'}}>Serviço a realizar:</span><span style={{color:'var(--g900)',fontWeight:700}}>{srv}</span></>:null;})()}
                      <span style={{color:'var(--g400)',fontWeight:600,whiteSpace:'nowrap'}}>Quantidade:</span><span style={{color:'var(--g700)'}}>{i.quantidade||1} {i.unidade||'un'}</span>
                      {obsExtra&&<><span style={{color:'var(--g400)',fontWeight:600,whiteSpace:'nowrap'}}>Observação:</span><span style={{color:'var(--g700)'}}>{obsExtra}</span></>}
                    </div>
                    <div style={{display:'flex',gap:6,marginTop:8}}>
                      {i.tem_estoque===true&&<span className="bdg" style={{background:'var(--green-lt)',color:'var(--green)'}}>✓ Em estoque</span>}
                      {i.tem_estoque===false&&<span className="bdg" style={{background:'var(--red-lt)',color:'var(--red)'}}>Sem estoque</span>}
                      {i.gerar_compra&&<span className="bdg" style={{background:'var(--amber-lt)',color:'var(--amber)'}}>📋 Compra necessária</span>}
                    </div>
                  </div>;
                })}
              </div>}
              {/* ── SERVIÇOS ── */}
              {insItens.filter(i=>i.tipo==='servico').length>0&&<div>
                <div style={{fontSize:11,fontWeight:700,color:'var(--purple)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>🔧 Serviços ({insItens.filter(i=>i.tipo==='servico').length})</div>
                {insItens.filter(i=>i.tipo==='servico').map(i=>{
                  const partes=(i.item_descricao||i.descricao||'').split(' | ');
                  const getVal=(prefix)=>partes.find(p=>p.startsWith(prefix))?.replace(prefix,'').trim()||'';
                  const itemCk=getVal('Item:');
                  const problema=getVal('Problema:');
                  const servico=getVal('Serviço:');
                  const isEstruturado=partes.some(p=>p.startsWith('Item:')||p.startsWith('Serviço:'));
                  return <div key={i.id} style={{padding:'12px 14px',marginBottom:6,borderRadius:'var(--r)',border:'1px solid var(--g200)',background:'var(--white)',boxShadow:'var(--shadow)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1,minWidth:0}}>
                        {isEstruturado
                          ?<div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'4px 10px',fontSize:12}}>
                            {itemCk&&<><span style={{color:'var(--g400)',fontWeight:600,whiteSpace:'nowrap'}}>Item verificado:</span><span style={{color:'var(--g700)'}}>{itemCk}</span></>}
                            {problema&&<><span style={{color:'var(--red)',fontWeight:600,whiteSpace:'nowrap'}}>Problema:</span><span style={{color:'var(--g700)',fontWeight:500}}>{problema}</span></>}
                            {servico&&<><span style={{color:'var(--purple)',fontWeight:700,whiteSpace:'nowrap'}}>Serviço a realizar:</span><span style={{color:'var(--g900)',fontWeight:700,fontSize:13}}>{servico}</span></>}
                          </div>
                          :<div>
                            <span style={{fontSize:13,color:'var(--g900)'}}>{i.item_descricao||i.descricao}</span>
                            {i.observacao&&<div style={{fontSize:12,color:'var(--g500)',marginTop:4}}>{i.observacao}</div>}
                          </div>
                        }
                        {isEstruturado&&i.observacao&&<div style={{fontSize:12,color:'var(--g500)',marginTop:6,gridColumn:'1/-1'}}><span style={{fontWeight:600,color:'var(--g400)'}}>Obs: </span>{i.observacao}</div>}
                      </div>
                      <button onClick={()=>removerInsItem(i.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--g300)',fontSize:16,padding:'2px 6px',flexShrink:0}}>✕</button>
                    </div>
                  </div>;
                })}
              </div>}
            </div>
          }
          <div style={{borderTop:insItens.length>0?'1px solid var(--g100)':'none',marginTop:insItens.length>0?14:0,paddingTop:insItens.length>0?12:0,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
            <span style={{fontSize:12,color:'var(--g400)'}}>
              {insItens.length===0?'Adicione ao menos 1 item para finalizar.':
               insItens.some(i=>i.gerar_compra)?'⚠️ Itens aguardando compra — OS ficará em espera.':
               '✅ Todos os itens com saldo disponível.'}
            </span>
            <button className="btn btn-ok" style={{padding:'10px 22px',fontSize:14}} onClick={concluirInspecao} disabled={saving||insItens.length===0}>
              {saving?'Finalizando...':'🏁 Finalizar Inspeção'}
            </button>
          </div>
        </div>
      </div>}
    </div>}

    {/* ── ETAPA 2: MANUTENÇÃO ── */}
    {stage===1&&<div>
      {/* Navegação rápida */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,padding:'8px 12px',background:'var(--g50)',borderRadius:'var(--r)',border:'1px solid var(--g100)'}}>
        <button onClick={voltarParaAberta} style={{background:'none',border:'none',cursor:'pointer',color:'var(--blue)',fontSize:13,fontWeight:700,padding:0,display:'flex',alignItems:'center',gap:4}}>
          ← Voltar ao Check de Entrada
        </button>
        <span style={{color:'var(--g300)'}}>|</span>
        <span style={{fontSize:12,color:'var(--g500)'}}>Os itens apontados na inspeção serão mantidos</span>
      </div>
      {/* Responsável pela Supervisão */}
      <div className="stage-box">
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>👔 Responsável pela Supervisão</div>
        <div style={{fontSize:12,color:'var(--g500)',marginBottom:14}}>Apenas Líder de Manutenção ou Coordenador podem supervisionar.</div>
        <FuncPicker campo="responsavel_manutencao" label="Responsável pela Supervisão *" valor={osData.responsavel_manutencao||''} cargosPermitidos={CARGOS_LIDER}/>
        {osData.data_inicio_manutencao&&<div style={{marginTop:10,display:'flex',gap:16,flexWrap:'wrap'}}>
          <div style={{fontSize:12,color:'var(--g500)'}}>▶ Início: <strong style={{color:'var(--g900)'}}>{fmtD(osData.data_inicio_manutencao)}</strong></div>
          {osData.data_fim_manutencao&&<div style={{fontSize:12,color:'var(--g500)'}}>⏹ Término: <strong style={{color:'var(--g900)'}}>{fmtD(osData.data_fim_manutencao)}</strong></div>}
        </div>}
        {!osData.data_inicio_manutencao&&<button className="btn btn-p" style={{marginTop:12}} onClick={iniciarManutencao} disabled={saving||!osData.responsavel_manutencao}>{saving?'Aguarde...':'▶ Iniciar Manutenção'}</button>}
        {osData.data_inicio_manutencao&&!osData.data_fim_manutencao&&<div style={{marginTop:10,padding:'6px 12px',background:'var(--green-lt)',border:'1px solid #86EFAC',borderRadius:'var(--r)',fontSize:12,color:'var(--green)',fontWeight:700}}>✅ Manutenção em andamento</div>}
      </div>

      {/* Componentes instalados na cabine — visível na manutenção */}
      {(()=>{
        const insMotors=motorsDisp.filter(x=>x.np_atual===os.np);
        const insFrei=freiosDisp.find(x=>x.np_atual===os.np);
        if(insMotors.length===0&&!insFrei)return null;
        return <div className="stage-box" style={{marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:800,marginBottom:12,color:'var(--g700)'}}>🔗 Componentes Atrelados à Cabine {os.np}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {insMotors.map(m=><div key={m.id} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:20,border:'1px solid var(--g200)',background:m.status==='manutencao'?'var(--amber-lt)':'var(--green-lt)'}}>
              <span style={{fontSize:13}}>⚙️</span>
              <span className="cod" style={{fontSize:11}}>{m.tag}</span>
              {m.modelo&&<span style={{fontSize:11,color:'var(--g600)'}}>{m.modelo}</span>}
              <span style={{fontSize:10,fontWeight:700,color:m.status==='manutencao'?'var(--amber)':'var(--green)'}}>{m.status==='manutencao'?'Manutenção':'Instalado'}</span>
            </div>)}
            {insFrei&&<div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:20,border:'1px solid var(--g200)',background:insFrei.status==='manutencao'?'var(--amber-lt)':'#FFF5F5'}}>
              <span style={{fontSize:13}}>🛑</span>
              <span className="cod" style={{fontSize:11}}>{insFrei.tag}</span>
              {insFrei.modelo&&<span style={{fontSize:11,color:'var(--g600)'}}>{insFrei.modelo}</span>}
              <span style={{fontSize:10,fontWeight:700,color:insFrei.status==='manutencao'?'var(--amber)':'var(--green)'}}>{insFrei.status==='manutencao'?'Manutenção':'Instalado'}</span>
            </div>}
          </div>
        </div>;
      })()}

      {/* Confirmação item a item da inspeção */}
      {insItens.length>0&&<div className="stage-box">
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>✅ Confirmação dos Itens da Inspeção</div>
        <div style={{fontSize:12,color:'var(--g500)',marginBottom:14}}>Para cada peça ou serviço apontado na inspeção, confirme se foi executado, informe o técnico responsável e adicione observações.</div>

        {/* Peças */}
        {insItens.filter(i=>i.tipo==='peca').length>0&&<div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--blue)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>🔩 Peças</div>
          {insItens.filter(i=>i.tipo==='peca').map(ins=>{
            const reg=ins.id?manRegs.find(r=>r.inspecao_item_id&&r.inspecao_item_id===ins.id):null;
            const confirmado=!!reg;
            const mf=manForms[ins.id]||{funcionario_id:'',servico_realizado:'',observacao:'',hora_inicio:'',hora_fim:''};
            const obsPartes=(ins.observacao||'').split(' | ');
            const itemVerif=obsPartes.find(p=>p.startsWith('Item verificado:'))?.replace('Item verificado:','').trim()||'';
            const problema=obsPartes.find(p=>p.startsWith('Problema:'))?.replace('Problema:','').trim()||'';
            return <div key={ins.id} style={{border:'1px solid '+(confirmado?'#86EFAC':'var(--g200)'),borderRadius:'var(--r)',padding:'12px 14px',marginBottom:8,background:confirmado?'#f0fdf4':'var(--white)',transition:'.2s'}}>
              {/* Header */}
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:4}}>
                    {ins.item_codigo&&<span className="cod" style={{fontSize:10}}>{ins.item_codigo}</span>}
                    <span style={{fontSize:13,fontWeight:700}}>{ins.item_descricao||ins.descricao}</span>
                    <span style={{fontSize:12,color:'var(--g400)'}}>Qtd: {ins.quantidade||1} {ins.unidade||'un'}</span>
                  </div>
                  {itemVerif&&<div style={{fontSize:11,color:'var(--g500)'}}>Item verificado: {itemVerif}</div>}
                  {problema&&<div style={{fontSize:11,color:'var(--red)',fontWeight:600}}>Problema: {problema}</div>}
                </div>
                <span className="bdg" style={{background:confirmado?'var(--green-lt)':'var(--amber-lt)',color:confirmado?'var(--green)':'var(--amber)',flexShrink:0}}>{confirmado?'✓ Concluído':'⏳ Pendente'}</span>
              </div>
              {!confirmado&&<div>

        <div className="fr2" style={{marginBottom:12}}>

          <div className="fg" style={{marginBottom:0}}><label className="fl">Arquivo</label>

          </div>)}

      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        <button className="btn btn-ok" style={{padding:'10px 20px'}} onClick={async()=>{

        }} disabled={saving}>✓ Concluir Checklist → Liberação</button>
        <button className="btn btn-g" onClick={voltarParaInspecao}>← Voltar à Inspeção</button>

    </div>}

    {/* ── ETAPA 3→4: LIBERAÇÃO (stage 3 no modelo = liberação) ── */}

        {/* Responsável pelo check */}

        <span>✅</span>

          <strong>Equipamento liberado para locação</strong>

function PainelORMEC(){
  const[lista,setLista]=useState([]);const[loading,setLoading]=useState(true);
  const[filtro,setFiltro]=useState('');const[busca,setBusca]=useState('');

  const PIPELINE=[
    {key:'embalagem',lb:'Embalagem',ic:'📦',c:'var(--g400)',bg:'var(--g100)'},
    {key:'enviado',  lb:'Enviado',  ic:'🚚',c:'var(--blue)', bg:'var(--blue-lt)'},
    {key:'retorno',  lb:'Retorno',  ic:'🔄',c:'var(--amber)',bg:'var(--amber-lt)'},
    {key:'confirmado',lb:'Confirmado',ic:'✅',c:'var(--green)',bg:'var(--green-lt)'},
  ];

  async function carregar(){
    setLoading(true);
    const{data}=await db.from('crane_ormec_envios').select('*').order('criado_em',{ascending:false});
    setLista(data||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  async function avancarStatus(item){
    const ordem=['embalagem','enviado','retorno','confirmado'];
    const idx=ordem.indexOf(item.status);
    if(idx>=ordem.length-1)return;
    const novoStatus=ordem[idx+1];
    const hoje=new Date().toISOString().slice(0,10);
    const update={status:novoStatus};
    if(novoStatus==='embalagem')update.data_embalagem=hoje;
    if(novoStatus==='enviado'){update.data_envio=hoje;
      // Marca componente como indisponível (na_matriz)
      if(item.componente_id){
        const tab=item.tipo==='motoredutor'?'crane_componentes_motoredutores':'crane_componentes_freios';
        await db.from(tab).update({status:'na_matriz'}).eq('id',item.componente_id);
      }
    }
    if(novoStatus==='retorno')update.data_retorno=hoje;
    if(novoStatus==='confirmado'){update.data_confirmacao=hoje;
      // Marca componente como disponível
      if(item.componente_id){
        const tab=item.tipo==='motoredutor'?'crane_componentes_motoredutores':'crane_componentes_freios';
        await db.from(tab).update({status:'disponivel',np_atual:null}).eq('id',item.componente_id);
      }
      toast('✅ '+item.componente_tag+' confirmado — disponível no estoque!');
    }
    await db.from('crane_ormec_envios').update(update).eq('id',item.id);
    carregar();
  }

  async function voltarStatus(item){
    const ordem=['embalagem','enviado','retorno','confirmado'];
    const idx=ordem.indexOf(item.status);
    if(idx<=0)return;
    if(!window.confirm('Retornar status anterior?'))return;
    await db.from('crane_ormec_envios').update({status:ordem[idx-1]}).eq('id',item.id);
    carregar();
  }

  async function excluir(item){
    if(!window.confirm('Excluir esta tarefa ORMEC?'))return;
    await db.from('crane_ormec_envios').delete().eq('id',item.id);
    toast('Excluído');carregar();
  }

  const filtrados=lista.filter(i=>{
    if(filtro&&i.status!==filtro)return false;
    if(busca&&!(i.np||'').toLowerCase().includes(busca.toLowerCase())&&!(i.componente_tag||'').toLowerCase().includes(busca.toLowerCase()))return false;
    return true;
  });

  const kpis=PIPELINE.map(p=>({...p,n:lista.filter(i=>i.status===p.key).length}));

  function fmtD2(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR')}catch{return d}}

  return <div>
    <div style={{marginBottom:20}}>
      <h2 style={{fontSize:20,fontWeight:800,marginBottom:2}}>Gestão ORMEC — Motoredutores e Freios</h2>
      <p style={{fontSize:13,color:'var(--g500)'}}>Controle de envios à matriz para manutenção · Embalagem → Envio → Retorno → Confirmação</p>
    </div>

    {/* KPIs pipeline */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:20}}>
      {kpis.map(k=><div key={k.key} className="kpi" style={{cursor:'pointer',border:'2px solid '+(filtro===k.key?k.c:'var(--g100)'),transition:'.12s'}} onClick={()=>setFiltro(filtro===k.key?'':k.key)}>
        <div style={{fontSize:18,marginBottom:4}}>{k.ic}</div>
        <div className="kl">{k.lb}</div>
        <div className="kv" style={{color:k.c}}>{k.n}</div>
      </div>)}
    </div>

    <div className="bar">
      <div className="sw"><SI/><input placeholder="Buscar NP ou TAG..." value={busca} onChange={e=>setBusca(e.target.value)}/></div>
      {filtro&&<button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={()=>setFiltro('')}>✕ Limpar filtro</button>}
      <span style={{fontSize:12,color:'var(--g400)',marginLeft:'auto'}}>{filtrados.length} registros</span>
    </div>

    {loading?<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>
    :filtrados.length===0?<div className="emp"><div className="ei">🏭</div><h3>Nenhum envio cadastrado</h3><p>Os envios são gerados automaticamente pelo checklist da OS</p></div>
    :<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {filtrados.map(item=>{
        const pipe=PIPELINE.find(p=>p.key===item.status)||PIPELINE[0];
        const pipeIdx=PIPELINE.findIndex(p=>p.key===item.status);
        const prox=PIPELINE[pipeIdx+1];
        return <div key={item.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:'var(--rl)',padding:'16px 18px',boxShadow:'var(--shadow)'}}>
          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12,flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <span className="cod">{item.np||'—'}</span>
                <span className="bdg" style={{background:item.tipo==='motoredutor'?'var(--blue-lt)':'#FFF5F5',color:item.tipo==='motoredutor'?'var(--blue)':'var(--red)'}}>{item.tipo==='motoredutor'?'⚙️ Motoredutor':'🛑 Freio'}</span>
                {item.componente_tag&&<span className="cod" style={{background:'var(--purple-lt)',color:'var(--purple)'}}>{item.componente_tag}</span>}
              </div>
              <div style={{fontSize:12,color:'var(--g500)'}}>Criado em {fmtD2(item.data_criacao)}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{padding:'4px 12px',borderRadius:20,fontSize:12,fontWeight:700,background:pipe.bg,color:pipe.c}}>{pipe.ic} {pipe.lb}</span>
            </div>
          </div>

          {/* Pipeline visual */}
          <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:14,background:'var(--g50)',borderRadius:'var(--r)',padding:'8px 12px',overflow:'hidden'}}>
            {PIPELINE.map((p,i)=>{
              const done=i<=pipeIdx;
              const active=i===pipeIdx;
              return <React.Fragment key={p.key}>
                {i>0&&<div style={{flex:1,height:2,background:i<=pipeIdx?'var(--green)':'var(--g200)',margin:'0 4px'}}/>}
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,minWidth:60}}>
                  <div style={{width:24,height:24,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,background:active?'var(--blue)':done?'var(--green)':'var(--g200)',color:done||active?'#fff':'var(--g400)',fontWeight:800}}>{done&&!active?'✓':i+1}</div>
                  <div style={{fontSize:9,fontWeight:700,color:active?'var(--blue)':done?'var(--green)':'var(--g400)',textAlign:'center',whiteSpace:'nowrap'}}>{p.lb}</div>
                  {done&&item['data_'+p.key]&&<div style={{fontSize:9,color:'var(--g400)'}}>{fmtD2(item['data_'+p.key])}</div>}
                </div>
              </React.Fragment>;
            })}
          </div>

          {/* Ações */}
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            {prox&&<button className="btn btn-p" style={{padding:'7px 16px',fontSize:12}} onClick={()=>avancarStatus(item)}>→ {prox.ic} {prox.lb}</button>}
            {item.status==='confirmado'&&<span className="bdg" style={{background:'var(--green-lt)',color:'var(--green)',padding:'7px 14px',fontSize:12}}>✅ Disponível no estoque</span>}
            {pipeIdx>0&&<button className="btn btn-g" style={{padding:'7px 12px',fontSize:12}} onClick={()=>voltarStatus(item)}>← Voltar</button>}
            {item.observacao&&<span style={{fontSize:12,color:'var(--g500)',flex:1}}>{item.observacao}</span>}
            <button className="btn btn-d" style={{padding:'5px 10px',fontSize:11,marginLeft:'auto'}} onClick={()=>excluir(item)}>✕</button>
          </div>
        </div>;
      })}
    </div>}
  </div>;
}

// APP
// ════════════════════════════════════════
// ════════════════════════════════════════
// CONFIGURAÇÃO DE ACESSO
// ════════════════════════════════════════
const PERFIS_LIDER=['Líder de Manutenção','Coordenador'];

// ════════════════════════════════════════
// TELA SELEÇÃO DE ACESSO
// ════════════════════════════════════════
function TelaAcesso({onEntrarGestor,onEntrarTecnico}){
  const[modo,setModo]=useState(null); // null | 'gestor' | 'tecnico'
  const[senha,setSenha]=useState('');const[erro,setErro]=useState('');
  const[funcionarios,setFuncionarios]=useState([]);const[selFunc,setSelFunc]=useState('');const[pin,setPin]=useState('');const[loading,setLoading]=useState(false);

  const[loadingF,setLoadingF]=useState(false);

  useEffect(()=>{
    if(modo==='tecnico'){
      setLoadingF(true);
      setFuncionarios([]);
      setErro('');
      db.from('crane_funcionarios').select('id,nome,especialidade,funcao').eq('ativo',true).order('nome')
        .then(({data:base,error:be})=>{
          if(be){
            setErro('Erro ao carregar: '+be.message+'. Abra o arquivo via servidor HTTP (não file://).');
            setLoadingF(false);return;
          }
          if(!base||base.length===0){
            setErro('Nenhum funcionário ativo encontrado no banco.');
            setLoadingF(false);return;
          }
          // Tenta buscar pin separadamente
          db.from('crane_funcionarios').select('id,pin').then(({data:pins})=>{
            const pinMap={};(pins||[]).forEach(p=>{if(p.pin)pinMap[p.id]=p.pin;});
            setFuncionarios(base.map(f=>({...f,pin:pinMap[f.id]||null})));
            setLoadingF(false);
          });
        });
    }
  },[modo]);

  function entrarGestor(){onEntrarGestor();}

  async function entrarTecnico(){
    if(!selFunc){setErro('Selecione seu nome');return;}
    const func=funcionarios.find(f=>f.id===selFunc);
    if(!func?.pin){setErro('PIN não cadastrado. Peça ao gestor para cadastrar seu PIN em Cadastro → Funcionários.');return;}
    if(pin!==func.pin){setErro('PIN incorreto. Tente novamente.');return;}
    setErro('');
    onEntrarTecnico(func);
  }

  return <div style={{minHeight:'100vh',background:'var(--blue-dk)',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{width:'100%',maxWidth:400}}>
      {/* Logo */}
      <div style={{textAlign:'center',marginBottom:36}}>
        <div style={{width:56,height:56,borderRadius:14,background:'var(--orange)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:'#fff',margin:'0 auto 12px'}}>CR</div>
        <div style={{fontSize:26,fontWeight:800,color:'#fff'}}>CRANE</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:3}}>Gestão de Elevadores Cremalheira e Mini Gruas</div>
      </div>

      {!modo&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
        <button onClick={()=>{setModo('gestor');setErro('');setSenha('');}} style={{padding:'18px 24px',borderRadius:12,border:'none',background:'var(--blue-mid)',color:'#fff',fontFamily:'var(--font)',fontSize:15,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:12,transition:'.15s'}}

              :<div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:200,overflowY:'auto'}}>
                {funcionarios.map(f=><button key={f.id} onClick={()=>setSelFunc(f.id)}
                  style={{padding:'10px 14px',borderRadius:8,border:'2px solid '+(selFunc===f.id?'var(--orange)':'rgba(255,255,255,.15)'),
                    background:selFunc===f.id?'rgba(255,117,0,.2)':'rgba(255,255,255,.06)',
                    color:'#fff',fontFamily:'var(--font)',fontSize:14,fontWeight:selFunc===f.id?700:500,
                    cursor:'pointer',textAlign:'left',transition:'.12s'}}>
                  {f.nome}
                  <span style={{fontSize:11,opacity:.6,marginLeft:8}}>{f.especialidade||f.funcao||''}</span>
                  {!f.pin&&<span style={{fontSize:10,marginLeft:6,opacity:.5}}>(sem PIN)</span>}
                </button>)}
              </div>}
          </div>
          {selFunc&&<div style={{marginBottom:20}}>
            <label style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,.5)',textTransform:'uppercase',letterSpacing:.8,display:'block',marginBottom:6}}>PIN</label>
            <input type="password" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,'').slice(0,4))} onKeyDown={e=>e.key==='Enter'&&entrarTecnico()} placeholder="••••"
              style={{padding:14,fontSize:28,letterSpacing:12,textAlign:'center',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',borderRadius:8,color:'#fff',width:'100%',fontFamily:'monospace'}} autoFocus/>
          </div>}
          <button onClick={entrarTecnico} disabled={loading||!selFunc} style={{width:'100%',padding:14,background:selFunc?'var(--orange)':'rgba(255,255,255,.1)',border:'none',borderRadius:8,color:'#fff',fontFamily:'var(--font)',fontSize:15,fontWeight:800,cursor:selFunc?'pointer':'default',opacity:selFunc?1:.5}}>Entrar</button>
        </>}
      </div>}
    </div>
  </div>;
}

// PORTAL TÉCNICO
// ════════════════════════════════════════
function PortalTecnico({funcionario,onSair}){
  const[aba,setAba]=useState('os');
  const[osList,setOsList]=useState([]);const[osSelId,setOsSelId]=useState(null);const[loading,setLoading]=useState(true);
  const[catalogo,setCatalogo]=useState([]);const[historico,setHistorico]=useState([]);
  const isLider=PERFIS_LIDER.includes(funcionario.especialidade||funcionario.funcao||'');

  async function carregar(){
    setLoading(true);
    const[{data:os},{data:cat},{data:hist}]=await Promise.all([
      db.from('crane_ordens_servico').select('id,np,modelo,status,data_retorno,obra_origem,responsavel_inspecao').neq('status','liberado').order('criado_em',{ascending:false}),
      db.from('itens_estrutura').select('codigo,descricao,peso_kg,tipo_equipamento').eq('ativo',true),
      db.from('crane_oficina').select('*').eq('funcionario_id',funcionario.id).order('criado_em',{ascending:false}).limit(100),
    ]);
    setOsList(os||[]);setCatalogo(cat||[]);setHistorico(hist||[]);setLoading(false);
  }
  useEffect(()=>{carregar();},[]);

  const osSel=osList.find(o=>o.id===osSelId);

  const esp=funcionario.especialidade||funcionario.funcao||'';
  const ini=(funcionario.nome||'T').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

  return <div style={{minHeight:'100vh',background:'var(--g50)',fontFamily:'var(--font)'}}>
    {/* Topbar mobile */}
    <div style={{background:'var(--blue-dk)',padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:'0 2px 8px rgba(0,0,0,.3)'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:34,height:34,borderRadius:8,background:'var(--orange)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#fff'}}>{ini}</div>
        <div><div style={{fontSize:14,fontWeight:800,color:'#fff'}}>{funcionario.nome}</div><div style={{fontSize:11,color:'rgba(255,255,255,.5)'}}>{esp}</div></div>
      </div>
      <button onClick={onSair} style={{background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',borderRadius:8,color:'rgba(255,255,255,.7)',padding:'7px 14px',cursor:'pointer',fontFamily:'var(--font)',fontSize:13}}>Sair</button>
    </div>

    {/* Tabs */}
    <div style={{background:'var(--white)',borderBottom:'1px solid var(--g100)',display:'flex',padding:'0 16px'}}>
      {[{id:'os',lb:'🔧 OS Abertas'},{id:'historico',lb:'📋 Meu Histórico'}].map(t=><button key={t.id} onClick={()=>{setAba(t.id);setOsSelId(null);}} style={{padding:'13px 18px',border:'none',background:'none',borderBottom:'2px solid '+(aba===t.id?'var(--blue)':'transparent'),color:aba===t.id?'var(--blue)':'var(--g500)',fontFamily:'var(--font)',fontSize:13,fontWeight:700,cursor:'pointer',marginBottom:-1}}>{t.lb}</button>)}
    </div>

    <div style={{padding:'16px 16px 80px'}}>
      {loading&&<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>Carregando...</div>}

      {/* OS Abertas */}
      {!loading&&aba==='os'&&!osSel&&<div>
        <div style={{fontSize:12,color:'var(--g500)',marginBottom:12,fontWeight:600}}>{osList.length} ordens em aberto</div>
        {osList.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}>
          <div style={{fontSize:32,marginBottom:8}}>✅</div><div style={{fontWeight:700}}>Nenhuma OS em aberto</div>
        </div>}
        {osList.map(os=><div key={os.id} onClick={()=>setOsSelId(os.id)} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:10,padding:'14px 16px',marginBottom:10,cursor:'pointer',boxShadow:'var(--shadow)',transition:'.12s',borderLeft:'4px solid var(--blue)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
            <span style={{fontFamily:'monospace',fontWeight:800,color:'var(--blue)',fontSize:15}}>{os.np}</span>
            <span style={{fontSize:11,background:'var(--amber-lt)',color:'var(--amber)',padding:'2px 8px',borderRadius:12,fontWeight:700}}>{os.status==='aberta'?'Aberta':os.status==='em_manutencao'?'Em Manutenção':os.status}</span>
          </div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--g700)',marginBottom:3}}>{os.modelo}</div>
          {os.obra_origem&&<div style={{fontSize:12,color:'var(--g400)'}}>📍 {os.obra_origem}</div>}
          {os.data_retorno&&<div style={{fontSize:12,color:'var(--g400)'}}>📅 Retorno: {fmtD(os.data_retorno)}</div>}
          <div style={{marginTop:8,fontSize:12,color:'var(--blue)',fontWeight:700}}>Toque para lançar serviço →</div>
        </div>)}
      </div>}

      {/* Detalhe OS + Lançamento */}
      {!loading&&aba==='os'&&osSel&&<LancamentoTecnico os={osSel} funcionario={funcionario} catalogo={catalogo} isLider={isLider} onVoltar={()=>setOsSelId(null)} onSalvo={()=>{carregar();setOsSelId(null);}} />}

      {/* Histórico */}
      {!loading&&aba==='historico'&&<div>
        <div style={{fontSize:12,color:'var(--g500)',marginBottom:12,fontWeight:600}}>{historico.length} lançamentos registrados</div>
        {historico.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--g400)'}}><div style={{fontSize:32,marginBottom:8}}>📋</div><div style={{fontWeight:700}}>Nenhum lançamento ainda</div></div>}
        {historico.map(l=><div key={l.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:10,padding:'12px 14px',marginBottom:8,boxShadow:'var(--shadow)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:700,color:'var(--g900)'}}>{l.servico}</span>
            <span style={{fontSize:11,color:'var(--g400)'}}>{fmtD(l.data)}</span>
          </div>
          <div style={{fontSize:12,color:'var(--g500)'}}>{l.item_nome||'—'}</div>
          {l.hora_inicio&&l.hora_fim&&<div style={{fontSize:11,color:'var(--blue)',marginTop:3}}>⏱ {l.hora_inicio} – {l.hora_fim} · {calcMin(l.hora_inicio,l.hora_fim)}min</div>}
        </div>)}
      </div>}
    </div>
  </div>;
}

// ── LANÇAMENTO TÉCNICO (dentro de uma OS) ────────────────
function LancamentoTecnico({os,funcionario,catalogo,isLider,onVoltar,onSalvo}){
  const[salvando,setSalvando]=useState(false);const[erro,setErro]=useState('');const[sucesso,setSucesso]=useState('');
  const[lancamentos,setLancamentos]=useState([]);const[loadingL,setLoadingL]=useState(true);
  const servicosDisp=ESP[funcionario.especialidade||funcionario.funcao||'']||TSRV;
  const hoje=new Date().toISOString().split('T')[0];
  const[form,setForm]=useState({servico:'',hora_inicio:'',hora_fim:'',quantidade:1,item_code:'',item_nome:'',observacao:''});
  const[buscaItem,setBuscaItem]=useState('');const[itemSel,setItemSel]=useState(null);const[showIL,setShowIL]=useState(false);

  const itensF=useMemo(()=>{
    if(!buscaItem.trim())return[];
    const q=buscaItem.toLowerCase();
    return catalogo.filter(i=>(i.codigo||'').toLowerCase().includes(q)||(i.descricao||'').toLowerCase().includes(q)).slice(0,8);
  },[buscaItem,catalogo]);

  async function carregarLanc(){
    setLoadingL(true);
    const{data}=await db.from('crane_oficina').select('*').eq('os_id',os.id).order('criado_em',{ascending:false});
    setLancamentos(data||[]);setLoadingL(false);
  }
  useEffect(()=>{carregarLanc();},[]);

  async function salvar(){
    if(!form.servico){setErro('Selecione o serviço');return;}
    if(!form.hora_inicio||!form.hora_fim){setErro('Informe hora início e fim');return;}
    if(form.hora_fim<=form.hora_inicio){setErro('Hora fim deve ser maior que hora início');return;}
    setSalvando(true);setErro('');
    const{error}=await db.from('crane_oficina').insert({
      data:hoje,funcionario_id:funcionario.id,funcionario_nome:funcionario.nome,
      tipo:os.modelo?.includes('MG')?'minigrua':'elevador',
      os_id:os.id,os_np:os.np,
      item_code:itemSel?.codigo||null,item_nome:itemSel?.descricao||form.item_nome||null,
      servico:form.servico,hora_inicio:form.hora_inicio,hora_fim:form.hora_fim,
      quantidade:Number(form.quantidade)||1,observacao_tecnico:form.observacao||null,
      tipo_lancamento:'producao',
    });
    setSalvando(false);
    if(error){setErro(error.message);return;}
    setSucesso('Serviço registrado! ✅');setTimeout(()=>setSucesso(''),3000);
    setForm({servico:'',hora_inicio:'',hora_fim:'',quantidade:1,item_code:'',item_nome:'',observacao:''});
    setItemSel(null);setBuscaItem('');
    carregarLanc();
  }

  return <div>
    <button onClick={onVoltar} style={{background:'none',border:'none',color:'var(--blue)',fontFamily:'var(--font)',fontSize:13,fontWeight:700,cursor:'pointer',padding:'4px 0',marginBottom:14}}>← Voltar às OS</button>
    <div style={{background:'var(--blue-dk)',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
      <div style={{fontSize:16,fontWeight:800,color:'#fff'}}>{os.np} <span style={{opacity:.6,fontWeight:400,fontSize:13}}>— {os.modelo}</span></div>
      {os.obra_origem&&<div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginTop:3}}>📍 {os.obra_origem}</div>}
    </div>

    {/* Lançamentos da OS */}
    {loadingL?<div style={{fontSize:12,color:'var(--g400)',marginBottom:12}}>Carregando lançamentos...</div>
    :lancamentos.length>0&&<div style={{marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:800,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.8,marginBottom:8}}>Serviços registrados ({lancamentos.length})</div>
      {lancamentos.map(l=><div key={l.id} style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:8,padding:'10px 12px',marginBottom:6,fontSize:12}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
          <span style={{fontWeight:700,color:'var(--g900)'}}>{l.servico}</span>
          <span style={{color:'var(--g400)'}}>{l.hora_inicio}–{l.hora_fim}</span>
        </div>
        <div style={{color:'var(--g500)'}}>{l.funcionario_nome} · {l.item_nome||'—'}</div>
      </div>)}
    </div>}

    {/* Form lançamento */}
    {erro&&<div style={{background:'var(--red-lt)',border:'1px solid #FCA5A5',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--red)',marginBottom:12}}>⚠ {erro}</div>}
    {sucesso&&<div style={{background:'var(--green-lt)',border:'1px solid #86EFAC',borderRadius:8,padding:'10px 14px',fontSize:13,color:'var(--green)',marginBottom:12,fontWeight:700}}>{sucesso}</div>}

    <div style={{background:'var(--white)',border:'1px solid var(--g100)',borderRadius:10,padding:16,boxShadow:'var(--shadow)'}}>
      <div style={{fontSize:13,fontWeight:800,color:'var(--g700)',marginBottom:14}}>Registrar Serviço</div>

      <div style={{marginBottom:12}}><label style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.6,display:'block',marginBottom:5}}>SERVIÇO <span style={{color:'var(--red)'}}>*</span></label>
        <select value={form.servico} onChange={e=>setForm(p=>({...p,servico:e.target.value}))} style={{padding:12,fontSize:15}}>
          <option value="">Selecione...</option>
          {servicosDisp.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </div>

      <div style={{marginBottom:12,position:'relative'}}><label style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.6,display:'block',marginBottom:5}}>ITEM / PEÇA</label>
        <input value={buscaItem} onChange={e=>{setBuscaItem(e.target.value);setItemSel(null);setShowIL(true);}} onFocus={()=>buscaItem&&setShowIL(true)} placeholder="Buscar item..." style={{padding:12,fontSize:14,border:'1px solid '+(itemSel?'#86EFAC':'var(--g200)')}}/>
        {itemSel&&<div style={{fontSize:11,color:'var(--green)',marginTop:3,fontWeight:700}}>✓ {itemSel.descricao}</div>}
        {showIL&&itensF.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:'var(--white)',border:'1px solid var(--g200)',borderRadius:'var(--r)',boxShadow:'var(--shadow-md)',zIndex:100,maxHeight:200,overflowY:'auto'}}>
          {itensF.map(i=><div key={i.codigo} onClick={()=>{setItemSel(i);setBuscaItem(i.descricao);setShowIL(false);}} style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--g50)',fontSize:13}}>
            <span style={{fontWeight:700,color:'var(--blue)',marginRight:8}}>{i.codigo}</span>{i.descricao}
          </div>)}
        </div>}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.6,display:'block',marginBottom:5}}>HORA INÍCIO <span style={{color:'var(--red)'}}>*</span></label>
          <input type="time" value={form.hora_inicio} onChange={e=>setForm(p=>({...p,hora_inicio:e.target.value}))} style={{padding:12,fontSize:16}}/></div>
        <div><label style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.6,display:'block',marginBottom:5}}>HORA FIM <span style={{color:'var(--red)'}}>*</span></label>
          <input type="time" value={form.hora_fim} onChange={e=>setForm(p=>({...p,hora_fim:e.target.value}))} style={{padding:12,fontSize:16}}/></div>
      </div>
      {form.hora_inicio&&form.hora_fim&&calcMin(form.hora_inicio,form.hora_fim)>0&&
        <div style={{background:'var(--blue-lt)',borderRadius:6,padding:'6px 12px',fontSize:12,color:'var(--blue)',fontWeight:700,marginBottom:12}}>⏱ {calcMin(form.hora_inicio,form.hora_fim)} min</div>}

      <div style={{marginBottom:12}}><label style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.6,display:'block',marginBottom:5}}>QTD. ITENS</label>
        <input type="number" min="1" value={form.quantidade} onChange={e=>setForm(p=>({...p,quantidade:e.target.value}))} style={{padding:12,fontSize:15}}/></div>

      <div style={{marginBottom:16}}><label style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:.6,display:'block',marginBottom:5}}>OBSERVAÇÃO</label>
        <textarea value={form.observacao} onChange={e=>setForm(p=>({...p,observacao:e.target.value}))} rows={2} placeholder="Descreva o que foi feito..." style={{padding:12,fontSize:13,resize:'vertical'}}/></div>

      <button onClick={salvar} disabled={salvando} style={{width:'100%',padding:'14px 0',background:'var(--blue)',border:'none',borderRadius:8,color:'#fff',fontFamily:'var(--font)',fontSize:15,fontWeight:800,cursor:'pointer'}}>
        {salvando?'Salvando...':'✅ Registrar Serviço'}
      </button>
    </div>
  </div>;
}

// RELATÓRIO DE OS — GESTOR/PCM
